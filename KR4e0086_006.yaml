body:
  text: 泊菴集卷六明梁潛撰序送鄒太府詩序中書舍人鄒君尚友以母憂去官既服闋改蜀之資縣令其友翰林侍講楊君士竒暨左春坊中允尹君昌隆皆賦詩餞之以豫嘗教於蜀蜀之故冝知之屬為序尚友蓋溫厚而信恭守其身約其行無毫髮失意於人而接於人者亦無毫髮拂乎其中也皇上紹登大寶嘉靖萬邦大封勳臣稽舊章定程式惟是二三文詞之臣尚友克宣乃力益勤弗懈蓋尚友在中書也久習於故事他人所未知知之而未盡者尚友言之輒有所依據非茍然者夫百里之令得尚友為之誠無難也然治其民而為之防範禁制非素知朝廷之先後緩急者有未易能之若尚友於國家深計逺圖皆已知之熟矣而資又小邦其俗朴厚一令行而翕爾從一牒追而遽然至尚友卧治之足矣於禁制防範施為先後緩急夫何難也若夫登臨山川之壯以宏放自恣肆其情於文辭寓其言於簡札則尚友得於為政之外者豫不能知也然朝之士莫不兾尚友之還也則吾知其不能久於其任矣送丁行人出使占城序皇帝入紹大統幾二載功化𢎞溥至和薰暢禎祥軿臻騶虞神龜嘉禾野繭進於闕下者不可殫紀內治既隆外化益彰於是瓜哇日本琉球三佛齊西洋瑣里諸國皆聞風喙息文犀白象玳瑁珠璣之屬獻於庭者無虛日既而皇帝若曰凡天地覆載之內皆朕赤子也其往撫其君以綏其民惟是二三大臣受命惟謹乃簡廷臣之賢且材者次第以俟惟占城在海外萬里乃命行人丁蕙往蕙頓首受辭闕下不俟卜日輒往就道衣繡衣持使節策馬出都門外親知故人觀者皆辟易道路惟恐褻天子之使亦壯矣哉昔漢之初年婁敬陸賈皆嘗奉天子命出使外國然其時髙帝方平秦天下新定胸奴外夷皆強盛不可制以文法髙帝惟羈縻之而已初未嘗若今赫然南面使之奔走僕僕也而敬等於其時徒以口舌折之亦難矣蕙是行占城君長方將率其臣子再拜郊迎而其羣屬首領驚悸駭愕望塵而疾趨炎海之涯樓櫓所蒞真若自天而下也其視敬等相去蓋萬萬不同矣豫沗職史官方覩國家隆平之盛而又竊嘆蕙之遭遇其時也遂序以贈之徐伯貞字序國子祭酒鄱陽徐先生冢嗣恆以年當冠先生稽諸禮冠之冠已字之曰伯貞先生以豫嘗同官屬為序以朂夫恆之志俾有以進於道於乎甚矣先生之愛其子也夫恆之義在久于其道也故恆卦之繫曰利貞利有攸往貞正也恆而不以正非其道也非其道而守之堅固而不知改移變易以求適於正其不為淫邪頗僻小人之歸者鮮矣夫聖人之道萬世而不可易者正也自灑掃應對至於窮理盡性齊家治國平天下之大舍之而他求則為老佛之妄管商之詐儀秦之縱橫舍乎此入乎彼去乎其正即乎其不正者皆黜於聖人者也先生之意在此故有以名其子而字之愛其子者至矣傳曰愛子教之以義方弗納於邪其先生之謂歟於乎古之人自胎教至於成人所以習而化之者靡不有法故人之生而為正人端士之歸也易後世之為父兄者不知所以為教決堤潰防而求其免於泛濫橫溢亦難矣恆其勉之送陳大尹序泰和陳君善方自壯嵗取科第事太祖髙皇帝為戶部主事既罷去復起為海寧令尋以憂去服闋授江陵令或者曰江陵煩郡善方性簡易以簡易之性居煩劇之地竊為善方病之善方行有以其説告豫者吾與善方友素知善方多技能喜行書又工於為畫興到取片紙寫山水雲煙皆有逺意彈琴賦詩至夜忘倦又喜任俠馳奔堤走峻坂彎弓命中以為笑樂人人喜善方之能也善方亦以是自快於已豈以豪邁之氣伏而不施或於是焉發之耶抑情滋於中不能自抑所謂玩物適情者其在此耶此豫之所以病之而人固謂善方簡且易也然則善方暫已乎其外以一乎其內豈不可哉昔劉昆之治有異績號稱長者史氏謂其為政簡易不知昆所謂簡昜者誠有同於善方今之所云乎哉然善方敏於為政博通古今知所以愛其民恐豫病之者或不足以病善方也書以告之五峯堂詩序臨川程伯成讀書好禮重於鄉閭遂以多資選歷事於天官以其家五峯之下名其堂曰五峯士大夫為歌咏之積成帙因求豫文序之伯成臨川巨族也其髙祖楚國文憲公巨夫以雄才碩望受知元太祖髙皇帝一時羣公卿士多出其門而伯成之尊父又嘗司征於臨川衣冠世澤亦盛矣伯成未仕時優遊乎峯之下草衣木履望青雲而招五老其一時雅曠之趣豈不與五峯相髙哉而諸公所為歌咏稱美則又自伯成在天官時居多夫往來於天官者天下士也以天下士而為之歌咏未昜得者而伯成得之焉於是乎五峯之勝與伯成之趣益並髙矣而文憲之流澤豈有艾哉然而君子立身行已必自致其力而後可以不朽則夫五峯之勝固有在於伯成而不在此也詩曰無念爾祖聿修厥德伯成其以之送王紀善詩序皇明統一萬邦堪輿之廣曠古所無乃稽古隆建周親以大屏王室其王府僚屬尤慎簡拔蓋以宗社翰屛之勢默繫乎王國之重而凡王之仁明忠孝文武慈愛又繫乎其僚屬之盡其心也然官於是者必亷威自重素有譽望者乃能行其道而知其任職之重如此豫自來京師獲交魯府紀善王可貞先生先生問學切實通乎古今之奧達乎物理之宜而恬淡安雅未嘗有毫髮慕乎其外之心其行於家教於下信於友者又未嘗一日肆也故其鄉黨故舊識與不識皆知敬慕王先生聞其名而畏服之先生非所謂亷威自重而素有譽望者哉君子仕於朝與仕於王之國其為道不二其受命於君以食夫祿一也惟無所慕於外則可行其道無所枉於已則可以正乎人而凡有所憚而不敢肆有所畏而不敢發者亦惟察其心之無所事乎利而守之素嚴義之素著不可以威奪而勢驅故屹然中立不動聲色而邪佞自然消沮也吾求其人而未之見焉乃今見之矣豈不深可喜哉自今以往聞有仕乎王國而能行其道勝其任者必先生也先生將隨王之國一時交友即其所之道路所經山川之勝自京師而抵於魯分為題賦詩以餞之得若干首以豫辱交先生而又知之深也俾為之序靜學齋序豫在禁林七年得交遊之士二人焉烏江蔣君用文姑蘇趙君友同也二人者忠信慈厚而皆迹於醫皆為上御醫方纂修永樂大典編古方經二人者又總裁其事遂得朝夕往還久之蔣君去侍青宫豫亦兼官春方進與蔣君接迹而並趨退而與趙君有校讎講益之雅相得益密然不知二人造詣修飭於道者何道而能然也意其質任自然一日過蔣君見其名齋曰靜學然後知其所以進德者在此也於乎靜者德之基也先儒以謂飬得至靜之極則自然包括宇宙終始古今濓溪周子上承孔孟之緒其示學者亦惟在於主靜夫所謂靜者非靜而不動之謂也無欲則靜靜之中而動理具焉故雖古今之逺宇宙之大千變萬化之無窮説之於吾心者不見其有餘也由是以御天下之至動而不見其擾理天下之至繁而不見其棼所謂淵默而雷奮者動之中靜之理所以行也靜體而動用靜存而動行此誠意正心之事而蔣君達此其過人也宜哉諸葛武侯謂才須學而學須靜者周子之言非有取諸彼歟然吾觀蔣君之賢益有徴乎其言也蔣君與人處洞豁不為深隱人人愛悅之獨趙君淡然恬漠雖於醫亦不屑然二人者中情甚相似皆善文辭皆有得於靜者因讀諸公所為靜學齋詩喜而為之序既以貺蔣君又書以質之趙君也迎薰樓詩序泰和羅養吾築樓而名之曰迎薰其來京師也屬能詩者賦之又求豫文為之序豫嘗愛其所居地曰洞源去城邑稍逺而羣山髙出百里之外望之尤竒凡居其下者對之足以樂也况又有樓居如迎薰者哉按傳記薰者南方夏至之風薰和融泄長遂萬物即所謂景風者八風之一也爾雅以謂王道平暢致景風舜歌南風之詩而天下大治成康四十二年之間薰風潛暢豈雍熙和平之時亦若此風者哉夫上之化及乎下下之被其化為之鼓舞動蕩者要之無異乎風之動物也養吾生乎太平之世沐浴膏澤以休厥躬憂虞驚慮不入其懷意其登髙以望逺也氣逸而神放而薰風之來又蓬蓬然適與之遇自其外蕩乎其中交暢旁洽其一時所適為何如甚矣其可樂也然養吾之樂亦知其所自也哉夫涵煦於太和之中而不自知其為樂與相忘於其樂而不知其樂之所自者皆可樂也昔楚子坐蘭臺有風颯然而披襟以當之曰快哉此吾與庶人共之者不知楚子是時其風果如是否其樂同乎今之人不同也然養吾是樂又王公大人爵位名祿者之所未暇則雖如楚子猶不能同之是冝以之名其樓而播之於歌咏焉豫於山林之樂未嘗忘之而不能得徒取其詩諷而誦之也遂為之序送李昌祺還鄉序翰林庶吉士廬陵李君昌祺以省親得告還家其同年交遊之士各賦詩餞之屬豫序其首豫與昌祺同在禁林者六年矣見昌祺持已接人之密未嘗一日有異也蓋昌祺年方壯負氣而抱材學足以達其志行足以掦其學又自處者甚髙非禮義之所在雖千金不顧達人貴士雖平生知識不肯一造其門故昌祺氣益髙而與之合焉者益少也其或與昌祺傾蓋而莫逆者必剛方峭直之士茍容而阿媚者皆望風引去不敢近昌祺如此豈一時尋常者可擬倫哉孔子嘗曰吾未見剛者夫孔門德行文藝之所萃所乏豈直剛者而孔子每有意在是抑獨何也豈以柔靡卑下者易於邪佞乎抑為士者不有以養其浩然則不足以當大任孟子所謂不動心者在是也茍如是非學問之深到有以審夫義理之至精詳處而篤行之未有不屈於欲者也屈於欲則不得為剛矣然無欲未易也吾之有望於昌祺故嘗畏而愛之邵子以謂與人處降意最難吾欲強交昌祺而每降意焉又不知昌祺謂豫何如也昌祺二親俱康強見其子之賢而有立必其心甚喜之想昌祺之歸也林泉幽深而賔客填集烹羊擊鮮舉酒以相壽何樂如之吾又知昌祺於是時和色婉容之藹然矣是為序嚴氏宗譜序嚴氏吾鄉之盛族也其始居縣城東南方宋元之際嚴氏為極盛亭園臺榭臨郡城而俯大江雄峙壯麗照耀江滸自喪亂以來嚴氏諸老凋喪逮盡其宗族皆散處别居然鄉之人士稱嚴氏者尤必曰城上云蓋以别於他族以見其盛也今年冬有思義者以其從祖宗旦及乃父文祐之命求豫文以序其宗譜宗旦自城中分居縣南之小塘州其譜自兵革後散亂失次者皆不敢棄輒為綴緝其尚有可考者即勤勤采輯之所謂思晦者宗旦之幾世祖也與胡忠簡公銓為交友忠簡以直言忤秦檜被黜也道出廬陵一時故舊交遊雖甚愛慕忠簡然畏檜之虐焰多逡巡不相顧獨思晦無所忌且以一子托壻忠簡故一時士大夫皆髙思晦以謂使思晦居忠簡之地必能為忠簡也忠簡哭思晦詩亦自識其事於後觀古人所為事見今人之不逮也自思晦幾世至縣尹某元初兵甫定而他兵復起縣尹教邦人捍禦甚有力至今邦之老人猶能言縣尹故時居髙門而廣厦深嚴潭潭然人罕能到時其居即所謂城上者是也自縣尹至宗旦凡幾世吾鍾氏叔祖元鄉先生實壻嚴氏故吾於嚴氏事知之猶詳惜是譜不能完於前世事皆略也然宗旦文祐皆敦厚𢎞博起家致多資能以詩書禮樂教其子弟如思義輩皆俊雅夫前人之休光偉烈後嗣子孫所冝深究而景仰者故為述之俾以識其譜至於考求其世次而完緝之又在思義輩盡心也姚老人詩序姚老人者居泰和龍洲之上其地平曠幽敻樹林鬱然環其居皆沃壤連延數十畝老人既無所求於世惟盡力以事耕作麻粟黍菽之收嵗至數百斛家穰穰然老人時而作倦而休釀酒盈缸東鄰西社老農老圃相與劇談而放飲醉則仰天而歌聲嗚嗚然甚樂也一日慨然呼其子弟語之曰吾年方弱冠遭元季之亂干戈相尋無虛日孰意其有今也吾今沐太平之澤得以優遊於田野者獨敢忘其所自哉顧昔之人有獻芹者吾與若請效之即命為大筐藉以葉載蔗瓜薯芋之屬凡數十筐至京師輿之上獻有司為白其事皇上嘉其誠不鄙棄之乃命以獻既獻加賜慰勞遣還或者曰堯之時康衢老人之於帝力不識不知而已今老人乃獨有感若知報者將為有知識耶夫聖人在上涵育煦嘔如天地之覆載無一物不得其所而老人者獨知私念帝力誠有知無知皆堯民也昔邠人或獻豜于公或以所績為公子裳咏於七月之詩孔子列之於邠風其來尚矣則夫老人之事固冝播之詩歌且以見聖化之盛也於是衆為詩以紀其事翰林庶吉士陳君士啓屬豫為之序老人不知其名年既老稱為老人云元故江西參政劉公挽詩序公諱鶚字楚竒吉之永豐人公自幼篤學學既成遂遨遊四方覽名山大川以增其氣發為文詞沛然也教河南秩滿歸建浮雲道院以居之學者稱為浮雲先生纍遷祕書監郎與虞文靖公揭文安公歐陽文忠公諸名士日相唱和其學益大進遷海門縣尹不赴改南雄路經歷升翰林修撰階奉訓大夫以內艱去官及紅巾盜起東南諸郡望風瓦解而江州自李黼之死民益困乃擢江州路總管改瑞州路未赴尋升廣東亷訪副使至廣繕城池修甲兵聚糧餉勵將士調度百出而上下翕然賊不敢近移守韶州授中憲大夫廣東行省元帥復拜嘉議大夫江西省參政越二年韶州蠻獠亂公分兵遣捕之而贑寇乘間卒至時城中兵甚少賊兵強盛公雖老而氣尤壯乃自將兵乘城命他將領兵出戰公之幼子運亦戰死凡一月而援兵不至城遂陷公被執至贑賊幽之於慈雲寺時仲子述亦在焉公謂其仲子曰吾生平志於忠孝今不幸至此我死不瞑目矣作詩付述不食六日而卒享年七十有五於乎公起自儒生掦歷中外凡數十年而後受命邊閫膺國重寄不幸而國祚日危王綱日弛公之志謀才略卒不及展而死於難豈非命耶然公之死自足以暴白百世而深愧夫叛亂者又何憾哉第當是時修史者失之采録不得為公立傳以附元史忠義之次然豫嘗之廣道韶聞韶人云城陷時死者尚多不止公一人今其姓名皆泯滅無聞古今死節之士蓋莫不然書不書不足較也今年冬公之孫某持公生時所為詩文及元進士劉玉汝所撰公墓銘俾讀之既又以諸公所挽公詩辭屬為序故述其大槩為序之且以備史氏之缺庶幾讀者有考也送醫士郭彥和序翰林庶吉士袁君可逺嘗過豫旅邸道醫師郭彥和活人多而其心益勤不倦近可逺之室人病寒㵼衆醫雜視之罔效最後彥和遺藥輒愈余聞而慕之且豫亦多病也袁公云彥和之先嘗贅居其里琑氏琑氏好施豫有一僧謁之琑待之良厚久而不衰一日僧拈筆畫一牡丹遺之琑氏初不甚異既久發視之花之葩瓣中皆有字書隱然可見蓋古醫方也琑大異之令其壻按方試以醫皆竒效僧尋去竟不知所之後又有一道人令聚藥煉為丹俄見爐上有花絢爛若牡丹狀丹成如黍珠以活人雖瀕死者蘇由是琑與郭氏醫若神明琑氏今絶無人郭氏之後有彥和也彥和蓋杭人云太史公紀秦越人及長桑君之事皆出乎神怪杳冥聞者皆不信其然而杭人郭氏之事殆有如長桑君者豈醫之理深祕極乎造化之微口不能釋其意書不足傳其事故往往有神人發旨以示人亦異矣哉審如是長桑君之事可徴驗也則郭氏之醫誠有所自矣其取效於人有以哉送陳教諭之官郫縣序泰和邑庠弟子員陳所達由科第教於成都之郫縣其同年友數人皆為詩餞之以豫嘗教於閬之蒼溪也屬為序夫蜀在京師西南萬里外山川之髙深波濤之險壯望而想之猶為之心戰膽掉然豫於昔之遊有不能忘者凡吾身之所歷目之所遭竒偉雄絶交乎前而蕩乎其中浩然足以增吾氣而壯之也交遊之士往還而倡和氣相凌而語相迫足以搜滌勝概而逞其情志故吾之在蒼溪雖翛然挾䇿以事教學而脫然忘乎其秩之卑也窺聖賢之奧旨探古今之墜緒泛觀而約取鬱乎其中者宣之以簡牘感乎其外者暢之以咏歌神適而意會優遊而怡愈故雖去國之逺於豫懷無戚戚焉巖洞之幽竒草木之叢茂與夫筍蒲之為味泉籟之為音皆可樂者也今豫雖欲解心釋形如往年之遊有不暇矣則所達之行能無情乎所達年方壯氣方盛又頴敏有文詞以其素所蓄者卒然而遭夫幽異竒勝其所得又當何如哉適乎外而暢乎其中者殆有過於豫而不止此也抑人之性情好惡有不同者則所達之遭與吾之所樂亦有不同然者乎有合焉以示余無忘也余與之相好者今或老而衰或滿而遷或泯然長逝者有之矣惟山川風景之如舊豫因所逹之去又有感焉於是乎序送陳教諭序皇上神聖文武超越百王萬幾之暇端穆無為乃留情稽古召天下文學之臣啓祕閣圖書人文宏斡化機躬示軌度統貫萬類成書三萬七千餘卷命卜日以進既進覽之大喜賜名永樂大典所召四方士皆加賜遣還湖口縣學官陳廷傑先生今翰林侍講林君環所嘗從遊而受業者也先生之去林君求豫文以贈於乎方國家文明之盛制作之隆如日月行天而河海注地草木為之光華山川為之潤澤蓋曠古所無之盛典也而先生得從士大夫講論其至要考索其精微書成而列其名次足以有光耀不沉晦矣豫何言為先生贈哉雖然豫友國子助教歐陽允賢嘗為興化郡博士時先生佐教郡庠與歐陽君實同僚歐陽君云先生氣略宏邁喜功名慨然論天下事引大義以折衆説沛然不可遏也豫聞之心竊慕其為人意其必狀貌魁梧及今見之老且病癯然低首徐趨口未嘗道壯時事間為文一吐出其胸巾猶瓌偉竒傑如其平生然亦尋棄去不屑屑也獨時過豫旅邸論其所以為教之道一時士子造就之衆如前給事中陳君道潛林君文從今刑部郎中黃君重皆端厚而明敏而侍講君又以巍科碩學遭遇聖上者也蓋先生雖未得髙位以顯庸振耀於時而人之服其教者如此余用是知髙材重望之士雖低徊卑官未必無益於世而又以惜先生老而不及用於時使及用於時又當何如哉因書以贈之先生莆田人宜樂堂詩序溧陽史君仲川兄弟三人同居合食甚相友善宗族慕其行鄉黨服其義仲川兄弟又恐其久而或怠也乃取詩宜爾室家樂爾妻孥之語扁其堂曰宜樂之堂其從子常以善書選至京同預編永樂大典因暇日出示冝樂堂文一卷求敘之豫弟本之教溧陽常從學為弟子員本之每稱道常之賢故不辭而為之序曰夫人意之所適無不可樂富貴之光華臺池鳥獸之繁車馬聲色之侈舉世之爭趨疾慕如江河之流下而注海也而惟君子不樂焉肆志嚴谷仰浮雲而俯清淵外物不能纍其心優遊暇裕常有以暢其意而蕩其懷此山林隱逸之士所以逃乎世者而不專於是也亦其樂之一端蓋逃乎彼者安乎此泊乎其內而忘乎其外是故君子有以樂乎此也端其行以肅其家誠其身以敦其道閨門父子兄弟之間藹乎其雍穆之行使過其鄉而望其閭者皆知所敬仰名爵位號不加於已而風化之機默有所關孔子所謂是亦為政者又樂之尤者非有君子之行不能也仲川兄弟樂乎此而又兼得其樂之尤者吾於是乎深有慕乎其人焉仲川之先世系出漢溧陽侯崇之後崇佐光武舉兵定關中分土封於溧陽子孫因家焉今其廟尚在邑人稱祖侯廟蓋言史氏之祖也歷晉唐宋皆有廟碑載其始末甚詳見於郡志者其事亦合獨漢史不載其事古今事失不見紀於史者何限不止是也史氏在宋尤盛如丞相彌逺嵩之之類今散居溧陽者猶數百家嵗時皆合祭於侯之廟侯亦數著靈異鄉之人無不畏敬也仲川豫未及見之常則相與出入乎禁林者凡期嵗其從兄源今為驍騎右衛虎賁百戶皆溫良而信厚即余之所已見於史氏者如是於其所未見者乃知之矣并書以為序使讀者知史氏之盛其澤有所自云羅氏復姓序姓氏上世所以别生分類要不可混也春秋鄫子取莒公子為後聖人書之曰莒人滅鄫非莒滅之也主其祭以祀夫鄫者異姓耳夫子孫祖考本同一氣其精神自相流通茍以他姓承乎其先則生者之精神與死者之魂氣已判而為二如董子所述嘗時祝降神之事是也莒之滅鄫聖人如之何不深譏之哉秦之亡以吕政晉之亡以牛氏漢大將衛霍二人所冒非所承後世大賢如文彥博真德秀又以時之所諱忌者改其所生惟范仲淹能卓然知其所冒朱氏之姓此豫蓋未之見焉夫承乎先以統乎後使人之道不至如夷狄禽獸渙散離析而無所屬其於人倫教化非小補也此而不察何可哉豫先世亦嘗後乎鍾氏至豫始復本宗一時故舊耆老尤駭然怪之且誚讓不已從今見之世無孔子者亦其惑乎俗而未嘗考乎古也吾里中羅孟昭自其祖壻於邑之劉氏遂冒其婦翁之姓而後於劉氏亦遂以某之子為嗣此與昔博士所議賈充之事無異傳三世歷數十年至孟昭始與其兄弟行十餘改復其姓請於朝而易其舊籍遂使羅氏先世復得以歆其祀於冥冥之中孟昭可謂不溺於流俗而能由乎古之道矣因翰林庶吉士陳孟京來屬豫一言為序豫喜其志之同於豫也故為之序使世有如豫二人而未之復者讀此而悟庶不至於溺而忘返也送江大尹詩序江君奚修都昌人宋丞相古心先生族孫也古心為文章持論髙出乎古人而仕非其時進不得遂其志退而委身以死於世亦偉矣哉然獨怪夫丞相後百數十季江氏未有顯者聞有均霖者以能詩擅名都昌均霖即奚修之尊父則江氏詩書之澤固未艾也奚修自幼承其家學抱負才略卓然著稱鄉閭洪武中以薦至京師奉命按事閩越有能聲然奚修不事表暴欲晦迹一時乃自混於醫以能醫選為大醫局官同預修永樂大典出入祕閣者幾一嵗奚修精練而博大又勤慎小心故凡與處者莫不知其賢也求賢詔下有薦之於朝者擢授溧陽令屬舊令還改髙唐之夏津縣夫古之君子甘心於下位者雖或病其名之著而亦惡其實之未符也故君子寧沒世不揚而踐履之有餘寧終身不遇而篤行之無愧吾觀奚修僅僅自處於卑退豈非所謂君子人哉奚修之宰溧陽適豫弟本之教溧陽云溧陽人莫不愛慕奚修欲白於府而留之府亦欲白於天官俾與舊令並任一縣會非例卒改去溧陽人莫不怫然嘆息以舊令故不忍顯言也其為縣才一月耳使及期嵗三年當何如也世之務名失實飾其外而枵然其中者能如是哉吾於是益慨夫古之君子者少見而深幸夫故家文獻之未泯也其友翰林修撰余君鼎相率為詩以餞其行因屬豫為之序楊氏族譜序左春坊諭德兼翰林侍講楊君士竒以其所修楊氏之譜屬豫序豫觀之而嘆曰何其盛哉楊氏吉水泰和兩邑者皆出南唐虞部侍郎輅虞部始居吉安郡中其子遷吉水若忠襄公邦乂文節公萬里皆出虞部而譜不復録者譜楊氏之在泰和者也自虞部又四世曰允素居泰和至今侍講君凡十六世其統或絶而不屬者詳其世次之可知不可知者則闕焉其支沠分合稱位名號皆有法而不茍也在吾邦世家文獻鮮有過楊氏者方宋元聞楊氏所居臺榭之壯接鄉閭田園之富連阡陌及喪亂起凋落而消亡者多矣獨詩書禮義之澤浸潤涵蓄沛然而不竭豫獲與侍講君同侍禁林君之曽大父吟窗公以亷潔忠厚著聲前代纍官翰林待制致仕事在元史循吏傳中吟窗公諸子如平洲如望之皆擅能文章平洲之作如西漢盛時演迤浩博而極典則望之頗瓌偉雜出於莊列而理致油然皆當時所甚推讓而持行又甚髙不可及也然皆遭時之亂卒死於窮困不得大振耀於時今侍講君生逢治世列位清華方受知聖上恩遇尤厚而其從子相又擢進士第居翰林父祖子孫百數十年既僨而復興既墜而復振何其盛哉吾於是乎有以觀君子之澤矣譜之作豈徒然哉豫祖母楊氏雲衢先生之子今侍講君之族姑而豫娶自明先生之子又侍講君族妹也然自豫祖母之親與豫妻之昆弟皆無嗣未有後之者雲衢之後蓋轉徙於他郡無聞焉徒賴是譜之存也然則合其逸而存其亡譜之作豈小補哉因併及之送羅秀才南歸序秀才羅同以其學官之命奉簡書上報於京將别而歸求豫一言以復夫鄉之先生長者太學生曾夢浙又來速豫一言以贈豫將何辭以告同也然聞之近吾邦子弟抱美質負俊譽挾材而進乎鄉校者比比引辭以詰難騁氣以矜能捉襟而並進連袂而羣趨操觚握管以登乎先生之堂者偉如也其進而仕於朝得與士大夫之論議又接武焉亦盛矣同循其迹而進可以自足尚何徴豫言哉豈以豫亦嘗遊乎鄉校耶禮曰教然後知困學然後知不足吾今而後知夫困與不足矣然豈惟豫為然夫人萃衆資而貯之充囊而滿槖穰穰然足矣可無資於人矣而或能肆於百家之市售於通都之衢應乎人之求者十無八九弊弊焉走東西強求以給之如何其不誚於人哉夫古之教者自王宫國都至於黨術閭巷莫不有學君臣朋友之倫視聼言動之則莫不有以教之使底於中和之極而知其偏頗之謬消其忿戾傲惰之氣而成其恭孫亷讓之風既克而後發既足而後用非若後世馳心役志以茍於文辭利祿而已其為説具於六經子思孟子又從而推明講説之其指甚深求之終身不知所止也同尚勉之無使徒為困與不足之歸如豫之今日焉可也聞豫弟洄與同同起處稍相厚而洄方有浩乎自足之心所謂偉乎升堂者洄亦其一也同歸以豫文示之以復夫鄉之先生長者云贈别胡生序古筠胡生振來京師謁豫旅邸豫視生偉然進趨有容其言論有節豫固愛之也生嘗從吾弟學科舉業前年秋偕多士試於有司生以未捷去今其來也察其志益鋭若生者何患不科舉哉然生之志宜不在是也凡士之於道也必知之明而後行之至而知之方必自學問始奈何不求其本而專事文詞哉紫陽先生嘗謂習熟見聞知有科舉而不知有學問夫設科所以求學者也其流乃使人至於廢學豈不失其本哉生之質甚美要不可忘其大者也豫又聞生之大父商隱君持身耿介而識見絶人國初太祖髙皇帝遣大將軍平江西諸郡以次定獨筠城守帥尚不屈聞大將軍别遣將誅守者遂謀盡殺城中人引衆遁去城中人皆洶洶賴胡君力陳禍福守者乃以城降大將軍欲官胡君君竟辭去大將軍亦不強也至今筠人德胡君不忘夫活千人者必有後今胡君所活數萬身不蒙其利傳曰不在其身則在其子孫豫用是知生之蒙其澤有自也生之質如此其美承於先者如此其厚而求速成於小效可乎哉念先世之勤以成其所大者豫有望者甚深也於其歸為之序習尚鏞詩序憶昔往年豫與習君尚鏞同考試廣東鄉闈君與豫故同郡甚相厚也既而有旨不果試遂皆别去君宰長樂豫守陽春地相去千餘里不相聞者久之會朝正京師與豫偕來豫有史館之命而君之去甚遽欲相與一言不可得也然往往聞人自嶺南來輒相從問習君習君為政寬厚持平若古之循良吏然長樂地險而俗陋前此為宰皆難之獨習君以能職聞既而以考績詣天官過豫旅邸聼其言論又讀其所為詩文蓋君之齒益壯更事益多故其言淡泊而理緻精慤其氣坦夷而心志堅定豫既察其行事又知其文辭如此蓋卓乎其未易及矣習君援例復任長樂乃以其詩一帙屬序之夫文學政事理同而事異自昔聖門之教且不能合而兼之者况去聖人逺後世之為教者又不知因其材以培植篤厚之士生斯世雖窮心力以就一偏猶不足以適於用况求其能兼善並美如習君者哉習君詩若干首讀之不獨知其才之美且知其為政之良也於其去姑為之序君諱韶世家吉之永豐云黃逢源字序豫友黃君孟岡以其從弟濬字逢源屬豫發其字之之義濬父嘗為都給事中於吏科於豫有同朝之雅則為之言以告之冝也夫源泉之本也孟子所謂取諸左右逢其源者在深造之而必以其道焉爾然源者流之本也江河之大浩瀚汪洋回折萬里而不可遏者其勢則然也堯舜文武周公之道仲尼之教與天地並立而無窮者其源端且厚也眇乎百世之下邈乎千載之上而欲泝其流以探其源非百倍其功可乎哉疏之欲其通引之欲其達涵之欲其深蓄而放之也欲其一日千里此古之人所以孜孜焉終其身未嘗一日怠也夫造乎古之道者過乎今之人也逺矣溺乎今之學者去乎古之道也亦逺矣故君子之用其力也不淺近而止其不淺近而止者蓋有不能自止者存焉自名物度數之微循而上之極乎性命道德之藴如之何其可以止也行之而不息進之而日強則庶乎逢其源矣逢其源而謂古之人不可幾及吾未之信也黃氏世家興化自唐以來多名士宋熙寧中有狀元諱公度者即濬之九世祖而給事君今方被寵光於朝然則濬所以承乎其家者在此也可不勉哉可不勉哉因為之序以復於孟岡石岡書院詩序西昌城東南三十里有山曰石岡蕭先生自誠家其地凡十餘世矣松竹鬱然庭宇幽敻則所謂石岡書院者也蓋先生之七世祖儀鳯之所建宋末燬於兵儀鳯從孫梅溪復創之元季又燬於兵則梅溪之孫三溪創之三溪則先生之尊父也始終百餘年書院燬而復建者三焉夫人事有廢興理固然也然君子篤志勵行乘時以圖不朽則不係於是焉儀鳯登宋漕貢進士致身顯宦其子子安亦仕宋為諸王府掌記丞相文信公敗而南也子安從之起兵一時豪傑慕義之士皆聞風而起及丞相之被執也子安死之千載之下聞之為之慨然夫丞相之名節與天壤並立而子安亦可謂烈丈夫矣嘗聞鄉之故老言丞相敗時事云當時死者極多事既無成其家人子弟懼禍往往諱言之故忠臣姓氏多泯滅不得列於大史氏以暴白於後世然至今鄉人有得丞相要結起兵時手帖者猶什襲之不忍棄去嗚呼遺墨弊楮人猶寶之如此至於死節之士何獨諱言而使之無聞哉有如子安者豈不深可痛耶古稱志士殺身成仁求無愧於心而已睢陽之士從巡遠先後死者豈必盡書之史氏也茍無愧於心焉書與不書又不暇論也子安之死此石岡之偉烈也在鄉人所當仰慕者况蕭氏之子孫守其遺構舊業也哉自誠先生敦厚而信慎雖老猶喜道其事則其志可見矣今年冬來視子省身於翰林以子安之殁已久而書院存焉求一時名士歌咏之且以謂書院教之地也而子安事有關名教甚大以豫為史官屬為序夫發潛德而紀先賢後生之責也豫不敢辭故備書以序之讀是詩亦可以興矣送山東都轉運鹽副使蕭公序前吏部尚書劉嵩之髙弟弟子曰鵬舉蕭公事我大祖髙皇帝為蘇州同知今為山東都轉運鹽副使既三載考於京師復任山東或者曰公老矣較利分毫於簿書期會之間小有弗當輒獲大戾維年少志慮精明者庶或克之公非其職也公視之泰然於是趙府伴讀鍾啓晦其甥也來徴豫一言以餞之豫惟公之學於劉先生者舊矣先生之德汪洋停蓄而不著其迹其為教因其端緒引而伸之俾自出之故從之遊者咸知正志以自飬而公之得於先生者蓋多也公之在鄉也其自守嚴而人稱其長者也其居於官不徒亷也而接於物者勤而厚其為詩無嫵媚態雖甚貧且老所以持其已者不少衰也甚矣公之有得於先生者多也夫君子之事業係乎志焉志之堅雖老猶壯志茍自隳矣雖壯且勇不足有為也公不以老且貧而移其平昔如此冝乎其處之泰然而無不可者夫何憂乎其難哉憶豫童丱時聞劉先生之館於蕭氏也每好遊詠以暢其懷其所與遊者率多名士金華之岡武山之麓騎往而輿歸極飲盡歡惟公為之傾竭故先生之詩凡為公而發者十常二三今讀而諷之其交際之情相知相好之深猶可想見也夫國家自賦稅之外惟鹽之𣙜最重今天官之選必得公其人豈無意哉又三載而來也人誦善政必推本而言曰劉先生賢弟子如此豫尚當與故鄉多士候於都門外而賀焉董太守詩集序知海州董君厚英集其所為詩若干卷水部主事曾君仲濬以屬為序豫素聞董公賢心竊慕其為人得其詩未暇盡讀間取而諷之知董公非徒務為音韻之諧體制之協而已觸之於外發乎其中或曲而暢或婉而達如行空谷幽意獨得蓋不必他人之盡喻此董君之自得也故董君意之所適輒見之於詩讀其詩有以知董君焉董君氣充然言論深厚而其為海州也守其身既嚴而施之於政者又果行於家可法乎其民庶幾乎古之循良吏也於乎昔人所謂登髙能賦可以為大夫觀之於董君豈不信哉然古詩三百篇自非宗廟朝廷稱頌告戒之辭多出於田夫野老優遊間暇者之所為而當時公卿大夫所作無幾也亦豈有所不暇哉抑亦功業之大足以及乎民則詞語之細無所用於世耶果然則董君之大者又不在是耶君四明人逮事太祖高皇帝為廣西參議既老低徊一郡守與曽君嘗同僚所居一榻扁曰淡遊故其詩曰淡遊集云贈蔗境翁歸教上海序泰和尹務厚先生今年夏以編纂召入禁林尋以老病得賜告歸教上海皇上復加賚豫眷待優至人皆為先生榮之先生嘗名其軒曰蔗境既又自號為蔗境翁於其去潛送之城南門外相與酌酒為賀遂進而問之曰昔人有言仕宦如顧凱之啖蔗漸入佳境者蓋以逡巡卑秩而躋於顯榮沉困淡泊而入於甘芳此雖常人之所羡而亦定分有命者之不可強而得也茍得之斯謂之蔗境矣今先生以七帙之年窮一經遭明盛之時曽不見試於公卿之門出入臺府之間吐竒獻計以禆夫聖政之萬一徒低徊下位僅僅自守既無以加乎人又不能裕於已乃尤以蔗自吒抑獨何也豈濶步長趨之難追而倒行却走以自快耶言未已先生撫手大笑曰豫與子處者素矣而猶言之若是况非素知豫者冝乎其喋喋哉雖然豫秉節亦何嘗苦也豫始冠值元季兵亂奔走逃避於亂者無寧日幸干戈底定始知挾册呻吟以為茍安計既而豫有子子又孫沐太平之膏澤進秩文學亦足以自髙矣且脫略不羈可以逸其老酣暢自適不為曠其官後之樂過乎前今之得加乎舊此豫之所以甘心焉者孰謂非蔗境耶縱九鼎前呈吾不以易此也然則吾之裕於已者至矣而奚以加乎人哉言已復浩然笑去不顧豫聞之斂容而嘆曰蔗境翁有味乎其言之也易所謂苦節不可貞而有甘節之吉蔗境豈必非甘節而底於甘節之吉顧豫何足以知之於是乎書慶塗氏母壽八十詩序翰林庶吉士黎川塗君其祖母夫人今年甫八十塗君密數其齡欣然喜之然以去家逺不得朝夕侍膝下歉然若有憾於懷者既以語其同里素所往來者則又以告其相知親厚者則又語夫凡同年交遊之士聞者皆為塗君助喜遂各賦詩以遺塗君俾以為祖母夫人引年之貺且以樂其志抑亦釋塗君之憤悶也詩多積成軸塗君持示豫請為序豫與塗君同出入禁林數嵗視塗君氣和而色溫循循然終嵗未聞塗君有疾言遽色以失意於人者人亦甚愛敬塗君塗君真純孝人哉豫又聞塗君之尊府登洪武甲子科進士第仕於朝為給事中恨早世而塗君之母夫人今亦老矣二母蒼頭鶴髮並列一堂而塗君能奮自孤童日以詩書自課竟取科第入翰林為時名士塗君蓋又真能以志為飬者也夫子之於親以志養者其意氣恆相通如肺腑之相屬自不懸隔則塗君於二親雖更越千里不逺也塗君謹行以純乎其孝又能以志養其親如此以踵前人之聲光居清華之密地其為二母之榮壽何如哉古之人令妻壽母之歌春酒介眉之祝未嘗不形之於歌咏則凡與塗君交遊而賦其事者其亦宜哉豫故樂而為之序壽安堂詩序豫弟本之往教溧陽與醫學官曹君孟文為交友孟文醫術精專而用心誠實今年秋來京師過豫旅邸談論連日夜知孟文有老母年九十康強無恙早暮起居猶勤勤誨子弟曰必讀書為善人茍不為善雖烹羊炮羔吾心不樂也誠為善雖啜菽飲水吾之心樂也雖老其精神智慮不衰猶如此或有過孟文喜其親之壽而康強也為題其事親之所曰壽安之堂孟文求能詩者歌咏之因屬豫為序夫人莫不願其親之壽而有不可必得者其或壽矣而老憊衰病之侵不能安也茍壽而安矣而時非太平之盛家無可資之産索莫無賴或奔走道路而遠違其親者何限則雖壽而安不樂也今孟文官雖卑可不去其家無政治之繁苛守之以老山林之幽迥田園之密邇親愛子弟朝相問而暮相聚也用是以娛其親而和其志則冝乎其親之壽而安也孟文亦其幸哉然吾觀孟文雖老淡然寡嗜欲飲酒終日不亂諧嬉笑謔神氣恬暢亦皆壽徴也詩曰豈弟君子遐不眉壽又曰令妻壽母三壽作朋其在孟文乎於是乎書贈大尹戴君序豫假令陽江時適莆田戴君原性為僚屬君靖恭而不肆亷慎而益貧然自以老成先進低徊下位削去觚稜鏟除崖岸舉耿介特立之氣消藏而掩閉之蓋非其謀之拙計之窘局於所居守姑孫焉自晦求無忤於物而已豈其所欲哉雖戴君未嘗幾微見於色而吾不能不為戴君動念也且陽江地濱大海其民多豪武竄名軍籍中搖毒以自防者皆是獨戴君能以理為之勸喻嚮道凡兩考卒以能職聞則戴君非茍為自適計誠所謂和而不同者戴君又焉失其為君子哉近有以其名薦於朝者天官亷得其實以聞於上擢興寧縣令吁戴君是行亦可以掦其所蓄矣夫馳騁於康衢與折旋於蟻封者其勢不侔戴君將凌厲挺拔以為髙抑隨浪混世以自同耶將震耀竒偉以為新抑因依順適以從俗耶承乎其上者不易也懷乎其下者亦不易也抗辭以自守與惕威以奔命者不同綏之以慈惠與齊之以刑罰者亦異凡事幾之會惟其施之當而已豫昔焉有資於戴君者猶所謂佩韋也今豫以空言無益誠有禆於戴君乎哉戴君必有以自處非豫之所能盡知也因其行書以贈之戴君其擇焉具慶堂詩序翰林庶吉士錢唐孫君子良嘗過豫道其友張用良之賢且稱其孝友深至鄉之人鮮有及之者豫頗惜未見用良也今年秋用良來京師始獲識之於子良寓所其進止循循然氣質清明言論慈順信乎如子良所云及聞用良二親尚康強兄弟數人皆有美質如用良之孝友何其美哉或有扁用良事親之所曰具慶之堂用良求能詩賦咏之因子良屬豫為序夫人情之所願欲事之可喜而可樂者莫大乎父母兄弟之無故是即孟子所謂三樂之一也蓋人之樂而繫乎天者也係乎天者有命焉非人之可必也人於其不可必者或得之於天其為慶祥祉福孰大焉得之於天矣而不能祇敬恭順以盡其在人者則為負其天者也人而至於負天其為罪罰悔吝又孰大焉以慶祥祉福之獲而不能將順以為樂至罪罰悔吝不能逃悲乎其可慨也今吾用良有父母兄弟而能篤天倫之真盡孝友之道以無負於天無愧於人可謂賢矣用良與子良交甚厚子良直毅少許可而甚稱用良傳曰不信於友不順乎親用良信於友矣其行之於家有本矣播之於歌咏孰曰不宜於是乎為之序水天清意軒詩序豫弟本之近自溧陽至京師與豫言溧陽楊公亮之賢昆弟季友讀書篤行其器宇甚髙不可以淺窺嘗搆一軒於瀨江之上終日獨坐其中天光湖影既足以澡雪其志慮蕩滌其志意而鳶魚飛躍之趣又若油然默會於忘言之表者因題其軒曰水天清意軒詩者為咏歌之求豫文為序於乎豫方酬酢紛擾於詞語之末搆鬬之相汨無斯須少暇亦何足以發輝振越於公亮哉然人之有心所以神明萬化惟學問可以致知惟無欲可以主靜而非幽隱間逸以少絶夫外物之纍則亦未易以察識夫聖賢天地之量也李願中先生謂常存此心勿為事物所勝終日危坐而神彩精明康節先生謂養得至靜之極自能包括宇宙終始今古之人所以存其本體而致其功用之妙者如此今公亮年既老謝紛華而絶外纍久矣吾意其優遊一軒之中微吟短咏逺求近取山川為之春涵草木為之光輝其為水天清意默有所解而口不能發也因論而序之使讀者知外物紛華之無益而豫於山林之士亦有愧也贈教諭康孔髙序康公孔高往與豫同遊鄉校同舉鄉貢上春官俱下第為學官各自東西去不得見者幾七年及豫來京師孔髙亦以朝正至别去未幾聞孔髙以母憂去官矣既服闋而來得改教於沔陽之景陵於其去不得不戚於懷也一時故舊在京者皆為詩餞之豫孔髙素交也屬豫序焉孔髙抱負才氣而騫偉不羈凡交遊之士莫不羡孔髙開通卓絶豫以為使孔髙得用其所長以理治繁劇當烈烈有能聲有顯效為一時所重乃瀟然抱遺編日與士子講論課䇿卑卑為儒者事雖孔髙油然自得豫固惜其材也孔髙鬱乎其中者既無自而宣暢意其中必有甚不屑者存焉及其徒有在太學者聞其來皆持酒殽爭來拜謁惟恐有後皆以為自先生之去無以考質疑問貿貿焉至今不知所以為學至有泣下者茍使孔髙有不屑之心能使其教之及人感慕向仰之篤如此哉夫孔髙蓄之厚而不求其施處之卑而能安乎其命盡其心而無憝其中如孔髙者可謂君子也已豫用是又卜其將來可用於人而未止此也尚其益加勉焉贈劉仲戡省兄還家序太學生廬陵劉君仲戬來京師之明年其弟仲戡來視仲戬於太學將還翰林庶吉士李君昌祺屬豫一言以贈之且謂仲戡孝弟而恭孫其志也鋭其學也勤其才不下其兄仲戬也豫與昌祺同編修祕閣最後得仲戬來皆相知深厚昌祺頴敏負氣剛介不少屈不妄交人人亦不黷交昌祺也乃獨與仲戬善仲戬從容而慎密寡事而多材方編摩倥偬簡編如山海非甚有精力無不困􅉵者仲戬朝夕從事未嘗少怠豫賴仲戬力蓋多今又獲交仲戡因其兄而併得其弟因交昌祺而併得二人者同類之相遭同氣之相合何其樂也昌祺與仲戬居同室學同業嗜欲好惡不異仲戬之在家一家之政皆仲戬所經度仲戬藉是無內顧憂益得盡力於學問今雖去家遠仲戬亦何憾於已哉然仲戬之材人咸知慕之以其名薦於朝久矣獨不知有仲戬也使知之能不為仲戬奪去哉因昌祺之請故書以為仲戡贈云歐陽助教重修族譜序豫嘗觀國子助教歐陽允賢十一世從祖參軍毅誥敕及其行實知其見忌於秦檜未嘗不悲嘆之及觀其譜諜見其子孫宗族之盛則又羡慕夫君子之澤也方毅以護軍長史參韓世忠劉錡軍事髙宗一見知其賢遣奉使于北詞氣侃然不可屈及歸即途中斬金將之首以徇何其壯也毅是時功業可引手致矣而為檜所擠竟不大用以卒於乎自劉嶽諸將之罷一時才烈之士低徊老死於下位如毅者豈少哉欲求其有後與否又不可知矣檜之惡甚矣聞其後獨繁徒以檜之流毒多諱言所從出夫為惡不必無後為善不必有後然以檜之子孫顯絶之於後世則檜之有後猶為無後也檜雖死地下視歐陽參軍寧不有愧耶歐陽之先自吉州為刺史琮生子彪彤萬彪之後不復續萬為福安令傳九世即為文忠公修歐陽之譜最號有法蓋自公始為之彤七世至宋大尉梁國公忠敕葬萬安子孫遂為萬安人忠八世即為毅毅弟德祖由萬安徙泰和之蜀江至今允賢凡十一世其為譜源委端緒愈久而愈著不妄如此蓋與文忠公之譜並行也豫嘗過蜀江見歐陽氏諸老若三峯先生某若觀民俊民伯仲皆宏偉博雅及來京師與允賢日相往來其從弟允俊以庶吉士留翰林同預編纂又皆才力壯健而學問過人允俊因暇日以其譜屬識一言豫嘉參軍之壯烈而喜為其後嗣宗族道之使以自勉也贈歐陽助教歸省詩序豫來京師之明年故人歐陽允賢以興化郡博士升授國子助教又三年考績天官得援例歸省其親凡故舊仕於京者皆為允賢榮之且相率賦詩以餞其去而屬豫為序憶豫未仕時與允賢交厚允賢取科第宦遊四方别去幾十年既而得仕京師無旬日不見見即劇言深論歡然也今翰林侍講楊君士竒與允賢尤相好每暇日允賢出太學而來也輒使人走東西要致之至即數人者皆來連挽之不聼其去歌咏諧嬉淋漓傾倒往往至夜分不止或遂不得寐呼輿𨽻秉燭趨朝去亦何其樂也豈外無觸忌之嫌而內有吻合之趣耶不然沐皇上太平之澤恬逸清華無所纍於心而尤脫略至此極耶豈不過矣然允賢為人寬易諒直不鏟削為峭厲亦不茍附而妄隨其為文章似其平生氣平而意雅人讀之知其為允賢作也允賢凡見人過失又能懇懇曲折指告之必使之改乃止由是豫數人者益慕之而願與之狎於乎世之士相頡頏勢位外為深密而中懷忿疾以相夸勝者多矣苟坦夷相接則同欲合私鮮有所規亦何足道哉然則有如豫數人者或庶乎可以免此矣允賢家泰和蜀口兩江之間江數里合流而東為金魚珠浦其族繁衍幾千指其子弟以科第發身者多矣今其歸得一見其長老接其子弟歷覽丘園之勝其喜蓋洋洋矣然吾數人者不可一日無允賢也望其來毋久稽也贈王紀善序往年豫與王君作昭俱遊邑庠作昭力學為文辭甚雅潔與人交忠信而和易可親愛而不可慢也别去久之聞作昭舉貢上春官心竊喜未幾聞作昭授官徴稅於京師意頗悒悒不樂且嘆作昭不遇也然作昭能莊敬持已又亷潔雖居卑官若蒞顯秩用此名聲遂大著今皇上紹登大寶作昭遂被簡擢肅王府紀善將别過豫言曰是行也吾殆有得焉吾聞肅在陜之西北極遠萬里外黃河之波濤潼關之壯險終南大華之竒拔髙峻天下之竒勝也道而過之可仰觀俯視以滌蕩其胸中且吾之學未博藉此以自廣也吾意作昭去京都舍故舊於萬里外必有逺别艱難之狀而其言乃爾此豈非宏曠超邁之士哉夫士之立功業以有成者必其氣之充也不然未有不蕩於外長其中焉作昭於得失之際處之脫然如此誠有以養其氣矣則作昭自今以往益大著其功業者又可量哉遂書以為别送吳縣丞序豫假令陽春時適番昜吳君子育為之丞子育端士也慈良而溫厚其用心惟恐其悖於物而病乎民也嘗歉然若不足者豫愛之其交也特厚其志慮又相同也子育嘗按行邑中還或欣然以喜或憮然不樂長嘆久嗟中夜猶不寐豫見子育之欣喜憂嘆不待言而已知其心之有以然也雖子育於豫亦不盡言豫以為陽春極天下之陋然得丞如子育者即不陋矣豫來京師又一年子育以考績至雖别之久相見而言未始有異也先是有舉子育於朝者召至京師將加擢用焉而未果及考於天官政績居優等將加擢用焉又未果遂以一丞弊弊焉復走嶺海外人皆惜子育之不遇夫時然豫獨喜陽春之得也夫以陽春之僻且遠得丞如子育而民安之茍通都大邦為郡守令丞者皆如子育焉可以少副我皇上側席斯民之心矣何獨少見之耶然以陽春而得子育則通郡大邦如子育者必多顧豫偶未之見也豫又聞子育之尊府君嘗為令廣之亷山有惠政其民至今思之不忘亷山亦陋邦何吳氏父子所居官皆惡地而皆有善政豈其地雖惡而天固不鄙棄其民必多使賢人君子以化導惠養之乎果然則吳氏一門二人矣豈非命耶命出乎天凡人之行合乎天者其獲報必昌光顯榮而少遲然則子育亦盡其心以俟其報於天可也又奚以惜其去為哉於其去書以為贈贈僧冰壺歸西昌序憶豫未仕時讀書於城東寺之地藏院氷壺始祝髮學浮圖氏禮雲間禪師而受業焉未幾來從豫讀儒者書其質醇雅而溫厚與之語道理講析古今已隱然見端緒及告之以天人物理之際禮樂人倫之大亦深悟其所以然者豫既愛其質之粹而又惜此之失而彼之得也是時豫與雲間又相好然雲間混一世於麈埃中顛倒諧嬉傲然自適一時名士大夫皆相與為忘懷莫逆眇論微言巧射曲中四坐為之絶倒有不愜其意輒白眼怒罵之亦莫敢誰何也獨酷愛氷壺不置遇佳客長者來輒誇道出示之於乎雲間沒又十餘年矣而氷壺今已長大長身秀眉竦然叢林中惜乎雲間未及見也使見之其誇道喜悅又何如也然氷壺年益長而行益篤事上恭接下有禮蓋遊乎方之內也雲間傲放以為達氷壺循規而自守雖規模不同皆髙士也時皇上祝禧於高皇帝於是天下名僧皆集京師而氷壺亦在焉既竣事受恩賞而還書此以贈之所謂散僧入聖小禪自縛者庶幾氷壺與其師皆近之而氷壺又非自終者也送楊生剛歸溧陽序代作翰林修撰梁君潛之弟本之為溧陽教諭之數月凡學之政教弛廢者一旦翕然且興既又以其書籍缺未備不足以資學者考習命其徒楊剛來太學摹印以歸修撰君以豫與本之交遊相好之深也欲豫一言以贈剛之還以進剛於學且以朂其弟本之也修撰君之愛其弟無不用其情如此然豫聞君子之學於堯舜文武之道周公孔子之教非徒講而習之也必使得之於心者明白而堅固則措之於事者正大而悠久正大則德尊而道著悠久則化洽而民附古之人之治與教蓋如斯而已豫往年與本之講論之以此自念於心然汨於物者多矣獨本之養之以間靜無外物以亂其中所蓄之富所積之宏氣盛而志暢豫固有以觀其壯偉光大於將來也剛之從本之學質甚美志甚端其來京師未嘗一出遊市肆中神樂觀有裘煉師者與剛同里善鼓琴剛主於其家相與清論終日無毫髮塵俗氣由是修撰君甚稱道之豫又聞剛之祖公亮老成有問學喜賦詩有古長者風則剛外服乎本之之教內間其祖之訓其於堯舜文武周公之道蓋將有得焉夫得天下英才而教之古之聖賢猶以為樂吾今見剛可不為本之一擊節哉遂書此以復修撰君俾以為剛贈且以告本之又因以慨豫之頺墮無成也送周如陵序豫往年教於蜀之蒼溪泝夷陵而入三峽仰視羣山如萬仞壁立岷江東下束手兩崕其勢若不得放抑遏之極驚跳怒躍逆而為回湍激而為飛瀑觸而為奔瀾其尤險者則為虎頭鹿角盤渦百尺旋轉若車輪轟然萬􅊤皆應觀者莫不目眩不禁也過夔萬而上三巴稍稍見平波緩流然巴郡據三江之險因石為城懸流飛㵼雲霧中益可愛也自是西走千三百餘里始入成都平曠坦夷疏江為渠散注平疇幾千里其西有雲山縞晧明潔與晨暾爛然相照蓋天地間之竒觀獨偏方遐國擅而有之使傲遊隱逸之士得時時臨望以蕩滌其志意何其快也又其地有諸葛武侯之遺教關張之忠節徑氣至今不衰又蘇氏父子文詞壯健數百年來無有過之者故蜀之勝又不獨山川然也豫去之十年至今念之不已今年夏忽廬陵周君如陵歸自成都訪豫京師之旅邸極道往時之遊且樂豫不覺解心釋神焉今如陵又將有所遊惜不能與之翺翔其間也雖然人之情因事而感固不繫山川之遭杜少陵窮愁悲慨終身不釋豈蜀之山水獨有以戚其中耶彼所遭之時為然也然則吾與如陵壯年遊樂何可不知所自哉凡與如陵交者皆為詩以餞之而中書舍人吳君平仲為書西川壯遊四大字於卷首以豫故嘗遊於蜀也屬為序之贈嚴元晏序嚴氏為吾邦巨族而元晏嚴氏之尤賢者卜居金臺山中淡然無所慕於世而一鄉之是非曲直必俟元晏一言而後決元晏既與世謝絶獨喜談醫藥豫居家時好觀黃帝內經及劉河間張長沙諸公之説時相往還講論者惟瓊州守王伯貞先生白水丞陳孔立先生二公既喜與豫言而尤得元晏數人者皆相與莫逆也及王公去守於瓊白水公故無恙每出遊則必過豫柳溪之上或之金臺則必留宿元晏家宿元晏家必遲留不即去攜童奴遍歷溪澗遇藥輒俯掇而嘗之或圖其花葉而默染其形色呼僮置䇿中乃行行不休言亦不已至暮始捫蘿而歸其樂陶然也蓋瓊州公與白水公脫略而有趣元晏則篤實而頴悟豫亦散曠不自羈故數人者甚相得豫宦遊於外不得與元晏狎者六年矣白水公巳物故瓊州公又阻於官守思欲如往昔相聚論不復可得今年夏忽元晏來京師豫聞之心喜不自勝及元晏過豫旅邸未及一言也輒起他去雖強留不少住斯須未幾竟别去元晏豈今有不釋於豫哉豈其志慮昔同而今異耶抑何為其然也然則如之何其可巳於懷耶他日倘得乞身歸田困病之餘無以自資當求醫家書與元晏日一閲之以償吾平生之夙志而無忘山中之舊約也不知元晏尚有意於此或棄去否也書此以贈之因以識豫懷贈朱孔良序皇上紹正大統九有寧謐萬幾之暇端居無為乃遊情於文藝萃天下儒臣俾編纂祕閣文籍上自唐虞下及當世天文律厯諸子百氏旁搜而彚緝之括之以類統之以韻蓋將會萬卷於一編合萬世於一時者也然其功浩濶非日月可計而簡册增於尋常部書萬倍皇上乃又命天下州郡能書之士皆集於文淵閣俾以成書精寫上進泰和邑庠生劉俊預是選俊志鋭學勤又溫恭而慎密凡在禁林與為交遊者莫不欣然愛重之今年夏其婦翁朱孔良來視之豫既與俊同往還禁林而又獲識孔良心甚喜也孔良世家邑之屯州屯州朱氏族既繁多賢子弟又有老成人如孔良者孔良來京師數與豫談論其氣溫其容肅豫益知孔良之賢而惜乎其識孔良晚也俊之壻朱氏也稱其為佳壻然俊方圖見用於時而孔良惟務抑遏掩閉不使自彰雖吾邦之人知孔良者少也孔良歸故舊在京師者皆為詩餞之豫與俊當盛世文明俱預榮於大典故於孔良之歸敢誇道其事以為贈贈朱知縣序古筠朱貴登永樂二年進士第選蒞事於都察院之廣東道視舊制蓋習觀乎為政之難易得失非實有職任之委也貴於是乎有憲臺之重而無官守之纍焉既有旨命還家明年夏復徴至京師俾蒞事於大理寺其在大理如在察院時貴徒以一進士兩居要地視訊鞠之操縱知己用法之權衡非唯有以博其識習其才而以無所纍之心縱觀於叢脞轇轕之表人情物理之際必深有所見也夫汨然而不暇者或有所溺於心譬猶博者之相對而勝負之迹形焉情不能不中怵也故惟以無情者旁觀夫有溺者之心則彼之失焉者吾且得之矣得之於外既多積之於中益久則其發之也必將沛然而莫之能禦者矣貴之所以昔焉而觀之者誠若是今去而為唐山唐山小邑也其地僻逺無迎送之繁其民質實無爭訟之擾其去京師蓋千里外以貴之所素歷如彼而其所試者若此抑將何如其用心也將其心亦易之乎豈惟易之也加乎其身者若未嘗有令焉則又無所纍其心矣然貴嘗從吾弟本之受經持其心未嘗少怠其接於人者欿然其虛也則雖無所纍其心必不自逸也必將挾其曠然自得之志而益觀夫人情物理之無窮者矣屢觀而屢有得焉吾不知其將來何如以發之也遂書以贈之送蕭教諭序豫往年遊鄉校聞廬陵蕭君引之以端重力學著名郡庠未嘗不愛慕其為人然會聚之日甚少也獨時時得其所為文章讀之有程式有典則開宏張大而不逸乎矩度甚似乎引之也自吾宦遊四方引之由科舉為武義縣學官皇上紹登寶位之初朝正京師得相會焉蓋與引之别去者久矣時鄉郡故舊仕於京者多引之平時莫逆相見道平生歡忘懷吻合一無所忤樽爼相酬或深夜不止情志諧暢巧詆而豪謔曲諷而旁嘲莫不閧然自放獨引之簡默不可以意撓或時作漫浪語以少折衆鋒則又未嘗不切中肯綮也顧引之務自囊括鄭重耳由是衆皆推敬引之丈人行而豫益不敢慢交引之也引之去後以憂還家又三年服闋而來改教於崑山縣學衆為詩以贈之翰林侍講鄒君緝熙以豫故知引之者屬為序夫教之職與師之道甚難也彼郡邑子弟年少負盛氣而抱鋭志者方自視無前而吾欲抗顔為之師則非素有端慎之行真積之學未易使之帖然無齟齬其間如吾引之者於師之道教之職殆無愧也哉外以施之人內以增於己文以博其趣而行以成其德是則為引之之師弟子交相賀也惜豫去引之遠不得相請益矣因以序之詩凡若干首耕讀軒詩序夫古之達人志士藏迹養晦使其身有所寓而可安志有所適而可尚油然渾一世於庸常卑賤之地者何也所自處既淺則其所蓄者易傾故常有以自晦而深其所蓄也泰和曽君能濟名其軒曰耕讀持其一時所賦詩二卷謁豫序豫家居時見能濟方埀髫挾䇿往來於先生長者求益今長大老成遽見已莫能記憶蓋曽氏吾邦巨族宋熙寧中有諱安強安止者兄弟同登第安強官至侍御史尤有聲當時蔡京疾之例置黨籍中而其名益著傳數世至鷗江先生先生以文行自髙即能濟髙祖也二子方壺方谷當元盛時松竹田園之勝鄉族罕比今能濟所居有所謂九成堂者方壺先生所搆百數十年矣而其堂尚存鄉之老人多能道曽氏盛時事惜能濟不及見也今鄉之老者日少道其事者又寡矣能濟去家而居於廬陵以耕讀自適其迹與世益疏雖吾鄉之人少有知能濟者能濟亦惟恐人之知也數年來能濟又泛舟江湖與鄉之豪賈相往還以自匿於吳儂楚獠之間能濟誠欲深其所蓄而故為是以自渾耶然能濟質甚美年甚富而好學不輟吾知其有以紹續乎其先世矣能濟尚慎自重毋使人得易傾其所蓄則幸矣遂書以序之友筠軒詩序廬陵蔡君學淵與其弟清源俱好寫竹俱從學於錢唐髙士謙先生先生亦寫竹頗清俊盡竹之態然好之甚篤自云其法得之顧定之定之得之李息齋之子遵道今息齋徒有譜傳之世世之工寫竹者猶宗師之况髙先生所授遠有所自非徒玩其譜者則蔡君兄弟之所得可知矣豫嘗以謂竹之榮枯燥濕形容意度譜有所不能盡者必其心自得之若非窮極精力不能自得也自髙先生後往往見蔡君寫竹布列人家今其弟清源又題其軒曰友筠其用心益勤矣然蔡君今為吏部主事清源又擢貢於禮部二人者皆孝友篤厚能文詞則非徒寫竹云耳清源之居家人求其竹者往往不已蔡君笑曰文與可所謂襪材者今在吾弟於乎人徒知其一藝也獨不知蔡君厚於德深於材可行於世而施於政者不在此也清源為人清徑遒拔甚有髙趣既托於竹而又以友筠軒詩文一帖求余文序之因書此為之序送劉教諭序廬陵劉君仲鐔舉於鄉而入太學選修永樂大典在禁林者幾三年時學士解公與祭酒胡公總裁其事仲鐔未嘗斯須去其側搜閲祕典遇竒事隱語即俾仲鐔録示館中之士或有所考索以上進者必仲鐔書之乃以進否則不得書不以進也蓋仲鐔性頴敏又知所畏慎他人勤者或不敏敏者又不能慎惟仲鐔敏而慎故學士諸公皆賢仲鐔今年春羣試於禮部得選為沛縣教諭同館之士多賦詩餞之翰林檢討解公文夫欲豫一言序其首夫沛漢髙之舊里也方髙帝平定四方威加海內而還也與沛中父老子弟飲酣而歌大風之詩一時徑氣雄風何其壯哉然髙帝是時徒欲得猛士耳豈髙帝於此尤有慢乎儒生耶魯兩生之不至商四皓之逺引蓋以是然髙帝過魯而祀孔子徴博士以起朝儀諸生稍稍向用則其所慢者獨酈生輩爾沛中父老子弟固亦知髙帝之意哉抑習見其始未覩其終耶夫士之習俗繫上之意向今之沛非復漢之舊矣天下既向風文學而沛又得仲鐔者為之師夫承時制作抱負問學之髙深者尤知賢仲鐔而謂沛中子弟使其見吾仲鐔之學行溫雅必愛敬歡然傾竭矣因彼之甚慕而施之教焉吾知其能有成必也是行也仲鐔其勉之豫與仲鐔處久而相好之篤因檢討君之屬也遂為之序送某知縣序蜀之人純厚而易治信義道德非家習而人通之然其好慕尊尚敬恭而樂道雖齊魯逢掖之士未必如蜀之人也比聲律切對偶儒生末事而蜀人有終身不操觚而握管者而聞人之誦詩書道文詞者則皆知賢之此豈其性然哉習見之厚而化之深也為令非得其民不能有成而民有負詐挾姦好惡異乎天理之正者焉能治之也故易治而化惟蜀之人為然進士南康某以選為順慶大竹縣令大竹在巴蜀之東南四面皆大山無舟車之往來使者行部終嵗不一至其民尤朴而其習尤醇以某抱負才藝擅進士之賢名而一旦臨乎其上其民固巳慕之矣民有慕乎其令之心則令之道必行政必成道行而政成使人人知明經問學其治民如此豈不深可喜哉吾往年教於蜀以文詞雕鏤之靡責之於醇龎朴厚之人恨不得因其醇朴與之相忘於無事徒以其不能者強聒之無益也然亦以好慕在此又上之人所責成吾之職當如是故未嘗敢怠惜豫未知所以教教未久而去不見其成也今某是行逮與其民相忘於無事之地也然烏知其民於今不化而為才美文藝之士耶因其好尚之實而啓其憤悱之誠治而教之亦令之道也以豫嘗遊其地教之難而不能久去之久而不能忘也某之行南康縣令黃紹祖求豫一言送之遂告之以此泊菴集卷六
