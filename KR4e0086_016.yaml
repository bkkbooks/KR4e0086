body:
  text: 泊菴集卷十六明梁潛撰題跋題金諭德扈從北征詩永樂八年春皇上以北邊騷擾不靖親御六師度朔漠萬里之外直抵乎窮髮大纛所指神武威靈赫然有以震動乎邊陲而其時以文詞之臣預在扈從者凡三人右春坊諭德金公幼孜其一也幼孜平生惟從事筆墨工記注一旦身屬􅐤鞬載後車於旗旄劔㦸軍容之盛簫歌鐃吹之雜遝執魁獻馘之紛紜皆得以盡覽之其亦壯矣哉宜其隨所至輒形之咏歌而凡山川風土之異觸目動心情之所感有不能已者亦皆有見於是也總若干首間以示余讀之其雄篇傑作宏美盛大之音洋洋乎飄飄乎所謂揚厲無前之偉績者其在于斯耶昔商之伐鬼方討昆吾周之平玁狁城朔方當時人皆見之頌歌後世得以協之金石而奏之清廟明堂之上至于今有不可泯者幼孜是作亦豈徒然哉百世之下有欲諧登歌而協之金石者其有徴於斯乎題羅氏先德記後右廬陵新安羅西樵先生伯崇所録先世銘文一帙其子適均因泰和王君樵雪求豫文識其後蓋羅氏之先有曰融齊先生士友者宋丞相信國文公之執友也丞相嘗志其墓而稱其忠信篤行其夫人蕭氏之殁志其墓者又丞相也融齊子存軒寶佑丙辰實與丞相同貢慶元己未與丞相仲氏為同年故融齊先生有母百嵗丞相嘗奉幣載酒拜之堂上而存軒之殁丞相仲氏哭之以文一時交友之間不惟情好之深厚而文章翰墨尊賢敬老之禮亦傾竭備至世未嘗有而亦足以見羅氏之盛也於乎丞相之忠節與霄壤並立其平生所與多天下名士况其交友之尤厚者不言可知矣融齊之曾孫求師仕元為臨江録事棄官歸終身不仕其行尤髙銘其墓曰圭齊歐陽公與為同年者也西樵則融齊之六世孫與其從兄遁菴芳洲皆博學能文讀其文可知其行遁菴在元為泉州路儒學教授西樵為今楚王府訓導惟芳洲不仕而皆殁矣樵雪羅氏之女夫也羅氏所以盛樵雪多能道之云題繼志堂詩文後夫自古幽節之士梗介而特立雖湮鬱廢棄之餘其胸中所蓄要不可奪也嘗讀宋史忠義傳及安公所為楊氏忠節祠堂記知宋之所以亡而楊忠襄公諸賢之死其徑氣直義直足與日月爭光何其盛哉使其始終得位以行其志宋不亡矣於乎悲夫忠襄之十二世孫汝濟以善書預選編纂祕閣文籍暇日持示鄉先生周君公明所為其尊府仲偉繼美堂記及文一卷豫讀之知楊氏之有人而忠襄之聲光氣烈未泯也汝濟沉靜而知學尚其勉之跋主一齊詩文後右臨川汪秉文主一齊詩文總若干首豫讀之有以知秉文之能學也夫主一所以敬也敬者德之聚秉文養其心治其身施之以接物應事皆由此德之推則不徒名其齊矣此聖學之所以成始而成終而程子之所以教人主敬者皆在此也周子之主靜張子之示人以禮其說不同其㫖未嘗有異秉文其勉焉必有得于是而後可也跋蕭氏族譜後右蕭氏慶源録一帙前鄉貢進士蕭雲龍之所撰次也蕭氏自梁國子祭酒子雲十六世至宋縣丞某始遷于泰和距今又十二世闔門殆數千指每嵗時㑹合諸父皆鬚髮皓偉衣冠襜肅望之者不敢有慢心而一時子弟侍側又魁梧竒傑負邁往之氣殆不可狎視可謂盛哉其孫棻來京師以屬豫題豫既見其諸父子弟之盛今又觀其譜故為之題書王修本遺墨後右臨川王修本先生所書李斯上秦皇帝逐客論一通先生沒其子英謁豫文記之曰此先人手澤也先生茍辱貺焉惠莫大焉夫文章學者一事耳然為之也未易其立言也有法而用意之妙又在乎法之外也斯於此書含意屬辭引物託喻誠有未易及者先生因其節目分畫而疏著其旁探其緒以暢其指蓋燦然明甚亦豈以其言之有法也哉亦味乎其言於法之外也夫古之善言者無往非法而其所以言則非法之可盡故自唐虞以來言者人人殊論禮不類易易不類書周孔之語不必類臯䕫孟軻之言不必類孔子至於遷固而下皆然其意趣之精深思慮之隱顯或邇而逺或疏而密觀者徒觀其妙如武夫用干將抑揚眩轉橫斜排撇千萬變不窮也果可以法求之乎所謂大匠不能使人巧者亦若是也然則先生於是書雖有意古人立言之法而其用心不専在是可知焉吁先生於斯之言且爾况聖賢之微言也哉其必有所獨得而未可知也英今為進士能文辭以選為翰林庶吉士寶此書若拱璧然其用心要之不减其尊父也豫既悲先生之歿而喜英之能繼述之也故為之題云題嚴氏族譜後嚴氏本宗譜一帙上下凡十有八世其十六世孫元晏所修輯也今翰林侍講楊君士竒為序之詳矣翰林庶吉士王君直又俾余識其後余頃自祕閣搜內藏古今典籍見吾泰和郡志數卷亟取閲之知吾邦前世文獻忠義之偉可仰慕可誇道也及究其子孫之賢不肖克紹其家者又不能不感慨而悲嘆焉於乎盛於前而莫繼於後古今皆然也所謂可仰慕可誇道者嚴氏其一焉嚴氏之先有諱某者仕宋為本邦尹時西境寇竊發來攻城尹教邦人為捍守計城賴以完鄉之故老猶能傳道其事今其譜不載獨略見於郡志蓋元晏所修譜止及其本宗惜未覩其全也然胡忠簡公銓所為萬頃先生退齊記及挽思晦詩則郡志所載與譜合萬頃即𤣥晏十世祖思晦又十世從祖也方忠簡以直言忤奸檜被黜一時故舊皆畏懼無敢往來者獨思晦無所顧且以其子托壻忠簡忠簡挽思晦詩特識其事讀之見古人交義凛然也豫自總角與元晏同挾册從鄉先生曾原友授書見元晏之長大篤厚而孝友固已知嚴氏之澤為有繼矣豫舅氏御史君以貢舉來京師一女方提孩囑家人曰親表中孰有如元晏謹厚者嚴氏之後必大我且去茍擇壻吾女其必歸嚴氏去今二十年元晏已有孫森然家益盛而御史君之殁久矣獨念其知元晏不妄如此也於乎吾邦之世家大族如嚴氏者豈少然能有子弟如元晏者幾人盛於前而克繼于後將不在兹乎嚴氏之寖明寖昌吾又有以卜之矣故并書以識之使其子孫讀之有所興起也題道統圖後右道統圖聖賢一帙乃僧道應以贄元學士虞公邵庵者又三傳至今謝君惟髙首之以夫子而顔曾思孟從之繼之以濓洛諸賢而紫陽夫子終之嗟乎畫者之意淵矣哉夫作之于百世之上者非夫子無以紹其統求之于百世之下者非紫陽無以折其衷六經述作所以寫其心也是圖之作所以寫其像也其像各不同其心寧有異哉雖然聖賢以道傳而畫者以圖傳圖在是矣道在是乎彼無方所無形像即畫者之筆有所不能寫也謝君篤信而好學接神交心㑹於此圖之表者則雖豫之筆有不能寫也遂書此識之題厚敬詩卷後夫敬聖學由之以成其德者修身接物不可頃刻而忘之而豈獨事親之際為然哉然深於情者或簡于文聖人固嘗病夫學者之失也秀才陳仲京於是而用其心焉則事其親者至矣而於其身之修德之進及夫聖學成始成終之要又將日求其說而不止其所至詎可量哉仲京又嘗以善書預選留祕館天下賢士所聚禮樂之府也廣大𢎞深之論制作淵微之意彌綸張弛之具日接乎見聞養乎其中者深博乎其外者又廣吾知某之所造就者殆非常人所能及矣登其堂讀其記序文詞因為之言題松齊處士濳德卷後余昔假令陽江適金華朱君思全為丞于廣之新㑹縣新㑹與陽江接壤聞思全為政闓通而簡易欲一見之未得也久之胥㑹于新興飲酒樂甚及余來京師又三年思全亦來同與修永樂大典出入祕閣相往還益知朱君端靜而恭儉其材足以修政而立事意金華多名士故思全得以薰陶其材器如此一日思全過余旅邸示余前太史蘇君伯衡所為其先君松齊處士世與墓銘及學士解君縉紳所為表讀之知朱氏先世多貴顯而松齊之恭信足以服鄉閭友悌足以率宗族吾於是乎知思全之賢有以致也思全之從子仲智嘗為吾吉郡守亦亷平有威惠民至今懷之跋姚通判望雲思親圖右望雲思親圖者通判吉安府姚君某宦逰于外不能忘其親為是圖以識其懷者也夫通判君誠於愛其親又能推其愛以及其民故郡之士大夫皆樂通判君能以孝施於治也為歌咏之夫吉大郡也其民之衆治之之道尤難獨通判君推其心以及其民故其民亦甚愛之詩曰豈弟君子民之父母為民父母而無豈弟之行者焉能使之不薄於己哉吾觀是圖誦諸賢之咏不徒知通判君之賢而又有感夫世之為民父母者之失其道也已書南溪蕭氏族譜圖後蕭氏五代時有諱球者由金陵徙長沙球生軍巡判官覺馬氏之亂覺徙居吉之永新遷泰和之禾溪子茂貞遷盧源茂貞子􅢰又遷盧灘􅢰長子大承事始居南溪自球距今十有六世而居南溪者十一世矣承事五世孫鵬舉始以薦為蘇州府同知厯山東都轉運鹽副使蒞官廉潔終身嘗修譜于其先世有以弟後于兄者數人相循不改君皆舉而正之於乎其為譜如此其行事大概皆可知矣然自君之殁五年于此矣其弟鵬翔不忍沒其兄之善以其譜求翰林學士胡公為之序學士君與運副交厚因序其譜而著其行特備使觀譜者讀其文知運副兄弟之賢而蕭氏之所以為盛者在此而世之為譜妄亂乖謬不知正之反竄竊移易以自誣者可嘆也哉鵬翔以運副君之孫凖後其子叔炎學士君又為改凖名為封其不忘情於運副也如此因牽聨書之于以見二人者交道之至也跋西園翁傳西園翁居城西豫家又在其西栁溪之側有畦數畝松竹雲霞渺然如巖谷之幽此先君畦樂公所以朝夕吟哦放情其中者也翁之園廣不盈畝跨于通衢種蔬藝藥其香郁然行者嘗側足而望其園中蓋其所適殆與先君同然也先君喜飲翁亦以酒自縱故二人者常相往來草蹊苔徑見屐齒之迹纍纍然者非翁即先君也翁今雖已老猶痛飲豪謔如方壯時獨先君不作矣悲夫翁之學最篤往年受經於三華蕭先生之門其時豫為童子尚未知學也翁以其學教于鄉者幾三十年而豫仕於時周行天下列官于朝者亦十有五年矣追念往事恍如昔者忽得亡友楊之宜所為翁傳讀之益有感焉因書以識其後蓋距之宜之殁又一年矣題冠朝郭氏家録後右郭氏家録一卷凡七首前吏部尚書劉公嵩既編録而正其乖訛别其篇次又為題識其後公之於此亦勤矣哉蓋郭氏自唐汾陽九世至僅與其子之美同登宋景祐二年進士第僅自祠部員外郎卒官贈太常博士之美自屯田員外郎通判定國軍編修國史遷集賢學士以殁其所録者真宗所賜進士詩博士登第後所作七言及仁宗時誥詞之類皆在又有當時所為彥常墓銘一通讀之知其父慶甫當嘉祐初歐陽公知貢舉時登丙科與東坡蘇內翰南豐曾舍人皆為同年其母夫人陳氏丞相堯叟之孫而彥常娶南豐曾氏即舍人從女也其後慶甫之殁銘其墓者其榜首章衡題其額者坡公而表彥常之墓者又坡公之子邁也當其盛時一門交友姻戚無非顯者即此猶可以見惜文字所載零落者多此特十百中一二耳博士父子事見郡志者與彥常銘又合然自集賢而下譜系散失于後人世次有不能考者此又深可惜也是編僅存於集賢之逺孫存敬存敬殁流落於他姓而其從子以存復得而完輯焉因暇以求豫書於乎宋真仁之盛博士父子遭遇殊常天下之士孰不仰慕而重之如誥詞所謂名冠朝廷者豈虛語哉則其斷編遺墨有足考者在邦人士子所宜愛重詎忍見其泯滅也此尚書公所以拳拳於此而况其後嗣子孫也哉因為之書以存賢而知學觀其用心於此亦可知其為人矣題湯君如川濳德堂後豫觀謝太傅稱陸士雲身長九尺吐音如洪鍾未嘗不悲嘆吾友如川也如川貌魁梧竒偉孝敬而慈愛與人交氣和甚雖浪語諧謔忘懷傾竭而其愛敬於人者常油然也如川殁一時所與交者皆相與為之詞以哀痛悲悼其不幸讀之者如見吾如川蓋其交之厚知之深故其言之也無異乎其平生世之茍富貴無可稱道者或强要文人才子為謬言以欺後世讀之略不肖似其人甚矣可笑也後之人茍欲知如川者不必親接其顔面讀是盡之矣豫與如川别去者十年余來京師之明年如川由科第選入翰林被遇簡拔恩至隆渥方期顯庸於時以光耀其二親而如川已殁矣既殁而數尺之棺尤不能免竟燬于火於乎世有賢如如川而受禍如此之烈者抑獨何哉夫死生常理君子常修身以俟之其間長短得失何足深較也如川之心志材行見於諸公之作詳矣姑書此以附其後使其二親讀之知如川雖已殁而所託以傳于後者方在此無窮也可無悲也題劉州判墓銘後泰和劉君仲啓前吏部尚書槎翁之從子也尚書公雖接物和同而中情極簡重少許可然獨愛仲啓仲啓判陜州時以事逮至京師事不白公即為廷白之仲啓少負竒氣好持弓乘馬嘗羣獵窮山中遇猛虎獨前格殺之心以此自壯既而折節讀書從尚書公及其弟東園先生講學稍就砥礪而其材益振施之於政沛然也然人常稱仲啓在州時一事云州治舊有邵公祠祠有怪嘗夜見女奴四人各麗服持一燭而出云邵公也不敢近仲啓知其怪從祠旁搜之得二老狐殺之俄又見池蓮色鮮艷殊常即命拔去之池水為之赤怪遂以息蓋州人道其事其家僮輿隸亦云翰林庶吉士余學䕫又為之傳甚悉於乎亦異哉春秋左氏所記怪異事甚衆後世未免譏左氏之好怪孔子不語怪豈以其易惑而難知也老子又以謂至治之世其鬼不神然則使前此治陜州者其賢如仲啓怪且不作矣仲啓既甚英偉又得尚書公昆弟振育之其為治必有異績惜州人不之知獨傳此異事事之異者固足以動人耳目獨不知仲啓于此偶然耳可稱道不在此也仲啓之孫鯉舉于鄉而來示豫以山東按察僉事晏彥文先生所為仲啓墓銘讀于此有慨焉因題而識之題劉公辰宗譜後北京行部侍郎劉公辰宗譜一帙自公而上至五世祖載而止載以上譜遺失不可知者不强續也載生元婺州萬戶府經厯季季生常州萬戶府知事良良生毅賊將張士誠圍常州時援兵絶不至毅賫蠟書浮江間道抵浙江行省求救未及還而城陷城陷時良獨不屈闔門赴水者十餘人良即公之從父也公之尊公某嘗以是語公公亦自能道張士誠之成敗及其從父死時事識其嵗月恨其時褒恤之典不及也公為人喜談論慨然甚有志於天下事方太祖髙皇帝渡江時公為他將幕府掾屬今皇上即位之明年纂修髙皇帝實録公與豫實預編集凡當時戰伐克捷之功宿將舊臣有所不能知與知有不能盡者公一言之聽者如身在其時目觀其事退而考之記注皆合事相越數十年猶强記不忘如此也史書畢拜江西參政既罷歸尋復擢今職然不煩以事蓋皇上欲數知太祖時故事惟公能道之故有是命公在江西為政尤知大體雖老其氣如其壯時今觀公之譜及其行事遭遇乘時與其先世忠節俱顯可謂盛矣豫惜其從父之死事不著之於史而公之出處當必有太史氏書之也故著之以係其譜俾藏于家云書趙氏族譜後右天台木菴趙先生季通所修本宗譜自恭肅王元儼至先生凡十有三世恭肅而下至汝㞩凡九世其世次詳於宋史宗室系者可參見也九世而下至先生非復宋史之紀特見於所修之譜而其世次猶因其先朝所次之字以為序於所自出之宗則先生尤致其詳者也然見於其譜與載諸史微有不同者先生亦不敢增損其譜以求其合於史氏所書大抵譜之載相承於先世者未必皆失實而古今史官所紀載其事有詳略亦未必盡得其實也此又先生修譜之微意焉先生篤厚而有文學始自永豐縣令改國子博士明年遷司業又二年改北京國子司業升趙王府左長史其時臨川董公子莊亦自北京國子司業升為右長史自二公之去太學久矣而語司業之賢者必以二公並稱之及其為長史也士大夫又以謂極一時之選他莫之及其可敬也夫趙氏之後何其盛也因先生求豫書其譜故并及之跋胡氏族譜後戶科都給事中胡君濚與豫俱以扈從還自北京因暇日出其先世族譜一卷屬豫題之按胡氏之先世本南昌人有諱特者贈太傅岐國公避五季之亂因徙于晉寧後三世曰宿事宋仁宗英宗纍官樞密院副使其勳業著在史册自是而後若尚書右丞宗愈轉運副使宗哲端明殿學士世將登兩府列侍從者蓋嘗接迹于時其諱中立為常州置制使者則今給事君之五世祖也於乎亦何其盛耶給事君為人溫靜而慎密朝夕侍上左右承眷注尤厚蓋其先世所積者深故其澤及於後者逺也夫譜牒所以紀先世以詔夫後之人也使其先世烜赫盛大之積足以埀之無窮而子孫乃不能修其行以承其緒則未有不泯滅廢墜於世而莫之自見可嘆息也因觀胡氏之譜知給事君之賢竊為之喜而又以知夫盛德達才之士薰陶涵育以至於成者未必不由于世家慶澤之積有以致然也書為善堂卷後同安宿松詹子淵氏構堂小孤山之麓而名之曰為善永樂癸巳秋豫上京師舟行留宿山下遇子淵而愛其名堂之善也因告之曰人之欲為善如農之種榖擇嘉種而播之猶不免稂莠之生而今之種之者稂莠也欲望其實之為嘉種可得乎人之不為善而欲祈夫善之報也决無之理也子淵誠於為善者而其堂特勝蓋自大江之流過九江合南韶西蜀鄱陽洞庭之水以斂于一壑而小孤之峯岌然獨當其衝雲霞之飛蕩蛟鼉魚龍之出沒變怪恍惚之狀見者為之動心駭目子淵于是朝夕覽望亦足以自快矣名堂之善而兼得其勝故豫告之以為善之說而且道其勝者所以識豫之逰于子淵之堂而兩得之焉跋篆書千文後今之篆書大率本秦人小篆也始皇初併天下命李斯為之罷其不與秦文合者而取史籀之大篆者省改焉故其字差少多假借以通其用漢許慎之為說文本之此也然孔子之書六經左氏之述春秋傳皆以古文本之倉頡以來文武周公之舊故其字未嘗簡於乎不本之六經之備而専從秦之省改斯無足怪者許氏之為說文本之斯之省改而不知有文武周公孔子六經之舊抑又何也幸而六經之存自可考見而彼之所省者無害於經之全也學古之士其尚考之于此乎抑有能擴而充之以臻極其體用之全者乎吾同里生劉彖喜攻篆書吾愛之為求中書舍人陳公登所書千文俾以為法因又告之以此雖然三代之典章文物湮滅於秦而不可復見者多矣又豈獨書之一事而已哉題脊令圖近時有邊文進者善畫翎毛為翰林周編修孟簡寫鶺鴒圖極佳凡畫羽蟲要在飛鳴有意而於鶺鴒又必有急難關心之態蓋又在飛鳴形似之外也邊公作此筆法似亦踈略而細觀其意度殆非草草畫者可及豈歐陽公所謂忘形得意者耶於乎誦華蕚之詩而又觀之於此真能使人動念可喜也哉孟簡屬豫題為書此以識其後題蕭豫喬行卷昔東坡以燈照壁自寫以問人識與不識皆知其為東坡豫嘗於此而疑之彼嘗識東坡者固知其東坡也設未之識何從而知之然又以謂如東坡英偉豪宕之氣固何待審其眉目之似而後得之耶豫喬善寫真其來京師所遇無貴賤老少凡道人劔客書生小子之形狀所寫輒似試為豫寫小影豫不能知其似與否以問人或平生之密顧訾視而莫究或偶然過者一見而即知其為豫豫不知其為何說也因仰而思之豈玩而究者即其形之似彼倐而是者固亦得其神之妙耶形不可不似神在似與不似之間尤難能者而豫喬能之矣其為技豈不良也哉豫將屬豫喬寫林壑之幽趣貌煙雲之遐蹤于其還也書此以贈之而遲其重來也題宋理宗墨迹右光風霽月之語宋太史黃山谷以稱道周濓溪先生者理宗於萬幾之暇操弄翰墨遂輒及此其尊隆道學拳拳之意于此槩可想見惜其後委任權奸國事日以不振良可嘆息夫尊崇聖學莫如理宗而用人一失宋之弱滋甚焉得失之際可以觀矣書袁鏞死節傳士君子于死生之際忠義所激非必有民社之寄惟其理之當而已茍得其當雖閭巷韋布之士其志節之髙有足尚者視彼髙爵重位一旦臨害反淟涊低徊偷生以自全者其相去得失豈不逺矣哉宋之士有曰袁鏞天與者四明人也徒以一進士當德祐丙子之際國事已去傍徨無所歸適元兵壓其境遂以其友治海制置趙孟傳之命慨然往陳大義竟不屈慢罵死烈火中於乎天與之死可謂得其當矣當宋之亡死節之臣率多光明偉傑而天與有足異者非食焉不避其難者之比也至舉家十七人者聞之亦皆赴水以死惟恐辱其身以負於鏞則尤為難焉天與既死惟存一幼子澤民澤民之孫珙以忠亮受知聖上為太常寺丞以殁珙之子忠徹今仕為中書舍人一門之間父子俱榮天之報施于袁氏者可謂不薄矣讀其傳而異之因為書書楊處士墓銘後夫為君子者惟其心之仁而已其心仁焉則自其身行于家推之鄉黨以及夫鳥獸草木無不蒙其澤者茍其心非仁則自家至于鄉黨被其病者有之矣欲望其有以及物何可得豫觀建寧楊處士平生急義好施所以及人者自宗族至于鄉黨不可勝數至於戒無毒溪贖雛鷇戒當春毋燔山林之類其及物者又無不曲盡謂非其心之仁可乎至以片言止暴掠活城中老壯幼萬口則其為澤又大矣夫布衣之士存心嘗患其施之狹也而處士所為有如此者使有爵位民社之寄其所至當何如也處士之配曰阮氏御家尤有法今其孫榮列職禁林兼侍青宫寅恭小心鮮有其比其所至蓋未可量者傳曰仁者必有後豈不信哉因讀諸公所為處士及其配銘志行述竊有慕焉遂為之書題龎氏譜後右吉水龎君文逺所修族譜一卷著自六世祖叔達而下其上有不可考者則缺焉又其先世有以季父為之子者皆舉而正之文逺可謂得修譜之法矣夫譜所以明吾所自出也或有所脫寧缺之為愈而世俗往往牽合附㑹强承他胄以自絶其先至于尊卑之次人倫之大反略而不顧有如文逺所為其過于人豈不逺矣哉龎氏先世最盛今文逺從子明叙又以善書仕為中書舍人其為人循循雅飭明叙豫所知者其未知者蓋多也夫盛于前者嘗患其不繼于後龎氏積百數十年益盛不替如此豈非其先世所積之厚者致然哉宜其譜之修有不緩也譜成明叙攜至京師余觀之因書此以識其後跋唐詩後唐諸家之詩自襄城楊伯謙所選外幾廢不見于世雖豫亦以為伯謙擇之精矣其餘雖不見無傷也然而學詩者於名家之作固當觀其全也况夫珠璧之産汰棄瑕疵之餘精英竒絶之未泯尚有足愛而不忍棄者讀者要知所擇可也是編豫得之翰林侍講鄒君仲熙及修撰王君行儉二君之收緝勤矣惜其於五六言古體猶未暇及之也豫既抄録為卷遂書以識其後跋隂何詩後右隂常侍鑑何水曹遜二家詩共若干首豫既録為一帙又宋祕校黃君伯思所為水部跋尾一首録附其後觀跋尾所稱二家詩初尚多即今所録十失其八九所存者特零落之餘而世又少得其本亦可惜也夫詩之變至二家詞益綺麗而格調之卑弱亦極矣故選古者於此輒棄而不録非無意也雖然唐之始音實權輿於此故以李杜之豪亦愛賞稱慕之不置其語至往往有甚相似者則又何可以其卑弱之極而遂少之耶特其音調于古則已逺于唐又未盡純此所以為二家之作也近時蓋有慕而效之者因擇其所作之似者得若干首附其後亦足以見作者之用心也跋柴宗禮傳後右前史官蘇公伯衡所為柴宗禮傳稱宗禮葬其死友金觀而下三喪豫讀之慨然嘆曰宗禮誠篤于友道者哉夫君子之行無小大在合于義而已義之所在雖小可卜知其大雖千駟萬鍾之重殺身成仁之難皆可以類推見何則其心志固篤於此矣特所因而發者不在此耳自宗禮之所為葬死友一事非甚髙難行之道也然其心可謂急于為義者矣推此以求之天下之事茍有大于此者誠得如宗禮者而為之無難矣况宗禮之廉節善行多可稱道使得馳騁於當時將見其雄名偉節埀於後世而無窮惜乎其止於斯也然吾觀古之君子豈必盡馳騁於時後著之于不朽耶世之觀人者往往駭其非常於其常者每忽而不察如宗禮之事是已是又可慨也故為之書宗禮有子某仕于朝以兵部武選員外郎擢拜江西參議聲甚著今復入為兵部職方郎中云跋夀樂堂詩卷後南豐李君宗桓母夫人年八十既夀考康彊而宗桓目致其養豐潔鮮好極一時之㫖甘且搆堂以居而名之曰夀樂衆皆為歌詩以美之宗桓求豫一言夫人之有親如宗桓者不少也求其養能如宗桓者千百中一二耳宗桓為陽江縣丞其為政開敏通達凡臨乎其上者皆稱道之蓋宗桓能顯榮其身而及其親之恩也庶幾乎其以志為養者哉宜乎諸君子歌咏頌禱于其堂之作也豫嘗為令陽江與宗桓為同官書以識之書胡學士扈從記後扈從記者今翰林學士兼左春坊大學士胡公從皇上幸北京在道時之所記也自二月壬午至三月庚午雖屬車行殿之際而無時不在上之左右者蓋公以篤學純誠簡在聖衷凡一時聖謨睿斷經營圖治之深意公卿大臣未喻而難言者公皆預承其論議而未嘗以言干人人亦不得而聞也意其所記者在此及觀之則皆山川道途耳目見聞所及以至起居食息細故之小事豈公平時所不言者于此亦有不書耶將書之而于義有不可者乎夫古者史載筆士載言彼誠有所書所以傳之無窮也然史之所記者士有所不得預士之所書者史有所未暇也獨公於今以文章顯名當世遭遇殊常遂得兼斯二者而于朝廷之盛美閎休揚厲鋪張見之記注形之歌詠足以垂示萬世而傳無窮于士于史之所職業可謂兩盡之矣則又因其餘暇自其躬之所處行止作輟之間以至交友同逰清論雅謔之相接皆備書詳述而無有所遺焉于此見公雖平居宴閒情放意適之頃而所以酬酢委曲之際皆坦然可書以示人而非若他人閒居之所為者輒無足道求其可書以示人者無有也吁此公之所以不可及而上之待公之厚者其有以哉題葛氏族譜後廬陵當宋崇寧間葛文康公為州教授于時從公學者三百人翕然多為世名儒及公之去纍官為中書舍人兼給事中以國子祭酒致仕而殁既而廬陵之士相與為祠以祀公之像與歐陽文忠公楊忠襄公舍人王公並號四賢而胡忠簡公實為之記蓋其時距公之去州學者已六十年矣其後終宋之亡廬陵忠節叠興祀于鄉校者名與霄壤並而公亦貌似如故嵗時奠薦罔有怠忽雖士之祭其先師在禮有當然者要之公之教在人心者有不可忘故也去今三百餘年公之十一世孫太常寺丞清隱以其譜屬豫題之豫念常拜公之像于鄉校讀忠簡之記而景仰其烈今又與太常君以鄉邦之好並仕于朝觀其譜知其子孫衆多而賢其敢不起敬也哉因書以識之題薛節婦傳後豫讀翰林編修鄭君好義所為寧海薛節婦傳而嗟夫今之世閨門女婦之行有合于古之道者庶幾其有警于世也蓋節婦年未三十而夫亡卒能守節誓死不二於乎此共姜氏柏舟之詩所以見録于聖人而埀戒于無窮也彼徒一女婦耳若夫傑然忠烈之士世豈無之茍有以著之皆有以警于世也題髙閒雲集後右髙閒雲集一卷詩凡若干首北京國子司業董君子莊之尊父養性先生之遺作也先生處乎山林生平無一物汨乎其中故其見于詩者油然曠出乎萬類而不可及也於乎先生之不作久矣讀其詩可想見其襟度其亦善于道其性情者哉先儒以謂人養得至情之極則百慮自然精明先生蓋養之以情者也茍知先生之所養則其不可及者豈獨詩之一事也哉瓊林萬玉圖引蔡君學淵為秀才陳仲京寫瓊林萬玉圖筆意精雅京師見盡如渭川千畝使人塵慮頓消失然學淵與仲京嘗預修書祕府從多士雍容玉堂之署光華而顯榮此圖之作其意有在哉仲京豫同里年少有美質其進于學者未艾風霜徑節上干霄漢他日豫當見之其勉之也題香山九老圖後嘗觀南華生之言曰虛靜恬淡寂寞無為者天地之平而道德之至也又曰無為則俞俞俞俞則憂患不能處年夀長矣之香山九老者果皆俞俞者耶九老之最髙者元爽也其差少者樂天也樂天宦逰三十載退居于洛合九老而為尚齒㑹洛陽為天下之巨麗而九老極一時之風流石樓香山之間龍門八節灘之上少微之星煜煜埀芒而衣冠皓偉賔逰雜遝酣嬉淋漓或弄琴操秋思之商聲或喚家僮奏霓裳之法部或命小妓歌楊栁之新詞興盡而止兀兀然舉天下之得失曾足以纍其心其視劉伯倫聞婦言而不聽王無功逰醉鄉而不返者又安能倣佛其樂之涯涘哉信所謂俞俞者也雖然人徒知九老之既老而不知九老于未老之時也知九老之甚樂而不知九老深憂之未嘗忘也當是時唐綱解紐蕃鎮跋扈奄竪弄威搢紳為之斥逐雖有裴晉公以身繫國家安危曷亦得以少吐胸中不平之氣耶於是九老者嵗月坐成晚矣自托于流連放棄之間者豈其心哉固不已而强自寬也况洛陽天下之中四方用武所必爭之地一有不幸如前日之安史者則臺榭苑囿之勝鞠為茂草矣果可以保其樂乎吾知九老雖衰未必不念及爾也不然年九十之尚父猶思經綸於周室年八十之綺皓且定儲皇于漢家九老雖衰果可無意于世事乎然則九老之俞俞乃所謂戚戚也愚故表而出之使世之志于事君者無自託于九老九老非得已焉但九老中有僧如滿者今亡之疑為𢎞文館諸翁而逸其半未知是否中書舍人解縉既序其端而給事中王子誠屬豫序其後如此云梁用之墓碣銘永樂十五年車駕巡狩北京仁宗皇帝在春宫監國南京凡南方庶務惟文武除拜四夷朝獻邊警調發上詣行在若祭祀賞罰一切之務有司具成式啓聞施行事竟則所司具本末奏達而已上既有疾兩京距隔數千里支庶萌異志者內結嬖幸飾詐為間一二讒人助于外于是禁近臣侍監國者惴惴茍活朝暮間賴上明聖終保全無事小人之計不能行然其意不已也㑹南京有陳千戶者擅取民財事覺令㫖謫交址數日念其軍功貸之召還有言于上曰上所謫罪人皇太子曲宥之矣遂殺陳千戶事連贊善梁濳司諫周冕既逮至上親問之濳等具實對上顧翰林學士楊榮等曰事固無預濳他日又諭禮部尚書吕震曰事亦豈得由濳然猶未悉陳千戶非出上命謫之也兩人者皆未釋有毁冕者數言其佻薄放恣不可用遂併濳皆死非命十六年九月十七日也士君子聞濳死皆嗟惋悼惜又相與出資收殯之文明門外其妻時隨在北京慟夫非命哀毁不食數日亦死明年其家始啓殯歸而合葬于泰和縣北下龍門仰天湖之原梁氏其先家長沙唐有進士曰震徙荆南又七世曰勝用仕南唐為徴事郎徙今泰和又十世贈知吉州曰逢吉二子皆仕宋伯君崇纍官起居舍人兵部員外郎直史館知鳳翔府仲君傑纍官同知黃州府入為翰林院編修官君崇五世孫蕃景定三年進士太常博士知宣州改撫州生才可才可生彥卿彥卿生不移娶陳氏元潮州儒學教授以道之孫生男子二人長即濳次混濳字用之自幼好學警敏嶷然有巨人志嘗受經于鄉先生王子啓及舅氏陳仲速入則浸漬不移先生之教父子兄弟討論切劘無虛日故所得率出其同輩用之甫弱冠其文論議已馳騁頡頏諸先輩洪武丙子選鄉試明年授四川蒼溪縣學訓導蒼溪僻逺過使客終嵗無幾人而山水可適其學者前此未嘗遇明師用之樂得其地旦暮坐講席開諭辨析必盡其說諸生皆欣欣有嚮進意稍暇獨行清流茂樹間吟咏自得又明年用薦除廣東四㑹知縣授承事郎推誠愛民剗宿弊崇寬政臨之以平易導之以禮讓致勤撫字稍暇輒就學舍親授業諸生嵗餘民咸悅服而爭訟息學校興流徙來歸以纍千計縣有瀧橋河世傳吏有亷平之政即河水清自用之至訖其去河水澄潔可鑑又明年改陽江又改陽春治之一如所以治四㑹者而陽春猺獠環處稍不得所欲即獸怒跳蹶不可制用之待之如子而不拘于法亦皆盡誠事縣令如父敬恭命令惟恐不及所厯之處將去人皆遮道留之不得至有流涕者永樂元年召修太祖皇帝實録書成升翰林修撰授承務郎賜白金五十兩織金衣一襲文幣四表裏五年命以本官兼右春坊右贊善進儒林郎時修永樂大典召至四方儒學老成充纂修及繕寫之士幾三千人人衆事殷特命太子少師姚廣孝禮部尚書鄭賜總之已而賜卒命禮部翰林院就本院推舉才學服衆者代賜遂舉用之用之方公明决蒞事有程而惰慢放肆者有不樂之相與誣其過于上上問具對云云上曰梁濳言是遂抵造誣者罪于時以文事禆益皇太子尤為所重上幸北京驛召赴行在八年南還十一年復扈從北京十三年考禮部㑹試十四年南還升侍讀明年復北狩將發親擇侍從監國之臣時翰林獨留學士楊士竒特詔尚書夏原吉吕震方賔舉一人副之遂以命用之其在皇太子前纍纍進善言皆見嘉納而寵以賜賚是年考應天府鄉試蓋明年及于禍矣嗚呼用之闓爽𢎞毅耿介自執其智足以燭幾其德足以及物其才足以興理其自任之重不肯下古人凡士君子哀而惜之夫豈以私用之也哉用之之學通諸經尤長于詩易自十五六已用意周程朱張之書壯而益探其微為文章馳騁司馬子長韓退之蘇子瞻亦間出莊騷為竒務去陳言出新意古詩髙處逼晉宋所著有史論若干篇碑傳記序銘頌贊述若干篇五七言古近體詩若干篇皆可傳後與人交藹然有相輔之義人有過而誚之不為依阿取容及其能改歡好如初焉用之死時年五十有三娶楊氏子男四果楘楫榆皆知務學果楘皆舉鄉貢未升二女長嫁袁俊次嫁進士劉凖孫男幾某某皆秀朗可望造物者殆以是報之歟梁楊世婚姻家余長用之一嵗少學同業壯而仕于朝同官知用之孰有深于余哉故其葬也宜余銘而余銘之亦豈出乎其私哉銘曰楩楠之蒼蒼可車可梁靈芝之煌煌瑞世之章曷其舉之又中毁之夫毁于琢曷全于璞理有瞢瞢為善罔祐顔短跖長從古則有從古則有善者徒傷尚有傳者其永不亡榮祿大夫少傅兵部尚書兼華蓋大學士楊士竒撰泊菴集卷十六
