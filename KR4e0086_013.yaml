body:
  text: 泊菴集巻十三明梁潛撰贊祭文墓誌商山四皓贊幷序右商山四老人坐松石間碁方罷欠伸俯仰若倦而欲休者其後二小童若為具茗飲之狀筆意殊不俗然不知畫者何人要知非汎然作者可到也四人者在秦漢之際深自晦匿其於出處進退凛然有不可致之節雖以漢髙之雄才大略猶嘗自以不得招致此四人為歉其介如此也故卒能折其當時溺愛之情挽不可回之勢使之潛消黙化不動聲色而天下之大本已晏然安矣於乎此豈徒以口舌强聒於一時者能之哉士欲有為於天下而平時不能自髙其節亦何足以動人也然竊恠當時有以致之矣而獨不能進之於師臣之位以為朝廷重豈其髙世之志又非子房輩所能羈絆而籠絡之耶翰林待詔李君遜得此頗愛之以求予題因為論著其大略而贊之曰相古至人不大聲色四公傲然功在邦國我觀四公㳺龍翔鳳超然髙舉身隠名重雲松倚天商山峩峩四公在焉永世弗磨春牧圖贊并序右春牧圖元趙文敏公所畫者馬凡三十有九其為態各異又各臻其妙平原沃衍豐草蓐茂𤣥黄聚散雜然如雲霞之巻舒而其騰驤超越雄駿豪騁之状駓駓然兟兟然如在内廐而釋抑羈如脱校於天伏如歸放乎華山之陽者亦何竒也信非文敏公豪墨之精他人不能至此方聖主御極萬方無虞紫燕白羲来于遐徼絶域者不可以數計而今太僕卿晉城楊公寔典馬政於一時得此圖因寳愛之吾知公進而縦觀夫神駿之羣退而玩此圖交相臻羙不亦快乎哉然則馬之牧茍有不遂其育者公固不能已於懐也贊曰房星降兮孕至靈紛容容兮瀰郊坰雜驪黄兮何駉駉鬛振風兮尾流星踔飛電兮獵迅霆或昂竦兮矯長鳴或徘徊兮勢欲騰或怒躍兮氣填膺目鏡懸兮晶熒熒聳顧盼兮態横生倐千里兮無留行毫墨弊兮神愈精閶闔開兮黄道平服容與兮駕雲軿力且馴兮爾良能噫駑駘兮誰其稱偉翼翼兮太僕卿寳兹圖兮弗怠輕謹乃牧兮永有成氷雪軒贊并序右春坊諭徳兼翰林侍講金公㓜孜以扈従来北京之明年治其軒以居而名之曰氷雪軒軒甚小而四壁皆白公樂焉既而自雪中見西山居庸之雄髙㧞出而壮之命圖之于其軒之壁間公于是入處乎軒中如在乎氷崖雪谷之下至于長松古木紛披欹折之状飛泉埀瀑淙瀉而怒激澗溪林壑開合而無窮者皆不出于其軒可坐而得之于圖故其軒非有髙深靡麗之觀而所以擅夫幽逸之勝者已超然乎塵埃之表矣公由是甚愛之凡退自玉堂之署即居于此軒以思報夫上之恩遇而或賔客之来相與講説徘徊于暇日徵道徳于前修而迹其盛羙考典謨于徃牒而發其要妙因以形諸頌歌見于鋪張揚厲之際者亦皆在此也然則公之所以名軒而愛賞之至者豈徒然而已哉然或者以謂皎皎者易汙公于此豈所謂皎皎者非耶公笑曰吾固假之焉耳夫氷雪雖至羙而世莫為寳者以其為物能融液于倐忽而莫之寳于世也故假之以名軒殆致意于無所用之物也世将誚予之不知則有之矣尚何汙之招哉於乎公之言如此其㡬於道矣辭曰天地之氣極寒而凝雨之凝而為雪水之堅而成氷本至隂之假質燁璀璨而光晶惟舉世之莫寳庶斯軒之得名既皎煥而光昭亦虛白而髙明顧靈臺王府之湛妙誠無異夫一榻之潔清也夫物不受汙本乎其質雖投之于埃墨亦皓乎其自潔卓哉斯軒豈竒寳之娛玩彼衆棄其樂超如惜哉昧者蔵珠懐玉如髪之垢而漆斯沐視于斯軒可以一忸胡學士畫像贊其外之和其中則剛其本之舒其容則荘窮六經之微言資濓洛之梯航既逺探其本始遂大肆而汪洋掌帝之制雲漢天章恩遇隆洽詞林輝光搏扶揺於青㝠載華轂乎周行盖董仲舒之正學陸敬輿之讜論楊公權之清操曠千載而與之方也胡亷使畫像贊其姿秀發粲然如紅蕖之出清淵其氣英偉隠然如豪曹之倚秋天其學而進也如傾三峡而沛若其仕而達也如馳康荘之坦然蒼桐以西崆峒挿天蔚繡斧其煌煌駕四牡其翩翩盖将厲秋霜之節以肅夫瘴海之烟使功成名立夫然後遲子于都門相與而周旋也陳缺畫像贊其居在金華芙蓉山下登髙邱而望廣海吾不知其中之曠也采黄花而挹清露吾不知其情之放也哦三閭之橘頌懐九老之香山邈金華其遼絶鬱芙蓉之巉岏於乎盖聞其人而得其真吾為之慨乎永嘆也止齋先生畫像贊此予舅氏止齋陳先生畫像也自予去家而来京師不見者四年先生之子公餘以溧陽訓導考滿因攜此以来遂得拜覩其容似而慨想其邱壑之趣焉為之贊曰粹乎其容翼乎其儀其中泰然其外似之澄江之南栁溪之涘抱遺經而遐放矯世態以知止鴻飛㝠㝠白雲孤起尚安得従朗陵令謁太邱公于髙陽之里耶袁院判畫像贊藹乎其氣之温綽乎其容之舒雖簡易以諧世亦禮義之同趨窺軒岐之秘究盧扁之書乗景運以龍附效忠藎而不渝藥畦春霽花徑雨餘妙生意以同物樂神情之洒如此畫者所未能知而公之髙致方與古而為徒也蒋院判畫像贊斯人也吾嘗見其采靈芝之三秀撫長松而孤咏聴天籟之稀微發雲霞之髙興盖曠乎其無營而坦乎其不競也及其遭遇明時上承恩命發陳編于金匱得衛生之寳鏡其所以保睿躬臻太和者夫何異乎古之醫師而其心之誠行之篤則又本乎其學之静也於乎所寄之甚重所任之匪輕而豈獨侈其能於杏林橘井者之比哉趙長史畫像贊并序此長史趙公季通像也公有文學嘗自教官為吉之永豐令入秘閣除國子博士擢司業遷北京國子司業既而以薦行特授今趙府長史其平生政教之善盖覩其像若将得之焉贊曰泊乎無營介乎自持坦乎不競抑抑乎其有儀副教太學弼亮王宫其教之是若其言之也従豈其感之以誠而導之以躬盖觀之於斯庶㡬乎有徳者之容翰林庶吉士陳孟潔贊并序於乎吾友孟潔負英偉宏達之資浩乎自放雖擢髙科入秘閣人皆以為榮而孟潔意若未嘗一日適者惟沉酣陶然若将委其身而不知有物者豈故欲絶世離紛以抗意乎物表抑和光合汙以冺情於塵垢耶夫以孟潔之髙材濶畧遭逢盛時足以取顯榮自樹立豈誠跅弛嗜味而逃焉者哉孟潔方壮時好擇交天下士所過郡邑即人人知孟潔所舎而休也扣門而問者屨相接嘗同逰乎西山南浦之間孟潔放舟中流引滿豪酌自夜達旦吾従旁視其貎津津然别去十年孟潔来京師其容已槁然手捉杯簌簌顫不能自持猶苦飲不已觀其所與友則惟其意之所欲者矣吾固憂其将憊也屢止之孟潔漫不惜也又踰年孟潔殁矣於乎世之不飲者豈必不死然凡人之嗜好有溺也必有害焉溺之深者将不勝其害也孟潔獨溺于飲耳而竟以是喪其身悲夫孟潔孝于親厚于宗族篤于朋友之義人之有急不啻如在已以其所能發于詩歌文辭翰墨今皆在也而孟潔不可見矣為之贊曰世之溺者聲色貨利沉酣昏墊卒以自斃君㫖于飲非聲利比而君之亡竟亦以此伯倫巨源豈各有意君負材豪脱畧軒輊何能自局以乆斯世有生則死何有同異泯焉逝矣千古一軌泰山為杯酌以江水與君傾倒君不可起我之懐思曷云其已龍贊方其排風雲鼔雷霆霖雨天下之人皆知龍之為靈至其屏迹百仭之潭使蛟鱷斂其威鰍鱔蔵其迹人固莫測其神於滄溟也於乎使龍而可狎可馴可測知其神則将與尋常之獸等而為頑㝠矣龍豈靈乎哉楊處士贊其貎之温温其行之循循不離世以絶俗乃含和而抱真湖山之區霎水之濵濯清風而䕃喬木采紫芝以望白雲其亦欲入虎溪之社赴東老之約而超然乎無功鄉之民也耶祭榘兒文爾生之明年丙子吾以鄉貢而之京又明年吾舎爾之蜀戊寅吾歸自蜀爾祖攜爾候里門外趨拜道左爾祖躍然喜未㡬吾又舎爾而徃爾時漸有知矣聞爾父徃且泣且止而莫知所由也吾以舉者還京師授四㑹令攜爾母與爾兄偕来至章貢舟師不嚴㡬危而幸活莅四㑹六月以舊令復職調陽江七月抵陽江客土始至舉目無可親者炎風瘴霧侵人肌骨疾而死者相繼未㡬爾母病爾兄病僮奴皆瘁然獨爾質冲氣揚神暢貎澤吾心且喜且懼豈意母兄僮奴病皆愈矣獨爾竟殞其身於乎痛哉彼造物者既生爾矣胡奪汝如此之速耶誠爾父行負神明降之罰固如是之毒耶爾父為令罔敢有毫髪私取與祿俸之餘期以奉親也輕暖之服不至於身華羙之食不至於口爾為邑令子無異乎圭蓽蓬桑之家也攜提之恩疎於徃日戒約之嚴加于此時爾父誠有負於神明耶抑汝之命也抑爾父之命也彼蒼蒼者何為其然也於乎痛也吾来也汝與俱吾還也汝已死爾祖與爾祖母尚未聞爾之訃也使其聞之痛于肝腸者何如也承家亢宗端有望於爾也今其已矣今其已矣割不可忍之慈葬爾于廨宇之右爾其有知耶其無知耶尚妥焉無怖無懼女鑾墓誌女鑾生永樂乙酉十二月十六日辰時明年丙戌十月五日辰時以暴内傷得風疾死焉其生及殁皆在京師崇禮坊鑾慧婉能笑語最鍾愛于父母於乎使其無生予不為之戚既有生矣而又夭折焉則予之情有不能已也葬于都城外鳳凰臺之下其父翰林修撰梁潛為誌其壙云泊菴集巻十三
