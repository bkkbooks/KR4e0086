body:
  text: 泊菴集巻一明梁潛撰應制騶虞詩有序臣聞自古聖帝明王至治之極必有禎祥若麒麟鳳凰醴泉甘露應時而産皆所以符聖徴彰至徳者也乃永樂二年秋八月皇帝冡弟周王畋于鈞州厥有異獸白質黒章猊首虎軀其狀孔威不可廹視王俾部曲俟之其性孔仁遂擾致之以詢之故老蓋古所謂騶虞者此其是已夫惟人君有至信之徳則見於是九月丁未王率厥屬表獻闕下皇帝服皮弁服御奉天殿以觀不震不動柔伏自然皇帝若曰厥為嘉瑞予罔敢知惟致自昆弟之邦予其嘉焉於是太子太師淇國公臣丘福謹率百官上千萬嵗夀既而京師人士忻喜聚觀咸以為聞自古昔見始今兹臣潛伏覩盛典不敢自黙退而考之騶虞咏於詩記於禮列於傳記或以為義獸或曰仁獸或曰聖獸至以為嘉祥者則其言皆同也傳曰國家將興必有禎祥洪惟皇帝紹登大寳率由舊章親親而仁民恩沛而義洽萬方咸和以及乎庻類禾同頴於郊蠶成繭於野文犀白象諸福之物抑之而愈臻却之而復至何其盛也豈非上天以是昭至徳哉臣潛忝職記注茍不形之歌詠以垂示無窮厥為不職謹百拜稽首而獻詩曰於穆聖皇綏懐兆民端本自家篤於周親恩沛義洽如煦春陽至和冲融發為禎祥禎祥伊何厥惟騶虞産於王國惟皇徳符王馴致之獻於帝庭素質𤣥章雲舒霧凝帝乃觀焉爰戢其爪爰言究之踐非生草吁嗟騶虞外何其威内何其仁匪苞而鳳匪角而麟吁嗟騶虞曷為來哉王拜稽首皇則召之皇之仁民淪膚洽肌𢎞暢旁達物以不疵皇之孝友本乎至性萬邦咸懐物以類應皇帝日俞惟王信恭王乃麟趾奚必騶虞皇帝曰吁凡百在位惟徳召和匪物其瑞庻臣拜手皇帝萬夀慶祥畢臻徳音是懋河清詩有序維永樂二年十有二月十七日河水清自蒲津遡韓城凡三百里其始也紺碧蒼𤣥五色融液混混未定越翼日榮光上羃㝠濛相蕩和氣郁然俯而視之則奔湍歛息化為清泚淪漪粼粼楫而游者傳相告語逺近駢集既明年正月有司詣闕下言狀羣臣皆頓首賀皆以謂河清者太平之應也臣退而考之傳記自古禎祥之臻必由乎人君功徳宏普黙符潛召而其徴應之大又莫有過於河者是故般之頌美時周之命必曰允猶翕河時邁之詩言懐柔百神必曰及河喬嶽蓋河之行乎地中為四瀆之尊配乎五嶽河既率職則神無不歆而天地萬物靡有不寧矣故河清為太平之兆非偶然者洪惟我太祖高皇帝定天下紀元洪武之二年龍門磧下河水清由是三十餘年天下晏然清明蓋其應也今皇上入承大統河之清亦永樂紀元之明年於乎此豈人力所能為哉是皆皇帝陛下功化之大克承克配充滿天地奠及神人故上帝監觀發此禎祥肇基太平以同符高帝而並美匹休古未嘗有也夫有周詩人之於河嶽播之頌歌告之神明其盛大如此今河清之祥昭著倬倬其可不形之歌詠垂示萬世以傳之無窮也哉臣謹拜手稽首而獻詩曰河流渾渾肇自古昔横亘萬里潢汙霆激觸乎崑崙踔乎龍門震掉奔騰入乎無垠惟皇聖明百神效靈湯湯蒲津河流載清始視其流混漾弗定若鑛在鎔五彩輝映厥既清矣静影浮空榮光上燭煜乎溶溶若挹而注若涵而蓄元氣黙融太和潛漉纎滓弗滯淵乎若澄千峯倒浸湛乎若凝蒲津之堧幾數萬里烏翔而廽魚駭而逝屬時載暘楫而詠之祥颷慶雲盪潏無涯觀者如堵聞於京師京師髦倪鼔舞孩嬉列章帝庭帝弗矜異曰匪在兹益惟寅畏於惟河流為地之紀四瀆之宗五行之始在昔皇祖戡定萬邦惟兹河流駿發其祥我皇繼統舊章是則河之清矣如軌合轍河之既清萬民以寧萬方畢來物以阜成顧兹河流念我皇徳東漸西被始自家國皇之𢎞化功邁三五如彼河流行地東注河流浩浩孰非皇仁淪肌浹髓品物皆春河流洋洋皇帝夀考於萬億年為民父母瑞應詩有序天命皇帝臨御萬方上下百神克享克祀越今五載嚴恭靈承益䖍弗懈乃永樂丙戌十一月庚申禋祀昊天上帝於朝天神宫爰及九廟皇帝考妣壬戌上親奠薦頫仰對越精神潛孚百靈昭格是時天宇澄穆慶雲祥颷蕩摩上下松栢竹樹甘露布羃鸞鶴翔舞既去復還既畢事越二日戊辰醴泉出於神樂觀惟厥地宻邇異香旁暢玉色湛凝神光騰吐下徹厚地醇和醖冽無異甘醴既馳報闕下皇帝御大輅率近臣徃觀揚之而愈芬酌之而彌甘汲之而不竭乃取以薦宗廟遂徧賜羣臣始飲之耳目視聴通泰明爽沾溉所及沈疴如脱又明日復有甘露降於孝陵松柏之上枝條廹迮凝綴浮動芬馨勃鬰物無比擬於是太子太師淇國公臣丘福謹率百官上表稱賀皇帝御奉天殿乃詔曰朕纘承皇考丕緒精享百神嘉瑞迭降匪朕之力惟皇考實啓佑後人然自古有道之長禎祥之集益惟戒慎爾羣臣尚勉輔予一人以𢎞膺兹休羣臣皆拜手稽首上千萬嵗夀於乎盛哉臣潛退而稽諸傳記聖人之徳上及太清下及大寧中及萬靈則甘露降而醴泉出又曰王者徳至在天則甘露降徳及淵泉則醴泉出惟皇帝中和一徳蟠極天地貫通幽明故六合之内無物不遂無神不格諸福畢臻譬之春陽既泰土脈咸奮百蟄昭蘇理之常也然此之為瑞世所共知者至於我皇運此心之誠施之萬幾庻務使四時迭行七緯順軌山川奠位雨露時降五榖繁殖庻物充牣四夷向風斯為大瑞而億兆羣黎所不識不知者也皇上雖謙抑弗及然美盛徳告成功曠古有不能自已者於是臣潛拜手稽首而獻詩曰於惟聖皇克對於天靈承郊廟弗懈益䖍弗懈益䖍神具歆止嘉符黙貺爰集多祉神觀巍巍宻邇郊祀有冽者泉其甘如醴峩峩皇陵皇考是宫有蒼者松甘露濃濃皎皎晨暾灼之弗晞肪疑玉綴其甘如飴布羃條柯涵潤巖谷孰其降兹惟皇考嘉告有冽者泉澄深淵濚酌之愈甘挹之弗濘有冽者泉凝寒弗沍虹光上騰下徹后土峩峩神觀巍巍皇宫祥颷慶雲鬰乎冲冲孰醖孰釀孰疏其源坤后帝神有開厥先乃薦宗廟乃錫廷臣乃命徃視填闉溢城既瞻既駭拜舞忻忻惟帝神聖靈貺斯甄帝念皇考明禋精格嘉祥之來如響斯答皇帝曰俞兹非予力惟爾耆舊靖恭乃職皇帝曰俞罔弛于度爾尚相予益勤以惧臣拜稽首聖謨洋洋用永兹休以埀無疆臣拜稽首皇帝萬嵗永世無斁萬方來格正月六日觀靈谷寺㙮影奉和御製詩二首菩提正覺超𤣥間非空非有開禪關三乗頓悟是非塗慧力高等崑崙山崑崙萬仞倚天起千派靈源走河水一從釋迦辭王家當時如在化城裏念此羣生溺愛河誰能隻手遏頹波化身千億入東土神光瑞氣昭彌羅靈山遺跡久茫昧復此重來屬昭代端嚴真相妙如如圓通法戒行在在定以生慧慧生空六根净盡空慧同勝縁妙果悟聞見揮手可入堂奥中遍歴諸刼不能毁縁此無始無本體執想想生見空花刹那之間萬紅紫傍蹊巧趨易招惑如蠶吐絲自徽纆有目顧見佛日光高照天下及萬國我皇化被極東西遐邇來貢無或迷象犀虎豹日交致車渠火齊青玻璃醴泉甘露降巖谷嘉禾瑞卉何煜煜皇心所眷不在兹徳惟馨香自芳馥頃聞浮屠現毫光大周八極細茫茫又看倒影入虚室從一空中遍長廊諸相玲瓏僅盈尺陽烏隂兎㑹晨夕走視稽顙衆顛仆千影俄散入千隙玉刻芙蓉金作臺雕甍碧瓦無塵埃鸞輿降幸時徃來龍章鳳彩雲間開六丁守䕶百神繞虹光騰燭天皎皎由來佛法昌運符旭日東升塵界曉誰能觧此妙圓覺彈指可以超無學滄江俄頃息暴流水底摩泥光灼爍旋來超至一事無縁生起滅空華如若淪貪著出遂禊焉知自性同交蘆執持真妄不開演渾似風煙相展轉自在那知獸踏沙綢繆甘作蠶成繭尋常安得竟生身四法修行兩便因徃來迅速無石壁知慧善巧成陶輪眼中何人最勝子究竟真如微妙理惟恐浮漚尼海觀空見雲騰烏飛起憶昔鹿苑道初成大興慈誓悟羣生萬法無言寧可説十方有耳皆聞聲靈山一去幾經刼多少無明成惑業聖凡由此分兩途終始應知纒五叠世人何幸見如來祗園春暖曇花開微心已入虚空藏揮手直上光明臺如來前身釋迦佛説法曽住耆闍崛西渉恒河度𣺌茫東踰葱嶺凌超歘三十二相具莊嚴一念清澄衆善兼五色金光晃千日九秋玉鑑懸孤蟾每向招提演空法四百歡聞聲颯霅不論燥濕與蠕蠢㧞及升沉并鱗甲浮屠倒影光陸離巍峩樓殿相參差多因攝受妙景出巧奪造化神工為温温彧彧窓間度絢彩非煙亦非霧畫師縮手不敢圖墨客操觚豈能賦春風淡蕩春日妍人間一界無諸天生靈永樂普超濟翼我皇家萬萬年神龜賦有序永樂二年十月皇上思惟太祖高皇帝成功盛徳將紀功孝陵以告萬世既得碑求砆未獲獲神龜乃併得砆焉臣潛百拜稽首而獻賦曰若有神物兮輪輪囷囷晶晶熒熒弗坯而冶弗孕而形不侈乎六目不矜乎三足背圓方腹肖乎隂陽昻首曳尾若趨復止曾追琢兮是施微瑕疵兮可指是殆所謂龜之神而賦質之特偉者耶想其冲氣陶鎔太和薫蒸虚危晝煜瀣沆夜凝走衆怪馳百靈列地位羅天經耀赤日射紫清𤣥鼉茹沫素蟾奪明􅞪朱鳥兮禠魄隠𤣥武兮降精沁寒液兮沉瑩絡微蘚兮廻縈光離離兮黯以著色黝黝兮蒼以頳含靈和兮暢内藴炳至文兮昭竒英顧荆山之璞不可匹而磻溪之璜未足稱也然而岡巒隠約榛莽蔽翳伏而弗彰孰藏之秘萬夫荷鍤孰啓其志弗求而獲奚祥奚瑞蓋幾無感而不通物有竒而非異於穆聖皇厥孝純備聿念皇考作配天地徳超乎百王功垂乎萬世文謨武烈奚可弗紀惟陵有碑琢龜是負必珉與珷必完以固千崖矗矗靡中其度崇岡漫漫靡究其所乃勤帝衷乃勞聖慮心忡忡兮潛擬目睠睠兮遐顧結幽思兮𣺌岡巒疲逸想兮馳煙霧由是鍾山之陽龍潭之側碧樹廽春紫芝耀日神氣歘忽祥颷蕩潏諒皇心之感孚信帝命之昭格蓋將發真石之幽蹤而先此神龜之是出也是以衆工助喜謳歌洋洋虞衡馳報挿羽飛章辭烟霞升明堂炫金鋪晞晨光觀者如山怍愕徊徨稽首拜舞歡慶殊常景星爛其垂耀威鳳雜其來翔薦寢廟歌樂章鼔萬舞聲喤喤文教敷兮洽萬邦盡四海兮畢來王於千萬嵗兮夀而昌平安南頌有序安南自漢為交趾九真等郡歴唐末五代始竊據其土宋元因羈縻之我太祖高皇帝始定天下安南貢最先高皇帝惠顧隆洽涵育浸潤幾四十年既久以安自為禍孽其臣黎季犛擅其政柄樹黨立朋威自己出及高帝升遐遂弑其主陳日煃建國改元揚言陳氏絶祀請命於朝俄陳氏遺𦙍有脱至京師者黎賊愧懼乞迎返國則又邀殺諸塗縁邊數郡深被其害狙詐日積厭於聴聞皇上不得已乃布告中外永樂丙戌秋七月戊子朔以成國公朱能為征夷將軍總諸將兵八十萬徃討之癸夘上送之江滸聖謨宏深告諭周宻又一月師臨其境别將自滇池直擣富良江賊勢大窘聨木為栅縁江四百里為大舟絡置水上我師遣小艓趨出其上流因大風夜焚其舟衆兵繼至大呼奮擊大敗遂平東都進克西都不一月郡邑以次皆降附乃布告皇上所以弔伐之意交民父老流涕感激以陳氏之殱於賊也乞舉國内屬願世世勿為夷狄以外化唐虞皇上遂按漢故事郡縣其地置官司如内屬郡凡黎賊所以威虐其民者悉除之交民大悦臣謹按大司馬九伐之法黎賊之弑主罔上蔑棄典常罪當殘滅不可以宥然其國逺在萬里又自唐末至今五百餘年矣根蟠蒂固上襲下順恬不自畏茍非皇上神略雄斷洞燭事幾高出百代曷足以建立曠世殊功如此臣潛忝職史官次第其事頓首百拜而獻頌曰於惟聖皇統天建極肇此民彞以表四海際天極地無有小大以生以育惟帝是頼曰廸於彛帝則受之厥惟弗廸帝用糾之是曰天憲匪帝其私念彼交趾作貢南土亦既有年以奠其所惟厥臣姦敢背厥常誑言盈廷以幸冀康天鑒在兹惟帝服訓奉若天命以征弗順皇皇聖謨百萬其師赳赳虎臣如熊如羆帝臨送之於江之滸鳴笳沸天揮戈如雨皇帝曰吁來爾將臣汝弗究武徃弔乃民皇帝曰吁來爾統師參軍副將左右其宜神機横海驃騎遊擊爰及鷹揚各率乃職浩浩江流桓桓我旅有截其所有赫其武左江之西桂嶺之墟萬壘雲屯萬馬電趨王師未來虎穴狼區蜃氣晝暝虺沫林枯王師至止有風泠泠飛霜被野天開日晶堂堂之陣道行無留徧將别趨乃斧其喉乃斫其寨颷飛火烈如渉培塿何有嵽嵲富良之江有徒林立一炬宵投羣舸如鴨大江失據連寨齊㧞乃蕩其郛乃夷其城兩都既平四郊遂寧按兵止戈宣我皇徳乃詔庻鰥載欣載悦有羊在牽有酒盈樽延頸促武拜手轅門交人既來乃告乃謂曰予天氓皇乃遐棄皇之宏化如天浩浩曽謂交民而不覆幬飛章帝闕帝憫且吁曰奠交民曷圖厥初爰昔漢唐制内内地宋化失宣投之醜類今五百年天運載旋朕惟機逢敢弗順天乃斷自衷乃擇俊乂立之百司統以庻吏乃發洪音乃厲庻士交民困疲汝惠鮮之母俾交民憂心孔懐於乎噫嘻聖澤洋洋自今其始交民永康交人于于惟帝之謨交人來同惟帝之功伐石泰山告功萬世億萬斯年永蹈成軌瑞應麒麟贊有序大海之西萬里外其國曰榜葛刺有麟生焉其王知其瑞而不敢自有因望洋東北再拜而言曰兹惟海島蠻夷之邦視在天地之内如九牛一毳其何以致此者斯其為中國聖人宏化盛徳之徴乎謹卜日遣使戒舟航度絶島踰大洋獻之闕下于時聖情悦怡萬姓具瞻龍顱而鳳頸麕身而龜文容與閒暇不驚不悚聲出其脰若合乎鐘律其歩趨又中乎規矩信乎其性之至仁而有以賔服乎百獸者也於乎盛哉考之徃諜禮稱四靈麟蓋為之首而龍與鳳次焉詩詠歌文王之化其頌美揄揚托意於麟者自趾而定而角不一言而已則麟者誠聖世之上瑞也三代以上或在囿或在郊藪然皆以聖世而出記曰中國有聖人焉則麟至而又以麟之應為夷狄向化之兆者此特其一端耳然而漢武之世麟見於雍而匈奴渾邪來降宣帝時九真國以麟來貢而四夷莫不賔服則其言信然是皆見諸經史可考證不誣者也洪惟皇帝陛下功徳盛大仁恩宏暢始於家邦充溢乎八表故薄海内外九夷八蠻之逺無不向風順化蓋自三代以降中國之盛未有過於今日者也夫惟陛下盛徳充積之極故融而為醴泉渙而為甘露諸福之祥無不畢至其積盛不已則又為麟之祥産於數萬里外而後致之闕下豈非上天以是昭彰陛下漸磨萬國柔逺能邇之化哉蓋自周成康至於今幾二千年麟之見纔一二耳而臣獨得遭逢其時以快覩乎曠世希有之瑞其為欣幸可勝道哉謹頓首百拜而述贊曰於皇聖徳兮如日方升被九有兮超八紘旁暢達兮感至靈極西溟兮麟降禎嗟麟之降兮孔神以明五行粹淑兮匪孕而生四靈合體兮匪育而形其性振振兮含和包貞渉萬里兮登明廷嗟麟之來兮惟聖之徴龍顱兮俅俅鳳領兮矯脩九門闢兮卿雲浮參紫鸞兮陪玉虯賁聖文兮揚佳休千秋萬嵗兮麟孰與儔麟孰與儔兮聖澤汪汪龍遊宫沼兮鳳鳴朝陽酌丹穴之泉以為醴揉玉山之禾以為糧擴至仁為囿兮禮以為防嗟維爾麟兮永與翺翔後天不老兮聖夀彌昌瑞應賦并序永樂十五年十一月癸丑皇上營建北京宫殿瑞光頻見輝映殿柱之間金水河太液池冰凝結衆像千態萬狀竒巧精妙不可殫舉丙辰之日復有卿雲五色中見瑞光團圓如日正當御座瑞光中燦五色天花已而騰輝上升西度宫苑映照皇上所御殿庭浮彩氤氲終日不收其時宻雲來獻瑞氷如水晶含玉者凡七與金水河所結無以異者工師執事之人萬衆共覩莫不歡忻踴躍既而皇上命以示南京小大臣民瞻望咨嗟都城人士駢肩累迹交相稱慶蓋前此未嘗有也於乎方宫殿經營之始而上瑞疊臻此天意所在豈無所自而然哉洪惟皇上功徳盛大無與倫比至誠之道上契於天聖謨之發動與天合由是三光全寒暑時四夷賔服五榖咸登然後修禮樂明教化舉先王之道重彞倫之典隆百神之祀惠施鰥寡之民使海隅邊徼日所出入之地皆相安於無事熙然泰和充乎六合之間凡醴泉甘露嘉禾瑞麥麒麟騶虞之瑞靡不畢至至於此而天地之祥交應於上下蓋所謂以和召和者皇上盛大之徳誠有以來上天之降鑒而非偶然之故也於乎盛哉臣覩兹盛美不勝欣踴之至謹百拜稽首而獻賦曰欽惟聖皇御極兮乾清坤寧聿追豐鎬兮肇建兩京明堂洞開兮玉墀彤庭煥黄居之巍巍兮凌紫府之冥冥惟天篤眷兮屢錫嘉徴卿雲興兮郁郁紛紛變化輪囷兮燦五色以成文祥光燁煜兮洞徹乎金門輝騰黼扆兮儼奉獻於至尊惟體元以居正兮實厯數之方殷太液兮淵冲金水兮沇溶氷凝結而疊起玉稜層以玲瓏外成如意珪瓚中含瓔珞寳網竒竒怪怪殆有不假手於良工蓋造化之自然所以符泰運之興隆神臯聖壤兮所畜者久英猷睿斷兮所謀者深信天作地藏之有待恢經營布制於聖心規模宏逺兮過周成之作洛厯數綿延兮邁商湯之景亳於以奠安中原於以威鎮幽朔煥乎大明麗天率土一照而不遺於丘壑也欽惟聖皇其仁如天其智如神聰明文武統一聖真纉太祖鼎新之業繼文王日昃之勤無一事不遵成憲無一念不在生民曠六合以無外令四海以皆春際天極地悉主悉臣興禮樂於中朝考制度以時廵熙治化兮三代返風俗兮再淳天命兮諄諄聖子兮神孫萬萬年泰山不拔之基萬萬年洪河久長之業衣裳垂乎紫宸之殿功徳鏤於白玉之牒巍巍隆隆天子之功頌曰惟聖作都詢謀同兮惟天降祥符宸衷兮聿配豐鎬兆熈雍兮居正體元日方中兮創業垂統益穹隆兮四方萬國長朝宗兮西域獻獅子賦有序永樂十三年秋九月西域以獅子來獻雄姿詭狀傑然殊常顧盼之間百獸悚伏前此未之見也於乎逺物之來實由皇上徳化廣被之所致非偶然者臣潛覩兹盛美謹百拜稽首而獻賦曰遐哉曠乎極金天之西陲厥有獸兮曰狻猊蒙蒙茸茸勃其髯耏凛凛栗栗赫乎有威睒紺目兮星垂妥繡尾兮霞披攬蓐收之精英禠太白之神竒稜稜乎猛氣獵獵乎雄姿聲殷雷兮含咿咿齒利劍兮切差差憤冲膺兮欲洩怒拂脰兮莫支於是捩文豹擘𤣥犀玃象兕刳熊羆養由歛技而逺逝中黄扼腕而莫窺爾乃道西極騰瑶池踰葱嶺渉月氐東望扶桑獻之京畿於時九門既開明堂孔暘金昊載肅商颷微颺遊於彤墀煒乎煌煌厥有老者椎髻而毳裳再拜稽首擎拳以奉將䬃沓進退率舞而低昻曰皇至仁兮柔逺偉兹獸兮馴良見者駭乎其未覩聞者想像而彷徨乃知逺物之來格實由聖徳之遐彰簫韶兮鏘鏘鼓鐘兮央央陪麟趾兮下上隨騶虞兮翺翔協皇武兮符治康奠中土兮清四疆皇風暢兮皇道昌聖夀萬億兮與天而俱長瑞應麒麟篇有序永樂十二年秋九月榜葛刺國遣使獻麒麟於朝明年秋九月麻林國復以麟來獻其狀皆與詩書傳記所稱無以異者臣惟麟仁獸也中國有聖人焉而後至今二國皆西海萬里之外距一嵗而麟兩至焉是皇上盛徳廣覆漸被所至非偶然者臣潛覩兹上瑞不敢以嘿輙形之詠歌為麒麟篇一首百拜上獻辭曰皇化敷萬國賔麟之降徴皇仁若木之西桂海濵𤣥枵昱然降其神歘忽下為麒與麟龍其首麕其身負以龜文燦彬彬行中規矩聲合韶鈞生草不折何振振瑞物之生本同氣要當匹美貢紫宸神光皎皎射太白散作矞雲成五色淋漓上與太微直駕樓船辭下國祥颷興驚波息十洲三島相緲綿𤣥鰲紫虬俱辟易飄然遐舉上神京神京大道如砥平峩峩雙鳳闕巍巍凌紫清璚樓玉殿丹霞生麟之來皇化成兩兩翺翔繞丹陛遊聖歸昌相和而應聲有如雌雄兩神劍萬里之逺還合并麟之來符佳禎簫韶九奏鳳凰和鳴獅子貢西極騶虞遊郊坰南畝之禾九穂而一莖皇之沛澤有如此萬國涵濡皆滋榮麟之來景運昌伏靈囿偉煌煌舞堯階繹蹡蹡餐以𤣥圃之芝房飲以瑶池之霞漿千秋萬嵗承寵光泊菴集巻一
