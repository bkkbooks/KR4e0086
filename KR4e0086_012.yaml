body:
  text: 泊菴集卷十二明梁潛撰傳一槎翁傳一槎翁泰和人年方冠從事入臺府聲籍甚既而入禮部將命于四方負盛氣英偉動人選為給事中命方下以憂去自是沈滯低徊者三十餘年凡六考皆卑官最後為江都典史尋復罷去皇上即位以髙皇帝舊臣例加賚豫俾退休于家然一槎鬚髮皓然老矣自以宦途飄泊之餘風波所激觸枯朽而摧濯生意盡矣而猶泛乎不知其何所止也因自號為一槎其生平政績有過人者一槎皆委擲棄去不肯自道於人因念一槎方壯時面如玉雪秀眉疏髯髙材而俊略雄邁蓋一時使遭遇知已出其所長而用之其所至何如也今既頽暮猶時矍然有意時務性喜飲飲酣而歌聲如金玉諧嬉敖謔機應不窮然一槎外若黠而中情實朴人每從其後揶揄之一槎不知也嘗一至京師與飲之醉慨然曰吾之槎今休矣上崑崙而望河漢世無復知我者棲溝壑之恬流與燬梗聚萍相依以少息吾之槎其止於斯矣乎乃歸買田負郭築室于故邱輕裘緩帶日與二三故舊徜徉往還欣然以此終其身也一槎姓羅字仲矩因其老又謂之一槎翁云贊曰豫聞河南歐陽參政云羅君在江都為政濶略無文而洞見隱滯學士儒生多所不喜然甚得民歐陽又數數問羅君今已老尚康强無恙否其有意於一槎如此然吾觀一槎甚自適無一毫憝容孔子稱栁下惠不卑小官一槎其近之哉因為之傳疾退子傳疾退子泰和人也仕不顯於時又以盲廢故自號曰疾退子疾退子少時豪邁頴敏氣英英然蓋其五世祖復之宋神童也疾退子既負其地以自髙又不肯阿合下於人故所交多一時名士其仕也雖卑官甚亷及廢而歸也貧益甚又盡喪其妻子且老矣練裳草履低徊蓬蒿之間巡除卓杖歌聲激乎霄漢然時遇事不平猶拊膺憤然人望見多引去避之獨所為歌詩人得之無不愛也自顧無所為於世乃推衍邵子先天數術以測人之貧富窮達夀夭亦隂以驗其人之賢不肖或得其似焉輒以自笑而喜口固不言也然疾退子尤數奇元亂時嘗與其母俱陷賊中疾退子被傷死道上氣方屬遇他盜憐之搗炭為屑以藥其瘡裂衣以蒙其首氣始蘇血淋漓被面上又負其母四顧甚急忽遇賊帥憫之留止其旁舍與之賦詩飲之酒而勞苦之明日徑遣出城衆異之以其為孝感也疾退子平生所遭窘迫如此又窮獨終身此豈非命耶蓋人情有不能堪者而疾退子視之泰然古所謂知命者其疾退子哉於乎世之耳目聰明享有百祿意無不得獨其中不能泰然如疾退子者抑獨何也疾退子姓鄧字學詩云胡敬方傳先生諱直字敬方其先本熊氏世為豐城人父達天仕元為福州路録事卒于官先生幼孤鞠於古田縣尹胡時中因姓胡氏徙為吉水人先生幼已頴悟稍長敏於記誦胡公愛之遇如已子年弱冠益刻苦自厲鋭意於六經孔孟之書已而致力于濓洛周程之說窮隂陽之化以極夫性命之原探道德之㫖以明夫周孔之緒其立志廣大故其逰心也髙明其用力未嘗少怠故其所造深逺所居鳳凰山西澗之上學者稱之曰西澗先生嘗獨坐一室掩卷而思思而有得也輒援筆肆書頃刻數百言不止嘗語學者以為古之聖賢以其方寸之微應天下無窮之變著之於事業可以為萬世法後世豪傑之士弛張措置能中乎機㑹者特偶與之暗合耳求其所謂明體適用如古之人者未之有也因以謂今之學者欲從事於聖賢之事功當必先明乎聖賢之道而後可聞者莫不嘆服先生尤深於春秋之學每欲學者即王霸之盛衰明世道之升降而後求之聖人豫奪之㫖其用意精詣絶出故其所見非尋常局於所聞者可擬也又曰不能明春秋大義于千載之上而欲折衷人事世變於千載之下者未必合于道也大抵不為徒學欲折衷行之者如此然先生為人雖簡易以接物而亦峻立以自守雖疾惡之心常勝而和易之氣益藹然也聞人之善其稱道奬勸若已有之至于人之過失未嘗一出諸口不忤意於勢不矯情于物雖閭里童稚待之亦必以誠其為文詞善論議意所欲言輒浩博宏放而必本之於道逺近知慕其文而獨不知其於義理之學尤深也凡從之學詩書春秋以决科者皆中進士髙第獨先生屢貢輒黜或讀其文謂先生宜少貶其說以同于衆先生曰不然學之道必求其至使淺其說而可合吾寧不合之為愈也以便於養母求為鄉校弟子員既而其子槩以進士擢監察御史先生乃自鄉校貢于太學踰年始中應天府鄉試逺近聞者大喜以謂鄉貢士得先生誠愜公論也就北京㑹試復以下第南還遂乞告歸省先塋至家之明年得疾卒矣年若干聞者痛惜之其所著文有春秋提綱西澗藳鍾陵藳詩賦雜藳總若干卷先生之就㑹試也適豫為考官既開榜皆駭然以失先生為問因亟取其卷讀之其文之壯浩浩乎如長江之洪流可驚愕也以偶脫經題一語於法不得取同考者執其文相視嘆息而止及豫出試院一見先生先生撫手大笑因誦東坡送李薦之語曰可不牽羊載酒以謝玉川邪歡然不以毫髮介意士大夫由此益髙之不數日遂去豫因餞之以詩時永樂十三年二月也嗟夫士之志於道德者功名不足以纍其心志於功名者富貴不足以纍其心自聖賢之教不明俗學之卑陋甚矣使其心少知內外輕重之分則必能反躬以求其大者固乃謭謭焉馳其志於文詞利祿之間蕩乎其莫之止也可勝嘆也哉方狂瀾既倒之餘有能卓然不隨波而靡者其亦庶幾乎古之篤行者矣而何可使之泯滅於後世而無聞耶吾故於先生之歿既痛惜之以為不可復得因擇其平生學問之大端著之於篇使讀之者不獨知先生或因是有以感發其志意云王伯貞傳公諱泰字伯貞姓王氏吉之泰和人其先世蓋多顯者獨公父祖數世不仕父子與元季授福建行省照磨改吉安路治中皆不受逮國朝初開端本堂召至以為說書既而授福建鹽運司副使以老疾乞還鄉里所居種竹滿亭學者尊師之因號為竹亭先生公自幼學易于其家性極頴敏時安成劉雲章先生嘗從虞邵菴先生講明理學得濓洛圖書太極之藴公往受業焉時共學者數人先生獨稱公足以任重行逺久之公追省其季父於宦所窮蒼梧三湘之勝泝大江厯三峽以縱覽夫岷峨之壯而其氣益浩然洪武十五年以聘至京師同時至者凡五百餘人太祖皇帝親御奉天門試之公所對為第一既而與論太極公之說尤稱上意授試僉事出按廣東雷州既至問利病於民言特吕塘之水灌東洋田萬頃乃寇凖所開故渠也不可廢不旋踵公去而渠復民大便之改工部主事丁外艱去官以起復後期謫居安慶者十年復用薦起知瓊州公是時年幾六十矣精練之才博達之識隱然蓄之益深而其溫厚和易之氣藹如也先是崖州黎民報讎殺人而府衛以反聞且張大其事兾用兵得漁取於其中遂發衛所之兵往勦之一方汹然㑹公至亷其實以身任之卒捕讎殺者數人以復于朝兵卒不發而崖之民賴以無事瓊之野其田嵗常三獲以賦于軍然軍中收不時受俟民乏而斂急則因之以要利焉公為立期以三輸之其弊遂絶嵗甲申瓊大旱公禱之大雨既而聞城南十五里外至精瀾浦尚不雨公又禱之詰旦適往精瀾浦視畨舶雨亦隨至民為之鼓舞曰太守雨數年其政大行獄訟止息舊嘗為奸利病民者皆屏迹不敢出有欲隂俟公之短而挾持之者久之無所得卒亦化服為良民田野日闢流民相率來歸者萬三千餘口郡既無事遂新學校課諸生一意於教化蓋在郡中十五年而以病及往來道路之日半也然環瓊數千里內凡三州十三邑其民無問識與不識皆愛公如父母其以內艱去也號泣而送者十餘里不絶是時廣之東語賢守公為最焉服闋改知肇慶府未行而疾作卒于北京萬寶坊時年蓋七十五矣公平生尤孝友其季父無子公事之如父事其繼母尤篤其學無所不通為文髙邁有古意其於性命道德之理則得之於師承之間蓋深矣豫與公同里且有世好自公之守瓊適豫為令肇慶連易三縣聞其行事尤詳及豫為史官于翰林公之子直亦以科第入為同官故其沒也豫既哭之以辭因又取直所為公行狀參次所聞者為之傳云贊曰豫往年數見公飯啖異於常人志氣偉然亦何其壯哉而今羸然身不能勝衣舉觴微噍輒止豈既老而衰者如是耶然豫竊觀公形雖憊其神益精明至死不少變則其所養之厚自有不隨氣而耗者矣然豫又聞公在蜀時往來青神峨眉之間遇異人授書頗𤣥祕果然則公之所自得固有異於常人者乎豫不能盡知之姑述其為政之槩以俟異時太史氏著循吏者采焉錢可大傳可大名瑛姓錢氏本吳越王鏐之後厯廬陵刺史匪再世曰和自廬陵徙吉水又四世曰程程之子誠可皆以科第有聲而可大之祖本和號梧岡先生者尤篤行之士也可大生十八月而孤稍長性頴敏年十三以書經中臨江路賞試既又中撫州路賞試然是時元祚日非紅巾盜起所在皆爭為雄長自至正丁酉五六年士大夫顛頓甚矣可大奉其祖及其母﨑嶇以避之走廬陵之富田遷泰和之梅岡既又走其邑之大洲尋又奔走雷州最後廬陵之李坑李坑路極險盜又追及之梧岡被鎗不死縛之以行可大聞即冒白刃奔訴乞以身代盜并繫之可大訴不已梧岡亦哀訴其無子唯此一孫耳兩人因爭相代死情亦悲慘賊憐其意遂兩釋之可大方脫時其母尋亦被執而可大妻張氏翳伏叢薄中窺見賊已執其姑即自出迎謂賊曰我姑老矣請釋姑而縛我賊熟視良久即解縛其姑縛張氏張氏既就縛擲所攜袖中雙鞋與其姑訣曰婦無用此矣且行且睥睨其姑稍逺即罵賊不復肯行遂死之變故倉卒之頃而一時憤然求死以全生者若素約然何其可悲也逮國朝兵定有司以可大之賢凡三薦之皆以親老辭親既沒終身為之悲痛梧岡故所築樓可大每一登之輒流涕因名之曰思樓其孝行篤至世蓋少見也然其為人頗豪健慨然以氣自負鄉有劇寇嘗殺人有司憚不敢捕以屬可大可大立捕殺之年若干卒于家一子曰遂志今以科第得官為山東按察僉事云贊曰吾嘗過錢氏所居其地今所謂錢塘者愛其山水清曠因登髙而望焉其南數十里外峻峰躍起視衆山特髙云其北即宋丞相文信公故居也諸老人言丞相往事與史傳所記殊異因言可大之避亂也居其山下最久其被執也亦幾不免余既壯其山川又聞可大事思見其人而不可得也因為之傳云徐孟昭傳公諱旭字孟昭姓徐氏饒之樂平人其先南昌人也居樂平者十七世世以儒為業公幼頴悟稍長從其鄉先生蔡仲淵授春秋為文辭已超詣拔出見者皆竒之年三十一登洪武乙丑科進士第行浙江道監察御史入為禮科庶吉士日記事侍上左右上方屬意天下進士每朝羣臣退獨進士留被顧問上未退不得退也一日上呼公至前將有所任使而公奏對弗克稱㫖上以其迂也命分教于涿州之房山復教諭鳳陽皆以憂去服闋擢安王府紀善用薦者升為知州入史館上書論天下事多不能合公益落落自殊無所顧惜遂自史館出為考功員外郎及今上即位遷郎中預修髙皇帝實録明年拜朝列大夫國子祭酒又明年罷為翰林修撰以卒公在髙帝時素以篤學見稱數言事切中當時髙帝嘉納之然欲老其才故抑之久而未有以用之也及在考功拒請托抑僥幸是是非非毫髮無所遁其情而尤以謂天下之治與教在守令與教官守令教官弗稱其任者尤精核之無少貸衆望風喧騰公持之益堅及在太學亦如在考功時然公純謹君子也雖盛威嚴而中情簡質好惡出乎其至誠至於卓卓自守激之而不動挫之而不撓人未有過之者也居太學僅一年諸生凛凛謹自修飾而其僚屬之不便者已譁然議之矣憚之者方側目於下忌之者又背沮之於其私至相與揶揄其所為公以此竟罷改雲南參議君子莫不惜之及陛見上察其無他特命除翰林修撰俾預修永樂大典為副總裁方向用之而公卒矣時年五十二上聞之悼惜敕賜棺以斂遣禮部主事端禮諭祭焉公蓋終身坦夷不事表暴而其嫉惡剛徑人有所不堪者世以此髙之而亦以此齟齬者衆也其為學明於義利之辨為文約而明喜薦士所薦最多且賢屢考試科舉其得士最盛而尤孝于其親自鳳陽考試河南時入朝告歸省其母疾方亟公聞倍道疾趨至家母疾忽為之愈數日竟卒人以為孝感所致云贊曰考功與大司成皆國家要職非得才賢譽望之士以居之誠不可也然而信道明義篤行如公者往往猶難之豈天下豪傑羣居之地是非好惡所聚非素有驅駕籠䇿之才者終不足以騁耶自公在大學與考功人情固多不附也及其殁已久相與稱賢考功與賢司成者必曰公事須久而後定亦理之常然無足怪者獨念聖上於賢士大夫保全覆護如公者蓋有無窮之恩焉豫素知公恐其久而失之也因取其行事而論次之義馬傳義馬者應承完所乘馬也馬頗俊逸左右持羈者數人僅足抑之非其主輒弗得乘然自歸承完頗馴承完由胄監生舉進士第為吉安泰和縣令泰和號難治承完至摘罰羣奸不少恕于是搖毒以肆虐者一旦斂迹民賴以息郡之胥徒來要利于民者往往埀槖去不敢出一言然承完質直材能不及中庸口吃吃每遇事未言而氣已盛民益喜之郡益惡其所為纍搆陷之承完積不能平輒舉郡之不律事十數往訴于朝或者曰子訥彼皆巨蠧且狡宜少忍之弗聽後竟弗能悉白遂死焉郡聞之即收市其馬以官價償之馬且行闖門數四即返執䇿者盛怒笞之馬輒人立良久馬垂雙淚如水終不可動邑丞躬造馬所諭馬使且往馬蹭蹬强出門去纍纍然衆皆扼腕焉馬亦無復舊態矣暨至郡隔河五里許徘徊顧來時路酸然嘶不已遂不復渡死於水濵牽馬者舁死馬以歸君子曰馬來歸承完時固有主矣乃獨不負承完固知人不忘報也哉承完在邑僅半載許豢養之恩能幾何焉馬不肯背主歸讎以死世謂馬比德君子豈不良然泊菴集卷十二
