body:
  text: 泊菴集卷七明梁潛撰序銀浦唱和詩序吉文西百里曰銀浦陳氏世家焉去銀西八十里為泰和之梅岡則王氏居之也梅岡以王氏勝而銀浦亦以陳氏著稱山水相屬雲馳鳥飛相望也獨怪夫兩家賓客足迹不相及物情人事不當爾也及豫來梅岡也王君樵雪約豫逰銀浦而未果其年冬樵雪獨攜子弟逰焉樵雪雖老苦嗜詩每遇山窮水僻霞煙草樹禽鳥之勝未嘗不徘徊其間然世之工於詩者既寡而知樵雪者亦少也及其過銀浦陳氏之俊曰于敬子威其從子清汶清湘輩皆工詩子威尤年高而氣盛于是二人者一相見談詩不輟皆自以相遇之難而相得之晚也淋漓樽俎之間長篇大章更唱迭和至拳拳不忍别去蓋其氣同志合情好綢繆故其發於詠歌若金石奏而律吕諧鳳鳥鳴而聲氣應至于相忘以情相賞以心相矜以為高相誇以自豪雖其一時之作有不可掩者要之皆所以道其志而無傷也夫士之文辭好之篤者亦既有合焉而嘗少也故不得於天下則期之百世之後千歲之間今夫二人者地不相逺又同乎一時自今己往梅岡銀浦之上載酒而問竒者吾知其衝乎道路而未止也既而樵雪合其所和詩凡幾首屬豫序豫方悔恨於未逰讀其詩而喜之遂為之序孝友堂詩序錢塘潘孟溫材足以治民理邦而以一驛丞守官於泰和浩溪浩溪非通道公卿顯宦者歲不一二至知孟溫者少也故孟溫久淹於此而得以迎養其父且友愛其弟甚篤因即官署之後為堂名之曰孝友既求能詩者歌咏之矣又求豫文序焉孟溫能以其秩之卑祿之薄而志于養也如此豈非賢哉夫自三代盛時習俗之厚凌忽傲惰之風不作而教其民者又先之以孝友之行黨庠術序洋洋乎詩書禮樂之訓講求誦習以明夫親之長之之理至於負劔提攜應唯進退之際皆有以養其良知良能及其不率也則有不孝不弟之刑以督之故自孩提之童無不知愛其親及其長也無不知敬其兄者當是時閭巷之民雖欲不為孝且弟何可得哉後世之士既不知所以學故其行亦無復三代盛時孟溫之能賢蓋本乎其性也豫愛其名堂之善信其行有以近乎古之人因慨然感夫三代教化何獨不可行于今哉古詩小雅多道父母兄弟之情至於美尹吉甫則言張仲之孝友以謂吉甫之功德材美傑然可頌可歌者在此也千載之下讀之猶能使人興起況乎今之世得見其人升堂以誦其詩其有不感發乎哉孟溫既慎其官又和易藹然其弟將行為今楚王府伴讀亦知愛其兄者送楊𢎞壁序楊君𢎞壁家故西昌巨族也當其盛時一門父兄席纍世之豪臺池花木金珠犀璧之富與封君户侯相埒及遭亂離家事日非君亦﨑嶇江淮之間而遂家焉蓋其時君年始十六壯志鋭氣輕離别而易之及其老也思見其親戚墳墓日夜南向而悲蓋以五十年于外矣而後歸則蒼顔白髮頽然衰老見者駭愕不知為楊君也過其閭問道而後入道其姓名老者驚而少者疑焉問其祖之昆弟無知之者其父之昆弟無幾人焉已之昆弟間有存焉者非老則病杖而後來而窮奴老傖之尚在者皆當年雄力自視無前者君猶僅識其狀貌也故居遺址荒煙蔓草冢墓纍然而牛羊鳥獸之迹交乎其間者皆當時賓客歌舞而歡樂之所也君於是愴然悲之念往事如在夢中惜其去之久而還之不早也既而君之從子益智拜君而勞苦之置酒會故人賓客留君毋去此故土然君占籍鳳陽己久為留數月乃去歸時攜其中子某與偕行因謂之曰吾老矣先人墳墓在此者汝謹識之無忘嗚呼君生于富貴未壯而困于羇旅老猶不忘其鄉非其心拳拳篤厚能如是哉夫人事變故不常而人之一身榮辱升沉跬步有不能保者而況數千里之外數十年之久能守其身而不墜其先又豈非其心篤厚之報哉君少從豫先大父心易先生受業與先君有筆硯之好故衆為詩餞君之去而豫為之序所以備道夫人事變故之際者有以見君之不忝其先為難能也壟雲軒詩序姑蘇金君潤夫寓居都城而名于其軒曰壟雲能詩者既為之賦矣友人劉彥機為求豫文序之而道潤夫之言曰世之懷非分之求者常有以及其身惟君子知止而自足故常泰然自得顧豫之材與力無所能于世久矣則宜乎蔬食貧窶隨寓而安得失不介其意是非不入其懷而意之所至情亦自適升高丘以曠望攬白雲於天際此豫之所以名其軒者庶幾見其志之有在而若昔人陶𢎞景之所云者殆不同也嗟夫潤夫居京師盛富巨麗之地誇奢而競豪者相接乎其前金珠玉帛之致其飾膏梁旨甘之窮其味華榱廣厦之適其安者皆是也而潤夫獨淡然安於陋約又名其軒以此使古今天下豪勇才傑之士其用心常如潤夫則安富尊榮終其身亦何不可哉是其所為又足以警夫世之不知止而妄意于非分者也然潤夫樂詩書而重信義喜與士大夫逰其戍荆門也自號為荆門野樵則其中固有過於人者豈徒然哉因為之序贈小兒醫鄒孟義序太史公稱扁鵲聞周人愛老人即為耳目痺醫聞秦人愛小兒即為小兒醫見今之世豈無愛老人者而醫老人者己絶無聞獨小兒醫往往専門擅業宜其術之精矣而所守或乖其方所講或非其理施之於治得一二而失八九者皆是也則為今之老人與小兒者其亦不幸也哉不病則己病則欲求善醫何可得也鄒君孟義世家廬陵之西鄙其先世以小兒醫擅名一方環其境病小兒者皆往鄒君求治之鮮不效者即不效必鄒君預言其然故病小兒者以謂得鄒君於死生之際可以無恨故自豫之得鄒君而豫之鄉黨鄰里故人親戚無不慕鄒君者豈愛小兒者類皆如秦人而愛老人者獨不如周人哉抑愛之矣而醫之如扁鵲者少耶豫方衰邁寖以多病居常感慨嘆息恨鄒君不更為老人醫也然豫諸孫方孩提呱呱緩急之際又能無意於鄒君哉鄒君恭厚篤慎淺於利而急於濟人蓋可謂仁人矣因為之言姑以識豫懷云南富王氏族譜後序王氏之先當五季之亂有長者曰該自廬陵何山遷安成之連嶺長者後五世曰扆自連嶺徙泰和之南富南富之有王氏距今十世矣其族既盛其地有不能容者或居南塘或遷栗園或析池頭石灘槐下嶺上樓下雖異居散處而昭穆世系之詳無少紊者推原其故以有譜牒故也至其世聯科目迭躋美仕誦詩書而服禮義者數百年間未嘗乏絶此又鄉邦少見者何其盛哉蓋嘗考其家譜長者之後有曰瀘溪監薄廷圭者當秦檜用事時以詩餞忠簡公之貶遂俱得罪先正謂二公生可為人師沒宜祭於社者此也有曰炳者富而好義靖康之際東都士大夫避難至者多館焉鄉衮文信公之起兵也猶過南富而訪其後題其所居曰續槐精舍此其較著者其不較著者不悉也然則王氏子孫之盛而賢者豈無所自哉積之厚者其流澤久而不匱理固然也世或不知務此而茍冀後世光榮而昌大者何可得也是足重其譜且為王氏重也故為之言以告其來世王以誠挽詩序王君以誠歿之草年其子存性集諸公所為挽詩歌辭涕泣謁豫求序之曰先君之志于是乎見也豫悲之以為之言君五世祖啓宗為宋吉州教授而鄉貢進士仲柔其高祖也君承先志少頗質魯能憤然自力于學遭元季喪亂四方學士困絶無聞君低徊草澤久之乃復誦習法律雖非其志而卒藉是以自效於公卿之間以一捕盜吏張空弮入賊境捕劇盜三十六人者誅之尋統兵千人守地一方授千戶所吏目然元事日益非矣乃潔逺去抗志湖山之表優遊觴詠不以貧賤而易其慮者又三十年年七十為里人誣搆詿誤以卒故為之辭者皆悲其志之無成惜其終之不幸綢繆反復而深致其意也嗟夫君早負材氣不得附託青雲之士以自見老而遁迹於寡過之地而猶不免焉豈非命哉委於命而安之斯其為君子也故為之言庶幾有以著君之志云重逰龍城寺詩序豫之來梅岡喜得龍城以遊既而遺樗曾先生自歐鄉而來館于龍城先生嘗仕于朝為秋官郎中多學而博聞而寺之僧曰翠微師者亦能詩而善謔吾於是屢遊焉不徒喜得龍城又得遺樗也六月既望秋序甫臨火薄金氣煩炎益烈遂與吉文錢君稽稼攜諸生復遊焉陟高阜循大堤步喬林之茂蔭既而遺樗與翠微師亦徜徉而出逍遙容與俞俞如也其時微雨初止澗吐白雲谷暢異芳緑樹引風颷然滿襟笑談既洽樽酌亦勤及夫夜久而天曠明月東出萬籟之聲如奏琴簧遂欣然有作錢君最先成明日集為帙凡若干首嗟夫同遊者雖寄此或暫去而輒來不可知也豫去而縻祿於朝欲遽歸而遊此可得哉臨清八景詩序泰和邑西鄙多大山連荆湘而極廣海而所謂津洞者則劉君民望所居也連岡仄徑蒙茸陰翳即其深而後豁然開曠平疇淺溪稼穡茂而蒲荷鮮俯而四顧則垂崖修麓雲霞落而煙霧霏仰而望之則危峯飛瀑如在天上猿鶴之聲莫知其處蓋可怖可愕可喜可壯之狀萃于其所居又僻逺窮絶非有通道往來行旅之求售者不至賓客故人非好竒者不遊焉民望於是得擅其勝以窮登覽之樂蓋好之篤而人未嘗知也使其居之勝矣而遊者衆焉車輪馬迹之交乎其間民望固將厭其塵埃惡其煩囂矣亦何足以樂也惟其甚美可樂而人不之知獨民望能得之所以尤勝也民望之尊君子英甫抱材而不求知於人今己老矣民望與其兄民瞻方壯年英偉其材美有不可掩者夫進取之士嘗志乎宦達而幽散夷曠之徒嘗放乎山水放乎山水雖任情劇意無傷也志乎宦達而溺焉者君子不取焉民望不溺於彼放乎此耳何傷先是白水縣丞陳孔立先生嘗愛其地之勝而病其蔽於幽逺也因其八景相與賦詩美之矣其從弟彥偉又求孫君子賓繪為圖豫之歸也邑庠生王濓以求豫序之夫玩其圖誦其詩又讀豫序其能蔽於幽逺哉吾恐民望將不能擅有其樂矣王樵雪壽詩序王君樵雪負雄才盛氣壯而無所合於時既老自放於梅岡之山中其脫略不羈豪邁之氣無以自見獨往往見于詩也壬辰九月之望君初度日也能詩者以君長於詩也相與賦詩以為壽且以屬豫序夫古之人於其所愛之深者恆願其壽見於古詩三百篇多矣然其平時卒然相遭情志傾倒或慨然舉觴劔歌而起舞至倒囊而罄千金皆所以為壽也而豈獨於頌歌之際為然哉蓋人之情有不能自己者類如此君於其時樽俎盛列衣冠皓偉賓衆雜遝歌舞獻酬之適亦一時之盛也至於此詩之作瑲然有沖容和平之韻油然有尊老敬愛之情得古詩祝頌之遺意所謂千金之璧不以暗投投所好於君其亦作者之意哉若夫君之盛福子孫賢而孫曾具則非作者之詞能裨其萬一也君字伯彰樵雪其號云繼省堂詩序臨川曾紹魯有堂曰繼省危公大朴嘗大書其額能詩者既歌頌之矣紹魯又求豫序之紹曾誠有意於先賢之訓也哉抑將考其説行之于身推之以及于家國天下則其志未可量也夫孔門三千之衆七十子之賢負敏拔之材高世之資吾不知幾人也當時獨稱顔子曾子者何哉顔子以敏曾子以魯顔子不幸早卒其終得聖人之道者曾子也然聖人之道浩乎其無涯茫乎其不知所止而欲求之于百世之下舍子思孟子其何由哉孟子得之子思子思受之曾子其本原蓋有所自而曾子終身篤實之要學者可行而易從又莫切于三省也于此而昧焉不知所講而欲至夫聖人之域如涉大川而忘舟楫未見其可也然則紹魯登斯堂也其可不勉乎哉紹魯蓋聖賢之後抑嘗考之曾子子曰元元之曾孫曰樂為漢都鄉侯其四世孫據遭王莽之亂始去都鄉家豫章而臨川曾氏大抵皆都鄉後也歐陽公雖嘗辨其不合子固舍人未有以復之至元集賢學士曾小軒又以謂江南曾氏實大賢之後裔上其事請立沂水書院以教育其族姓而自宋以來曾氏顯者亦多矣紹魯之祖寄亭先生仕元為國子助教其學行尤可景仰則紹魯於此不徒用心於聖學殆將繼紹其家而無忝者也可謂不賢乎哉見之歌頌殆亦知道者矣因為之序梅岡王氏族譜序王氏之先有為吉州法曹者其後居廬陵之甲村久而益繁分富田六度吉水之帶原固山興國之小春而徙泰和之梅岡者蓋十有六世五百年於此矣今甲村之族無聞而散在四方者皆為巨族譜不能備見著其自梅岡者七世曰仲端資纍巨萬嘗伐石治道自廬陵麻洲抵興國凡百數十里又嘗命為量吏出納必一鑄于鍾誓子孫母改至于今猶然既而其子約齋登紹定進士第其孫槐陰復擢第咸淳自是百餘年來如秋澗如蘭亭如益愚處士皆以文學著名于世約齋之幾世孫尚德蓋嘗修其譜廬陵劉壺春先生為序之矣及其後也世故屢變遷徙不常於是約齋之六世孫退庵又加修集視舊譜益詳其義例尤密非淺學者所能窺也退庵視蘭亭為大父與其從弟樵雪皆風流高雅為王氏宗嗟夫王氏久而益盛如此豈非積於前者深厚而有本哉豫之來梅岡也既獲交退菴樵雪又拜觀其譜世家文獻有足徵者故為序之詳焉庶幾後之人知先德之不匱於親親重本之意有油然而作者而譜亦不為徒作也陳子威詩集序吉文陳君子威氣充而寡欲視外物無足動其意者雖窮居山林而其言超逸橫放若不可追躡徐而視之則端重衍裕其指逺其情深渢渢乎和平之音也何其美哉夫人之心有溺焉者見於其辭亦然或沉酣于富貴感于聲利或窮愁悲怨憔悴而可憐及其至也猶能使人感慨而羡慕蓋亦略其心之溺而愛其詞之勝焉耳要之得其氣之和平惟夫傑然豪達之士舉天下之物不足以纍其中者能之也而求之古今蓋少矣豫見君于銀浦之上即有以知其志及讀其詩又知其高邁絶倫君雖窮居以老而豈有溺于其心者哉君有行義又深于學使其壯時出而嗚乎國家之盛吾又不知何如其美也掩卷憮然書以序之栁塘于氏族譜序廬陵于君孟遜以其所修族譜求豫文序之豫既觀其譜知其先世之所以盛而又信其文詞翰墨之懿有足徵者蓋自唐僕射徽徙吉之城隍岡遷皂村有長者曰范時道一見傾倒相與為肺腑而厚資之遂家于皂村時人稱兩家為金石交者以此僕射生南仲南仲生猷謀謨猷遷虔謨遷州之栁塘地今屬廬陵獨謀仍居皂村孟遜之距謨蓋幾世矣此譜之作著自栁塘而虔與皂村不及焉者彼各為譜勢之分不可以強合獨其源未嘗異也自僕射而上至于後周太師燕文公某漢廷尉定國皆可考見先是歐陽文忠公為作世系表其幾世祖元高又嘗自序其譜故其所載自受氏得姓以來千數百年端緒原委最為較著及孟遜又加修集其世次遷徙愈久而益詳焉夫世家大族簮纓烜赫而子孫之微不知其出者何限獨于氏先世不泯滅如此此豈獨其子孫之賢哉抑其能託之文詞以傳不朽故也嗚呼世有可紀之績而不得託之於可傳之文多矣于氏乃得之歐陽公使千數百年祖父之澤烜赫焜耀皆由於此豈非幸哉今去歐陽公二百餘年孟遜又以其譜屬之於豫誦歐公之丈有愧乎豫言之陋不足為孟遜重也然孟遜是譜又何待豫言哉孟遜力於學而其行甚篤能拳拳於其譜牒其用心之厚可見矣庾山樵者詩序古之士有身為鄙事庸人賤夫之所不屑而其中負落落之竒雖偉人傑識有不能測也故大賢豪傑往往自放于漁鹽屠販之間當其漁鹽屠販之時人固不知其為大賢豪傑也至於乘時而出功業足以被生民而澤萬物則舉天下之人仰望而不可企及矣故深所負者亦深有以自晦人固不可以淺窺也陳君文或隱居庾嶺之下自號庾山樵者陳君非行歌負薪而樵也蓋假樵者之名以自匿之人不知也而豫有以知陳君也陳君博涉經史強記而善辨遨遊於吳山越水之間所與交者多俊士材能非其人輒去而不顧陳君負志而不偶又混其迹以同于衆故樵于山放浪于江湖無不可者而何必人之知也然庾山東西連閩湘以扼廣海凡廣之東數十州玳瑁珠璣犀璧之貢皆道出庾嶺至于仕宦商賈戴妻拏揭貨財往來乎其間者又衝衝也是為四衝九達之交聲利爭趨之塗人之所憚煩而厭處者獨陳君欲樵乎其間豈至于道者固不暇擇其地哉然吾察陳君亦烏能久于自放者陳君因出諸公所為庾山樵者詩示余遂為之序樂圃詩序廬陵張君思恆居城北闢地為畦藝蔬其中日抱甕往灌而忘疲焉因自號為樂圃能詩者皆歌咏之其友郭君實以屬豫為序豫家泰和栁溪之上有畦數十畝竹數千竿桃李數百株藝松薑蔗蔊芥杞菊數十畦及陽春之方來候時雨之既至茁而壯者生意勃然采而芼之真如列珍鮭數十品至於掇芳苣于雪中剪短韭於霜餘則雖熊膰豹胎有不能易其美者意之所適升高而遐眺慨昔賢之不作曠千古之逺懷而猶有合焉者此豫之為樂如此也視張君殆有同焉抑偶過之焉不可知也夫玩于物者雖適情亦喪志然豫聞張君為人信義敦厚聞于鄉閭諸子弟又皆賢而好學負郭多良田而居室幽雅花卉松竹之植連檻而並砌賔客故舊戴酒往來高談雅謔而不愆于度蓋處清時盛福有如此者是則豈豫之可擬哉況豫方竊祿於朝于樂圃殊有所未暇望青原白鷺不能不怏怏焉因書此以序之望雲思親詩序杜君新世為襄城人以軍功起身授山海衛百戶杜君雖起戎行而行甚篤循循有君子之風事其母尤孝以王事來江西去其家蓋五千餘里不忍其親之逺也遂求善畫者為寫望雲思親之圖以識其懷能詩者又歌詠之求豫文為序夫杜君矯然介胄馳馬試劍于萬里之外此其志也而乃低回顧戀有狄梁公太行之感蓋天性之真發乎其至情自有不可掩者然狄公屬唐室艱危之際能鞠躬盡力卒之唐之社稷不墜者狄公之功也望雲思親特其偶然一事後世猶傳慕之不已顧其大者不在是也杜君當天下承平四海晏然無桴鼓之警然立身揚名以顯其親於無窮孝之大也杜君誠有志乎此使功立當時名埀不朽則望雲思親豈足以槩杜君之善哉傳曰求忠臣于孝子之門杜君其勉之送皮千户還遼東序冀之東北曰幽州其山醫無閭即今之遼東也遼之西本孤竹國春秋時屬山戎戰國之際入于燕秦并天下置遼東遼西郡漢武帝開玄菟樂浪諸郡而遼之地益廣唐太宗之盛置都督府治其衆即陷于契丹終五代及宋其地遂為曠邈矣及聖朝受命混一萬方遼左地既平乃包三韓連碣石瀚海置兵衛王國如內郡今四十年矣舟車利涉而風氣日通兵革不試而習俗還厚蓋中國財貨金珠麻縷絺繡之物與其所産海錯之珍人參麝香豹尾骨􅙡之類相流通交易乎其間而富商大賈往往書行夜宿不擇地而居而中州文學之士流寓其土者益多矣於乎聖化之廣被如天地覆幬人迹所不至者皆稽顙闕下豈直遼海之近至若五季之際河東北晉齊之境猶陷于契丹不但塞外之逺蓋中國治亂盛衰之一機也千戶皮君德自遼東來按籍索其兵伍之闕者過泰和人皆謂皮君壯而武浩然有氣豈中州豪邁之士流寓其土者竒謀雅論日有以相激而皮君有以得之耶以今神武所加四海晏然無一燧之警而邊徼將校其材又有如某者復何所慮哉蓋中國所以盛者在此皮君將還遼東衆為詩贈之求豫文為序因為之書劉氏家譜序劉氏本湖湘間人自五代時徙廬陵之藥溪歷數百年散居四方至有自藥溪而逺徙江淮間者其徙泰和之巴山則始自誠齋明軒二人歷元元貞初至今百餘年而其族又己衆矣藥溪舊有譜宋季燬于兵誠齋孫曰克俊懼其久而世次之失也乃修輯之然可知者自六世祖文翁而下其上有不可考者克俊亦謹缺之不敢妄有所續也自克俊距今又二世曰庸禮為明軒之曾孫則因克俊之舊而搜輯為之譜總若干世以求豫序夫人之生久則衆衆則分其勢然也其分也逺則其本益迷迷其本則親疏少長之倫混而莫之别孝弟敬愛之心邈焉而不相施其名雖為人其無異於犬羊鳥獸者幾希古之聖人有憂之因生賜姓而統之以宗有氏族之官以掌天下之姓氏而領之於天宫大宗伯又有譜牒以藏于太史其為法周矣自宗法廢氏族之官失其職而民無所統有譜者至於竄獵他姓妄附貴顯其為失可勝言哉觀克俊之用心信乎其不汨於流俗而有見於先王之典者也其賢于人逺矣庸禮之弟曰某某某皆信慎而知自守以不墜前人之聲故為著先王之説以告之臨川胡氏宗譜序胡氏其先本秦州人其始祖十七檢閲自宋徽宗時以明經登進士第從高宗南渡始家臨川之白千歷四世曰拱辰擢嘉定甲戌進士第七世曰希顔纍官兩浙鹽運司同知與謝疊山諸公友善北兵之南侵也與疊山謀舉兵以匡王室其往復之書至今猶存其後有曰天祥者講學于陸象山先生之門曰斗南以能詩鳴於時吳文正公虞文靖公皆稱道其賢蓋自始居白千傳十有三世凡四百年而偉傑之材出於胡氏者不可勝數豈非積之者深厚而有本耶何其發之逺而不竭如此哉胡氏舊有譜其十世孫伯廣重加修輯其法本歐陽公小宗之制而尤精密仕止生卒葬娶分合行義之大槩無不備見伯廣又以其先世遺文可傳于世者繫于譜後於乎觀其譜讀其文詞胡氏之所以盛夫豈易及哉於是伯廣之從子儼以求豫言因為之序儼亦端厚有學稱其為胡氏佳子弟云扈蹕集序永樂七年二月皇上巡幸北京于時翰林侍講曾君子啓與二三近臣以文學得預扈從因次其道途所經山河之勝行宫連營千乘萬騎之壯見於詩凡若干首名曰扈蹕集余讀之而嘆曰於乎盛哉夫朝廷之事聖君賢臣之嘉謨雄烈照耀古今者史氏能書之至于一時太平盛觀豐亨豫大之容民情風俗之美下至原野鳥獸草木之光華潤澤可以感發歆羡而史氏之所不書與不及書者則皆存乎詩人之鋪張形容非負竒才雅思蓋有所不能也三代之際其雅頌如時邁車攻等篇著之于經讀之若親見其時漢代以降學者類不能追蹤古作故其事亦晦而不揚或庶幾其人焉而處非其地沉匿于山林草莽之間者多矣作者之少見而又不得附託青雲以自表著則後世雖欲因其言以觀夫世道之輝光隆治何可得耶此吾於子啓之作而有取焉子啓既學博而材優又遭逢聖主之治故其發於言者宏博深厚足以極一時之盛百世之下讀之為之低佪俯仰想見其時而追慕繹思于無己則其言與古之作者夫豈相逺哉於乎是可傳也己子啓名棨吉之永豐人其先世曰小軒先生仕元為翰林侍讀學士曰亦軒先生為編修都人故老猶能指其遺迹所在今子棨列官禁林重歷其地世家文獻之不墜有足尚也因為之序中秋宴集詩序士君子當四方無事朝廷清明交遊盛而志氣同進無諱忌之嫌退有講學之益如此亦足以樂矣固不在乎嘉時勝集樽酒淋漓而後樂其樂也然而樂之于心者無因見也必有暢其志氣發其歡欣形之詠歌使當時讀之者皆為之擊節羡慕傳之來世思見其盛而有後時不及之嘆則雖杯酒殷勤卒然相遭固亦一時之盛也於是永樂七年中秋之夕翰林學士胡公合同院之士會于北京城南公宇之後于時涼露既降清飈悠然明月方升而酒行樂甚公乃命分韻賦詩凡若干首諷其和平要妙之音有以知夫遭逢至治之樂諗其徑正高邁之氣有以明夫培植養育之功是皆平時蓄之于中隨所感而發之于此也豈非盛哉其或因事寓思有物外無窮之情興起感發為萬世不盡之慮者亦足以見君子之心也因為之序以明夫君子會合之美誠朝廷亨嘉之際而凡是作非泛然詞語之細也西垣對雪詩序古之人賦詩或旬月煆煉深思而巧搆或造次頃刻忽然得之而意趣要妙有不可及者要之不在遲速但欲其工耳速而工又難能也豫之來北京與處者侍講曾君某每好奕而豫拙不能奕因謂以詩為嬉戲以當博奕矯其難能奪其所甚好不為無益也而曾君以為忘外物禦憂思詩不如棋也嗟夫詩與棊皆害於事而棊尤甚焉曾君蓋不能忘情於彼耳是年冬雨雪曾君夜飲於修撰彭君之家預在席者七人修撰余君某以長安雪後見春歸分為韻賦詩即坐上刻燭期不過半寸詩皆成詩不成者罰且不得運意默搆即運意默搆者又罰於是觴酌如飛談論不輟且以古詩索句中字首尾以相頂綴繞坐上斯須不停蓋以是苦之使不暇思也俄視燭至刻處即具紙立書書成又今不得一字改竄僅僅能成章罷去則皆欣然若有喜色明日曾君余君同入直祕閣念此事兩人相視忽大笑豫問何為也曾君告豫以其故豫笑曰何自深相苦至此然深自苦者乃深以為樂也因謂以詩為戲其樂不有過于博奕乎曾君于是信豫言之然然余意其一時之作必不能工及取而讀之皆極工緻有非思慮所可及者信所謂速而工者亦竒矣哉夫古之君子雖戲謔不茍七人者亦庶乎善謔者也衛武公抑戒之詩以善謔見之咏歌則七人者之事有足尚者又安知後之人不有傳之以為雅事因為之序春闈倡和詩序永樂七年春翰林編修朱文冕預考試天下貢士棘闈中五十日相與倡和為詩凡三百餘首藹乎歡悅之情發于樽俎笑談之末而沖乎和平溫厚之氣動于典則儀度之中因念其時天下士子二千人聚三場文如山海考覽辨論計其間間暇之時十不一二而所作之多且美如此何也大抵扃約之深嚴人迹不至外事不膠其心而內懷自暢則雖片時之暇情之所適不得不於詩焉發之以其思之深趣之逺有以然也平時有求為文辭于豫數人者嘗經時涉月竟持空卷還不得一語此豈敢故為是哉構鬬之接汨之也如侍講鄒君仲熙性尤不喜賦詩間有來求者遙望見己搖首退却即不得巳草草聊略遣持去今主考文其中亦連賦愈出不資平生不喜作者且如此其他抑又何如嗟乎使諸君子在禁林中常如在棘闈考試多士時其諷咏篇什又當何如其多也豫由是益知深靜恬逸無外慕者百藝可進而聲華榮利之轇轕甚矣其奪人之趣也文冕以屬豫序因序識之九日宴集詩序永樂七年九月丙辰實惟重九之日合侍從同官之士七人者就北京旅邸飲酒歡甚酒半檢討王君希範摘江涵秋影鴈初飛之句即席分為韻各賦詩以紀一時之樂既明日侍講曾君子棨以屬豫序之於乎余七人者亦樂矣遨遊兩都歷覽山河之壯既有以增其氣而蕩其懷而凡職業文辭多朝廷制作之大鉛槧之末預有光華焉雖平居畏懼之未嘗敢肆而毫髮外纍曾少有干其心者亦何其幸也至于佳節間暇非有高山喬木以恣登覽無歌絲管吹以娛聽聞然鐏俎之間間倡疊和雄嘲而雅謔又皆藹然情投志合視昔之人感時悲怨索莫無聊賴者大不侔矣是皆上之賜也夫何敢忘由是七人之作益宏大演迤得盛時和平之音蓋所謂關乎風化者信可觀矣豫思鈍而材拙預在席齒獨長故既賦之矣又不辭而為之序七人王君錢塘人曾君永豐人侍講林君崇璧莆田人編修朱君文冕南豐人庶吉士陳君光世四明人李君時勉安成人為之序者修撰梁潛西昌人送任敬敏歸南監詩序余之仕於外久而一還鄉見學之士皆俊秀材美負邁逸之姿其氣之鋭而材之傑有不可及者其時敬敏亦為子弟員獨溫恭循循然擇焉而後言而凡學之士望見其來皆退然心相敬重有疑也必舉以質之有得也必舉以告焉而敬敏亦相與切磋懇懇為之盡余固欣然喜夫學者能自得師其心雖過高而其志未嘗不自下其氣雖過鋭而其行未嘗不自檢而又知敬敏之賢雖一時英偉傑出之材如吾鄉之士者尤敬憚而畏服之則其所以過乎人者豈不逺矣哉今年春敬敏以鄉舉會試于北京余忝為考試失敬敏心甚自恨既而選在教官之列則為之喜曰此敬敏志也敬敏亦自喜得教官學為有以進於道於是余又知其過於人豈獨其文之博哉其氣之宏識之逺皆未易及也未幾上命覆試四百人在教官者拔其尤得二十有四人皆賜冠帶厚其廪食俾南還讀書于國監而敬敏在焉然後知其失之于今者有待于將來而上之恩厚于多士拳拳不忘者蓋如此也然則敬敏可不益自奮勵思以副皇上眷注之厚耶夫得失之際人之情可見焉得失不足以動其中余獨得之敬敏故于其行也衆餞之以詩余為之序云處士蕭公挽詩序處士姓蕭氏字吾幼世家邑之高富里自處士始别居城西處士為人性和易藹然其交于人也驕矜忿戾之氣不介乎容色而人之交之者亦不以驕矜忿戾之氣加之也其言行信而篤其教子弟於為善也道誘之甚力為不善也禁制之甚嚴閭黨之士見之而人人美慕交友得之則無不欣悅蓋其寬易和諒之氣有以接于人者然也處士之配視余外祖母兄弟也其子建平于余之母蓋為從母兄弟然建平常受教先君進與豫同學退則遊處得之於先君者嘗以告之處士聞之於處士者又以質之先君蓋處士喜讀史雖耄年尤強記誦諸其口者稽諸簡册皆同也處士無他子弟唯子建平以事謫遼東而處士歿于家父子死生相隔萬里人生如此悲痛可勝言耶此諸公所以深悼痛惜不能已于言也詩凡若干首建平歸自遼東以屬豫序於乎十室之邑必有忠信三家之市而善人豈無焉吾恐化于善者之難而染於不善者寖寖乎易矣余宦於外不得歸者十五年鄉黨如處士者皆己殁矣後生小子其誰告之以善老者憔悴而無與好壯者傲黯之心日滋豈不可悲也哉豫不謂悲之又以謂俗之陋教之失皆始自此可懼也故為序之而詳著其行者使讀之者知處士之為善人又以見今之鄉閭無善人不可也會試録序永樂十三年春二月禮部將合天下貢士而考試之遂聞于上詔尚書臣震侍郎臣綬總其事翰林修撰臣潛臣淇合內外儒臣十人往考其文辭而以監察御史臣璚臣健往監焉于時皇上巡狩北京天下之士越萬里而至者凡三千人既撤棘拔其粹得三百五十人蓋試于北京方自此始而得士之衆亦前此未之有也於乎盛哉臣潛仰惟皇上文武功德度越萬古而率由太祖高皇帝舊章修明禮樂薰陶四方導之以詩書之教引之於仁義之域德澤之被乎遐邇如春陽之育萬物士之誦詩書而談道德者人人如在唐虞之世蓋教化之久五十年于兹矣易曰聖人久于其道而天下化成詩曰古之人無斁譽髦斯士由是而知今所以得人如此其盛者其來也有自矣夫惟養之久故見于文辭者皆宏偉而光明培之厚故發于論議者皆雄深而有本是蓋關乎國家氣運之隆非偶然之故也士之榮名于此者何其幸哉然既博於文辭矣則于聖賢之訓其必有得於心見諸事業必有致君澤民之實所謂汰什百於一二者在此也其又可不勉乎是用進之大廷以俟夫皇上臨軒之䇿焉遊長春宫遺址詩序長春宫在北京城西南十里金故城中白雲觀之西也元方士丘真人者與其徒嘗居於此當是時琳宫貝宇擬于王者今其宫既燬獨其遺址之存據平陸巍然以高登而覽之猶足以盡夫都邑之勝蓋其東則都城臺闕府庫之壯榮光佳氣輝然燭乎天表其南則曠然原陸而薊門高丘之間荒臺遺沼之可見者皆昔者遼與金所嘗經營其間者也其西則西山之崖雄峻拔出而蒼翠紺碧之色隱然煙霞之中其北則連山崔巍雄關壯峙凡仕於朝與居于城中者蓋嘗知唯間暇登覽於此而後得之也是時皇上親御六師於陰山大漠之北故凡居守侍從之臣皆優遊無事遂相與遊焉既周覽而樂之因又以知夫國都之壯且險誠天府之固也蓋都城西北諸山皆起自太行綿亘屬于居庸出榆關碣石至遼以東而後止豈天之所以限封域而安中夏者固在此耶然自五代至宋三四百年之間皆遼金雄據其中故其禍害終宋世有不能免者及元之興又百年然後聖明受命攘除而剷削之其民既休養生息熙然以樂夫太平之治而上方振耀神武于窮荒萬里之外於乎其為生民社稷久逺之慮者蓋深矣詩曰之綱之紀燕及朋友又曰不懈于位民之攸塈此言人君能振作綱紀勤勞於其上而臣民賴之以安也由是觀之今二三人得以恬然嬉遊於此者其誰之力耶誠使在夫五代與宋之際雖欲側足其間以竊窺夫山川城郭之壯其又可得耶夫士君子歡娛盛美之事多在於太平之日而能托之歌詠則有以傳之永久況元之諸賢若虞公邵菴袁公伯長皆嘗臨眺而賦詠焉因以其所分韻蓬萊山在何處為韻各賦六首同時而賦者翰林侍講鄒君仲熙曾君子棨修撰王君時彥王君行儉刑部主事周君恂如其一人則豫也六人之作見于辭者各不同而其志氣則皆可謂盛矣既相與録而藏之因為之序後之人得而讀之尚能想見夫今日之盛也哉贈趙法師祈雨有感序夫天地之化合于人之一身惟有道者能以此而感彼中和位育之説是也而道家者流或以其精神默運化機竊啓玄祕一呼吸之頃而風霆應之此豈獨其術使然哉亦其氣與天地流通也耶永樂癸己夏五月不雨民方憂之江西經厯沈侯壽之以藩垣之命與邑宰洪侯宗傑禱之而命道士趙希老以其教蕆事遂卜日建壇於延真觀率其屬各服其事既飛章帝廷乃集百神使各以其職聽命約某甲子雨即不雨有罰至其時炎威益熾山川如滌而希老己升壇候命矣四顧雲集而雨不降希老曰其民之有愆抑守者之辜耶是有任其其責者而民何罪復請于帝期必雨乃止為之約如初及期果雨而未足也希老禱益虔責雨益急逾三日遂大雨四野告足三農欣舞禾稼勃然歲以大豐嗟夫此所謂其氣與天地流通者非耶夫五氣迭運於天地之間而人事作于下者往往默與之應余不足以天然嘗嘗有感於人事之際如東海孝婦之類皆是也其機應如此故知挽天意而回之者易為力盡人事而合天心者難為功也而世之禱祈之士或任其術而不察焉此余有以告之希老也於是民父老嚴建德椽吏郭以存求為文以著其美京闈小録序永樂十五年秋應天府考試鄉貢士府丞臣鐸謹奉故事以聞于時皇上巡守北京皇太子監國事命臣潛臣全等為考官命監察御史臣儒臣賢俾嚴察之自京師以及畿內屬郡之士試者幾二千人拔其精粹者得一百人蓋其文辭之美明白而輝光清深而宏雅其氣之和平而進於禮義者亦英英乎其達而碩碩乎其充也於乎此豈無所自而然哉洪惟皇上聖神之化極其廣大仁之所緩德之所懷禮樂之所薰陶涵照撫育如天地之運而萬物自生餘波所及海隅邊徼九夷八蠻之逺皆爭先向化仰望乎德輝至遣子弟入太學者常百餘人而況京畿輦轂之至近誦習乎詩書沉潛乎仁義以表示萬方而率先四國者固宜其雲合景從輻湊彚進而藹藹乎其偕來也猗與盛哉唐虞之世平章百姓而萬邦協和成湯之民止於邦畿而肇域四海聖帝明王化道之行自古至於今皆然然則士之蒙被聖化耀人文而登兹選者亦豈非幸歟進之春官對于大廷對然如麒麟鳯凰之翺翔其誰不拭目快覩然而諸君子之進方自此始其又可不勉歟于氏祠堂記古之有家國者必立廟以祀其先祀之禮因乎其情而著之文也後世之制有不得為廟則為之祠堂焉其禮文亦必倣乎古效乎古者世雖降而其情不可茍而止也古之祭也有高祖之廟者則曾祖之昆弟無不在焉有曾祖之廟者則祖昆弟無不在焉有祖之廟者則父之昆弟無不在焉今不備其制則為之龕者四高祖居乎其西曾祖次之祖次之父又次之古之諸侯其適子之長者世世為諸侯以承其祭適子之次為别子不得禰其父沒而立為太宗之祖其適子繼之世世相承所謂百世不遷之宗也别子有庶子焉則又不敢禰别子沒而立為小宗之祖其長子繼之親盡主毁則不復相宗所謂五世則遷之宗者此也無庶子則無小宗無適子則無大宗今固無宗法而神主之昭穆遷徙祧毁猶皆本之此焉故繼高祖之小宗者於其身為玄孫繼曾祖之小宗者于其身為曾孫繼祖之小宗者於其身為孫繼禰之小宗者于其身為子統之以宗而祭有其序故繼曾祖之小宗則不敢祭高祖繼祖之小宗則不敢祭曽祖繼禰之小宗則不祭其祖而先君之子世世為諸侯者大宗而下又不得祭之焉今之祭法其簡略極矣而非適長不敢祭其父者猶此意也明貴賤别尊卑辨適庶其嚴如此而所以尊其祖者其情無不盡其文無不備也後世宗法之廢而以謂統其宗者有在於譜諜焉祭法之失而以謂合其族者有在於祠祀焉蓋雖不逮乎古而猶近乎古也舍是不務其渙散分析迷其本源而不知者可勝慨哉廬陵于君孟遜深有見乎此既嘗修其譜諜求豫序之矣又因其舊祠易其所壞而新之至於遷祔祧毁之次升降拜跪之儀罍爵籩豆之列亦皆放之占而不茍而孟遜之言曰凡此皆先君遺訓豫守之不敢失也孟遜恐後之不能繼乎今也則增其田若干畝以供祀事創祭器而完之神主之未立者復立之又為鐘鼓以警其昏夜又恐後之人墮其法而不守也故求豫為之記而以其田與祭器之屬皆刻之碑隂其統宗合族重本尊親之意周且詳如此於乎世俗之陋祀其先者類不法古簡於情而略乎其文至於士大夫之家亦因陋就簡背禮亂法有不可勝言者孟遜獨拳拳講求古人之遺意而盡其心焉此豈獨尊其親而巳哉其於風俗非小補也使復有作者其不以孟遜為法乎孟遜之先君文質篤厚恭慎鄉稱長者創之始俾孟遜集之於其後為子孫者要當知之也因并著之泊菴集卷七
