body:
  text: 泊菴集卷十明梁潛撰墓表林處士墓表處士諱德字汝敬姓林氏七世祖安宅仕宋纍官樞密院同知建第于候官居之遂為候官人處士父諱森遭元之亂因去候官居岊縣自失其先業又窘於亂故家甚貧處士幼己嗜學然以貧不能卒業終身以為恨處士為人性恬逸安於其命不茍營利於世不阿意於人其趨善避惡之心拳拳然如嗜膏粱而畏蛇蠍勤於耕桑以自植其家家漸以富先是其祖母及其父與母之殁皆無以為葬至是皆葬焉從兄章甫二親沒亦無以為葬見處士己葬其親日悲痛不己處士為營一丘以葬之曰水木本源一也何有親疏之間人皆稱其義處士既自恨其曠學教其子尤篤嘗欲建靈山堂為義學以教鄉人子弟而未果臨殁尤切切囑其諸子使日誦孝經論語於靈座側曰將使我魂靈聞之于冥冥中也聞者皆哀其志以洪武癸丑十二月二十一日殁于家享年四十有三葬于石泉山之原娶劉氏子四人興紹純紳皆能奮力于學以氶其父之志興今為國子學録孫九人曰節曰昻曰印曰文穆文秩文􅮘文稢文稑文稪節舉鄉貢試禮部中副榜今為新喻縣學教諭文秩文􅮘同時舉進士今並為翰林庶吉士處士之葬也前翰林修撰王公中美為銘其竁矣既而文秩文􅮘復以求豫言以表諸其墓夫人之積善如糞五穀糞多而五穀必茂如培佳木培之深而枝葉必榮此理之所必至也林氏以文學顯于時者其盛如此蓋自處士植而培之之深也浚其培瘠其所以糞之者而望其榮且茂焉世未之有也吾故于處士著其志以表諸其墓其世次之詳見諸其銘者茲不贅宋伯循墓表先生諱禮字學聞别字伯循姓宋氏其上世本江隂人後徙臨江之新喻至邦傑又徙廬陵之愾下邦傑四世曰敬仲始徙于泰和今所居是也敬仲子應徴宋大理司正生子叔平叔平生仁逺仁逺之子曰日新則先生父也先生自幼聰敏母曽氏教以孝經小學數過輒能成誦然既蚤喪其二親又奔竄于元季之亂者凡十五六年逮國朝兵定先生乃復留意于學受詩經于安成劉雲章先生年既邁矣而志愈篤既而有得于講論之際則又思所以檢其身者甚力言信而行果貌恭而氣肅非其交未嘗一與之接方是時有詔下郡縣立學尋又命立社學以遍教凡民子弟於是縣令丞以先生為社學師同時為之師者十餘人皆鄉之耆老宿儒衣冠于于然布列里閈見者敬憚而子弟皆有以培其初志成其幼學消化其慢厲之習者蓋藹如也先生言動必依於禮又素友愛其弟始其弟文濟相與避亂入山谷失足墜崖下碎首流血幾絶先生趨救之裂裳裹負以逃其弟賴免于難而全其生娶曽氏無子以文濟之子琮為子先生愛其子之深而教之甚篤琮後舉進士歷官監察御史給事中而尤教戒不輟至為詩以致其防遏之意者纍十餘篇事聞朝廷命以其子之俸給其家以便養閭里皆榮之時先生年八十矣又五年先生卒後一月其配曽氏亦卒同合葬于某山焉永樂十四年某月日也先生所為詩多至千餘篇往往有似元白者因自號曰歪吟翁名其居曰東齋集曰歪吟稿總為幾卷其葬也今右春坊右諭德楊公士竒為銘其竁矣琮又以求豫文表諸其墓嘗觀成周之時五比之閭必立之師上老居右孰庶老居左孰術序所教者黨學之所升而黨庠之所教者閭學之所升也凡民之秀升而教于大司樂者必自閭孰始而又必有上老庶老者以為之教此其所以盛也我朝社學之制蓋同符於成周者也然以有司不敏而罷其後見吾鄉邦之中舊嘗為之師者猶偉然衣冠之盛足以想見其時今皆零落無一人存者矣其又可感也哉吾恐夫鄉之小子不知有此也因先生之殁特為論著其事以表諸其墓後之觀者尚知所考焉錢處士墓表處士諱渙字好文姓錢氏本吳越國王鏐之後自徙吉水至處士幾世矣處士氣貌端重恭謹瞿瞿然其言必信行必本乎義守之于身達之于家推之于鄉黨者其意皆誠切而周詳蓋未嘗欺乎已亦未嘗拂乎人也處士勤于學問自幼至于老不怠其始授之經而與之講學者皆當時明師若其搜獵深隱考索異同而自得之者由勤而不怠者致之也為文詞浩乎莫之可禦論古今人事是非之際皆自其胸中所見聽者為之傾駭此無他由其學之不已故其所造之益深如此也年逾五十事母劉氏猶執禮敬謹如在童子時事其兄友愛尤篤士有困厄無依者館之雖久不厭族人之女有流落者力歸而養之歲飢則設粥以濟餓者其平生所為多類此又其施惠于人終身不以言故聞其喪有走數十里哭拜其墓而去者於乎其可謂篤厚君子者矣嘗遨遊溪山俯仰有自得之意因自號曰澄心老人年六十而卒葬于鄉之某山子三人曰森曰野曰述三子者人各授一經既而述以書經登進士第授浙江按察僉事未之任以憂去服闋來京師因以其從兄翰林僉討習禮所為狀求豫為文表其墓豫嘗一過處士之山中與之周覽林壑者數日而後去去三年而處士殁矣豫為之悲讀其行事猶倣佛其儀刑于山水之間豫之情有不能已也遂為之書於乎過其墓而誦豫之文者尚知處士之行與此鄉之山水相為久逺而無窮也哉若其世次之詳則今文淵閣大學士胡公已銘其竁矣豫可略也龎弱翁墓表弱翁姓龎氏其先袁分宜人幾世祖某始徙吉之吉水曰希愷元南康路左蠡巡撿生公于南康自少知力學既長慨然以才略自負試其藝有司不中即徒步入閩中以䇿干閩帥閩帥一見大異之曰此竒士不可失也薦之朝授永豐縣尹尋棄去而天下亦亂矣公既無所為于時益肆其力于學與遊者情好如金玉然必有學之士而後納交焉其所嘗授業者永豐黃玉相先生也公于師弟子之道尤篤先生嘗寓館其家既而病公扶持視醫藥甚勤既卒斂殯之檡善地以葬無不曲盡人以為難而公自視則欿然於乎俗之偷久矣為師者不擇賢弟子弟子亦不知事師朝出舍館暮相視如路人者皆是况死生之際乎哉其師也猶然况故舊交遊之際乎哉公之善不止此而此亦不足為公稱道也獨念俗之漸於薄者今益衆而欲求如公其人抑又少矣故吾于公擇其淺淺者著之庶幾欲知公因其小足以推見其大而世有髙志慕義之士得公所為而感激警愓其衷以篤其厚增其髙亦庶乎禆世厲俗之一端也然則吾之所以反覆拳拳于此者亦豈無意焉哉公之殁才三十七而﨑嶇于亂離之日大半焉故公之意甚篤材甚髙而時不克施可惜也公善小楷為詩文有貽笑集藏于家葬新淦玉笥鄉上富之鵝坳子二人某某孫一人振舒振舒端謹而賢以善書選入翰林院而擢授中書舍人與豫交因求豫文以表公墓豫不得而辭也故為之言其生卒之時世系之詳與其始終行已之可書者具見於銘文矣是可略也知撫州府潘公墓表撫有賢守曰潘公止善其行事著於時而遺愛存于人心其去撫而殁十年矣而撫之故老與賢士大夫道其為政思其簡易之化猶有為之出涕者非賢而能如此哉公之子賜以孱然儒生取進士進歷顯要五為天子出使萬里外國遂拜江西右參政為治之暇因得以訪公遺愛在撫之人者而公之殁久矣為之悲痛不已乃求豫文將以表其墓公閩之浦城人幼而聰明有志于學甫十歲遭值亂離失其父出入兵間求得之盜方縶之于樹引弓注矢擬之兾得重資公遙見奔走以身翼蔽而懇訴切苦盜憐而釋之未幾父殁公獨與其母逃避深谷中數嵗盜息乃還公事母尤謹家故多資而深好施豫以故資稍減於舊撫於江西為劇郡地方千里戶十餘萬賦之倍戶之數治視他郡尤難而公不為赫赫之名坦夷恭厚知足以擲姦發隱而優容包覆不盡用其明由是民皆感化獄無滯囚戶無逋賦禮讓興於閭閻而秀民遊于學校矣部耆老李文保等詣闕上其其事會都御史袁公泰行郡還亦以其名上聞特進階中憲大夫蓋將有以用公矣又明年屬以公事詿誤民欲往乞留公力止之遂謫雲中久之方以薦者徴起就道遽嬰疾而卒聞者莫不悲之享年若干前禮部尚書鄭公賜素厚公適偕在謫被徴乃以其喪歸葬于其鄉之某原公五子其一子即參政君也於乎世之為治者往往矜小智以自逞謂足以取快一時而不知雄姦深慝已窺其機玩而弄之如隨手轉圜不惟已之墮計而民之患害可勝言哉夫如是孰若公不盡用其明之為愈也蓋不徒待以長者之度彼固不能窺見吾機也不能窺吾機而能肆其臆者未之有也其為效豈淺哉古所謂外寬內明者正在是吾故摘公之行事著于墓以告夫來者句容教諭胡先生墓表先生諱璉字商用姓胡氏世為筠陽巨族當元之季士風日漸委靡先生獨抱負耿介講學明道不曲合取容視利祿屑屑無足動其意者洪武某年以文學徴授句容教諭既以老告歸遂杜門不出惟以事親為務虬髯長身遇事不言言必中肯綮大布之衣脫粟之飯終身晏如也先是先生之尊父諱旅殁于括蒼時四方兵爭殺人白晝者迹相踵先生走千里出萬死竟負骨以歸人蓋服其孝而敬其行歲辛丑偽帥歐祥遣其右丞劉敬襲筠陽據之甲辰王師大破偽主陳友諒兵遣别將討江西所至望風欵附督府分兵吉贑揚言城不下者誅不赦敬聞大懼謀盡掠子女金帛焚筠陽而退保新昌公知事亟乃往見敬麾下偽院判雷均正員外袁友德説以利害禍福遂與俱往説敬悚息從之且遣公奉書至臨江以事白大將軍大將軍甚喜即賜衣一襲先生歸筠陽而敬出降大將軍欲官之先生力辭焉當是時城中以戶計者十萬口五倍戶之數皆歡然相慶若更生然人至今偉其績而感其德此其大者其小者不論也於是先生之殁翰林修撰王君中美既書其事以銘其竁矣修撰梁潛復掇其槩為表其墓曰嗚呼世稱魯仲連功成而不居千載一人也使先生而處其時遇其事其功烈豈在其下哉惜乎其所抱負者未之用用之未盡其長也昔人有謂君子輕去就隨時卷舒富貴不可誘故其氣浩然勇過乎賁育先生何以異於是哉書以表其墓且以告夫來者蘭谷居士蕭志立墓表君諱聖觀字志立人號之曰立齋而蘭谷者君嘗自號也君為人負氣勇於有為臨大義慨然有濶度雖遇事甚急未嘗有窘容即喪千金亦不以介意然骯髒不肯阿意時人數以此致睚眥斂怨而君不變久之人亦信其中之非有他也翕然相與是之元末大亂君以騎射自雄州守達侯正道賢守也檄君守北門時吉郡城已陷于寇矣城守者退走泰和至北門無驗君橫戟拒不納傳言達侯久之乃得入守者俯首大愧而一時皆譽君為能嘗讀史至漢中興諸將嘆曰今豈無此人哉特不能用耳達侯以君老命其子更畨代之尋而代達侯者至矣日沉酗不事事君知時不然嘆息不已俄而達侯卒君亦殁逺近為之悲痛實至正丁酉三月也沒三年東南大亂鄉邑皆陷于寇人皆吒君有先見焉蕭氏自五季徙泰和禾溪分于南溪歷四百年十又二世曰祥甫君之祖曰德濟君之尊父也君娶康氏子三人自新自成自明今皆殁矣孫男五人鵬舉鵬南鵬起鵬翔鵬漢鵬南先已殁鵬舉仕為山東都轉鹽運副使卒于官曽孫男十三人玄孫十人君始葬居近兩塘之東自成嘗自銘其墓矣永樂壬辰某月庚申諸孫舉君合葬于君世父德軒之墓而丏豫言於乎以君之雄才嘗草昧之際使得遇豪傑而用之其所至不知為何如而竟止於斯豈非命哉然而世殊代易之際人事衰替多矣獨君之後益繁以顯則信乎君之不偶於人而得於天者又過于人逺也自君殁五十又六年而其所以不殁者如此則雖不偶于人何傷哉書以表其墓王氏二良墓表義烏王氏兄弟二人長叔盛次叔雍皆有美行而不得其壽以卒卒又皆在京師既返葬其弟䅷以豫嘗與其父博士君善也以其所自為狀及銘走書京師求表其墓且曰二兄有老母髮種種然有子皆幼弱今其墓纍纍並葬一原上過者莫不流涕為王氏悲哀此二人幸先生辱貺一言非直以著不朽庶幾老母弱子望之以攄其哀也豫悲二子有可哀者按其狀叔盛諱某自少讀書穎悟絶人既長機敏好謀畫慨然有逺志然與人交恭謹退下怐怐然人遇之非禮弗較也應門禦侮公私百端酬接謹密鮮有敗事故起家至多資甲于鄉閭卒年三十八叔雍諱某氣和色夷通敏秀朗讀書日數千百言經史百家無不究覽擇友而交遇勝已者必思與之齊乃已常一至成均就其從叔博士君學見者莫不敬愛卒年三十一二人之志雖少異而敬身接物皆同至于事母盡其孝處兄弟盡其愛又二人天性然也於乎二人同出于王氏同不得壽以卒卒之時又同蓋永樂三年夏春間相先後十日耳夫古今才不多見况並出一門世所謂機雲二惠者二子于此豈異乎哉昔人有所謂三良者豫于二子亦謂之二良乎是可為王氏痛也王氏自五代時有節度使諱彥超者由會稽徙金華之義烏遂為義烏望族元石硤書院山長諱炎澤者其髙祖也曽祖良常山儒學教諭祖裕考綸皆隱德弗耀國朝官至翰林待制兼修元史總裁諱褘者則其從祖也夫上以承其先者二子之志為無忝矣則于壽夭又何足較哉書以碣之以徴夫來者處士羅與敬墓表代家舅仲述作處士諱敬字與敬羅氏其先系出豫章髙祖宗大由豫章徙泰和遂為泰和之望族宗大生有先有先生文昌文昌生順可實處士父也順可始無子之豫章求族人子育之字之曰與善後乃生處士頴悟特異于常兒順可喜不自勝年十三順可即世處士已嶄然露頭角落筆為詞章輒俊發有英氣友事與善無間言養其母若父存暨冠出遊荆襄漢沔間慨然有髙蹈之志遂東遊秣陵維揚抵姑蘇歷錢塘酹嶽武穆墓既又欲北上黃金臺縱觀燕都之壯麗會壬辰兵亂弗果行自是居錢塘者久之或時往來豫章與諸名士琴樽吟咏無虛日時江西行省員外郎木八刺沙提兵出臨江辟掌機宜文字踰年授雩都典史不果就無何而元祚日非四海鼎沸諸名士多散去處士亦斂迹田園不復出矣御史蕭方崖大書東園學耕以扁其别業此其時也逮大明止戈頺然就衰老自號曰耕雲老人或時復之豫章痛名士之淪沒慨臺榭之丘墟為樂府以吊古情極懇欵未幾沒于豫章之旅舍時洪武辛未四月也享年若干嗚呼惜哉先配朱氏生子二人長曰崇其儀表視處士雅相似由俊秀舉歷仕三十載五任皆底僚當途者未有以揚之也次曰瑜先卒今年夏豫姊夫某為狀其行來徴豫文以表其墓且曰處士欲效傅奕杜牧預為志文先以屬前進士蕭子尚矣子宜銘嗚呼豫自髫首已識處士矣方其年少時性剛介負俠氣急人之急憂人之憂材足以有為而未及一展惜也逮其暮年優遊丘壑間嘗戴一鐵冠手執麈尾方顴而眉秀疏髯紛張如畫與豫姑夫劉尚書從叔祖海桑翁邑庠廖文學相過輒傾倒醉即仰視雲漢嗚嗚然歌音詠灑灑傍若無人人或坐上相謔語相侵不可擘處士瞪兩目視左右默然徐復發一語衆皆絶倒談言微中亦足以解紛豈不信然歐陽公曰與其食人之祿忍恥而包羞曷若無愧于心放身而自得其處士之謂歟是可以表矣詩曰超乎其遊泊乎其休其詣孔周其辨漻漻若提而鈎匪雕而鎪若史而幽亦隨而訓欲得其流則寡其儔匪云其儔曷追其輈曷追其輈我銘其丘若古千秋泊菴集卷十
