body:
  text: 泊菴集卷十一明梁潛撰墓志銘吕處士墓志銘處士諱煒字文著姓吕氏其先世為歷城人自忠穆公頥浩之劾秦檜也檜恨之刻骨公既斥以薨一子托官祕閣又竄梧州以死檜死托子昭亮始得返葬于諸暨因家于紹興之東城處士蓋忠穆公幾世孫也循循篤實接物以恕而處已甚嚴其性又至孝事其親其親之心樂也輒欣然以喜其不樂雖外為色喜中情常悒悒然其祖母喪兵亂不得葬以殯于諸暨其尊父一念及輒悲亦輒為之悲亂甫定徒步往營其吉而後返是時年方十五耳始諸暨為塋庵二百楹有墓田二千畝元季盡廢而視田出賦益繁舉族病之莫之能往也以屬處士處士慨然曰先塋所在棄而不顧豈為人後嗣者之道哉遂去紹興而構廬其田近盤回周視先塋訪故舊經營以竭其力久之盡得其業計其入足以給公賦而有餘也輒推以賙其族之貧者而不以自私其重本愛親之篤力有可為不避其難類如此其配義門陳氏有婦道處士與之處相敬恭如賔其子升僉憲江西改山西亷潔無私風采凛凛處士猶數致其戒不輟其心之仁其守義之篤勤勤然至老不懈嗚呼自宋歷元至今數百年江左世胄之家能不墜禮法者人知稱吕氏然居而有篤行仕而秉清操如處士父子者亦少見矣處士之殁升狀其行以乞銘其墓豫與修同升書祕閣知其賢又聞處士之行而髙之故按其狀而為之銘其在宋以蔭補校書校勘曰學矩者其曽祖也曰菊逸者其祖曰某者其父也子二人長圭先卒次即升女二人皆適士人其生至正甲戌六月四日其殁今永樂壬辰二月十有一日也享年七十有九某山之原銘曰於乎處士永乎其家以弗墜厥緒行之以躬尚表率乎來世於乎處士其身之殁其名不已東園劉先生墓銘先生諱野字子彥姓劉氏吉之泰和人也劉氏所居曰珠林其曰東園者先生所築别業也東園非有山川之狀而先生名重一時故東園亦由此以著而凡學者稱東園先生識與不識皆知其為先生無疑先生貌癯而神清氣和而行峻雖間居窮困而于天下事成功之機嘗恐失思所以為之如在乎其位者于古之治亂賢不肖用舍之際嘗反覆慨歎如身歷其時其所學益富故所負者益髙國朝初為會昌教官屬有詔徴制禮作樂通古今之士贑州守即以先生應詔至則條六事以進執事者惡其言不聞竟罷歸僉事李飲冰聞其名聘以為臨江教授踰年以疾還遂於東園之東築林塘書院以待來學之士而其仲兄尚書公亦以老賜歸幅巾藜扙逍遙松竹之間引觴而酌觴盡而止雅詠清倡望之如在塵埃之表會尚書公以司業徴而求賢詔下縣復以先生應詔至京師上御奉天門命至者皆自擇一官先生即自擇縣令上許之還需次于家明年入見復頓首曰臣老矣實不勝為縣願更為教官上又許之俾為豐城縣學教諭開導諄切諸生競勸為學既又攝治其縣事數月縣之政以肅於是人皆信先生之果可用而不及用者可惜也先生學勤而博六經諸子百家之説靡不畢究來學者嘗不一人人各持一經有問者應之如響其為文不待搆思意之所適頃刻千餘言而宏深豪博深思者反不及也丁卯舉考士於江浙方久病終日困卧衆稍易視先生及出題令取書至先生曰無煩也徐起拈筆寫五經數十題無一字脫誤時茹某為參議主其事意先生偶熟此請以其意為十䇿問先生又伸紙疾書鈎深索逺馳騁貫串几數千言衆相視愕然大敬服其在豐城有鄢道士者善詩名先生過之道士指壁間所畫松求題先生立書五十六字語尤徑險道士驚拜不復敢言詩蓋其得之于學者深故其言亦無適而不宜者先生尤孝友篤行與故舊傾倒若見肺肝而平居終日栗然其先世徙自金陵至今十七世而以科第顯者三十有七人矣其諱某宋國子待補先生曽祖也祖某父某皆博學某為州學訓導先生兄弟三人皆有學行而尚書公貴顯一時先生平生所為文有林下藁棄餘集北平西齋倡和録清江集劍江集總若干卷以洪武丙寅冬殁于豐城享年若干先生娶鐘氏盟鷗先生之子繼室歐陽某之子子二人曰觶觚女二人某某其壻也殁之明年歸葬其里之楓林尋改沙溪之木塘觚又將改卜其兆狀其行以豫銘少時嘗以通家子弟獲侍教于先生不敢以蕪陋辭為銘曰惟古博學匪外暴上探至理已乃足有弗克知愧以恧於惟先生學之篤窮古萬化無遁燭考訂羣言射中鵠炯然光輝在在璞身之絀兮志則縮神暢氣舒匪有局繼今其誰踵前躅沙溪木塘更屢卜過者式之慎無瀆故山東運鹽司副使蕭公墓志銘公諱􅀈字鵬舉姓蕭氏其先本長沙人五代之際由長沙徙泰和禾溪自禾溪徙今曰南溪曽祖某祖某父某皆不仕公早喪父鞠於季父自成自成嘗以事被逮公涕泣乞代之自成亦涕泣必自就逮其情皆誠切聞者為嘆息公與其弟鵬起從弟鵬南鵬翔鵬漢五人者翕然情好深厚庭有紫荆五株連本之異當時賢者前吏部尚書劉公嵩四明烏期道皆為論著其孝友之行以傳之于世公從學于尚書公尚書公愛之尤厚洪武辛酉冬以賢良徴至命賦指佞草詩成以稱上旨擢蘇州府同知居官凡七月坐秦府私買民物不舉謫役河南者十八年而後起為山東運鹽司副使又十二年而卒公平生亷潔在蘇州人不敢干以私謫河南貧甚從者伐地得黃金匿之而求去或告公使留之公聽其去若不知其得金者在山東一緼袍謫役時所至其貧無異河南公是時已老矣而持已益亷如此於乎世之營營於利者非必有飢寒窮困之迫也而不知自止使誠有飢寒窮困之迫將何所不至耶飢寒窮困之不足動其中夫然後患難變故之不可奪其節然此非安於命而樂之者不能公其庶幾耶公接人有藹然和易之氣而其中極耿介施於政人有所不及行於家者可法於後之人所賦詩若干卷讀之足以見其志之所在卒年七十二永樂庚寅七月十六日也其生元至元己卯七月二日娶郭氏劉氏先卒繼郭氏有賢行子二人金鎡皆好學端重鎡今以明經中鄉舉女三人皆適人孫男四人葬于某山某向殁之某年金求豫文志其墓為書其大槩而銘之曰彼枵然而中空恆矯氣以飾容䇿駑足以求騁淬鉛刀而耀鋒而豈知夫君子之守由乎禮義之充不可奪之于外者惟其有之于中百鍊之烈所以發干將之利秋霜之徑所以堅徂徠之松於乎其假之以寓形者殆有時而盡其固守而不改者吾將著之於無窮林處士墓志銘君諱直寶字玉成姓林氏其先自晉黃門侍郎祿歷九刺史而林氏之在閩者益盛君邵州刺史藴之後也世有顯者然自君曽祖直翁祖一龜父崇數世皆不仕君生六月而孤母趙氏誓不改適攜之依其外祖德賢君幼頴敏而性至孝甫六歲見外氏家歲時拜謁其先祠問母曰趙氏有先祠何林氏無也母曰有之以汝幼無能奉祠祀者君聞之即求歸拜其祠既拜而流涕見者為惻然入十歲日夜白其母圖歸以奉林氏之先母感之與歸故居居已毁買數椽以居尋奪於勢家久而後乃築室於城東先祠之外僅免於風雨而已家貧甚然人盛稱之所以奉其親者雖儉不足而愛常有餘造次必依于禮或時自外至見其母之色有不悅者即衣冠侍立不去俟其母改容而後退其妻翁氏有弗順于母告之不改立黜遣之改娶宋氏宋大姓君恐其復然切切私訓導之卒以孝稱母殁斂葬虞柎一緣於禮祭必戚與人言必悲哀蓋君之孝本乎其性非有勉強自幼至于壯且老其心一也於乎人之於親或豐於飬而志不適或深於愛而禮不周至有牽於私情而遂乖乎大義則又無足道者明於禮之所在而曲盡夫人事之當然如林君者世豈易得耶君有材能斷辨是非曲直使人悅服然安於淡泊不事紛華彈琴咏詩以自樂於山水之間其意油然也生某年某日卒某月某日娶宋氏先殁復娶鄭氏子三人熊羔勳女二人長適太學生鄭源次適趙稔熊舉進士今為監察御史有能名聞訃歸將以某年某月某日葬君于邑之某山某向因以其友翰林檢討黃行中之狀來乞銘君之行可書者多也豫特擇其大者著之以銘其藏焉銘曰有幽其藏其實孔揚有耀弗渝以緝其敷於惟人紀百行攸始孰其牖之以訓于家於乎君子琴逸居士錢公墓志銘公諱濬字好善姓錢氏系出錢塘某王之後遷吉水者凡幾世今所居之里猶自謂錢塘者識其所自出也公自幼資性頴敏日記數百言輒通曉其大意父漢濵先生遣入鄉校從前進士蕭飛鳳鄉先生王濟學為科舉之文既而選入郡庠同邑顔六竒先生為郡庠師尤稱道之未幾以疾告歸久之棄其所為科舉之文専其力於詩吟哦諷誦之聲自夜而達旦交遊之士相與倡和者至忘寢食由是無復進取意或連數歲不一至城府覽山川之勝遨遊于煙霞竹樹之間與其兄澄心先生皆蒼顔白髮映照泉石其樂陶然也築一軒額之曰琴逸曰吾之寄意於琴者非必操絃按徽以求夫宫商律吕之協也然而放意釋慮之際雖古之琴師無以過豫者焉因號曰琴逸居士所為詩曰琴逸集平生持已恭謹孝友之誠本乎其性訓率子弟動由禮法至於簡放以自適坦易以同物則又藹然和氣之發而人無不愛之也以永樂甲午閏九月殁于家享年若干娶同里曠氏早卒繼室劉氏子三人慎徽慎儀慎言女一人蕭應潭其壻也孫男八人將卜以某年某月之某日葬于廬陵之淳化鄉某山之源慎儀來京師乞銘于豫豫嘗過公所居之山中酌酒賦詩且為文記其所謂琴逸之軒留連不去者數日既去踰年而澄心殁豫為文表其墓又一年公殁尚忍銘公墓耶嗚呼痛哉慎儀必以請不得辭因為之銘曰於乎琴逸其逸匪琴浩浩乎其放翏翏乎其音挹太古之純和寫遐邈之沖襟蓋所以樂其志者人莫得而窺其心也錢塘之濱其山峩峩超百世而永固後千載而不磨處士尹君墓志銘君諱昌字原昌姓尹氏世為泰和人所居之地曰甘溪山水遐曠習俗淳質士之居其中者多篤志于學無外慕徙業之失君蓋其一也君性敏而學最勤其鄉故多學者故君之受業從遊皆不出其鄉鄉之士取進士或教授四方之學者歲嘗接迹不絶君獨窮治一經不出其戶閾其鄉之仕者勸君仕君不可曰學未成而仕猶未能行而欲走鮮不仆也最後其友王敬先為宜黃縣學訓導以書招之終不應其約已勵志如此事親孝其母晚得疾君日夕伺候維謹遂因以知醫其自處信慎和易未嘗有失意于人人有爭君為言之輒止種竹甘溪之上環其居皆竹因號曰竹溪處士以永樂丁亥十一月二十五日卒于家其生吳元年丁未十月二十日也葬于里之某山某向曽祖德中祖仁壽元季補吉安路學訓導父升逺君娶周氏生子四人長崇髙次某女三人君殁後十年崇髙舉進士留南京戶部謀改葬君于先塋之側因以翰林修撰陳德遵之狀乞為銘曰先君之篤志于學不幸不聞于世唯先生之言信于逺願賜之銘以掩諸幽庶其不殁也於乎豫不及識君然所凡知君者豫皆識也為之銘曰彼枵其中以華其躬惟勤而殖乃屯而塞甘溪之傍其流泱泱孰遏其光我銘永彰故竹亭先生吳孔昭墓志銘君子德修于身而道行于家者莫先于孝悌所謂仁民而愛物者其道廣大宏博其施澤不可限量而推其所由始曰孝悌而已古之賢者修之于身而民被其教物蒙其澤其流譽也無窮而或者不幸終身由之而其效泯焉無聞則有不哀者矣先生諱嗣麟字孔昭姓吳氏其先本番昜人後乃徙進賢祖存拙元新建路儒學教諭父本立先生早喪父尋又喪其母事其祖甚謹元季之亂其祖陷于賊縶而掠之以問其所藏先生度不免奮身入賊中哀訴乞以身代詞纍纍不已賊擇刃刺之流血被體先生不顧辭益苦賊憐而釋之聞者莫不嘆息季父本謙與異籍既沒一子孔性里人有誣以漢中衛軍者逮送有司先生曰是烏能自辨哉竟詣公府力辨之事得白而釋後孔性家疾疫甚熾逺近畏之與絶迹先生獨朝夕往視益勤卒亦無所染也待其同母弟孔哲友愛尤深孔哲卒撫其子無異已子教其子孫拳拳以孝悌為務嘗大書以名其堂曰順德於乎先生之于孝悌行于其家者如此其備也而不及顯著于時此豫所謂可哀者也然孔子曰是亦為政則先生之行雖不及著何傷哉先生殁于永樂丁酉十一月二十一日享年七十有九娶陳氏子五人彥中秉中和中泰中誠中泰中先卒女一人適同里李伯恭孫男十有一人孫女九人和中豫乙未考試時進士也方之官桂林道聞訃還將以明年某月之某日葬于里之某山某向以刑部主事劉全節之狀來乞銘先生之善行甚多豫特書其大者使觀者得其大則小者不待言可知也銘曰唯古君子飭躬著行其修在已其行曰命于已弗歉命聽于天苟弗之行已何預焉允矣先生孝友是崇其施弗遐於已則充有幽其宫其髙隆隆銘以昭之埀于無窮曽處士墓志銘君姓曽氏諱敬勝字子尚其先永豐著姓髙大父懷宋承務郎通判饒州軍州事曽大父松龍宋咸淳進士纍官兵部侍郎大父降嶽繼登咸淳進士授將仕郎吉州教授父汝靖為文有名當時君幼喪其母而事繼母趙氏甚孝友愛諸弟人稱之者無間言承其父之教篤意不怠其性又敏悟通曉卒能自奮于學讀書晝夜不廢既長為文詞不事華靡而論議考索必出入乎六經之奧連試于有司不利遂棄去一肆力於古文辭諸子百家之説靡不畢究而自元之亂君已絶意進取及國朝兵定君老矣益沉約以自晦有司屢以明經薦君屢以疾辭焉維鄉之學者從之遊君不拒也平時迹不至城邑然邑大夫鄉飲之禮必得君為之正賓否則通邑之士皆不樂焉及君在賔位衆仰之栗然不敢慢凡三為正賔年八十六而後殁嘗喜漁釣以自適其意晚因號尚漁翁所著有尚漁集若干卷君平生恭謹老而康裕神志怡然言信而行從其氣和其容舒見者莫不起敬及其殁也聞者皆嘆息悲悼以為老成人今不多見也君之娶同邑上羅陳氏子二人盡美求俊孫男六人曽孫五人其生元皇慶癸丑二月十六日其殁大明洪武丁丑十二月二十有一日也殁之又二年附葬于先塋之次君之族孫子􅪥侍講翰林豫為同官嘗道君之恭已篤學之故豫恨不一識君而某為光澤縣令嘗考績京師屬子啓狀次君之行又三年來朝于京師又因子啓以求豫銘於乎使君方壯時遭世承平得以其所學施之于政其及民之澤必宏偉盛大有足著于無窮者而卒困于喪亂及遭逢盛治又不及以行沒蓋可惜也然吾聞古之士老于家上之人不敢煩以政不敢勞以禮節欲有問焉則就之而當時士大夫亦皆髙自尊崇不下其道至于鄉射燕飲旅酬之際皆能誦説先王之法以盡夫乞言合語之禮故其殁也祭於社謂之鄉先生後世不惟不明夫養老之禮為之士者老于家亦不知尊崇其道藝其於古先王之法何所稽説大夫小子何所視效俗之偷教之廢蓋有由然矣有如曽君豈古所謂鄉先生者非耶其於乞言合語之禮庶乎可以詔後生也其沒也可不悲哉銘曰惟古老者道德之隆乞言合語詔于瞽宗大夫小子孰不敬恭惟世之季若知敬老小大蒙蒙孰輔孰教割牲省醴孰敦古道於惟曽君隆隆之師明之于躬任之沒而社之孰曰不宜銘于太史尚昭不已李通判墓志銘君諱銓字彥庸姓李氏系出唐西平忠武王之裔有諱某者官于袁其後自袁徙吉水之谷坪族最盛君曽祖公範祖務任父讓翁纍世皆不仕而讓翁尤富於資配周氏生君幼端重如成人性極頴敏稍長與其兄鎮俱有才名鎮舉進士于時或又勸君進取君慨然曰親老矣舍朝夕之養而圖榮宦于身如二親何遂專意以事親為務然由是其名益著久之有薦之於朝者名至俾歷事於工部有能名丁母憂服闋來京師今工部尚書宋公聞其至即以其名上聞俾攝主事事往福建所至介然不苟取毫髮時參政房公安以為未嘗見也疑而未之信遣二人躡其後察之歷數郡其自持如始至之之日漳浦縣縣令懼有逋責密以金餽君君大罵却之發其罪狀而去二人歸以白房公房公大為嘆異由是未還閩而名已聞于京師矣以父憂去官服除改授汀州府通判既至以獄囚淹繫者衆按其無罪者悉出之旬日獄為之空藩省素聞其亷又知其敏于政如此遂檄君督八州冶鑄錢匠時乃盛暑疫疾大作君為之醫藥繼以饘粥人為禱于神病者皆愈民歌頌之然凡各郡分部其匠皆小吏畏君名君又務束以嚴吏益不自安相與誣搆之訴于朝逮之至君歷訴其情誣者屈服事遂白還任汀州而卒時永樂癸巳正月之某日也享年五十有四君為人儀觀甚偉修髯玉立善談論為政疏通簡易常惻然有愛民意其死也其民尤悲之娶楊氏有婦道生子三人某孫男幾人以其柩歸葬于其鄉之某山某向又明年夏某以黃州教諭周公所為狀因翰林庶吉士周某求豫銘於乎古所謂亷吏者漢唐之際史傳之所紀其人可槩見於世如君非古所謂亷吏者乎惜乎君未究其施而殁也因摘其事之尤著者銘其墓曰惟古之亷以激貪吏今豈不厭貪者之忌庸庸羣小噂沓以憎炎服海嶠而君有聲嗟彼之附貪垢同汙君豈為異乃以速戾同江之原為君之藏其流洋洋奕世其光蕭母郭氏墓志銘母姓郭氏諱某父某家泰和江之南某為其女擇所歸以歸同里蕭以德氏以德循循切實平生未嘗有一語拂意于人人亦未嘗有毫髮怨惡之者推其所以能然皆曰其內有以相之之道也以德諸子皆知尚禮文相慕為善人之行其長曰士信以善寫真名聞公卿間諸子習其藝者皆精絶推其所以能是皆曰其教于其家者內外協而不溺于其愛故也廣其田園增其室廬凡養生送死之具口備以周推其所以有是皆曰自有是母內外積纍之勤且儉致然也又皆曰其母處姻戚鄰里無親疏皆冝待其家之人無少長皆安其賢蓋如此享年若干其生元至正庚辰二月三十日其殁今永樂甲午十一月二十日也葬于某山某向子三人曰士信士行士倫女二人適某孫男四人于喬于淵于丘于京曽孫男三人于喬來京師丐豫為銘其墓意以豫之幼時嘗從豫舅氏讀書其家知其大父以德者然距今四十年以德已老念往事又可感矣因為之銘曰孰為不死幾何不朽念此昔者銘之永久陳處士墓志銘處士姓陳氏諱漢隆字世賢其先世居溫氏代有顯者自宋南渡遷廣東雷陽之遂溪曽祖純祖洙皆不仕父宗達元至正間海寇攻雷城募民兵擊賊走之城賴以不破事聞授遂溪縣尉遷石城主簿以卒處士性寬厚而沉默雖晦迹丘園而智識有過人者元末遂溪賊起縣之人被迫協者甚衆獨處士舉家逃去既而為賊所獲縲系考掠必欲其從已處士以死自誓賊縳之益急至中夜忽自解縛得脫去聞者驚歎以為神之祐也及賊平嘗劫處士者望見輒恐愧走避處士召而慰安之人益髙其量國朝初詔天下立學校時郡縣初定民資産室廬蕩然有司懼不能應詔以告處士處士聞之慨然撤所居堂舍以造學宫門廡皆備且遣其二子入為弟子員於是縣之賢士大夫皆稱道其樂善好義在古少有然處士尤勤於治生故其家益裕宗族之貧者周之其不能嫁娶者為之嫁娶鄉人貧乏取貸不能償者焚其劵鄉黨忿鬬或就處士決之聞其言輒止不復爭故其殁也里之人無少長皆為之哀北京國子學正曽君才魯與同里交之厚而知之尤深也因為狀次其行其子貞豫為北京道監察御史因其友監察御史歐陽允和以求子銘遂按狀而銘之處士生元至正戊辰年九月二十五日沒今永樂乙未九月十五日享年八十有八先娶黎氏主簿某之孫女早卒繼室某氏巡撿某之女也子四人貞安貞泰先卒存者貞謙及貞豫女一人適羅志忠孫男八人孫女六人孫皆長子皆賢貞豫為御史尤有能聲將以丙申某月之某日葬于古城山之原向銘曰阻矣海邦俗淳以龎誰其牖之惟士之賢彼盜方熾士喪其節公獨凛然誓死莫奪學有新宫孰營度之談談奕奕惟公是思宗族思愛鄉黨思惠公則逝矣其澤不匱我其銘之以徵來世前泰和州知州顧光逺墓志銘泰和始為州其民之衆亂久而後定治之尤難而國朝初相繼為之守者得二人焉曰吳侯去疾顧侯光逺也二侯皆一時豪士顧氏先世居河南自宋髙宗南渡始徙而南居姑蘇之嘉定元末有知侯之材者辟為椽京口及太祖髙皇帝下江南京口首納欵侯預有力其間遂徙髙皇帝入金陵監大軍倉支納三年授江西行省理問從征陳友諒督饋運明年平陳氏擢知龍陽州時方甲辰年也招附懷來剷革宿弊民賴以息越二年改知泰和州龍陽老稚至號泣於道不忍侯之去至泰和前州守即吳侯也吳侯以民好訟告於侯侯憮然曰民有寃抑守弗為之理民將安訴頃之訟者雨集侯乃自為書榜聨紙長數丈誨諭諄切民爭來觀觀已去不訟者十二侯又俾凡訟者居譙門上思三日然後得訴思不三日去不訟者過半矣乃擇吏純謹者一人置簿受詞訟而勾稽其始末民誠負寃也輒為疏理非誠負寃願悔自止者聽不問未兩月民不復訟吏亦畏侯精敏無敢舞文以病民境有虎適其時禁民私蓄兵民無所措訴于侯侯為草檄告之神虎一夕遁去州以大治以丁祖母憂赴闕陛辭命留翰林院同議編大明律律成上進復命監造天下均工圖籍已而還服喪嘉定未幾起服授廣東行省郎中二年召拜吳王府副相留京師以他事詿誤方逮繫間得疾飲水病結胸而卒臨卒為詩壁間以慨道其平生有白髮歸朝之嘆聞者悲之子存誠殯于都南門外三里店侯諱某生元至元年某月之某日沒今洪武幾年某月之某日娶某氏子四人長即存誠次存仁為河南偃師縣令以殁次存義存信存誠今居嘉定存義存信從侯于廣遂留家焉侯性淡泊不尚侈靡所居廨宇室無長物惟藝蔬數畦食取充口衣取蔽體而已至於治民事無巨細必盡其心在廣之日别亷吏均轉輸浚城隍撫馴士馬安戢逋逃號令既明而賞罰必信逺邇翕然及聞其殁爭欲為祠立石以頌其德者屬有禁不可乃止侯嘗從元進士楊仲宏先生學賦詩氣豪才瞻而律調渾厚尤工七言晚自號蔗境翁詩數卷題曰蔗境吟稿云於乎侯當草昧之初能卓然諗知天命攀附聖主以自樹立可謂壯偉矣而用未臻其極功業不究於當時獨其善政在民者民不忘也瓊州守王君伯貞往來廣海間得侯二子訪之又素知侯之惠愛不忍其泯也為序其事以屬濳為之銘濳與王君皆泰和人也乃著其事之大槩吳侯安慶人為侍御史以殁焉銘曰民歷草竊窮姦偷及兹弭寧誇相讐大吞小噬病曷瘳正躬惠民邦兩侯後先敷政何優遊隱絀舒伸暴帖柔回遹海沮嗟相羞嗟哉我侯古罕儔衣被寵光壯謀猷澤流盈溢爵未優身永逝兮名無休故王母曽氏孺人墓志銘泰和梅岡山中有隱君子曰王君道濟其配曰曽氏孺人曽氏巨家也而孺人幼不好華侈性敏惠母教以孝經論語列女傳輒曉其大意道濟早喪其母在昆弟中最幼資産最薄孺人歸而安之又能厚于飬也其織祍之勤自其嫁之初至于老不衰其服之儉自其身之約至于富不改其安于命而有常度如此當喪亂之亟道濟舉家往依其婦翁尋而其尊府則堂公殁焉時摽掠于道者相接道濟擬間行獨歸其櫬儒人不可曰行而遇盜雖殺身無悔竟護喪俱歸葬而後去卒亦不與賊遇也寧委其身而不以廢禮此君子之所難也曽謂女婦而能之豈不尤難也哉道濟性豪曠喜與士大夫傾倒孺人嘗私蓄以備其乏愛其子之深為奉其師雖歉時必備不簡道濟沒衆謂其子不振矣孺人逆料其必不然既而果然由是道濟名播縉紳而其子亦有聞非孺人之賢烏能如是哉孺人諱春祖叔慶父君寶家廬陵之新墟其生至正巳巳正月十五日殁今洪武二十一年四月七日也蓋去道濟之殁十又七年矣子一人環女三人皆適士人孫男二人岡壽載璋曽孫男三人曰熊孺人猶及見其生也曰鶚曰孺人殁之後生也曽孫女六人玄孫女一人葬其居之後既而改葬吉水之吱嶺丑艮山未坤向蓋永樂九年十二月二十二日也於是環狀其行泣而乞銘余與環交好不得辭也銘曰既婉而慧嫓于良士始艱于躬卒倍而豐閨門間間禮信言言匪夙而成惟其性之明珠媚于澤玉輝于璞其藏也孔幽其著之孔灼蕭母張氏孺人墓志銘孺人諱玉姓張氏其父源春居泰和城中于世利淡然毁譽得喪憂戚一不以介意而惟酷嗜酒然甚愛其女稍覆罍而却杯也輒呼其女而教之孝經論語皆其口授也故孺人少知書及笄歸同里蕭君仲齡和順敬恭循循自持痛其父殁於患也事其母益孝事其姑如事其母事其舅如父而加嚴焉仲齡兄弟皆早殁孺人以伯氏叔氏之既殁也處妯娌之厚加於平時視諸姪之孤者如子而加愛焉既舅姑皆殁相其夫以治其家家事益繁理之益密內無懈心外無憝容又勤恤鄰里之貧者益甚周洽故其殁也無戚疏皆悲悼不勝蓋可謂里之賢母已生洪武已西二月十九日其殁永樂辛卯二月九日也年四十有三子四人進逢通迵女二人皆在室孫男一人曰將將以殁之明年某月之某日葬于某山某向于是進以其父之命述孺人之行來求銘進讀書遊縣庠志甚篤而豫與仲齡交之久也乃為銘之婉娩而愈不憚其劬撫于有家惟躬之痡而止於斯而止於斯我銘其丘永世其孚故翰林庶吉士曽春齡墓志銘於乎士大夫世家之後能統承先業以致顯榮昌大以耀乎世者幾人也而吾友春齡抱豐厚穎敏之資方壯年取科第入翰林為庶吉士行有以致其顯榮昌大矣而仕不酬其志材不施諸用遽為殞謝其為痛何如也先是有湯君如川者亦良友也吾哭之痛既一月春齡又卒惟二人出自鄉校皆有賢行其殁也皆不得年又皆有父母有子方提孩湯君殁未幾其居火并及其柩春齡幸一僮奴扶其櫬還家聞者莫不悲痛此二人者豫方欲為文詞以悼其不幸而春齡之弟來京師哭其兄乃狀其行以求銘於乎吾尚忍銘春齡也哉春齡姓曽氏其先世有諱延慶者仕唐為光州團練使由金陵徙泰和自是為泰和人宋熙寧中有兄弟同登第者曰安強安止安強為御史甚有聲自安強數世至傳道元天厯間兩以易經中鄉試學者尊為東蒙先生其弟耕道亦以易經舉瑞為金儒學教諭耕道生九韶先生國朝初為沔陽黃蓬湖官子伯髙皆慱學篤行伯髙即春齡尊府也九韶先生既謝事歸教授于鄉春齡兄弟皆授經于其祖皆孝友循循然鄉之子弟鮮有過之者先生殁幾載是為永樂乙酉二人遂同舉于鄉一時並捷人莫不謂曽氏兄弟紹述其祖無忝也及當上春宫鶴齡以疾留于家春齡登永樂四年進士第既入禁林同預修書朝夕往還方期相與於永久也曽未數月逺膺疾而至此極矣享年才三十有三於乎彼澆漓而憸詭者其夭遏也固宜曽謂此淳龎而碩茂者乃亦然耶然春齡沒數月皇上命勒進士碑于太學門外春齡預有名焉夫碑所以埀久也况進士有碑人皆欲指觀其姓名問其鄉邑以知其賢與否則春齡雖殁預有榮耀不沒矣彼修短之數繫乎造化者一時之得失又何足深較哉春齡娶袁氏生二子一女銘曰生而行之醜奚以壽殁而存者長奚以傷珠淪于沼其波涵耀猶崇于岡其臭則揚十里之墟臯如墳如子之藏矣流其祉銘于太史埀不朽章母蔡氏孫人墓志銘孺人姓蔡氏寧波鄞縣人其父得源仕元為國子學録其配楊氏相夫事姑極有禮法生孺人既笄歸同邑章景良氏章氏鄞之巨族景良父宗之兄景玄國朝洪武初相繼並出榮宦一時未幾皆以事罷久之朝廷命凡內外百職以罪罷歸者悉徙鳳陽闔門煢煢無一壯夫而景良母方老景玄尚未有子景良二子亦提孩長才五嵗孺人是時年始二十九景良瀕行哽咽悲痛不能出一語呼孺人孺人亦痛哭而已景良以老母為囑語勤勤不已孺人曰君止勿復言奉舅姑吾職爾若茍負君神將殛之君第強餐自慰遂盡出其資裝以為景良行不數年景良卒宗之景玄亦卒母哭其子妻哭其夫者一門三人行道聞者為之悲孺人日夜忍哀以養其姑撫其二子教之以詩書躬蠶績以資其家業又經理以歸其三喪始終葬祭無違於禮事其姑益勤弗懈又十年姑殁孺人哀章氏之凋悴二子之煢弱悼其姑之不幸艱苦悲辛竟以成疾而卒洪武丙寅二月七日也享年才四十七於乎悲哉人生不幸固有如孺人者耶方其夫之去孺人以一言相要而卒能保其貞節始終不以負其夫世又有如孺人者耶是宜彰而著之以為天下閨門法且為風教之助孺人二子長敬先材而有賢行今為溧陽稅務大使次某敬先既合葬孺人以從于景良遂以其鄉先生葉宗可之狀偕豫弟本之來請銘銘曰人之大間曰惟信義號為士夫乃弗蹈厥軌偉哉章母克完貞節匪教于閨門君子是式銘以著之用永昭于後世故大理評事熊君墓志銘君諱岊字具瞻姓熊氏撫之臨川人也自少負盛氣績學為文慨然有逺略曽祖某宋國學上舍生祖萬初元進士父伯穎國朝初徴授國史起居注以文章著名一時擢晉王府右侍奉使招諭元王子多爾濟巴勒被害于道事聞髙皇帝甚惜之遣中使祭于死所君之兄企瞻往收骨特加賚賜仍命復其家三年君時尚幼也企瞻沒君年始二十悼其父之不幸又痛其兄之夭遏畜志奮厲思有以紹緒其先而邦人有為憲府掾者擠君攀與俱為掾憲府君慨然太息曰豫先世皆貴官豫即為掾顧不辱吾先君也哉即以其父死事訴于朝願不為掾遂得授嘉興府知事嘉興大府知事於府僚最卑未易為也君為之大有聲考最選歷事兵科擢大理右評事遇事明敏辨折秋毫不苟隨而妄合衆皆稱其能以事逮繫獄尋復選使西南夷麓川緬甸所至皆稱上旨上將復用君而君遽求還改葬其繼母章氏未得命而君竟以疾殁矣於乎悲夫君之先君學行髙茂受知于髙皇帝將大著其勳以施于生民社稷而遽死于難意天之祐善必在其子孫也而君又賫志以殁豈所謂美名善行者天之所甚吝而為善者又不必責報也不然君與其先君所積皆忠信道義之曄然而所遭之薄如此此何理也於乎可感也哉君享年四十有九其殁永樂己丑五月壬申也娶同邑饒氏生男四人女四人嫁為士人妻孫男四人孫女幾人君性孝友持行甚篤淡然不以外物纍其心故雖即卑官且貧嘗自號其所居曰雲莊其弟某在禁林預編纂書籍與子交因翰林庶吉士陳君孟潔之狀求豫銘期返葬君而納諸墓豫既悼君之不幸而又獲交其弟也因為之銘曰天道福善乃理之常世篤其慶而流弗長天弗可信我心則傷勒銘其岡以永弗忘彭縣丞墓志銘永樂六年冬十月香山縣丞彭公叔介以老乞致仕來京師而主於潛又一月公得告而疾作越幾日丙寅公殁焉既殁濳為位哭之而痛既而鄉之故舊之仕於朝者左春坊左諭德楊君士竒翰林修撰王君直國子助教歐陽允賢與凡公之交遊皆來會哭哭必盡哀而後去既去而傍徨咨嗟皆以為鄉之老成問學如公者今而後不可見矣謀返葬其柩而諭德君謂余宜銘修撰王君為狀其行於乎余自幼而壯辱公之知尤深余為令四會其授官也蓋與公同時又同之官廣東知公之為政則惟余之宜銘也其尚可辭哉公諱志叔介其字也其先自長沙徙泰和世有顯者公之七世祖惟孝宋光宗時嘗詣闕獻賦以諷時政光宗一見大竒之欲遂官之辭不受同時知已如周文忠公楊文節公皆交章薦其賢自惟孝至公曽大父景望大父順軒父德聲或隱或仕皆為時名人公自少穎敏問學過人既壯浩然負盛氣不肯降意阿色于時雖屢更困厄憊而復起終不變以此竟不偶一世而凡與公厚者皆以是咎公不但淺于知公者然也州縣嘗以賢良辟不就久之為萬安縣訓導子弟雖甚德公其與公處而合焉者少也蓋公嘗從安成劉雲章先生講明理學大有得于其心間居為子弟論説旁徹曲暢聽者灑然忘倦惟其得于內而自重者益多故其于世益少合其合焉者必其志之不異氣之同也然與公志不異而氣之同者世無幾人焉而同者可知也其為丞香山與令齟齬而民則感公之澤無窮有以男女質錢久不能償沒而為奴者二十餘家訴于官官無以理之公至悉為規畫還之民甚悅公令甚愧焉自廣以東惟屯兵最病民往往奪民田而有司不敢問香山得公兵之占民田者皆以田歸其民邑城在大海中海寇日往來行劫守兵閉城不敢出或與之遇且引且却民多遁去公為設方略且守備鈎致賊船而盡繫其衆自是寇不敢近民賴以安數年政聲大著民至有不忍欺之者邑嘗大旱公為禱之三日而大雨明年又大旱公禱之又大雨邑有火逼廨宇熾甚公叩頭向之火尋滅聞者莫不駭公所為蓋其誠于已施于民而至于感乎神者如此惜乎其位之卑而施之不能慱也公雖去香山而故舊方待公之歸以教其子弟學者方資公以針其德業孰謂公之疾而遽至于斯可勝惜哉公生元至正戊寅九月二十七日享年幾十生平至孝執親之喪蔬食三年酒巵不入口處宗族尤盡思意擇地而蹈非義不居諸子侍側屏息終日不敢仰視所為詩書若干卷讀之可知其氣而見其平生焉歸將葬于某山某向卜某年某月之某日也娶同里蕭氏甚有婦道先公殁再娶王氏亦殁子一人曰某孫男四人某某卒之時惟幹與其從孫詡况侍側將屬纊命詡要余至語永訣氣恬神適毫髮不亂銘曰偶于道而不諧于人兮充乎中而不華其身兮君子之守孰云其屯兮奉天靖難推誠宣力武臣特進榮祿大夫右柱國左軍督府左都督太子太傅成國公追封東平郡武烈王壙志王諱能姓朱氏丗為鳳陽懷逺縣樂河鄉人父諱亮為燕山中護衛副千戶殁王襲其職洪武三十二年七月皇上起兵平內亂王以藩邸之臣首擒姦慝奪九門以功升護衛指揮同知遂領兵攻薊州擒其將都指揮馬宣等進攻遵化取密州從上攻灤河蹴大寧之兵攻雄縣先以兵破其東門衆敗走追之執其將楊松又執都指揮潘忠殄餘衆於漠州入真定長興侯之衆敗走王乘之與敢死者三十餘騎追之至滹沱河敵兵數萬列陳以待王與其騎望見即奮入其陳敵衆大潰相蹂籍死者無算降者凡三千餘人九月還升北平都指揮僉事復從上趨永平克大寧十一月敵兵窺北平復從上還至鄭村埧敗敵兵凡營于九門者悉攻破之十二月從取廣昌明年正月克蔚州攻大同四月二十四日暮至白溝河王為前鋒與敵將平安遇敗之明日整衆復戰王又為前鋒大敗之克其營長驅搗濟南至鏵山其衆陳而代與戰又敗之降者萬餘人以降者入至軍門上命皆縱遣之南兵自是急則降無復固志矣九月升都指揮同知復從取滄州破其束門引兵自門入斬首六萬餘級敵兵聞震懼戰于東昌已而從上還三十四年至夾河上以王為竒兵先鋒大敗敵將盛庸兵至稿城又敗之至真定戰東門斬首七萬餘級掠彰德還定州勦西水寨十一月升右軍督都府僉事明年正月入衡水引兵追敵兵于德州破之進克東阿東平汶上諸寨三月伏兵肥河敗敵將平安兵十餘萬人復連戰我兵小不利諸將請班師王勸上進兵遂攻敵銀牌兵敗之又敗其餽運軍馬尋而陳都督將兵來會王即以其衆奮戰敵大敗明日進拔其諸營克泗州長驅渡淮盛庸兵敗走入盱眙下揚州從上渡江先登克金川門盛庸等兵望見披靡散去六月十三日上入京城畿甸既寧四方底定論次諸臣之功王之功為最賜號奉天靖難功臣進階特進榮祿大夫勳右柱國爵成國公食祿二千五百石仍命為左都督賞賚甚厚永樂二年某月進兼太子太傅五年某月拜征夷將軍總兵討安南至廣西龍州得病而薨某月之某日也其生洪武庚戌四月六日享年凡三十有七訃報至上深悼之為罷朝封東平郡王諡武烈夫人某氏自成國夫人進封東平郡王夫人曽祖某祖某父亮皆自成國公進封東平郡王曽祖母某氏祖母某氏皆自成國夫人進封東平郡王夫人母某氏成國夫人進封東平郡王太夫人詔以其柩歸葬于北京遂以洪武某年某月之某日葬于都城之西南幾里某山某向子幾人長曰某襲封成國公次曰某某女幾人惟王以豪傑之才負果敢之志灼知天命深識事機用能協贊聖謨仰遵神算由是舉無遺䇿取無堅城受命于幃幄之內而取勝于百萬之中所謂雲龍風虎之會卒定大艱為國元勳遭遇之盛真千載一時也至于死生之際哀榮之典光賁乎幽壤而延及乎後人則又王之藎忠純誠始終不二者有以得之夫豈偶然之故哉夫惟王之功德如此是宜勒之金石昭示將來以彰著聖上知人用人之效如古所謂旗常之銘者今姑書其征伐大槩爵秩次第納于壙中以掩諸幽以識其嵗月於永久云贈成國公進封東平郡王壙志公諱亮字某姓朱氏鳳陽懷逺縣樂河鄉人洪武初以善戰立功為百戶疏年升武略將軍羽林左衛副千戶又五年改武毅將軍燕山護衛副千戶其生元至正庚辰十二月初三日殁今于洪武某年某月之某日享年凡五十有六子二人長曰能襲職為副千戶三十二年從皇上起兵定大難大立戰功賜號奉天靖難功臣特進榮祿大夫右柱國左軍都督府左都督太子太傅成國公薨進封東平郡武烈王公以恩追封東平郡王祖某父某皆自成國公進封東平郡王祖母某氏母某氏皆自成國夫人進封東平郡王夫人公之配某氏自成國大夫人進封東平郡王大夫人次子某今為某官孫男幾人長曰某襲爵成國公次曰某今為某官惟公植德深厚久而乃發篤生令子為國元勳髙爵榮封賁于幽壤推厥從來是皆公修德積善之報有以致之非偶然者某以公舊窆不稱今典將啓而改葬之以永樂十五年某月之某日葬于北京都門外某里某山某向因考次公之生卒年月官爵始終以及其恩典褒榮之至以志其壙以告于後之人云於乎公之所以不朽者在此也楊母鍾氏墓志銘代仲述公作孺人諱惠姓鍾氏父盟鷗先生當元極盛時隱居不仕吾與曽祖令尹慕李元爽白樂天香山之勝合縉紳諸公而為九老會風流髙一時孺人質實之德自幼成既笄歸配鄉先生楊萬泉氏先生儒而隱端莊而儉勤孺人相之不厭淡泊事繼姑丘氏尤得其歡心凡飲食一經孺人手丘氏食必既語言懇實服用朴素母儀足以淑諸婦婦德足以冠妯娌侍婢家僮莫不欣欣惟謹恤人之病不啻如已匱憫人之勞不啻如已困元季大亂萬泉沒于兵三子長自申蚤卒次自明遊於外沒不返皆積學尚髙致孺人哭所天而痛二子之淪亡憔悴就衰老無一日之好顔又次曰自良始業孺終棄孺而慕烏氏倮之術屢賈而倍蓰家道以饒于是孺人備甘旨之飬然其志弗如也長孫曰穀一嵗而父喪次孫菊一嵗而母亡皆孺人保抱鞠育至于有室家二孫最鍾愛嘗謂人曰吾兒雖富家道弗昌矣既而孫貴死而自良無後矣每念及家事輒拊膺淚雨下悲摧不自勝未幾而家難果作舉家械繫來京師惟縠以别籍幸免乞往告存養有司拘繫不遣行孺人沒逾年始克來收骨以歸而自良先孺人一月死矣自良之妻後孺人一月死矣又三月菊卒又五月梧卒梧者自良之螟嗣也居京師不三年一門死者五人穀哭之痛乃再拜以其祖母之銘來請於乎吾忍銘儒人也耶孺人長吾母三十年而吾母先孺人沒十年矣吾祖母楊氏實孺人之族姑孺人冡婦則吾陳氏之族姑吾伯姊適鍾氏為孺人之表姪婦孺人之孫女則吾伯姊之冡婦數世􅊚好重葭而疊莩居處相接不啻於比鄰且孺人年髙而愈康相往來無虛日故知孺人為最悉者也然則忍不銘孺人也耶孺人殁今洪武壬申某月之某日享年七十有九三子男三孫男存者惟穀三孫女皆適人以洪武甲戌某月之某日歸窆于某山某向嗟夫使孺人先一嵗而殁不復丁此厄使孺人後三嵗而殁尚生還而期頤胡不自其先不自其後閲百年之人世而竟止於斯耶其施豐其報嗇彼蒼蒼者孰得而詰耶是宜彰而銘之銘曰蚤孝於姑兮為楊氏之令母暮搆屯厲兮播越墜厥緒有孫曰穀兮返葬于故土於乎穀也屹中流兮底柱於乎穀也一髮千鈞兮楊氏之祚陳母王氏孺人墓志銘孺人字金姓王氏吾舅氏陳仲享先生配也王氏在宋多顯者入元皆不仕而先生曽祖梅村公時以贛州路推官致仕諸子亦皆仕宦而孺人之祖浩吾處士以文行尊髙為學者矜式故兩家皆為鄉閭傾仰曰有慶先生仲亨先生之尊府吾之外祖也與孺人之先君子實甫同遊學又所居甚邇數往還遂為婚􅊚逮元季兵亂兩家皆灰燼瓦裂孺人始八嵗已盡失怙恃鞠于從兄仲隆既笄歸仲亨先生先生與其兄孤苦僅自立敗屋數椽不蔽風雨先世負郭田數十頃皆為豪武者占去終嵗之食不給也然先生朝出而暮歸視其家皆欣然歡裕故終身泰然不外慕徙業由孺人相之安其貧而樂之也夫安貧而樂之雖士君子問學樂道亦難而謂閨門女婦非有道德教訓性成而質能之是尤難也孺人之姑余之外祖母性極端嚴然孺人始終謹畏服事未嘗少慢撫孤姪至長大愛恩不衰所以然者其質之美情之能厚也自始歸陳氏由窮約斬底于豐豫至今有室廬巍然壯偉粟餘於廪資盈於篋又有子有孫將昌大光榮其家視其初卑陋不給煢孑而獨立過之逺甚説者又謂孺人之為婦於陳氏有功能矣豫幼撫育多屬於外氏外祖母愛之恣其傲戲及稍長知觀覽古籍或直入寢室掊鎖啓櫝亂抽簡䇿取所欲者竟去孺人未嘗出一語禁止愛視其甥之厚在今日與他人家乂少見也其勤儉興復其家其子孫要當知之而豫與外氏狎恃恩愛又兩家子弟所宜知庶幾於吾母黨情可久焉孺人之殁先生命其姪賞為狀而屬豫銘銘既自豫得攄其情書之以示夫來者孺人生元正至乙未年四月十九日殁今永樂丁亥正月二十有四日子男四人長曰餘為瑞州府髙安縣學訓導次殖教于鄉次復次邵尚幼皆風骨俊爽可愛女三人長適劉并前吏部尚書劉公嵩之孫次適曽敏仲餘幼在室孫男二將以永樂七年九月二十八日葬于某山某向之原銘曰方困幼而屯兮孰安此而樂也既豐豫而享兮忍其逝而不作也享其成於永久兮宜有思而覺也魂其揚而逺遊兮尚體魄之有託也銘之自其甥兮言之長而無怍也曽伯昂墓志銘公諱顒字伯昂本劉氏其八世祖利賔後於曽氏故遂姓曽世家邑之荷山公自幼聰敏穎悟讀書日誦千餘言數過輒能成誦壯而精悍喜謀略善言兵彎弓馳馬以此自豪一時元末盜起散金帛聚鄉兵以捍守一方民賴以安時江西行省參政全普提出兵守贛聞公名辟佐戎幕然羣盜日起而普方沉酣於聲色公知其不足有為也遂託疾徒步歸荷山洪武初以事謫戍于贛尋復以言事改戍遼東雖﨑嶇行伍間而氣不少懾廣顙隆凖鬚髯戟張既自負其材勇而人之知之少也嘗慨然太息或遇故人知已飛觥豪酌終夜不休放言髙論聞者皆悚然異之謂公為兵隱生而不名也然公亦􅘆弛不肯茍合於人家故多資而自處淡然人益以此髙之在遼東者十二年而沒於乎公可謂豪士也哉使得乘時出其所長而用之其所至何如也而竟止於斯惜也公生元至順癸酉正月初六日沒今洪武丁丑九月二十九日曽祖英甫祖仁可父以智俱有隱德其配楊氏元清江主簿公望先生子也子三人皓昱晏孫男四實貫贇資曽孫男二序蕳一幼未名女麗華佛奴皆適蕭氏公殁又十五年始克以其骨歸葬鄉之􅀈溪陳冡坑山之原巽已向而其孫實來乞銘于豫豫自少已知公故為之銘曰惟公之藴豪略其識萬金之璞乃混于礫公之髙材孰不信知出則振耀而不逢時吁其可悲故徴士劉志崇墓志銘君諱升劉其姓志崇其字本漢長沙定王法之後也其先居安成之密湖從廬陵之石塘遷泰和之北門才三世耳君生十嵗喪其父而事其母與兄已能委曲孝敬從三華蕭先生學先生嚴而介獨深愛君所授業輒穎悟與其兄並居勞事嘗先之性和易與人怡然不為崖岸險絶然至於遇事機變故審馭方略雖老於世態者不及也喜飲酒終日不醉故人有過之者輒與頃倒視聲華勢利蓋泊如也以薦者徴至京師奉使出陜西還往袁州尋又遣往北京留北京者數月以徴逋囚往濟南開封諸郡轉而至湖洲過天台黃崖往還贛過家得病而卒年五十有四耳嗚呼君奉命而出周覽四方以謂增其氣而擴其中未嘗以為勞其還家也不肯為久駐即命介行李上道至豫章以同領命者尚在他州未得行乃復還家不十日君殁矣説者謂君不死于道路亦非偶然也君之在南京也數過豫而主于進士曽與賢與賢謹厚最與君合其來北京也主于豫日與諸公飲酒而其意之合如在與賢家其以便道還家也豫亦先以憂還家相見慰勞戀戀不能舍去孰謂君一疾而遽至此極耶於乎悲哉君生元至正己亥十月十有二日殁永樂十年七月之某日也曽祖某祖集父某其娶某氏賢而有婦道子三人女三人孫男三人以其殁之明年甲午十二月葬邑之千秋鄉龍門藕塘南園巽山之原申庚向某兄弟以豫與君處相知之深也乞為銘豫不能辭為之銘曰才之不試又胡不壽天乎命耶其將安究龍門之山申庚其向神氣鬱勃為君之藏閉之孔幽其發耿耿視此銘文其傳益永泊菴集卷十一
