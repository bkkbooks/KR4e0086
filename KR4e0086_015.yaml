body:
  text: 泊菴集巻十五明梁潛撰説康惟中字説龍泉康君秉恒惟中其字也其友胄監生李士志以其字求予説發其義余以為恒之云者常也中又常理之所在焉夫過與不及俱失中則失其理之常失其理之常則凡事倒行而逆施皆不可知也父子之親君臣之義夫婦之别長幼之序以至于萬事萬物之委曲㣲細非學問不足以致其知非誠敬不足以篤其行此惟中所當勉也所當知之者也唐虞三代之盛君臣世守之而不失故其治與教有不可及者周之衰孔子之徒守之而其教猶未墜也及夫黄老之學行異端之説興而民之耳目始有所溺矣方其未溺而導之也易為功及其既溺而救之雖百倍其功亦難矣自孔子歿千五百年至宋始得二三大儒區區講説其道既煥然矣然欲推而措之於治與教終有所不能者以其溺之乆惑之固故也於乎此君子之責學者可不知所以盡其心哉文詞利祿之茍且權謀術數之縦横是非詭誕之捭闔理之失其常行之失其中病乎民而害乎道有不可勝言者矣惟中篤厚静深有羙質好聞君子之道則於是固不可不察也因士志之請故備言夫恒之理中之道非徒以告惟中又因以慨夫世之教且治者也鍾九成字説遂江鍾韶九成其字也其友太學生李君仕志以其字求余發其説於乎韶之九成此舜之所以盛也舜之徳格于天地貫乎幽明延及于昆虫草木充周彌滿暢達而無間故其發之於聲而為樂也搏拊考撃此感彼應凡有形之類鼓舞踴躍各臻其極荘周所謂在谷滿谷在阬滿阬塗卻守神以物為量者荘子好非詆聖人而稱韶樂如此此其所以盡善盡羙也相去千餘年孔子在齊聞之猶為之忘味則在當時濟濟徳讓者當何如哉惜乎其世之愈逺制作之不復可知生乎百世之下者徒想像其萬一焉耳然則吾何以復九成也余聞九成恬漠安静無所求於時故亦無所累於心故常自得也九成推其自得者充之於身行之于家以接乎鄉黨州閭忠信慈良之發藹然如春和氣涵育暢達流行充滿無不自得其為吾一身之樂何以尚哉程伯子見小兒徐行恭謹曰韶樂作矣推此而言樂之本可知也九成即是而求于其身得夫韶之功用焉将見芝草産于岩谷祥雲被于其庭與夫九變而致物者無以異也尚以予言測之璜溪釣者説孟璜之所居有溪冷然而清人以其孟璜所居也故謂之璜溪而孟璜亦自愛其溪之勝也因號曰璜溪釣者孟璜温厚而文信慎而敏以所學授徒于其鄉鄉之人無與之忤者又安于貧不茍慕乎外此溪之所以得名而託於釣者則其志之所在也或者謂孟璜曰子方壮年誦詩書服古訓以明乎仁義之歸将必求聖賢之道而寓意于深逺玩物理之㣲而潛心乎髙明誠有得焉則推之以行於時庶㡬乎其志之得也此而不務乃屏絶世事以擅夫山林之勝撫松篁於岩壑而觀魚鳥之浮沉放身於閒逸以自託于耕釣之間此太平盛時仕而倦歸者所以逸其老任其情以恬于退者之事也而豈子之所宜為哉孟璜慨然嘆曰凡子之所言皆予心所欲夫舎富貴之樂而即乎貧賤昧行已之方而志于退蔵此豈人之情哉顧以為得于己者誠有命焉則安于此者亦以俟乎命耳知其有命而不能安之此躁戾而貪冒者所以可嫉而可憎也而子将為我願之耶或者聞而喜曰君子哉孟璜也非所謂居易以俟命者耶世有鄭公之谷召公之墩嚴陵之瀨皆以其人而見重于無窮吾知璜溪之上清風悠然而可尚者不在于孟璜者哉余聞之為著其説以貽孟璜孟璜姓劉氏其居去余所居尚數十里鄉先生王伯洪其婦翁也先生于余有通家之好潜心篤學然不及仕又早喪而無子有婿如孟璜又不及見焉曾與賢字説與賢名啟與賢其字也其名其字安在哉盖取啓賢能敬承之謂也一日徴予為説以自勵予與與賢同逰于邑庠有文字好又累世通家其七世祖通判忠愍公其配鍾氏實吾七世祖國子學錄公婿也方有宋盛時兩家衣冠鼎鼎聲華至今在人耳目忠愍之死直義勁氣踔厲俊偉自足以表暴百世激餘波而振頹俗與曾鷗江蕭清節髙風大節相上下嵗時俎於鄉校貎似儼然不可䙝雖樵童牧子武夫悍卒聞其事猶毛髪森然寒竪况在後嗣子孫獨可不日淬月礪思趾羙前聞人以無忝其績而紹基其家乎况與賢丰資秀朗如渾金璞玉一旦追而出之冶而煅之琢之以為珩玦瑚璉範之以為豪曹湛盧剸犀兕而極天下之利薦郊廟而致神明之歆迨他時之利器而今日之竒寳何其羙哉無愧於古人斯無愧于忠愍無愧于忠愍斯無負于鄉校矣尚庶乎正志以昌其氣博取以宏其中慎其所尚無自隳以随無止以不迪則續前人之耿光其名與實俱茂矣是為説泊菴集巻十五
