body:
  text: 泊菴集卷九明梁潛撰哀辭南耕先生哀辭先生姓許氏諱洪字彥章吉水人自少頴悟强記年十六七為文辭己浩然有氣及壯姿貌軒偉襟度夷曠遭時之亂人莫有知之者及大明兵定江西之明年先生遂出領薦書二年為橫海衛知事改英武衛知事升浙江行省檢校㑹左右司官缺員遂兼署六司之印聲譽赫然蓋浙江尤號難治而其時羣雄割據之後民之渙散離析者內無定志吏狃于故常而變詐百出先生內明而外恕應治繁劇之際舉當機㑹故不用其威而吏無不畏不苛于法令而民無不懷者由是浙東西人人歡悅皆以謂先生于爵位不如是止也而先生遽以母老告歸矣先生事母孝事其兄尤篤既仕而歸瀟然如未仕時日與里中故舊逍遙相羊忘情世故自號為南耕野人蓋先生庶幾乎古之知進退者也歸二十年始殁殁時年五十八於乎先生慨然有志于功業者也用不盡其材而果于謝歸負髙世之志而卒止于此此豫之悲而哀也辭曰世方草昧兮士無所依非誠豪傑兮孰知攸歸嗟若先生兮絶識離倫遁世逃避兮孰窺其機乘時而出兮亦孔之宜何材之髙兮而仕則卑瑣瑣趨慕兮世為恥羞超然决去兮何勇如之青原之左兮文水之湄藝蘭與蓀兮翳彼紫芝事母與兄兮其樂既孺家庭是則兮鄉黨是師胡豐其德兮而嗇其壽畜之日富兮而屯其施命之如此兮其將奈何死者奚憾兮生者戚悲曰著豫哀兮薄矢厥辭後此而千歲兮爰考于茲正固先生哀辭鳴呼先生之殁其可哀也夫先生問學既明而持守甚篤正言善行自家庭而達乎州閭敬信服從自子弟而及乎交遊貌豐而氣揚色怡而神暢其為文章溫厚和平意所欲達詞亦傾竭又自少孝于其親親之殁巳久每語及輒流涕至老不衰其學與行過于人者如此也嘗以聘至京陳十䇿太祖髙皇帝嘉奬之授潭王府長史辭不敢當改平陽府學訓導久之得還家學者從受經後多顯者於乎先生修于身行于家淑諸其徒今皆不可得矣使先生不殁至今吾黨之士其造就當何如哉是可哀也己先生之子遵博學而材為文章宏富捷出能世其家者也先生殁三年以選為靖江王府長史先生辭焉而遵得之積之厚報不在其身在其子孫蓋天道也人欲不為善而專事僥幸者視先生可少止矣先生嘗名其齊曰正固學者咸謂之正固先生云哀之以辭曰彼輻輳以售兮孰韜其輝彼恬漠之戚兮孰遨以嬉羌不知夫至道兮卷舒在我惟先生之明潔兮蹈而弗違於乎龍門兮峩峩翳松篁兮女蘿慨古道兮榛莽望白雲兮孔遐吳先生哀辭有序吳先生字孟勤吉之安城人豫自幼聞先生名甚熟及來史館始獲拜先生焉先生雖老色夷氣暢善道古今事終曰不倦時方纂集太祖髙皇帝神功聖德簡牘浩繁事有弗得其端者或以質之先生先生手按其書口誦其語出其端緒節目若引瓢而注之聽者如目睹其事蓋先生識見髙明非徒能記憶也其于英豪偉傑之士心志謀略設施後先亦自然符合於乎使先生用于時措之事業當何如也然先生方慕古之亷士其自視甚高不求阿色于時由是遂與世齟齬終身負此自困不改也其為文章簡質而溫潤操筆立成若不甚經意者既成讀之雖苦思力搆者不過是也史書成得䝉恩賚授河南開封學教授蓋聖上意以是可優老先生孰意先生遂去此長逝不返耶方去時翰林羣公合交遊之士以相餞莫不舉觴相屬謂先生復來固將動色以相候曽幾何時而盍簮牽袂之歡遂為扼腕傷神之痛於乎悲夫賦之深而未竟其施世固有如先生者豈非命耶先生長子善存謀返葬而未果今翰林學士解公己為銘其墓余因悲之以辭曰崇岡兮峩峩春將暮兮水增波蘼蕪緑兮桃始花悵獨望兮天之涯君不復來兮豫恫而嗟學之茂兮𢎞暢承先啓後兮伊誰弗諒彼連駟兮充逵獨方輪兮焉之彼插羽兮薨薨獨戢翼兮噤不以鳴名之光兮行之塞人弗施兮於己焉蹙相古則然兮今奚惑汴之濵兮河之阻洪濤湯湯兮不可以度羌獨滯此兮不還雲橫天兮地漫漫使我悲兮憂萬端酌清酤兮盈樽陳嘉殽兮藉以蓀神來歆兮不可以同吉之水兮孔幽上有叢木兮枝相樛君不懷兮故丘秋霜兮被野曠茫茫兮宿莽君曷寧兮故宇延平知府胡公子祺哀辭余自弱冠聞先生長者道胡公子祺為人未嘗不低徊慕戀庶幾得其人于百世之上其慨慷慕義如孔北海其愛民篤行如黃次公其論事切實如馬賔王其風聲氣烈𢎞偉壯毅足以激頺波于百世之下百世之下求其人而得之于百世之上者非公其誰哉公未仕時晦匿丘園然識與不識皆知之也公雖儒者而勇略過人方髙皇帝渡江遣大將軍平定江西諸郡吉郡城既下復陷他寇大將軍將盡誅城中人公上軍門從容一言而城中老幼數萬口賴以不死至今人稱大將軍之恩與公之德不泯也公領薦之初一時朝廷故舊運籌而獻䇿者跡相踵也公與十八人者見上上為之喜動傾竭心志諧合精神感孚至與天象默符亦何其盛也夫人臣之事惟直言為難而公易之連歷外郡治有異績若毁淫祠仆宋元祐黨人碑之類皆卓然快甚煦嘔愛育出乎至誠故其遺民故老道其事者尤為之流涕不已此與古之循吏何異况使公當非常之任安坐而决羣䇿其所建立又何如也屬其時天下無事専務休養生息故其績止于此耳余往來從學于鄉先生御史王君子啓御史君與公同領薦同為御史其出為郡也亦同時故甚知公事云公身長玉立秀眉而方顴平居言論怡然長者也又云公生之夕有大星光芒墜其舍其殁時亦然公與御史君尤相親厚御史君亦身長九尺面如赭玉音吐洪暢人望之若神明然於乎觀御史君與公二人知十八人者皆若是真一世人豪也哉御史君剛徑疾惡持法不少貸蓋與公若少異者至其事君誠意懇䔍則二人者皆同今皆不可見矣公二子方大光大光大今為右春坊右庶子兼翰林侍讀獨御史君無子惜也公吉郡吉水人自監察御史纍官終延平知府其行事之詳光大既為文以表諸墓翰林學士解君縉又銘諸壙公死無憾矣今之人少有如公者故為辭以哀之蓋亦紀先賢發潜德之一也有城額額兮民力顛危匪公惠民兮孰其綏之朝陽既升兮鳳烏䄜褷􅗳􅗳喈喈兮和鳴孔時彼芒而墜兮孰為之菑嗟忠言梗諒兮惟公在庭公之在郡兮枯槐向榮有鵲來巢兮提提飛鳴公之氣兮孔揚既明智兮又勇剛方振輝兮遽衄藏余心憂兮寧不恫傷遭神化兮能光不滅蕙蓀既焚兮其馨彌烈公則既往兮公有遺澤曷其來歸兮慰我民惻鐔津湯湯兮九峯峩峩公不歸來兮余將奈何往者莫繼兮來者其誰曠乎百世兮永以為期教授蕭引之哀辭引之吉之吉水人自少知力學于世利淡然喜為文辭而其性質實凡一時與之交者率多謹厚之士或負英偉俊茂之譽者其見引之必斂容焉引之洪武間領鄉薦試春秋第一下第除金華武義縣學教諭丁母憂服闋改蘇州崑山縣學教諭兩學諸生素怠于學而習尚浮華聞引之名甚畏憚之久而皆安其教既去皆戀戀不忘至今兩縣稱善教者必曰引之引之考滿得升為教授待闕于北京未數月以疾而沒聞者甚惜之嗟夫以引之鑿鑿切實其才豈止于一教官也哉其交遊之顯者其力固不足以引之重耶乃獨守一官幾十五年始循例得升一資又不及之官以殁其窮如此豈非其命也耶然引之存時于交遊皆落落若不相念及既殁矣則皆悲惜嘆悼之有不能己者則引之之耿介獨立亦何可泯耶豫素愛慕其為人因哀之以辭曰鬱乎其沉默兮彪乎其文之著也退乎若無容兮綽乎其守之裕也豈于時而背趨兮抑用弗諧于古度耶豈違衆而獨立兮抑任情于行素耶慨文水兮湯湯望崑山兮峩峩松偃蹇乎林幽鶴翩翩兮澗阿念爾之歸兮道路孔遐波浪出沒兮傷如之何泊菴集卷九
