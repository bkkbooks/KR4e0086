body:
  text: 泊菴集别集類五明提要臣等謹案泊菴集十六巻明梁潛撰潛字用之泰和人洪武丙子舉人授蒼溪訓導歴知四㑹陽江陽春三縣永樂初召修太祖實録累遷右春坊右贊善㑹修永樂大典代禮部尚書鄭賜為總裁陞侍讀永樂十五年北征仁宗監國以釋陳千户事牽連坐死事迹附見明史鄒濟傳是集前有王直胡儼二序儼序稱為潛子楘所編考蕭鎡尚約居士集有陳循墓誌稱梁公潛以職務違錯被逮且籍之梁平日所作詩文悉估書冊賣錢入官循遣人訪求倍價贖還今鋟梓以傳者循所贖也云云則其稿為潛所自編因循而傳于世儼序不載其事而但稱其文章遭際葢諱言其賜死耳潛文格清雋而兼有縱横浩瀚之氣在明初可自成一隊故鄭瑗井觀瑣言稱其豐贍委曲亦當代一作家楊士竒作潛墓誌稱其為文章馳騁司馬子長韓退之蘇子瞻亦間出莊列為竒務去陳言出新意古詩髙處逼晉宋此本有文無詩集末有康熙辛酉潛裔孫天清續刻家集小引云泊庵公詩集已瘞文冡不復存人間則舊本久佚矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀泊菴集序梁先生之沒既二十五年其子候官令叔蒙刑部員外郎叔車編次遺文為十六巻屬直為之序直與先生居同里且有連少從先生遊而辱教為多其何敢辭先生於泰和為儒家代以文學顯至先生尤俊邁不羣嘗從直之叔祖僉憲公子啟受詩經而其伯舅陳公仲述亦以古文有盛名先生皆獲承教凡經史百氏之書無不究而於左氏傳司馬史記班固漢書每注意焉性命道徳之奥文章著述之妙多其所自得而充之以竒氣發之以逸才沛然莫之能禦遂以文名搢紳間同游雖多獨與少師楊公士竒最相好有麗澤之益永樂初修髙廟實録先生徴自縣令與執筆其間據事直書精切詳雅書成授官翰林及修永樂大典又命先生為總裁該貫古今細大畢録時太宗皇帝在位徳化大行天地清寜民物咸遂華夏蠻貊罔不率俾和氣充溢嘉祥荐臻文學侍從之臣皆形諸歌頌及朝廷有所述作先生與二三閣老實冠絶一時四方求文字者必求之先生盖先生之文温厚和平而豪壯迭宕之勢寓焉如江河之流汪洋衍迤一與風遇則波瀾勃興魚龍百怪出沒隠見可喜可􅕎真當代之傑作也仁宗皇帝在東宫監國雅知先生而親任焉嘗賜詩以寵之先生孝友忠信平易正直而言行必由道其在侍近夙夜敬恭竭誠無隠凡所言於仁宗者皆本於仁義他非所及也竊嘗論之天之生賢以文行名世如先生者實闗乎世道不偶然也當國家興運之時清明純厚之氣始復而先生得之以生加以世澤之隆師友之懿篤志力學遂為名儒鋪張肇造之洪休贊詠繼明之偉烈勒之金石傳之後世而其餘力又以足夫天下之人之所欲於乎是豈偶然者哉先生名潛字用之泊菴其號也初舉郷貢進士為蒼溪訓導以言天下大計擢為令歴四㑹陽江陽春皆有治聲遂入翰林為修撰陞侍讀兼春坊贊善而終孟子曰誦其詩讀其書不知其人可乎是以論其世也直故詳而書之以為文集序使讀者有考焉里生王直序
