body:
  text: 泊菴集巻三明梁潛撰記竹所記梅岡南塘之上渡石橋並淺堤迴紆而後入者王君伯亮之所居也地不盈畝屋數椽而竹數千竿過其外者徒聞雞犬之鳴吠童稚之語笑機杼之聲啞啞然而居人烟火在其中者不見也桑樞蓬户俯而後入仰而視之則長梢直節上拂乎雲漢而烟霞雨霧紛披挺拔㝠迷蔽虧之狀頃刻而變萬殊而或清風徐來却鄰父之儂談止童子之餘誦拂衣宴坐而聽之則四壁之外如絲簧金石之互發而澗聲鶴唳與夫樵者之歌牧人之謡若呼而應響而答者君盖樂之而自號之曰竹所君簡易抗直不妄交扵世其人非負清情雅况者亦不至其門予嘗過君君葛巾黎杖練袍無緼而油然自得因與予觀竹入其室予笑而問之曰君室中何所有也君笑而答曰山珍海錯之竒熊蹯豹胎之羙吾無有焉至於釣登巨鱗瓢貯芥薺酒湓盎而午熟雞啄黍而秋肥則吾有也因取酒酌之醉而後論其先世豪奢盛羙之事而今未嘗見矣盖竹之東舊為寅賔樓樓之下為濯纓之亭其外為駟馬之門其北數十歩即梅岡梅岡之下為萬丈樓宋丞相信國文公為其五世祖約齋先生書履恒謙益四徳在焉當其盛時連甍疊檻花木之富賔客遨逰之樂殆無虚日及其廢也一旦丘墟蔓草禾黍生之過者莫不慨然歎息於乎盛衰之来亦誰能拒之而人情不能無忻戚也君及見其家盛時今老矣乃泰然安扵窮約如此豈非貧富不易其志者哉夫竹不以寒暑改其節君不以窮達易其志則宜乎君之愛夫竹之至也至其居之安樂之深浮㳺汚濁之表而外累不足以介乎其中則君之獨得又有在扵竹之外也君不以言於人人亦少知之者因書以為竹所記清風樓記都城之浩穣天下之㑹也萬夫之塗百貨之所通行者肩相摩勢不得迴還而文鼎之所居尤甚因築樓髙出闤闠以周覽乎四方以脱煩􅅝扵紛埃之表中書舎人王君孟端予友也為冩竹數千竿扵樓之四壁君扵竹甚自惜獨扵斯樓寫之如此其多也盖其意酣氣適振筆迅掃如驅龍蛇而出乎風雲雨霧之中挺然而直節放鏘然而爽籟發使登之者觀其勁正㧞出之操如見夫壮夫烈士之形容如長林大谷而幽仙羽人卒然而相遭使人神情變易思欲與之處而百慮皆化何其羙也扵是君與文鼎飲酒其中酒酣顧四壁若清風颯然而至者因以名其樓明年君以扈従来北京為求予文記之曰清風樓者予所冩竹在焉予嘗要君冩而未之得也聞而異之曰夫何為得此扵君也哉君亦囅然而笑之因為之言曰夫人不汨扵富貴貧賤則舉天下之故有不足嬰其情者浩乎其自得超乎其莫與之偕如昔之務光魯連嚴子陵陶元亮者其清風固油然扵六合之間而無窮也而今不可見矣君獨振其髙韵以見扵所寫之竹盖亦寄意於此矣及其於文鼎也又以其情好之所鍾意氣之相合而不自覺其傾寫之至焉人固莫能測也世必有㑹其意扵忘言之表者哉而非予之所能盡知也君為人氣岸髙邁若不可俯仰一世文鼎與君交厚靜直退然工扵冩山水善書而能賦而混其迹扵市區膠轕之鄉於乎彼其汲汲於得失之際憂愁思慮日交乎其内則雖離世以獨立絶俗以自髙亦徒見其迹耳夫何足道哉芙蓉山房記憶昔放舟青原白鷺之間望文江數十里外鬱然而秀出者芙蓉峰也雲霞開闔羣山環而向之而莫與為匹者世傳其下多丹砂空青琥珀之類又云其山即幽獄故又名天獄云扵此逮系鬼物其為繆妄甚矣然好怪者尤喜傳其事郡志所紀亦以為實然不知其無是理也於乎有山如芙蓉而不能遨逰升降於其中以攬取其清勝乃信其誕妄繆悠之説如此其亦可笑也夫廬陵數百年来忠節文獻之盛天下莫不仰慕希冀以為山川神靈實生此魁傑之才皆想望覽見其勝有未暇者則以為恨獨胡氏居此峰之下累世矣今有初又因以名其所居之山房盖不以其積玩之熟而忽其可羙不以其飫見之狎而厭其可愛其亦喜之至樂之深所謂繆妄不稽之説者自不足以奪其恒好之情而他人之仰慕希冀有未暇者有初得而専之也不亦快也哉有初系出公霸之後忠簡剛簡之餘烈殆與此山俱髙不泯山之巔老子之宮巋然而立好竒之士常至其上以周覽其四旁其必有指胡氏之居問其先烈而慨然動夫髙山仰止之嘆者乎有初之子某来京師因翰林庶吉士胡㵾求予為記遂為之書㵾有初之従子也世節堂記吉水曽希升之来京師也従其舅氏翰林編修周君孟簡過予因慨然流涕而言曰遭家之不幸凡三世皆以夭殁曰明輝予曾大父居中予大父而仲持予先君也三世娶皆周氏周氏里盛族曾祖母西園先生方大之子寡居時年二十八祖母元東宮説書志逺先生之子方大子也寡居時年二十七予之母則子敬之子又志逺従子也寡居時年纔二十二三母皆以節自守獨予曾祖母之歿乆矣幸二母康强無恙方将以其事聞于有司以干旌别之典而非二母志則有所不敢又恐其終遂泯然無以表見扵世則不孝之罪大矣因以名其堂而求記於先生斯二母志也謹介于舅氏以請予聞其言而悲之夫三代盛時内教之修自閨門鄉黨達之邦國以風化天下故不獨公卿大夫之家雖庶人女婦亦皆能躬蹈禮節以之而自防此其教使然非其質之能然也三代而下内教不行閭巷之女婦無所取式茍有足稱者非其教使然其質之能然也由扵教雖中人可使為賢由其質雖賢不能保其無過然則後世女婦之行有足稱者豈不尤難也哉曾氏之母同出於一門無間扵三世盖又曠世所未嘗見者至欲泯晦不願以聞扵時此雖士之明禮義審於輕重内外之分者尤難之也方女教無聞之後而有如三母之行是宜為之書不獨以著三母将以警勸千世也希升為人循實其逺祖三聘三鳳當宋季世皆有卓行三鳳當時目為偽學在吕祖謙三十一人中者也志逺為東宮説書時其母命之還即日辭去不顧當時之賢者皆髙之兩家先世風節凛然如此三母之行固有所薫漸而然哉因并書之俾以記其堂勤有堂記世之愛其子者嘗有無窮之計而尤自以為得者金珠象犀貨寳之積居室輿馬之富使其子終身不至於窮乏然不知金珠象犀之寳相遷徙貿易扵世者無已也多藏厚積鮮有不至於敗者六經百籍聖賢之訓天地萬化之理備焉探之極其深而人不以為過索之窮其源而人不以為侈充積之極盛而人不以為泰顧所見之下者寕以此易彼及徐而計其後也卒為世笑之亦何其不思之甚耶平昌呉仁濟取韓文公所以訓其子者名其堂其意拳拳焉望扵後之人者甚至既而其子紹生舉扵鄉登進士第以選為翰林庶吉士所以慰其親之心有在矣明年仁濟来視其子于京師留數月将還平昌求予文記其堂其意又欲以勉夫後之人也仁濟遺其子者如此而其子卒由是以顯嗟夫彼屑屑於金珠象犀輿馬居室之遺者果能使其子守之而不見奪扵人者乎不獨不能使其子守之雖其身欲守之以老不可必也然則以其身之不可守者遺其子倘来倐忽不知其不足恃可謂天下愚人也哉仁濟之識量其過扵此逺甚遂為之書竹軒記進士顔大和為令廣東之四㑹縣凡六七年不他調因即公宇之後為軒而種竹焉少暇輒退坐于軒中盖瀟然不知炎風瘴雨之為煩毒也其髙雅勁正超然獨立之操若與此竹相賞扵遐僻之邦而其凛然虚心寡欲之氣騷人逸士所自負而髙者将皆兼取而并有之其為可喜豈流俗之所能及哉予嘗為令四㑹知其民之難治大者挟其氣以豪小者負其忿以争臨之以威而不勝其詐之售也撫之以恵而不勝其威之䙝也甚則阻山谷以自比蠻獠而吾號令文法之具皆莫之施茍未能清心寡欲以臨之則鮮有不至於困者况望其能肆情一軒以翫其所種之竹如大和者耶大和有暇日以自適其情扵一軒如此其為治又可知已大和来京師因其友翰林侍講陳杲之求予文記其軒予嘗喜淇澳之詩所以托興扵緑竹者言君子學問之力自治之嚴道盛徳之至善而後申之以有斐君子終不諼兮者言其有是君子之實而民之不能忘也其寄意扵竹皆君子成徳之要道大和其志扵君子之道者也治一邑固不足以著其志然未有不能其小而能其大者大和誠有以愛其民将見其民愛之而不忘視其竹猶召伯所憩之棠也其有已乎哉予不能忘四㑹大和又告予以其民有不忘扵予者故為書此俾記其軒其民秀而文者多讀予記庶㡬又知予情者耶洞慧觀記廬陵城四面山之踴躍而出者如虎豹麟鳳之壮麗雖數百里外皆可見也獨附城隠然如偃月之状者曰月山山之小者最近而其地實勝附山而為之居者洞慧觀也先是元大徳中郡人劉宜中為營此觀既成又盡施其貲且棄家従觀之道士陳秋崖者學道其中以老焉宜中號無隠時又有徐石心者山東人聞無隠名而来為之徒於是洞慧之勝層宫邃宇渠渠然逰覽之士相接跡扵其時及元之亂棟宇像設日就毁剝歴數世㡬七十年至今主其觀者歐陽梅溪也梅溪不溺扵其流讀書賦詩授學徒於月山之中而扵驅馘邪祟之術尤髙一日發其所有資復營建之自殿而廡而門以及三清羣真之像皆完而飾之繚以周垣樹之松栢既又為燕息之所賔客之廬鑿地為池引流而注之藝蘭于室種竹扵堦聚圖書於庭凡可以資其奉養者無一不具焉加以太平之乆松栢之植者日以茂宫室之營者日以備四方之逰者日以廣扵是洞慧之勝視舊為有加永樂十四年冬其里吳道𢎞来京師因胡紹武求予文為之記予固同郡人而未嘗造月山聞道𢎞紹武道其事為躍然想見其處夫道家之説以虛無恬淡為宗以鍊氣化神為本至其為法以呼召風霆驅役鬼魅禱祈寒暑則亦欲以兼濟乎萬物以為之用著其功扵冥冥之中而不欲自逞於時此其教之所以然亦其流習之乆非一朝一夕之故也若其廣大宫宇以自植又繫其徒之材如梅溪者是已梅溪歐陽氏之賢者也雖放迹黄冠而志有足尚歐陽氏之在廬陵者無聞矣而梅溪又失之此而彼得焉吾重為歐陽氏嘆也書以鑱于石俾後之人知洞慧之廢而能興者自梅溪始知其廢而興之之難則知繼而守之者其不可以易也夫坦端堂記故吏部尚書劉公崧以老乞致仕髙皇帝許焉既賜之還又寵之以詔公歸築堂於私第之左名曰坦端之堂盖取詔書坦懐端志之語云於乎髙帝扵公眷顧之厚終始不替至於名成身退而寵眷益隆宸翰寳章之輝煌􅂱然照于蓬蓽君臣相與之際亦何其盛哉始公由儒生見授兵部職方郎中拜北平按察副使改禮部侍郎權知吏部尚書事文章功業並著於時位望隆矣而謙卑如未嘗仕然不矯激以絶物而行益峻不詭随以同衆而衆莫為之異一扵誠而安於命公之所以簡在上心者其以此也自古人臣不受知扵上不足以行其志扵下髙帝於公知之深故一語而盡其平生雖堯舜之知人無以異也此公之所以拳拳不忘既去其位而猶有以名乎其堂焉公歸之明年復以司業徴及公之卒恩章尤篤生榮死哀古今有如公者亦少矣公所居曰珠林距泰和城五里公殁未㡬其居弊不治者乆之一子又早喪其孫曰并長知學能世其家因改築其堂而新之盖距公之沒已三十年矣於是瓊州守王君伯貞為大書其額而并以請記扵濳潜自童子時嘗拜公扵床下公不以其童孺加撫愛焉盖嘗慨念公之不可復作也因為之書俾以記其堂云皆春堂記天地以至和之氣育物於春凡物之勃然以生扵春者皆此氣之充也屈者以伸鬱者以暢挫折而衂伏枯藁而困悴茍遇其時莫不奮然昭蘇盖天地之心造物者之仁固如是也然嘗黙求其故其所醖醸以成此氣之和者亦深矣窮冬寒沍霜雪之至嚴凌厲凜冽摧而迫之以斂其生意者無遺毫髪使其時摧而斂之者有所未盡則發扵春者亦安能溥博𢎞暢如此其至耶君子之道常使造物者之仁存乎其心天地之和萬物之春常與之接盖㡬乎仁道之流行矣然其學未易以至也鎮江有學醫之士曰何彦徴挾其術以涖扵大醫安静不妄其氣甚柔其術視古俞跗不異所謂鑱石橋隠案扤毒熨搦髓揲荒之法遇所當施輒發其技而不少止夫然故噭號而呻吟苦痛而無聊者皆得恬然以安嬉然以樂其生而皡皡然以即夫泰和之域若有契夫造物者摧落發舒之妙也彦徴於是名其堂曰皆春而以求予記於乎彦徴及物之志亦何其𢎞哉病者得愈彦徴為之喜如萬物之暢達而接乎其前所謂皆春者不待言可見其意吾獨惜乎世之不遇彦徴者多也豈獨不遇彦徴彼隠忍姑息不强委一朝之苦而寕抱終身之痛見者為之悲酸盖遇彦徴而不用其術者之尤多也扵是為記其堂而嘆息焉止齋記予舅氏陳仲亨先生居泰和城西栁溪之上因其故廬為室而名之曰止齋盖陳氏之先世常顯矣方其盛時賔客騎従之衆􅂱然常隘其閭及遭離亂無一瓦之覆而先生之兄仲述復以進士遭逢聖主為名御史於時陳氏子弟之進者亦浸浸乎盛矣然先生方慨然歎息以謂盛衰之相尋者倐徃而倐至承乎其先者非不難而立乎其後者不可必也扵是低昂俯仰諧嬉以玩世同乎流俗不絶情以為髙不矜氣以役志而或凌厲振迅赫然以希夫過情之譽翹然以干夫非分之冀者未嘗有也以畏慎約其志以澹泊養其躬以禮義訓其後人且名齋以識其意盖先生之年已老矣今年春其子公餘改官棗陽教諭至京師屬予記其齋某何足以知先生也雖然先生孝友之行本乎其性而敏黙深識窮物理之宻微極思慮之精深人有所不及者其所以退然自托如此者豈無所見而然哉時行時止之説在易之艮可推見其隠而世之自取僨覆之患者常始於不知所止也然則先生豈所謂知進退存亡之道者非耶是不可以不記齋之前後有脩竹佳花之植可玩而䕃而予之居與先生近顧何時従㳺其中以問所止之説耶雲山草堂記贈奉議大夫右春坊右庶子建安楊公士羙今翰林學士勉仁之先君也公賢而有才略嘗被舉至京師上以其子既仕扵朝遂賜之還所居在邑西雲際山之下因名之曰雲山草堂公於此徜徉以終焉其殁又㡬年學士君思草堂之勝而慨其先君之不作也以屬中書舎人王孟端為冩雲山草堂之圖且屬予記之君之言曰始予先君遨逰乎此山之中予時尚少也然而涉澗溪陟岡阜撰杖􅋰琴䇿壺觴之具下上乎雲烟竹樹之際予未嘗不従故舊朋友或與之俱徃亦時時酌酒扵泉石之間醉而後見之扵詠歌者其音鏘然而其樂盖陶然也長松脩篁干霄而蔽日松之聲翏翏然泉之聲淙淙然猿鶴鳴而巖谷皆應先君嘗静坐而聽之有油然自得之意至其暇日呼予昆弟告以詩書禮義之訓勤力忠厚之意其言尤諄復而詳懇然自予之竊科目入翰林遭逢聖主眷遇之隆凡十九年乃得推恩先君贈典之加􅂱然賁于巖谷而先君與先夫人皆不及見矣顧寵榮之已至而中情之益悲乃追維疇昔慨幽谷之遐蹤思見夫艸堂之勝而悽愴怵惕無日不徃来予懐者此圖之所以作也至扵予之悲有非圖之所能盡者子為我記之於乎古之人不忍忘其親而思其居處笑語志意嗜好者無一事而不用其情學士君雲山艸堂之作豈所謂致愛而致慤者乎此其意不在扵山水之間也雖然玩其圖見其山川艸木如升乎其堂聞乎其容聲則思之所由興又未必不在斯圖也因備書其説以記之焉醉吟樓記予同里劉仲良氏築居縣之南十里夏村之溪上有樓數間仲良日觴詠其中而扁之曰醉吟之樓時仲良年㡬六十矣予因念其壮時俊敏穎㧞之氣英英然足以馳騁扵時而今老矣乃頹然自放扵山水之間且以醉吟為足以適其意而大書以掲扵所居之樓上仲良豈固欲酣放以忘扵世耶抑固有同扵樂天之所謂醉吟者乎方樂天退居洛中龍門八節灘之上歌童舞妾賔客宴飲之奉何其樂也而其中情有不然者吟咏之意随遇而見而悲慨憤嘆之發其意拳拳非忘世以逃於物外者之比也仲良喜飲酒以適其意憂悲愉懌之積亦時時見之扵詩然而屏居夏溪之上者則無所用其心於時也撫長松䕃茂樹非其交不與之接非其事不勞扵懐世盖忘仲良仲良亦欲相忘扵一世此其情與樂天者異也雖然夏溪之上土沃而泉甘幽芳佳卉之植被逕而盈疇登其樓以望羣山之外則西陽三顧金華武姥聳立其前後仲良既醉而吟扵此信足以忘懐萬事者乎予自縻祿扵朝以来北京於其意之所適有不能盡知徒慨念其山川為之想像而嘆息焉仲良之子士皆舉進士今為河南按察僉事求予記其所謂醉吟樓者因為之書俾以告仲良尚以其所為醉吟之什示予一覧也清白軒記雲南按察僉事茹良玉取漢太尉楊震所以遺其子孫者名其軒曰清白良玉世本晉陽人自元末客蜀之巴縣乆不能歸遂家焉其地在巴渝之間今重慶府屬邑也重慶昔者為明氏僭竊之都巴蜀之水至扵此而合下為三峽千餘里而後出夷陵其壮且險天下莫之過也予嘗道經其地覽其山川因訪其遺老盖太祖皇帝之定四方也最後乃取蜀方其用兵時一自漢中入取成都一自夷陵攻瞿塘成都既潰瞿塘亦披靡不支遂直搗重慶明氏君臣既繫頸出降而兵馬糧餉府藏之貨財逺近屬邑悉封上于有司其地未盡煩兵戈故其民至今號為富完其學者習扵禮義才充而氣完仕於時徃徃取通顯者此豈獨其山川之髙深致然也亦其安集富完之餘遭逢太平之盛加以詩書之涵養而流風遺俗之未冺者因得薫其化而致顯榮扵時其材之成有自来也哉良玉蔚然有今學者之文詞而介然以古君子清㧞之操自勵觀其所以名軒而想其意氣之偉出豈不賢矣哉而豈獨如是而止也定其志而不遷充其所守而不可奪則見之扵事業者固将􅂱然照耀其山川無窮也則其所謂清白者又何以異乎昔之人所云耶予自去蜀以来京師徃還兩都忽忽㡬二十年志氣之衰耗甚矣然猶常時想望其山川而思見其士之志節盖其去之已乆而與之接者益少聞良玉之介且潔而又居乎風紀之任足以行乎其志可愛也夫其可尚也夫良玉以求予記因為本其山川習俗之故以記其軒貞節堂記貞節堂者泰和劉彦桓與其弟彦湘所以奉其母孺人之堂也劉氏為里鉅族彦湘之尊父曰仲堅好學負材其兄號吟所者尤豪扵詩孺人歸劉氏十年年二十八而喪其所天子二人長者纔三嵗遭家多故播遷傾覆一門壮者無㡬存或勸孺人改適以存二子者孺人輒大慟欲絶持之益堅卒撫其孤至於長大教之以至扵成凡四十有二年而劉氏之嗣賴以不墜者孺人力也夫節義人所難也士大夫非素明義理一旦臨利害之際鮮不失其所守女婦生長閨門乃能蹈之終身不失豈不尤難也哉孺人姓蕭氏元御史方厓君曾孫也君以方壮之年當元盛時自江西儒學提舉僉憲廣東西拜監察御史彈劾奸宄所至為之凛然一時勁氣論者至與丞相文信公並稱百餘年来未有以其言為過者然年三十八卒矣於乎此吾廬陵之所以盛盖自諸賢忠節之著而又有如君者惜史傳失傳不得暴諸後世鄉人父老雖能言之亦十失其八九其子孫又遷徙淪落少有知之者聞孺人之貞節使人慨然念之世家餘韻流波其未泯者尚在扵此哉故香山縣丞彭君叔介嘗為劉氏塾賔為扁其堂曰貞節而瓊州太守王君伯貞為大書二字以掲之彦湘又以求予記閭閻之士欲知方厓君之烈者讀予記則不獨有得扵孺人貞節之一事也溧陽縣學鄉貢題名記進士之科自隋唐距今㡬千年賢豪俊乂之出不可勝計聖明統一萬方詔天下立學既嵗貢其士子之賢者又取之以進士之科此與成周鄉舉里選之法並行不廢也故今之得士也尤盛至于薫陶消化使人人自趨于善禁制防範使不失其性則三代以下未嘗有也由是海隅邉徼萬里之外皆翕然響應而况溧陽之為縣宻邇邦畿其于教化得之最先且深者哉夫古之教自格物致知以至于窮理盡性先後本末之詳未易能也而其所由入莫先于六經孔孟之言今之科舉于六經孔孟文詞章句之間要不可茍而止也然而致察于章句而日造夫義理之精微致篤于文詞而日究夫聖賢之隠奥博求而約取勤行而不怠則自盡心知性以至于命者亦不自知其至也夫于天地古今之秘人情物理千變萬化之由以及夫三代君臣化民成俗之微言深意皆得之于心舉而措之其有不沛然澤被天下者乎其究之不深則其言之也淺其講之不密則其出之也疎則夫學者于此果可易而求之耶由是論之科目之于教化疑若淺事而千餘年間所以得人之盛其亦有以然哉予外弟陳公餘佐教溧陽之三年集士子由科第進者自洪武以来總若干名勒之石而立于學宫非徒以勸来者一時之士所以涵濡聖化而得之最先且深者亦于此而見其㮣也予弟本之嘗教于其學公餘因以求予言故述予所聞者為之記其必有深明六經孔孟之言出其間而任致君澤民之責者夫豈徒文詞章句而已哉偃雪軒記車之兩廂曰軒而凡簷宇之間可慿以望者亦曰軒郭君仲輝則因其舟中可望者名之以軒者也舟頗宏壯其中之室髙及尋横縱加尋之四刳木為承溜其上加梁棁焉而漫以版牖其兩旁以為軒軒之空可以出入其坐也可倚其立也可慿可望以宣其煩燠至扵波濤烟霧之接則浩然如據堂戺而望乎郊野之空曠也仲輝盖愛其疏達而未有以名之予時與同舟自濟隂以趨北京忽大雪平地數尺光景煥發洞澈乎軒之内人之居乎舟中者或若偃卧乎雪中慿軒而望之則樹林髙下扵川原之際鳬鷖鷗鷺出沒乎洲渚之間者皆随遇而輒見舟之行不止而幽奇偉怪之接扵軒者亦屢變而無窮也予心樂之顧仲輝笑曰自南洲所見雪固有如是者乎而况局扵邱園樞户之間一隅之近求其汎覽流觀窮萬里之勝不待褰裳躡􅄚而盡得之於此軒者未有如今之觀也予為子名之曰偃雪軒不亦可乎仲輝聞之欣然大喜取酒相酌曰先生其為我記之予昔嘗仕廣海間苦瘴熱恨無雪以自濯今乃叨蒙國恩忝職侍従得遨逰兩都以觀覽竒勝於河濟之間其為喜幸亦已至矣而仲輝嘗従先君讀書其胸中㧞出流俗又乆處北京可樂可喜之接乎目盖不止此也雖然駭於所未嘗見而厭棄扵玩熟者人情莫不然也以予之所駭而恐仲輝之厭玩也故為之記使仲輝知予之所樂者在此雖乆處未必厭也春熈堂記廬陵張君思恒居之舊為沼自思恒得之乃刳治其汙濘實以土石築為堂寛爽深靚周旋拜起可以容衆而合族其上為樓曲欄回檻倚靡而相通其髙可以抗烟霞而覽山川之壮其下俯以清池池之上為圃曰樂圃廣數畆種竹數千竿被之以芳杜猗蘭浮之以荇藻蓮芡烟收雨止徐步而遐矚則汀沚之外溪澗相綿輕颷方至而逸響曠發盖其状無窮其可愛而樂者亦無盡也思恒自㓜習詩書禮譲不幸早喪其父兄弟四人既喪其伯兄尋又喪其弟存者獨其兄思忠思忠耿介慎厚甚愛其弟而思恒之事兄亦敬恭怡怡然一味之甘惟恐其兄不在焉其厚扵倫誼盖其性然也故堂之西為軒曰二難之軒其兄與弟之歿二孀婦在室一有子一無子然相與居二十餘年卒能自誓以不背所天故其東為堂曰雙節之堂大書特扁光耀相照凡過其里升其堂者皆悚然以作顧視其子弟少長之際皆俞俞然以喜乆而薫然若有得於中爽然若自失扵外及退而逰於其圃則又莫不詡詡然既倦而忘歸既去而不能已扵情也故合而名之曰春熈之堂而張氏鍾慶於此者盛矣嗟乎四方之治乆矣閭巷之民侈扵居室輿馬而鬬狠忿戾無一日之寕者皆是也顧其中能以孝友禮遜敦行扵家使流風被於人人其為禆世匡化何以加之哉予行四方而寡見其人乃扵思恒昆弟而得之語曰家難而天下易如思恒昆弟者非得之扵家矣乎使有以推之而曰難焉者吾不之信也思恒二子鉉鑣一孤姪鍾愛而教之無間焉求予記其堂以示數子者且以勉其将来予既逰其圃樂其山水升堂而信其孝友之可徴故為之記湧翠樓記廬陵城北數里望羣山如圍江流際山而極不見其所徃然其地少平荒壘之雉堞與人家之竹樹鬱然布列其中山之可望者尤未盡見也張君思忠之居城北者因而為樓以據髙邱出氛埃而臨廣野然後天玉瑞華青原諸峯逺在百里之外者皆見焉其巖壑蒼翠髙下横縦如鱗攢而粟聚如滄海之波濤其孤嶂重壁森聳而出者如虎豹之跳躍而出乎叢薄之外風雨晦冥光景倚薄變化倏忽而其状益奇因名其樓曰湧翠之樓至其淺坡平陸衍迤起伏之際仙宮釋宇徃徃據之以隠伏而逺沙極浦之間帆去檣留之可見水之溢出者因而堤之以為渠渠藝以荷而堤皆植以栁風至而荷香烟霽而栁媚盖居其上與常逰其間者皆不知其勝獨扵樓而後得之若其勝在於樓而非其地之有也亦奇矣哉夫天下山川之羙者常多而好之者少也雖好而居之僻有不可得或仕扵四方賈於江湖之逺意有所不暇一見而心已厭至於其適也則樂玩愛賞之不足而憂愁離思系之矣求其常與之處又有暇力為樓以盡其勝朝夕飫見熟玩而未嘗厭者什百中一二耳若張君者是也君所好如此其志趣度越扵人者亦逺矣哉永樂癸巳之秋予獲登樓而縦目焉然方上京師又輒别去所謂意有所未暇者其予也哉詩意樓記永嘉謝廷循其先世嘗以文學顯扵宋元之間至廷循益好學而工於畫永嘉多名山華盖紫福松臺諸峯環城逺近状如北斗故世稱為斗城其尤秀者曰謝山以晉康樂公嘗逰其間而得名者也廷循家城中築樓髙出城外每圖畫之倦則慿髙而望山有足愛者層巖重壑或離立乎逺空或屹然近在几下而雲氣之徃還光景之巻舒蓊然而深隠煇然而明霽使覽之者爽然而自快盖雖能賦之士抱襟發舒然徒得之于其目鬱乎其中者口固不能道也由是好事者為題之曰詩意樓廷循以求予記之夫古人之詩不徒模状物態在寓意深逺非深扵學者未易工非博物多識不能賦也然亦嘗藉山川之清淑以暢達其性靈以予之拙於詩也安得登斯樓假山川之助庶㡬一為某賦之然又以謂環列夫樓之外者予能賦之某固能畫也得之於畫與得之扵詩者其意豈有異哉廷循今居京師予嘗過之索其所畫草蟲花卉羽毛之屬聚置一榻之上觀其紛披鼓舞之勢昂飲俯啄怒鬭鳴呼之状真如讀古詩邠風而箋爾雅則亦何徃而非詩意固不必樓之外也廷循知讀書又多能如此因并述其所能者以記其樓使登髙能賦者或於此兩得之也重修白沙靈祐廟記廬陵上流三十里曰白沙有廟曰靈祐相傳以祀宋髙陽闗都部署康公保裔也按史公初以彰國之節守髙陽契丹入寇范廷召求援扵公公比至而廷召宵遁敵騎圍公數重左右請易甲以逃公曰臨難無茍免此吾效死日也大呼入戰連數十合殺傷甚衆矢既竭猶奮空拳以擊賊遂死之公死二百年宋失其故都而公之神亦徙而南焉公洛陽人死河間乆矣英魂毅魄猶凛然不可汙如此當是時有身為将相富貴尊榮而忍扵背君父以向事讐仇者其有愧於公何如也史稱公謙遜謹厚崇儒好禮則公扵死生去就之義必有見焉豈尋常武力之士而已哉公既著神南土其精爽之在物者益赫然隂威慘烈真能使神奸懾伏而民之奔走奉承者亦罔敢或怠水旱疾疫禱之而輒應於乎公之靈明盛矣夫惟古雄勇忠烈之士秉大節臨大難奮不顧身死而其神上通於天以佐事上帝至扵焄蒿悽愴之際發見昭著有不可遏者盖其生平耿耿自見者不隨物而俱盡與隂陽造化同其樞機屈伸變化不可測度而或感之以至誠亦無不應者盖理之常無足恠也而道家者流謂公為疫部之帥察善惡而司疫焉是不必然也夫為善降之百祥為不善降之百殃者天之道而亦人事之必至者公何預焉彼巧祈曲禱以求免扵罰而徼恵焉者皆惑也公自真宗贈侍中南渡後所在郡縣復有以公封號為請者遂進爵為王公之父諱再遇後周時従宋太祖征澤潞亦力戰死大行山下民為廟祀扵其所白沙之有廟剙自宋紹定辛卯既燬而復興者屢矣近其民又改剙之既成主廟事某求予文記之予恐民怵公之威而不知公之烈也故論述其事俾刻之石使祀公者有以考焉靜軒記泰和沙湖之北曰源塘羣山隠然蒼松古栢極天而無際即其深始得閒曠焉岡阜盤迴溪澗相屬溪横而橋出澗過而泉鳴漁者㳺而耕者樂山人隠士曳裾徒步而徃還者楊君世冲所為静軒在其中也霞烟雲霧之中而見其室宇之𢎞麗老者含頥而歌童子抱書而讀而獸之逰者不駭鳥之啄者不驚魚之沫扵池沼者如躍于江湖之波濤凡接乎目過乎耳無不可愛者則坐扵軒之中而得之於軒之外者皆是也君和易怡然既無忤於物亦無慕扵世無忤也故於人鮮有所怨惡無所慕也故嘗㤗然有以自足休休焉與一世相忘扵無事君惟如此故能静也夫人心之所以妄動者由有物汨之耳見可愛而羡見可憎而憤激乎外盪乎其中使和平之氣索然而日悴於乎豈不可慨也哉君無有扵是故雖老其容甚澤如方壮者然孔子曰仁者静又曰仁者夀荘子曰無為則俞俞俞俞則年夀長矣吾於是知君将龎眉皓首享有多福子弟見之而稱慶閭里聞之而嗟羡夫豈止今日之見而已哉君有子皆賢諸孫亦既知學其季子孟完来北京既求翰林林先生觀書静軒二大字歸以掲其軒以予居同里也又求為記予愛楊君之為軒有以得夫山川之勝而名之又有以息其老也故為之記退菴記退菴者王君子朋所居之菴而人因之以號扵君者也君所居四面皆山蒼翠踴躍如大海之濤其中隆然髙出者梅岡也岡之南兩山横分靡而相屬而飛雲過鳥望之無窮元馬九臯先生為書兩山之間者以此盖梅岡占羣山之盛麗而兩山又據其㑹君之菴獨當其中所以尤勝也君少時負盛氣竒材氣足以挫豪武智足以破奸諛家藏萬金一朝散盡亦不以介意嘗従蕭求已先生學書經慨然以進取為己事遭時之亂羈縻扵世故而今已老矣頹然山澤之間鏟去節目更為坦夷聞人之失則包含盖覆或淺辭以寓意雖其子弟不屑屑也而豈有意扵世事哉名於其菴盖志其老也然予友尹君昌隆嘗稱君雖老而氣不衰及予来梅岡尤時時聞其論議君雖韜晦屏處而其行尤足以化服其鄉人或有所争縣不能直者皆聽君一言而止也君盖斂其果毅以為中和而消化其鋭者使泯然而莫之見則君豈尋常之人所可測哉書以記之庶㡬知其名菴之有以然也澄心堂記錢君好文家於吉文之西漢水之上水下流為濴水曰濴曰漢皆不詳其所以名之之始二水亦非舟棹所通然疏而播之灌其鄉之田㡬萬頃方春雨積衆溪合注浩然有江河之態及雨止而潦收則平沙淺瀨泠泠然有可愛者而或過之以急澗障之以斷麓跳波濺浪漕然相激至其泙湃洶湧呼號噴薄之際如山傾而谷應如風雨之急来而又在夫曠然寛閒之野無城郭車馬之交此山林隠伏之士與夫奔走乎埃塵厭倦扵煩囂者得之以盪滌其心志則雖江漢之雄傑深廣有不願以易也而錢君樂之不獨以此也盖水之流至其居之近淵停流止蓄貯而待用於人者俯而鍳之可見眉髪君謂此有似于吾心之静也因託之以自號曰澄心老人又大書以名其堂曰澄心之堂君年㡬七十矣方将息衆慮以自逸日徜徉乎二水之上而泰然乎萬物之表故有取扵水者如此於乎世之多欲者常有以累其心惑之甚者有身外無窮之冀使其過漢水之上登君之堂得不恍然覺其形之穢哉君之學志于道徳而諸子皆以明經為務有以科第進而仕于朝者矣子愛君居乎二水之隅而得其利以養取其清以名其堂予為之記又道夫水之竒變者抑亦有以盡夫水之情状不獨于君之所樂者而止也琴益軒記弁冕緌纓皆所以飾躬也而玉要焉笙磬管籥皆所以為音也而琴瑟要焉故古之君子習其步趨于玉而養其徳于琴瑟徳之于琴瑟譬身之于玉也故君子無故玉不去身而琴瑟不離其側焉然步趨淺事也而佩玉之際必宮羽角徴之諧肆夏采齊之似則所以作其一身之儀者何可有毫髮躁忽之舉哉琴瑟之所養必致其和平攻伐其邪心消化其粗鄙頑傲之習盖有操其器而其中肅然聽其音而其思油然者矣玉以禁其外琴瑟以養其中二者交相為用何古人善養其躬也哉吉文錢君好善自少篤志于學思有以窮夫古今萬化之本于六藝禮樂嘗兼通其文老而無意于世獨好夫琴因以琴益名其所居之軒錢君之言曰操琴如執玉予愛其言之有合于予也然世之知琴者寡矣烏能知君獨惜君知夫琴之深而善言其意也然君又喜賦詩長篇短章託辭比類善曲盡其情則君于所養之和平者不獨于琴焉發之也茍知其詩庶乎知其琴也哉君之學見于此若夫君之才不止此也惜乎其老矣書以記其軒善安堂記劉君文復西昌善人也雖頺然自放而中情坦夷舉一世之是非不交其慮而憂虞得失不入其心故能泰然相忘于恬逸之鄉而傲然自樂以終其身其以善安名其堂者所以識其平生也然文復自壮嵗負氣英偉去逰江湖間覽觀山川之勝結交知己以自快于一時今老矣無所為于世矣猶以其身之安于田里者由于為善也拳拳不忘以名其堂則其胸中所見豈常人可及哉夫人之為善如農之種穀種之而俟其成必食其利為善之乆亦必食其報此常理也文復自壯至老一意于為善今有子長大知為學有孫亦岐嶷可愛則食其報者豈徒在其身将在其子孫也彼世之機慮萬端而終嵗無一日之寕徒于文復而咨嗟嘆息盖所謂未種而望秋不耘而求獲者可笑也已文復居城中其為堂頗深迥其前為小樓俯視城外江濤浩𣺌龍洲隠然雲帆鷗鷺飛揚出沒而岡阜林木挺然而葱翠者皆可望而見之其居之勝有在于堂之外者又如此文復與予交其子舉善以善書選入禁林以其父之命求予文記之予愛其名堂之意有足以警世也故為之記守拙軒記吉文錢君習静即所居之東闢一軒曰守拙君之言曰古之君子學窮乎萬化而不知其深處貧窶之極而不知其困居富貴尊榮而以為當然以予之鄙願學之而未能也盖其材猷志慮既不逮于古人而推移合變求其似今之人者又相去之逺也其謀之淺計之迂徒取誚而召譏而猶不知改慮以諧世易意以同俗此如蝜􅀈之升壑商詎之慿河多見其不知量也則予之拙也亦甚矣方其壮年盛氣足以奮乎青雲之上猶不能以有為而今将老矣泊乎其無所營蕩乎其不知所止放言以髙世危行以激俗固非予之所敢若夫守先人之業棲身巖壑囂然以自足饑寒之及身而不憂乎其中則以予之拙盖有之矣誦聖賢之言求其要而未之得也則求夫拙者之友與逰焉朝夕講之有㑹于其心則欣然以喜既以詔其子弟又以淑諸鄉人盖不知其不可也引壺觴以獨進升髙邱而望逺及其適也稱物託類模擬化工陶寫萬状雖不甚工亦拙者之情有不能黙爾彼機巧圓轉側媚阿合以飾行釣譽于人者予則恥之矣故以之名于軒其軒之陋而予居之稱也嗟夫君之言如此君豈尋常之士哉夫士之潔身獨立秉志不變者居常與世而相違世亦忽焉易之而不察也然不知夫絶俗之士亦嘗負髙世之志顧彼之不合者何傷也而世欲求夫傑然偉節之士則何自而能得之哉吾故于君而異之因次其言俾掲之軒中以俟夫知君者察焉容膝軒記錢君習容居吉文漢水之間山髙而水深而為居殊隘為一軒又益隘名曰容膝客過焉曰何隘也夫以君之濶度若可容萬間者而故為是卑卑何也或者曰非也小大之觀無窮凡物皆然而豈獨君之軒哉故以大澤而視礨孔礨孔小矣以泰山而望拳石拳石卑矣然自天地之大而視夫大澤大澤一礨孔也自九州之曠而望夫泰山泰山一拳石也而况夫四海之外八極之表又有大于天地與九州者又烏可為之限量哉彼鵬之飛而摶夫南溟也所據者大也然烏知鵬之不自小夫南溟耶彼羣蟻之鬭而争夫蝸角之杪也所據者小也然烏知蟻之争不尚侈夫蝸角之杪耶君之軒如此其卑也而安知君不以其宏深髙廣惜其餘地之尚無用耶且君之軒甚隘矣然而嚢一琴置書百巻簞食壺飲忻然樂矣使君而日食方丈羅百甕而列九鼎導棨㦸以前呵則将營髙門以容駟馬之不暇而安能自適于今之軒哉君無有于是雖卑其軒無傷也君聞之笑曰吾瞑目而匡坐不知為六合之内軒于吾何有也客恍然不能測其意以問予予亦莫能知也然予知君為人孝友寡于欲而勤于學以其學教其子弟而鄉之人亦皆化其善也故過其鄉者以謂君雖貧中之所蓄者富矣因書其言以記其軒俾陋君之軒者觀焉積善堂記里人李仲貴恭謹恂恂然與人交尤極和易機謀深計之不作巧言謭行之不形稱之者曰此一鄉善人也而仲貴亦自以積善名其堂或以問之曰善之積何如也仲貴曰吾不為惡而已善之積吾不自知也然而窮其欲而求不已侈于利而貪無厭吾嘗深懼之而恐其溺焉而不知覺也此所以名其堂也夫人之居閭閻非有一命之寄恵愛徳澤之不究于下顛沛困悴之不蒙其力于善之積何自而見之而稱于人者亦何自而稱也盖昔人有謂隂隲猶耳鳴者正以夫人不能知已自知之耳仲貴所云非惟不見知于人求諸巳亦不自知則其所積之善不既深矣乎今之人有一行之可稱的然而暴之惟恐其不揚也縦所為之善亦淺矣况未必善乎此吾于仲貴之名堂而有取焉仲貴喜與士大夫逰見人之不善必懇懇告之俾為善乃止盖又不獨善其身而已傳曰為善降之百祥又曰天道嘗與善人仲貴行而不懈積而不止雖人之不知獨不見知于天乎不在其身在其子孫此天之道所以福善也書以記其堂俾以告夫來者泊菴集巻三
