body:
  text: 泊菴集巻五眀梁潛撰序楊氏家乘序楊氏家乘者今翰林學士楊君士竒之所錄也自其所修家譜以及其曽大父翰林待制而下累世之遺文與凡當時名公大賢之所撰次史氏所書碑刻所紀通家文獻之所可徴以至於詠歌往復簡牘之間有不可棄與不忍棄者皆録之於此以遺其後人又以其皆有關於楊氏世徳也以屬予序之總之凡二十巻惟楊氏之先世有盛徳魁傑之人其文章政績蔚然有聲於時及其後也遭世之亂倉皇山澤之間悲歌而流涕者其言亦足以自著其志蓋太平之際賢者皆乘時而用及其亂也皆沮塞而困窮此勢之所必至無足恠者大眀之盛楊氏之後人又以其學興至今學士君遭䝉主知遂掌綸命兼侍青宫其清操雄文足以追繼先烈恩典所加賁於前人蓋自待制至今百數十年埀休繼美者何其盛也惜其累世之作多放失於喪亂存者殆千百中之一二也然學士君固拳拳於是何也夫古之人不忘其先於器物裳衣之㣲猶相與謹藏之奠於薦獻之間以遺其子孫而作其孝思况其世系文章所在後之人得而觀之將為之低徊感激思以自奮至於哀痛而悲慕者亦或有之矣蓋所謂不可棄與不忍棄者皆在此也其又可忽乎予嘗為君序其所修譜矣君又以此屬予蓋以予有世好於楊氏而知之深也遂不辭而謹書之西清餘玩序翰林侍講曽君子啓嘗暇日取所蓄圖畫山水竹石草木鳥獸之形狀装潢成帙以與予觀焉且屬為之序君與予俱以從臣侍中秘嘗預討論於制作典章之事或少暇則又汨於世俗所謂應用之文詞予年之邁而志亦憊矣獨君鋭然不怠故能以其餘力及此雖然豈徒然也其好之已篤則往往得其精者毎一觀之如行山谿而聴水石之潺湲陟曠野以望煙霞之浩𣺌如聞猿鶴之鳴唳觀魚鳥之浮沉如箋爾雅而讀豳風所以宣其底滯忘其怠倦者蓋不自知其好之至也昔東坡所謂畫􅁐與畫笥者誠無以異此因題之曰西清餘玩且時往與觀之不已嗟夫古之君子於視聴之際皆有以養之故為之佩玉和鑾鐘鼓琴瑟之音所以養其耳者無不具也為之藻繪絳綉黼黻文章之制所以養其目者無不有也今之君子於耳目之養未必能具則隨所玩以足其所好而尤可喜者雖其好之深而不足以亂吾之聪眀如侍講君者是獨惜乎予之好而力有所不逮因為之書焉送郭推官序推官决一郡之訟獄者也於一郡之事無不理不獨訟獄者太守也推官之任専太守之責備然而郡之事有不理推官固無預其責而訟獄有一之不治太守且不能無責也故凡郡之治有賢守矣而不得推官之賢者以専理其獄未見其治也瓊州之為守在南海之中環其疆為徼巡之所者蓋三千里戍守之兵與南畆之民其居相錯加以山谷之深阻蠻獠之盤據其嚚訟鬬争之習尤號難治近年以來治而民安之者蓋太守則王公伯貞其推官之賢則郭公彦僉也王公宏大而眀恕彦僉通敏而周密皆吾泰和人彦僉之先君又嘗與王公同被命出為試僉事故公視彦僉猶子弟而彦僉之視公如父與兄又幸皆不及遷調因得相與處者凡十五六年以此瓊之險雖在海外萬里而其善治之聲日聞於京師自公以憂去而彦僉亦以他事詿誤來北京既得釋而還公之子直為翰林修撰相與求為詩送之且以屬予序予於彦僉素有交好不可以辭也雖然彦僉今之去也其為守者得復如公之賢與否不可知也昔蘇頌之為推官歐陽公為之守郡之事一以委之此雖頌之賢亦二人者相得之深也陳希㸃為推官為之守者丘公崇希㸃日與之争辯久而後得此固丘公之過亦二人者相知之淺也彦僉始與公同志以相濟可謂相得之深也今之所遇或相知之尚淺則亦豈能不事争辨以求必行其志耶尚庻幾盡其心而不可以茍止也送尹同知之任詩序永樂十三年上巡狩北京之又眀年也於時四方熈然臻於至治上於萬幾之暇遂留情六經探堯舜周孔之緒以為禮樂政教必本於性命道徳之㣲遂命開館簡儒臣擇四方之士搜濓洛諸書參以近代名儒之説窮極其㫖趣使煥然大備眀年書成賜名曰性理大全書命以鋟板而凡預在纂集者皆加賞賚焉太學生以善書選者十七人皆賜之官於乎盛矣哉自道時在十七人中得官雲南澂江府同知故舊在京師者為賦詩餞其行監察御史歐陽和其内弟也因以求余文序之自道予同里也少時嘗從予受書自予去家竊禄於時者二十年而自道亦自邑庠生貢於太學不踰年遂遭遇恩典出貳大府於萬數千里外其意氣可謂偉然矣自道尚推其所學者施之於治敷道朝廷恵愛遐逺之意此予有望於自道者而亦豈非自道所以報稱聖上恩遇之厚耶之雲南有兩道一自大江沂夷陵道三峽度瀘水而南一自江西上庾嶺道東廣入蒼梧以西今自道二親皆老無恙其尊父子厚先生為上海教諭嘗預修書翰林以年而致仕於家年今八十餘矣自道倘假道江西過故鄉拜其二親致酒髙堂使閭里故人舉觴引滿以為二親壽且以為之榮其樂可勝道耶因自道之行為之躍然以喜而又嘅予不得如自道者有可感矣新喻蕭氏族譜後序右北京行部主事蕭君仁實家譜一巻始自唐宰相瑀十世孫扆徙長沙仕馬氏為神䇿將軍號八大保者其子處鈞始居新喻厯宋元至今傳十七世凡五百餘年見於譜者若刑部尚書貫太子太師正肅公燧大山小山二先生其功徳文章皆灼然表著當世厯世愈久族日益繁然按圖而考其親疎分合雖殊而異世皆可見也此閭閻小民之所不能有而故家大族尚頼此以知其先世如蕭氏者亦盛矣哉古者諸侯自􅆘子而次有大宗以重其本小宗以聨其支而四時之祭於廟也則子姓昆弟無不在焉所以統宗而合族者周且詳如此故其民親親而重本趨於厚而不薄者有以然也自宗法廢而祭法不眀民始離析渙散而無所統疎其親而忘其本故士大夫於其時也不可以無譜牒以謂統宗而合族者庻幾其近於古而重本親親之道誠在於此也於乎古之法不行於世乆矣蕭氏在新喻者最顯且盛而譜又詳統其宗而合其族者良有以也書以序其後茍有志於古而無忘其先者可考也送哈千户序皇帝巡狩北京之眀年以北境聚衆騷擾不靖之故親率六師往正其罪於時平凉鎮撫哈文濟以陜之精兵三百人蒞中軍從渡清水原搗臚朐河遂長驅以出邊境追敗烏格布尼雅實哩之衆還兵以蹵阿嚕台於静逺鎮兵方合上自臨髙以望之精兵四集陣列無際而躍馬奮先大呼以入敵陣者文濟之一兵也文濟馳射殺數人生擒一人衆軍益奮敵以大敗推原其功率先陷陣盖自陜兵始故上之還也論功行賞奬激勞徠於陜兵尤厚而文濟遂以功授武畧將軍副千戸凡陜兵還自塞上者皆煒然有氣色至有欲求識丈濟状貌者文濟長不過五尺貌不踰中人及挽强弓馳馬射數百歩外百發而百中人皆以為神至於恵撫麾下與之絶甘分少雖古名將不過也其在平凉邊徼銖兩之姦皆知數百里間商旅行宿道不拾遺然低回偏校者幾二十年矣蓋當其時四夷方寧謐無事故文濟抱竒才亦無自而見及遭逢拔擢發於久鬱之餘名聲遂大著何其幸哉欽惟皇上擁百萬之師渉沙漠萬里之外雄謀勝筭發自聖衷而指揮號令制勝於俄頃之間及功成事定則又推之將士而不遺遐逺如此此奔走之臣所以欣躍賈勇各求効其力能如文濟者尚多也文濟之還平凉也其友俞君行之誦其事求予一言以壯之故為之書廬陵曲山蕭氏族譜序蕭氏居廬陵曲山者其先徙自長沙至今翰林修撰時中凡十有三世幾五百年於此矣闔其族之衆至數千指紀於其譜者有乾派坤派分而自為居盖五十餘室亦何其盛也其修仁植徳或分財以賑貧者或以詩書自力以科第進身仕於時者又卓然有善政可紀及時中遂以進士第一入翰林為侍從之臣又何其顯者之多也大抵世族之久則其生必繁繁則分而凡材且賢者亦嘗出乎其中此勢之所必至也惟古之人於其生之衆也常有以統之而於其分也又常有以合之故有宗法焉有祭法焉居而統其衆於宗祭而合其族於廟由是其族雖衆而其序不紊其勢雖分而能相與恭敬悲慕於夫灌獻祝嘏奠薦之際蓋常有以啓其敦宗重本之心未嘗有已也自夫宗法之廢而祭法不眀豈惟淺陋茍簡而失其禮之甚生者之衆至無所統分者之勢至不可以合於是欺詐暴慢之習日益長茂而仁慈忠孝之心日益寡少其俗之偷教之悖實由此矣其可悲也已夫如是宜乎士君子於其譜之修有不可緩者蓋庻幾乎統之合之之道少有契焉耳蕭氏之族衆矣而備見於譜者如在闔門之内其散而分者勢不可遏矣而知其為一人之身者按圖而即見盖嘗修是譜者時中之六世曰麟其重修之者又其先君樂存先生也時中被召來北京攜之來以求予序蓋知其所系之重而不可緩者如此也因為之書贈醫士李士文序凡人之病在五臓六腑百骸九竅之間者宜若近而易知也而其宣化順逆升降之理必通乎天地隂陽五行六氣之微其為深且奥何其難哉世之為醫者徒持繆悠荒唐之見以揣摩測度於茫然㝠昧之中至於病者之困且殆則因委之而去若無預於已者固不自任其咎而病者終亦莫之悟也其可嘆也夫今年夏中書舍人龎振舒病傷寒之疾其時比舎病者數人大畧皆同醫者不得其要領至有不治而死者振舒病方亟一時視之者或云其疾不可治或云當以大寒之劑奪之獨士文曰病未深而投以重劑不可也啖之緩劑乆而其疾愈衆醫相顧皆以為不可及嗟夫醫之效不大顯於世者由其不眀乎理不能深於其道故也昔者扁鵲視齊桓之疾知其在腠理在血脈在腸胃骨髓皆灼然有見毫髪不少差故扁鵲之術如神眀後世莫能及今之醫者固不可望其有扁鵲之竒也然不知疾之所在而藥之猶欲用兵而不知寇盜之所在也今之醫大率類此然則凡疾而至於殆者其又可憫也夫振舒徳士文而無以報焉因以求予言遂為之書送熊自誠南歸序北京據幽薊之㑹偉大壮麗之觀古所謂形勝之都也士生於南服者常以不得往遊其中為恨大理評事熊仲彛以扈從居於是其尊府自誠君來視之君時年五十餘矣鬚髮浩然而能輕萬里之逺自其家吉水汎大江渉淮道徐踰吕梁之險以至於此既至不以其冐渉險逺者為難且以其逺逰快覧為足喜其志可謂壯矣哉予於君同郡而予之去家者三年矣故聞君之來而喜君為人藹然温厚旣老嗜欲不足動其中而獨喜奕雖風雪苦寒之夕猶不廢予不善奕心竊喜之毎與君奕輙敗北亦未嘗厭也時侍講鄒君仲熈曽君子棨亦喜奕鄒君稍劣於予獨子棨精出過人累與予奕輙累勝自君之來子棨數與君對君稍難之而其勝與負常均君又嘗佐予以一勝子棨因大笑以為樂夫古人適情於物於夫六藝之外又有所謂投壺之戲而傳之於禮文以為平居閒暇之雅戲也奕之為戲亦平居所以役其心智者也孔子曰不有博奕者乎然或者其心之不專審之不固則皆不能精如予之與鄒君者是也雖然予之與熊君好也豈直以此而已哉顧惟逺去其鄉而忽然得以歡娛而嬉戲以遂忘其旅寓之思如在乎里閭鄉黨之近其為樂可勝道耶夫樂之既深則於其去有别離不忍之態亦人之常情也於是子棨相率賦詩送之予因道其平居相與之樂以為序若夫君之享有禄養於旣髦之年以得周覧夫兩都之勝其所得亦豈在此而已乎送熊訓導之任景陵序豐城熊子維先生佐教於都昌者十餘年以考績至京師吏部援例改佐教景陵縣學於時子維年已五十餘消去其鋒鍔以就於平實温然和易而坦然相忘於人情世故之中蓋其學老而自熟其氣久而益平固非世之少年鋭志凌厲驕蹇者可得而比也其始至此嘗以其先君所書鄉先生教學程法屬予題識之其法大抵皆本紫陽先生平時示魏元履諸公及示其子遣從學於東萊先生者子維非徒以為前人手澤存焉耳蓋嘗宻用其心勤勤遵服以承其先訓而誨於其徒者皆在此也予既書其後而還之㝷又得子維所作古文數十篇讀之而尤喜焉蓋用意深而詞不浮燭理眀而議不詭考據之詳而其出無窮皆未易以得也豈非其所學者有法以為循守之階而所造者未嘗怠耶不然何以能若是也顧今之為學者不知有此及其推而教之亦未嘗知本於此也其可惜也夫昔胡安定教湖學當時東南之士莫不徃從之至取其法以行之太學蓋以其教有古聖賢遺意也吾知子維之教異時豈獨景陵之士䝉其惠而已哉必有取其法上而行之者亦不可知也子維將行求予言因為之書送韓伯承還姑蘇序太醫院判韓君公達扈從北京之又眀年其從子伯承來省之踰年而歸其友李士文相與求為詩以餞其去而以属予序予與士文交聞伯承之為人故有以知其賢蓋人不能自賢必賢者輔之而後成院判君以謹信篤厚之器受知聖上恩遇益隆而其心益下則固非尋常溺於勢利者可比也士文負其才能偉然出乎等夷雖其寓迹於醫而善聲日聞於公卿大夫之間者不獨以其醫而然則夫伯承之賢可卜而知矣伯承在京師足迹未嘗出外戸不妄交一人其自待者重矣而又内有父兄之賢外有交友之良夾而輔之以致其直撓而振之以回其枉琢磨淬厲以達其成振迅激揚以迎其意如此伯承雖欲不為賢可得乎予又聞伯承故宋魏國忠獻公之後也公之事業在當時未之或先其距伯承纔幾世流風餘烈之未泯可想而見之世所稱燕之函粤之鎛妢胡之勁笴專精極美他莫之奪者由所産之異故也然則伯承之出韓氏其何以異此顯庸於將來見慕於人人吾又有望於伯承也尚其勉之溧陽史氏族譜序溧陽史氏本漢溧陽侯崇之後侯以宣帝外戚之裔佐光武中興封於溧陽能以恩惠及其民終漢之世襲侯爵者八人吳晉之際侯者又數人傳十有八世為常州刺史仲謨仲謨之後益顯如宏文館學士𤣥道檢校刑部尚書兼御史大夫寔寔三世為蔡州刺史萬壽族之繁至於分於四方者凡十有五若宋丞相浩丞相彌逺丞相嵩之見於眀州之派者此皆不載也所紀獨溧陽之族然見譜者亦已數百人仕於時者不可勝計又何其盛也溧陽始封之廟四方之史氏皆宗之謂之祖侯廟雖其邑人至今尤奉祠之飲食必祭水旱疾疫必禱禱之輒應侯之生也其功在漢室其仁愛足以庇其封邑及其旣没其利澤又足以惠其民而不茍食其土如此蓋自侯至今四十有五世矣曰常者侯四十四世孫也以詩經登永樂乙未進士第授行人居北京因以其譜求予序之於乎自兩漢之興將相大臣以軍功侯者不知其幾人也或自其身而止或二三世而亡求其終漢世而不失侯者少矣況千數百年之久子孫貴顯綿而不絶如侯之後者蓋未嘗有也此無他譬之江河之流亘萬古而不竭者其源深也澗谿之水倐而盈忽而涸者其源淺也史氏豈非世世有顯徳之人以濬其源者乎祭於廟以合其族書於譜以聨其宗吾知為史氏之後者其孝弟之心無有窮已也橙溪處士挽詩序於乎士不逢時負其材困悴於山林卒以無聞於後世有可悲者吾見多矣彼立言之士或憫其不幸而見之於文字之際以冩其悲慨悼惜之意而伸其抑鬱不能自見之懐庶幾其言之傳而其人之志亦將托之以著也然而二者之相遭亦難也其言之傳或不遇其人遇其人或其言傳否不可必其可嘆也夫橙溪處士之没蓋有得於立言之士庶幾其不朽也夫處士諱及字漢廣姓劉氏為人襟抱疏豁壯而有材畧當元之亂嘗引大義折羣盜迫脇之勢卒以不失其身而保其家族又嘗言其鄉水利之便有司上其言築堰以蓄水民至今以為便而又通於詩書與士大夫交游賦詩有曰行樂集者其言尤有意惟不及用於時君子莫不惜之然自其没而葬也今國子祭酒胡公銘其基而翰林學士金公又為文表其墓矣及相與為哀挽之詞以著其志而悲悼其不幸者又皆一時青雲之士處士所附托者如此其有泯没而無聞者乎處士之子全節舉進士來北京因以其所集哀挽之詞求予序之予言之陋所謂不能必其傳者而全節予考試所取進士也不可以辭因為之序處士先世多有顯者居豊城之艾岡岡之有溪其上所植多橙故號曰橙溪處士云贈趙主事考滿序三載考績三考而後黜陟此唐虞之制而行之至今有不可以易者何也凡百司庶務必得人焉而後理而人之賢不肖未易以知之也亷退之行或取憎於流俗而諂䛕容悦之流或羣情之相附獨立之操或見拂於常人而降意忝顔之徒或上下之未察此古之聖人所以常嘆夫知人之難而於夫官人黜陟之際必待之以嵗月之久考覈之詳庶幾公論既定賢否自見而一時好惡之私有不足掩其是非之正者以此也於乎其為法可謂至矣而或者於人之才不肖猶不足以盡知豈非難哉北京部工曹主事趙汝梁居其官三載得考優等於是其同官郎中劉子玉貟外郎刁翀霄喜汝梁之能其官也為求予文紀述之且以為汝梁賀汝梁之所以得此於其同列者何耶往年汝梁嘗以進士預修書秘閣其為人温然静慎其氣和以平其材敏以達而又持之以亷㓗恭遜之道故今汝梁不徒以能其職聞天官考覈之際雖其同列亦愛而譽之如此也然則汝梁其可謂賢矣乎凡今京官百職之考績皆自其所司之長官覈其課最而後移之吏部吏部覈其課最而後移之臺憲臺憲論定復移吏部紀其績以俟凡三考皆如此而後黜陟焉甚矣其詳且宻也故凡考而稱焉者常以為難汝梁起自科第於此一考而稱誠有可賀者然予以為汝梁不止此也雖其同列顧望於汝梁之情亦豈遽止此哉行地千里者常半百里為山九仞者常虧一簣蓋以末終之難尤當勉也然則吾之於汝梁固宜待之於將來而同列之屢致其賀者其有已乎哉汝梁南豊人予鄰郡也因為之書送汪伯彰詩序北京部刑曹郎中汪敬夫之仲兄曰伯彰以其母夫人之命來視其弟敬夫於官所數月而歸能賦之士皆餞之以詩敬夫以求予序焉予與敬夫舊不可得而辭也始敬夫以行人預修書秘閣其二兄更迭來視之無虚嵗是時敬夫居南京其家在衢州金溪之上徃來未甚逺及既改官於此其家已逺矣而來視之者如在南京時道路間關之情惻然動乎顔色盖其昆弟三人敬夫最㓜而最鍾愛於其母其母亦既老年八十矣敬夫日夜念之不置其母亦日夜思見其㓜子情眷眷有不能已者故伯彰戒行李不逺萬里而行者兾有以慰其母之心也及既見其弟將歸以白其母則又依依然若不忍舎其弟而去者隠然昆弟子母綢繆恩故之情可想見也豈孝弟之情發乎至性有不能自已者如此乎吾往年見敬夫於館中討論於文字之際其用心極勤與人交循循然旣又見其二兄距今五六年又得見伯彰於此温恭和易之氣猶始見敬夫也何汪氏之多賢如此耶詩曰惟其有之是以似之宜乎知伯彰者有以播之於歌咏也伯彰還將必有過其廬而相勞苦者使出其所得賦詠與之諷而誦之孝友之心固必油然而作也廖氏族譜序廖之先始自金陵遷㤗和至今海康教諭潜仲凡十有五世為之譜者潜仲之大父愚寄先生自强父也其後復系一圖特詳於本宗則先生之曽大父梅澗所作梅澗云倣樓叅政譜圖而為之而樓氏之所為圖蓋未嘗見也愚寄父又因梅澗之舊而重續之於是二圖之詳略可參見焉自梅澗而下十二世曰寔翁本翁寔翁即愚寄之尊父也愚寄自國初為吾邑庠教諭而本翁子伯先洪武初仕為翰林編修子季習今亦為松溪教諭潜仲之子謨今又以進士選為翰林庶吉士廖氏之先世盛矣然自喪亂來世益㣲存者惟二翁之後然皆能以文學紹其家仕於時又皆為學者之師嗚呼其世澤之未艾者尚有在於此者乎梅澗娶梁氏蓋吾六世祖鳯翔公之女弟也因以吾家譜合而叅之公自兵部郎中知制誥出知鳯翔而此云權府豈其時固權知鳯翔耶又云公之諱曰蕃而考吾譜所紀曰君崇其曰蕃者蓋公之科名而吾譜所書公之字也廖氏家與予故相近然梁氏之先居縣之光化亭此云東門疑非光化之舊矣亭入元改為龍洲書院元亡書院之廢已久今其地漫不可識間有知其為龍洲書院者亦不復知為梁氏故居矣可深嘆也哉先世所藏文字零落殆盡無復可考質而故老又無在者因叅之此譜其時世皆合而尚有不同者如此蓋鳯翔公與梅澗為同時又其時方講好於婚姻其所紀者當必不妄也自梅澗之殁距今幾二百年兩家居室園池為他人之室者不知其幾易矣獨賴此譜之存而尤可喜者幸斯文之未墜而世好有可推子孫得共寳之因有以知夫先世之為盛也潜仲自海康考滿來北京以求予題遂為之書送杜千户還陽江序交趾去中國萬數千里然自唐末五代儼然以王者之尊自統一方中國特羈縻之而已視其相殺奪戕賊若固然者未嘗深較其亦僥倖不遇夫神武之君有以不信夫中國之命故得逞其僣踰强暴之習而莫之或異也然則黎氏之弑其主而奪之國蔑若無所惮者其積漸之勢有自來也哉於惟我皇上以文武聪睿之聖雄斷自天王師所至其郡邑皆平遂縶黎氏父子以獻之闕下餘孽之僨而復起者亦旋致誅夷蓋不惟海嶠淪汙之民得復覩乎惟新之化而中國威命頺靡於數百年者亦以復振於今之時嗚呼何其盛哉古未嘗有也而於夫飲至䇿勲之際一時將校䝉被顯賞者又何其幸耶是時廣東陽江千尸所鎮撫杜某以功陞副千户其後來朝於京師將還同知紹興府徐季陽江人也遇之於京師因求予言送之嗟夫天下之無事也久矣連城列障熊虎之士相望然而驕惰而酣嬉日滋甚焉夫豈知平僣逆取功名於遐荒萬里之外耶某之還也守海上百里之城於晏然久安之境閒暇之日因相與論其馳堅赴敵仰憑神筭深探窮擣之鋭其亦足壯矣哉此大丈夫報國可喜之事聽者將為之踴躍思奮也曽氏奥臺遺編序奥臺在廬陵之北八十里上杭訓導曽宜勉之居所在也自其八世祖栖閒居士始徙距今凡三百餘年矣然以詩書仕於時者不絶曰奥臺遺編者宜勉集其先世所作之詩在焉作者凡四人曰愚谷宜勉之曽伯祖也在元為吉州路教官所與友者若劉須溪太傅劉岳申提舉龍麟洲仁夫皆往還見於其詩也曰殷巖者愚谷之弟也殷􅑐之從子曰慥菴皆為萍鄉州教官曰西塞翁者慥菴之弟而今宜勉之先大父也翁為元大冶縣學教諭善醫藥遊威順王之門置田宅得吕文徳之遺莊既而沒於大冶其言皆温雅深厚無雕刻靡麗之態皆可以為學者之師讀其詩想見其時交遊之盛而凡更唱迭和於篇什之際者又莫不謹而不放有以得其情之自然嗚呼求於今之作者蓋有所不暇矣其亦深慮夫後之作者之過而不欲自為以啓其端耶何其言之約而近於質也然予又聞宜勉之尊府君年今八十餘矣喜賦詩不隨時而靡豈其得之於家者有所自而不少變其初耶此其執心用意皆未易可及也宜勉拳拳於先世遺墨掇拾於殘缺之餘且以求予序其承家繼述之道如此又可謂賢矣泥田周氏族譜序周氏居吉水泥田者本吳將周瑜之後瑜次子都鄉侯𦙍謫廬陵因家焉𦙍之後有遷袁州者十三世為隋㑹稽刺史汾自袁復遷廬陵之烏東又六世曰沂濵始自烏東徙泥田此譜之作詳於沂濵以下者以其居泥田之始也由沂濵距今四百餘年凡二十有四世其族益繁其分而自為沠者十有八若盧兠網村官洲若長沙安福永新雖既分或猶詳其系世或止著其始分之由是皆因其可知者其不可知者詳於所分之沠使可叅而見也然泥田之族尤盛聨比以居者常千餘人以詩書科第顯者至不可勝數益國文忠公必大居嘗與通譜者也十餘年來若台州同知仲方黄州教諭公眀雲南按察僉事彦珍國子學正岐鳯偕予來京師而後識之其或仕於逺或未仕而晦迹於家非予所知者尤多於乎何其盛也豈非世有植徳行仁之士以培其本耶岐鳯今為長洲縣學教諭其子叙中鄉舉未即就貢禮部岐鳯因命之修其舊譜既成求予序之夫古之人於世系也重矣春官小史掌讀禮瞽矇掌誦詩而皆兼掌世系之奠蓋欲其和同於孝弟相安於輯睦故本之以禮樂以為風俗教化乆安長治之計其後漢太史公采世本而作史記眀周譜以著世家則小史之所掌至是時尚有存者自大史氏失其職小史之官廢存者獨氏族志於公卿大夫之緒猶可考也今又并亡之則夫士大夫所存之譜幸而未冺如周氏之在泥田者宜乎其寳藏之而不敢失墜也而岐鳯拳拳以命其子之意蓋又有在焉和同於孝弟而相安於輯睦為周氏之後者尚其知之哉送呉員外知均州序均州跨荆襄之㑹其山之勝者唯武當為然所謂逍遥翠華三公五老諸峯與夫龍湫虎巖清洋之澗白雲之洞皆刻削秀麗俊拔而深隠人迹無因而至者真神眀之府也至於楩楠豫章之材蒼松翠栢之植森蔚隂翳望之而無際即之而不知其所窮雖天台武夷泰華衡廬古今所謂最勝者未有過於此予嘗考之圖誌及道家之書云自昔北極虚皇以王子之貴修積至行居此山之中因超然遐舉於𡨕㝠之表顧其立訓埀範於當時者猶足以隂翊治道而黙庇斯民於無窮也今其故宫遺址所在靈飈飛電常赫然而莫之可干於乎靈矣哉豈非其所謂修者皆至誠之道則其與天地相為久逺者自有不可已耶皇上子養兆民與天同體與神同功將為民祈福於天遂大修武當之宫命下之日民争趨之由是璚宫桂館層臺傑閣倐然而皆備既又命民往居其傍者凡五百餘家眀年又以刑部貟外郎吳㓜文氏知均州以專撫其民之始遷者㓜文為人㳟謹有慕於𤣥黙之化擇而任之意蓋有在也同列既為之喜遂求予文贈其行予嘗想見武當之為勝而無由一往然㓜文之去也方將周覧其山川以遐測夫靈化肹蠁之妙解心釋慮蕩滌其胸中以迓延景貺熈洽乎大和而上報聖天子神化宜民之道則豈徒泛然出政治於一郡而已詩曰神之格思不可度思矧可射思此㓜文之職業不可以不謹也故特著其説以告焉若夫安利其民使繁其生以臻於致治者予不必道也送蕭照磨之任髙州府序今之府猶古諸侯國也建官自太守而下其属備矣而又置照磨檢校以通稽一郡之政事綜覈簿書勾考纎悉其職若易而任尤要其秩雖卑而權未嘗輕茍非眀於法而審於治體者未易以居也鴻臚属蕭子敬氏以九年秩滿改髙州府照磨子敬居京師十五六年以侍臣之宻立殿陛之下齊肅百官蓋嘗能其職矣於夫教化萬民賞亷治奸之意又聞之熟矣朝之賢士大夫行髙而徳美才優而任大子敬亦嘗竊觀其措置謀議心有所擇意有所取得之於中者而豈少乎哉夫積宏偉之見者所負也髙所負之髙則見之行事者必有以過乎人而子敬又毅然剛介蓄其所欲施張之意沛然如河决下流莫之可遏則夫心志思慮之發其可茍焉以自放政治乖違之機其可忽焉而不察哉所謂眀於法而審於治體者子敬固當勉焉而深致其意也予與子敬居同里將行求予一言以為别遂書此以贈之康氏族譜圖序康公之先本某處人徙泰和莆田者自泰然始由泰然距今凡幾世其舊譜毁於兵重為之圖而譜其可知者泰然之幾世孫某也某為人謙約自守而不求知於人其從孫曰榮今翰林學士楊公士竒甥也榮從其舅氏讀書於京師因以其圖求予序莆田在邑之南十里予嘗過焉有水曰莆溪莆溪之傍室屋鱗次皆康氏族也康氏盛時諸長老風流篤厚好尚文雅與之遨逰往復者皆一時賢士大夫如前吏部尚書劉槎翁槎翁之弟曰東園先生予先君畦樂公又嘗館授其家者也今皆不復可見而某亦老且病矣其可嘆也哉某既若無所求於世獨以善道率其子弟至於修其譜則又知慎重其事而無誇妄之失於乎譜所以眀乎先世之本源者也世逺而繁而知其出於一人者未嘗異則其情之所當厚自有不可已者奈之何安於妄以自欺其先耶蓋亦不思之甚也因榮之請為之書俾康氏後之人尚知作譜者用心之深也送鄭御史序鑒察御史鄭景曜以選赴北京其同官故舊相與之厚者皆為之賀且求予文送之曰景曜始以乙酉科進士擢江西道御史日以亷潔有聲旣而改山西道出按治山東者四年威著恵行山東之民至今稱其能及奉命亷獄於遼東隠伏必得其情其同列皆以為莫之及也蓋為御史者十餘年其識益廣其才益成其所至誠末可量也今被命以行願一言以著之嗟夫士於平居之時措心積慮皆卑諂汙下無可紀之行而常有過髙絶人之望欲以欺世而盜名亦何其不思之甚耶景曜䝉被寵擢翹然而獨出蓋其素所蓄積者如此其宏偉也夫豈僥倖於茍得者可比哉吾嘗患進士之用無顯效於時或者瑣瑣不立反取譏誚於庸俗之人今而得景曜心竊為之喜景曜其尚勉之聖天子方將重任焉慎無負士大夫之所素望也送邵亷使之任江西序鑒察御史邵公以九年考績擢江西按察亷使始公以考績上北京御史數人屬予為文餞之今其之江西也又以屬予言曰江西之故予知之其病於民者必公之能理也予言之公能理之予又何以惜其言之複也夫江西大藩且盛地自匡廬而之庾嶺之東山水之清何如其美也舟車之會商賈之湊居民室屋之繁富仙宫佛宇之臺榭何如其盛也士之誦詩書慕禮義者進而䝉被乎聖恩退而歌咏乎太平之盛化其眀周孔之道探六經之緒或見之文章事業或忠節行義埀之百世而無愧蓋又數百年於此矣有以作於前有以承於後未嘗乏也獨今所謂病於民者非習之然激之使然歟弱之食强之取饑寒顛頓而漁奪之未厭若之何而責􅅵畆之民之安其分耶夫自古為民病者多類此顧受天子之命而牧民者宜有以處之邵公之賢聞於朝久矣一朝承命而徃吾民之病庶其有瘳也哉夫居髙位而求下之安其道之難也姑息者嘗養患猛厲者嘗過之不姑息猛厲而民安焉非邵公其誰歟異時政化修行使强暴者革善柔者立禮義之俗興而民知所愧恥則夫大江之西山川之偉傑與邵公之聲華並著不朽也吾其待之書以為之贈送史參政之任廣東序國朝之設布政司即古所謂方伯連帥之任以縂領郡牧之政者也内建六卿外設布政之司者十有三内外之政體於是乎有統紀焉至於擇賢而任之則天子常自擇六卿他官雖貴且重不敢與聞布政參政之任人則天子或以命之六卿亦不自任其眀是以其任至重而任之者常得其人號令法度之施大綱常舉而其小者自無所違也今年夏吏科給事中史壽以選赴北京特拜廣東布政使司參政還至南京其交遊之士皆為賦詩以餞其行而以求予序某始以國子生入館閣預纂修之任予知之舊矣為人温然有和氣不為峭拔險絶之行其中常亷潔無所私曲又為人小心處煩劇綜理宻而不紊其材稱於人者衆故一旦拔而任之而人皆以為宜雖然予有以告某也廣東之地為郡者幾為州與縣者又若干海濵之利魚鹽百貨之所産海人蠻蜑風㠶浪舶疾馳於萬里而交凑城府之下象犀珎寳之貢嵗往來於風濤之中而不已則其勢固不能不使其民奔走於其間也豈惟其民雖吏於其土者亦烏能以獨安耶此特其事之一耳其賦斂所需土地所産民力所致有所當供而不緩者又烏能皆中於常經而不疾其民哉然則朝廷簡拔之意誠有在矣非精達於事亷潔無私曲者不能也某之拔而出也人既以為宜其任廣東則又以為未有加於某者予故備道其事序其詩以餞其去察洋陳氏族譜序陳氏之先河南人世仕宋宋南渡陳氏從之為禁兵千戸者四世宋之走閩入廣以訖於亡千户某皆從之與俱亡不返一子韶方弱冠獨與母徐氏避兵閩之福安山中事定居縣之北鄙曰富春子宗烈又徙縣之西鄙曰察洋宗烈生顯祖顯祖子四人曰玉曰生曰成曰道玉之子即今江西按察僉事琦也自韶至今凡五世五世之上一世即千戸從宋亡不返者此其可知者其不可知者不强道也僉事君來京師以求予序昔老泉為蘇氏譜因其可知者而紀之纔五世五世之上亦一世而止然自今稱為譜之法必取之蘇氏盖以其立法之善紀例之精尊尊親親隆殺之節有宗法之遺意非深於禮者不能故在當時蘇氏與歐陽氏之譜皆有法皆百世不可易也今陳氏之世次與蘇氏無異其闕疑謹審不妄之意又皆有得於蘇氏之遺法於乎世之失其先世之系者常多矣然必欲旁求强附必不肯如蘇氏五六世而止及其為譜求其能幾於蘇氏者則未嘗有何其見之謬耶然則如陳氏之譜有足尚者矣僉事君有材能方將立功業於時而且留心於其譜如此其知所重者哉椿隂書屋詩序姑蘇姚宗善名其讀書之所曰椿隂書屋既以屬畫者繪而為圖能詩者又為賦之久之積成巻宗善以求予序曰願因以自勗予何以告宗善也宗善今太子少保壽椿公之子予嘗從公於秘府討論於文字之際知公特深公以豪傑之見先知之眀識今聖上於潜邸委身效忠卒以成功名垂之後世有不可掩者公之遭遇於時者可謂至矣及其退然怡情於道徳守仁義之用自信而不可回此又公之性然也夫乘時以立功者才智之士所可能功成而能以道自樂雖賢者有所難能也公之所以受知於聖上者信乎非常人之所可及也哉公既老上不欲煩以政故公益得以自適謝絶人事玩詩書以窮道徳之㣲探造化以盡物理之變觀公之意不獨油然乎物表其亦欲推之以及於人也然而望下風之士毎趦趄而未暇宗善之為子也奉杖屨侍起居承候於温凊之餘耳目聞見所及豈不安然志有定而業有方者哉培之以待其成養之以俟其化人生之至幸而可樂者孰有大於此此宗善之所以名其齋也嗟夫世之學者或負笈千里跋渉於風波道途之險而又未必能得賢者而師之以遂其所願欲其視宗善相去甚逺然則士大夫咏歌於宗善者宜乎其意之厚也宗善尚其勉之哉詩曰式穀似之予其有望於宗善云旣以告之遂為之書楊氏家乘序進士廬陵楊黻集其先世行事之實自幾世祖忠襄公邦乂幾世祖文節公萬里而下之遺像及史傳所書墓碑銘文所紀與夫一時追封褒䘏之典合為一帙而類分之為若干巻題之曰楊氏家乘以求予序之夫忠襄公始以通判建康受命於倉卒之際能嘅然不屈以死文節以侍從舊臣雖致其仕而去而其心未嘗不在朝廷聞韓􅇑胄之啓邊釁也痛哭上書力詆其姦邪至憤憤不食以死二公所處之地與時皆不同而其志節未嘗少異如此於乎人事得失之際天道存亡之幾係焉然於夫死生變故之頃則惟君子之守可見也悲夫宋之亡也士之氣非不振而沮於邪佞之説者常多君子之公論非不眀而遏於小人之勢者常甚確然獨㫁之智不由乎上之眀而進退予奪之權常移於其下於是時也雖有忠信眀智之士亦何以行其道而伸其志也哉反覆乎二公之行事於其死亡之際蓋又可惜也夫君子之大節書之史册足以為世之勸戒而於其一言一行之㣲在後嗣子孫尤當深識而不可忽者此楊氏之後人所以拳拳於此而不敢失也予少時嘗拜二公之像於鄉校之祠蓋自歐陽文忠公而下皆在焉其後來京師拜於晉將軍卞壺之祠則唯忠襄公配享其中於乎拜其像貌心猶凛然有生氣况又讀其行事之詳其能不低佪感激想見其人於千載之上而嘅然嘆息夫當時變故禍亂之相㝷何其痛哉二公之後多賢其學問之淵深道徳之眀備載之史册者皆可於此而㕘見之黻蓋忠襄公幾世孫也其尊父東平州守治有能名嘗以此屬其二子俾采録之於是黻與其弟翼相與訪求搜閲發其舊所藏與今之所得者總若干篇其用心蓋勤矣而其收輯猶未巳也詩曰伐柯伐柯其則不逺楊氏子孫於夫立身行已之道其尚求之於此編思以繼其先世而無忝其家可也送常熟學生赴春官序古之士習於道徳眀教化之大防知亷恥羞愧以有自重之心者皆上之教使然也所謂閭師黨正州長以至於大司徒大司樂其教也有素中和聖義孝弟恭遜尚齒尚功之說禮樂詩書之文所以節其過以養之於中者又非澆詭淺陋溺情於文辭功利者之比也至於簡其不率移易其居屛逺之於郊於遂也猶必有耆老長者習之於禮俾從大司徒周旋升降於獻酬拜起之間以作其志意而俟其誨化自鄉而升之司徒自司徒而升之學謂之賔興者蓋於是有藹然之禮文將之以恭敬之道其所以絀惡與崇徳者蓋如此其備也故其不為不善非有所强由其習於善者之深也其不為不義非有所兾由其習於義者之固也今之士培之之久教之之詳其學非不成也抱其能售之有司舎什百而得一二擇之非不精也於夫堯舜文武周公孔子孟軻氏之道非不深求而力究也於夫亷恥羞愧之心非不知所以自持也然而以之立教以之修政求其守之固而不奪於外者常少焉豈所謂勸懲之典未至所謂絀惡與崇徳者未盡耶豈習於末者重且周而探夫本者輕且畧耶何為其異乎古之士也則凡任之治教者亦當深致其思矣乎進士傅玉良為常熟知縣勸學教民之意蓋切切焉今年秋其學生舉於鄉而獲選者凡幾人將上之春官玉良來南京為求予為文以送之予知玉良之用意有以然也昔常衮為福建觀察其民有能文詞者親與為賔主之禮而閩人翕然皆化玉良之心其亦若是也歟其所以重之者亦將使之自重也歟於乎今之為令者有能用心於其民如玉良者乎予既嘉玉良所為而又有望於今之士子也故為之言哀王處士詩序安成王處士士隆年四十九而殁殁十有八年其子彦登進士第為工部虞衡司主事因以諸公哀悼處士之作丐予文序之予讀之而後知處士之賢其殁已久其名益著其施澤在人雖久而人不忘也然而處士善修於身徳及其家施予恵䘏在其鄉之人其家與其鄉之人固宜有所不忘今之於處士者時相久地相逺又未嘗接其顔色有歡然相好之情而為之悲悼傷痛至形諸言者其故何哉夫人之言發乎情懽好之積係焉則其言有所溺而非其公而或未嘗接其人蔑焉無平生之懽則其言之也常有以合乎天下之公而得乎情之正處士有君子之行而施不博澤不流其名又不大著彼君子常存夫善善惡惡之心恐其泯然與時而俱化思有以揚之而為之言則固無所係於情而能當乎理之公也昔衛人之悲二子秦人之哀三良皆形諸咏歌不忘彼二子與三良者豈有一旦隠然之澤以少結其人之心者乎顧其志有可悲其死有可惜其國人相與悲哀之發乎其情自有不能已者也然則今之所以哀夫處士其必有發乎情而不可已者乎送大尹顔君復任四㑹序四㑹在廣海之間地曠而僻其民秀而文其俗尚禮義喜亷潔鄙貪詐而於夫是非之際往往好挾夫賢不肖者之得失以自矜其意甚則憤然相持有不可平之氣上之人茍不能正身以得其情鮮有不至於敗者故其俗號難治往年余為之令而畏之居數月得其情為之任意而簡乎法於是其民嘗挾法以自豪者亦皆相與變其所為予不久而去有争相乞留者數十人予媿焉因自嘆息夫去之之速不得見其終果何如也距今十五年而顔君大和以進士選為之令凡兩考於天官者皆以能職聞其民愛之甚於愛予聞太和治之之道又大槩與予不異予由是益知其民不難治顧治之者未嘗盡其理也大抵廣海之民非有異乎鄒魯之民也使為治者嘗肆其貪詐之心放其頗僻之行予奪是非失其性則雖盛威以臨之峻其法以箝之雖鄒魯之民鮮有不怨者使正直其行平易其所為予奪是非得其情雖廣海之民未嘗不可治也太和閩之龍溪人来京師問予曩之所以治其民者何如其道也予無以應之既而其友之仕於朝者相率賦詩餞其去因翰林編修李君子固求予言遂為序其詩太和之去也其尚以予言而觀之於其民耶瀛洲别趣圖詩序瀛洲别趣圖詩序為翰林典籍鄭叔美先生作也叔美以九年考績上北京今右春坊中允吴平仲先生與中書舎人某數人即圖賦詩獻之又為篆書四大字以屬予序按瀛洲世傳海上三神山者此其一也人未嘗到以為皆仙者居之翰林所謂玉堂之署者天子以貯文學侍從之臣其地之清峻殆與瀛洲無異者盖自唐初置𢎞文館學士當時被其選者人謂之登瀛洲其来久矣夫以翰林之臣優㳺中秘仰清光而聆玉音誠千載一時之遇謂之登瀛洲者誠非過言也顧處之者其人何如耳浦江之鄭氏世多篤行修潔之士闔門而爨者十三世世謂之義門叔美於禮義之道生於其性習於其家行之於其躬者不勞而安其在翰林職卑而務最簡所掌中禁之書上自太古下訖近代九州四海之外天經地緯隂陽奥秘之文靡不畢備時搜覽其中如入寳藏而玩竒貨至於幽暇清勝之極凡百務之紛然者嘗曠然莫與之干則所謂仙者之居豈有過於此耶叔美盖嘗忻然以此自快而與之處者亦嘗私竊為之喜於乎彼汨於世故嬰情得失者雖處可樂如在憂虞使人之心嘗如在憂虞則雖乗之以冷風載之以浮雲如逐氛埃而遭混濁茍能徜徉自適其性如叔美者人固望之以為仙矣然則圖之所擬以况夫叔美之行者其亦有意也哉因為之序叔美所交如中允諸公亦皆脫畧徽纆遺外世俗者也其為詩總若干首夏氏族譜序交阯之夏氏其上世本㑹稽人漢建和中方為交州大守有威恵歿而其民祀之號曰恵公既而賈琮李進繼為州刺史公之子謙佐之謙遷日南大守弟規佐之皆有治績民歌頌刻石於恵公之祠自是夏氏之後世豪於其土五代之初曰廣曰淵曰齊分居三江當李氏時夏氏以文學顯者益衆曰翬曰燾母杜氏盲翬燾刲臂割乳百計禱之不愈則相與禱于恵公之祠約不愈則兄弟各刳一目以禱母目為之復明母歿兄弟廬墓側三年燾獨留不去居十五年而歿有慈烏来集獺致魚以祭李氏褒顯之甚備繼李氏而王者陳氏簒陳氏者黎氏也上之遣兵平黎氏既郡縣其地燾之曽孫時中首䝉拔擢為翰林典籍永樂十五年春時中因出家譜求予書之於乎交阯之民阻於遐逺不得沾被王者之化凡五百餘年至今而後得見中國禮義之盛時中又䝉恩眷登于禁從不責以官守之事而優㳺乎儒者之場上之徳及於逺者何其至哉交阯既自放於夷狄其政治得失賢士大夫忠臣孝子之行皆不復槩見於大史予嘗惜之因時中之請特為著其先世之烈而又拳拳於其曽大父孝行之事者豈以其逺人而能此哉以時中能遭遇於時得以其事託於中國賢士大夫文字之間將不復湮沒無聞矣異時夏氏之後人讀予之文得不為之感哉楊先生壽七十詩序泰和楊仲基先生今翰林學士楊君士竒從兄也先生嘗至京師與其弟學士君相慰勞甚洽諸賢士大夫見者亦忻然以喜去則賦詩送之都門之外而今不一至者數年矣蒼顔白髪邈乎其不可及學士君每念之諸賢士亦慨然想見其情聞其年今甫七十遂相與賦詩以為之夀夫愛先生願其夀又重之以詩皆情之至也予於先生尤親且厚不可無一言因告之學士君為序其詩考之禮凡七十曰老盖人之生至於是精力憊矣筋骸倦矣不可强以事故在官則致其政事以還君上在家則傳家事于其子孫今之仕倦而歸者或有所未暇矣傳其事于家有子孫之賢獨得以自恣而逸其老如先生者又何可得耶先生剛毅方正持其行之堅自少至於老不變雖貧富貴賤不以易其所守鄉閭之子弟仰而畏之不敢以放三王之養老也皆引年盖以老者之衆非賢不可皆養故引戸校年以求其可養者如先生者將不在引年之典耶夫養與不養有不暇論今學士君典司綸命職任俱崇古所謂三命者不齒于族惟七十年不敢先今先生年七十而有弟之賢如學士君者相與周旋而不敢先此其樂又豈常人所能及耶是皆可為先生賀惜乎予去之逺不得舉觴引滿以為先生夀遂為序其詩竹間堂詩後序廬陵張君思忠於郡城東種竹而為堂其間名之曰竹間盖去城邑纔跬步而幽爽森寂如長山大谷烟霞之接曠然若無窮焉其外見江流東注而窿然起江中者白鷺洲也洲之外天玉華盖青原螺浦諸山蒼翠秀發盖一郡之勝名于四方者而自竹間之堂視之為尤勝也堂之中無長物焉惟古書名畫而已嘗與客過之或引觴而酌授琴而彈或徙倚徘徊聴風泉萬籟不知日之既夕也而君於酬接之際益勤不暇顧而視其子弟肅然無有怠者賓客或見其然也皆相顧而愕而或淋漓酣放逸乎禮度者皆自斂而不敢縱嗟夫此其堂之勝又豈獨在於山川竹樹而已哉古之好竹者晉人為甚而縱蔑於禮法之外者亦晉人甚焉君子盖有所不取其以竹自比於學問徳業之際惟衛武公淇澳之詩能然故夫子録之以埀教萬世君誠有得於此耶觀其於接物之頃而比徳於竹者有在焉因又以知一時咏歌之者未必不有取於淇澳之遺意也是宜存而著之以俟夫觀者辯焉張氏東臯十景詩序廬陵城東北螺川鷺渚之間山川之秀為一郡最勝一時騷人墨客與夫倦逰之士過之而低徊終日有不能去者而况昔之賢豪風聲氣烈之無窮其遺蹤往躅可嘅者猶多存焉至於仙翁釋子之居與龍蛇之宫雜處其間豫章楩楠之植佳花異卉䕃翳叢茂亦足寄傲以適休暇然而逰遨之士或抱憂端離思或負天子之簡書則雖過之而於登覽之樂有所未暇者矣獨張君思恒居其地以擅有其勝者久矣盖遭逢盛時雖閒居獨處而有超然拔出之想清時暇日與賓客故人翺翔觀覽而豈徒宣其佚暢其和哉地之竒勝閟而弗彰者將由是而著焉故思恒既繪為圖又分為十景與能詩者歌咏之又大書東臯舒嘯掲于其所居樓中樓甚髙登樓望十景而讀其詩甚可壯也嗟夫宇宙間竒勝卒泯滅而不遇思恒其人者其可惜也哉予之上京師過思恒欲訪十景者而未暇將别為序其詩云東昌志後序東昌地横縱不十里而有為之志者雖出一時好事然而先正之遺跡如蘇内翰黄大史周益公歐陽秘書髙風偉節之不泯者或因是而著焉而豈徒然也過者得而讀之或想見其人思慕興起其於教化補益豈小哉世之名邦大郡或雖海隅邊徼豪傑功業紀緑所不及者皆泯滅無聞良可惜也東昌雖蕞爾僻隘見於紀録如此則亦烏可小之也編輯訪求為之志者里之士曽君未成而卒繼為之者其子子魯子魯博雅多學得於其家益公有讀書臺在其居近累世保䕶使不毁者曽氏也而又為是書以著不朽皆可喜者故為序其後云廬陵胡氏族譜序胡氏之先自有虞閼父為周武王陶正封其子媯滿為陳胡公配以大姬遂命之氏歴秦漢至呉有諱質者累秩䕶國將軍荆州刺史蜀建興中居江夏徙丹陽尋徙袁之宜春又七世曰盛宋乾徳中自銀青光禄大夫檢校國子祭酒拜殿中侍御史由宜春徙廬陵之薌城薌城之有胡氏始此建炎末知邵武縣事諱百順者殿中君幾世孫也屬其時境有寇乃别居郡城之北百順於忠簡公為從子又三世曰耕樂有篤行其母夫人張氏年二十孀居守節以終歐陽巽齋嘗為銘其墓盖遷自薌城幾二百年于此矣方其盛時一門顯者聲名赫然以秦檜威燄之熾上下屏氣而忠簡公上書乞斬其首天下聞之凛凛繼之以剛簡之死而吾郡忠節遂有光於萬世及其久也女婦生長閨門猶知以貞信自守而偉傑之才知名當世者比比本之大者其末必茂所謂連抱之木不生於步仭之丘千金之子不産於三家之市者吾於是乎信其言之然也紹武耕樂之五世孫恭慎好學知重本以親親来京師以其譜求予序予既考覽其世次遷徙之詳又得其先世所録遺文讀之信其譜之不繆而故家文獻有足徴者故為之言壽陳贊善母七十詩序惟古名賢才士行成而徳修往往自其母之賢見之傳記多矣然而及其母既耄之年親見其子遭逢主知從容忠孝之間志以為養而爵禄随之公義至矣而私情惬焉則其遐齡盛福安富尊榮之樂何以加之哉今右春坊賛善陳君伯載其弟叔逺頃以吏部侍郎攝征南行軍司馬王師所至交阯既平遂以銓衡之重便宜鎮靖邊陲者八年矣盖其功甚偉而賛善君問學尤宏博强記始自布衣薦入秘閣總裁永樂大典天下之士預在館者常二千餘人皆推君為能卒拜賛善與太子少師姚公監修成書者君之勤勞為多君昆弟既貴顯于朝益恪畏忠藎其所為足以稱服當時故其太夫人甚喜板輿之至京師也京師之人皆為二君榮之君所家常州之武進大夫人之還也其鄉之人又皆以為武進之榮大夫人年既七十康强不衰永樂癸巳之冬十月適其始生之辰其季子叔達未仕而留於家者以書来白其兄於是秘閣及春坊之士凡與賛善君處者皆賦詩以為大夫人夀因以屬予序夫愛其人者願其夀古之道也况故人之母升堂拜慶有所未暇則稱頌祈禱形於咏歌亦其情之至有不可已者魯詩人之頌魯公自令妻以及其夀母至以三夀作朋願之則其来也尚矣是詩之作其有不得於魯詩人之遺意也哉宋陳堯啓蔡君謨兄弟皆及其母之存而顯者當時士大夫紀述其事至今尤以為美况賛善君兄弟之賢大夫人之盛福自足以使人欣喜而稱道者哉是宜著而存之以埀之永久若夫大平盛際為臣子者得涵濡聖澤以遂其私情其又可不因是以識其拳拳於萬一者哉廬陵北溪劉氏族譜序劉氏居廬陵北溪者本漢長沙定王發之後徙自湖南之豐陵舊譜所紀幾三百年矣宋元之際其族最盛諸老皆風流循雅仕於朝者雖卑官皆有亷節子弟亦服習詩書其居室臺池花木之植極一時之盛麗故其時名勝遨逰之士道廬陵者往往之北溪而不去自喪亂来居室盡燬諸老亦淪沒迨盡曰季𢎞者贅吾邑篠溪之郭氏久而不得歸其子孟璜既長始鋭志還故居訪諸父求先世文字得遺譜可知者僅數世而其宗譜之失久矣孟璜慨惜求之不已乃缺其不可知因其可知者而修輯之自孟璜而上凡九世其先世有以其子儕於父者今皆正之孟璜来京師以屬予序嗟夫孟璜可謂得修譜之法矣夫譜所以别親疎辨尊卑之等其本常同而其分不可混也其統宗合族之意油然無間而小大之節上下之序不可紊也不父其父而禰其祖孔子議之久矣劉氏先世雖狃于當時之習俗而其失豈小哉孟璜之為譜乃一舉而正之其正名分之意凛乎甚嚴而重本尊親之道亦於是乎盡矣非其學之至識之明烏足以及此哉其譜之善盖不言可知矣因為之序送許鳴時詩序中書舎人許君鳴鶴扈從于北京其弟鳴時来省之踰年而歸中書舎人龎君振舒與之有夙好既為詩以餞其去又求予文序焉鳴時年壯而質美温恭孝友方孜孜學為文辭以事進取其氣鋭然而自江以西行數千里至於燕薊得以仰觀天子兩都之盛美遇山川之勝登髙而賦之其亦壯矣哉昔之人以謂不讀書萬巻不行地萬里不可不求之杜少陵之作豈以其學問之富周覽涉歴窮極夫人情物理變化之由有以奮發其志意其言之工自足以埀不朽故適於澗溪之小者不足與論洞庭之廣安於㟝嶁之卑者不足與言泰華之髙其所見之小者不足與言其大者也今鳴時外有以擴其見聞内有以充其智慮其所得將浩乎其自富耶抑欿乎其猶未足也其形諸言者將沛然其有餘也抑悱然其猶有未達耶夫君子之學不可以自怠茍進而不止則其所造也必深吾觀鳴時慊然懐不足之心其歸將閉戸讀書以求至於古之學者則其將来何可測耶予與鳴鶴交愛鳴時之深故言之欲振發其氣鳴時其勉焉異日學之成與計偕而来予與鳴鶴皆有望也送王典籍還南京序金華王君文英居翰林為典籍者九載以考績援例當加陞擢屬其時聖上巡狩北京君以疾不果赴久之予以外艱服闋至京師而君疾亦愈約與偕行君時雖老善清談而雅謔意謂道途足以相樂矣及辭青宫以行予忽被命行君且先往心不能不悵然已而予復得㫖追行而王君先已至北京矣既至接屋而居朝夕往還者凡三閲月遂俱復其職如故於是心竊自喜以謂不得於前者於今當得遂之也尋而予又留弗果去君又獨行因嘅然曰曰人生聚散豈亦有數然耶何相乖背如是耶由是而知凡人事得失變故之機出於俄忽有不可逆料者皆如是也而或者以其智慮之末揣摩窺冀欲取必於茫茫之中者其亦惑矣雖然予之不得與君偕也而君之来有以觀覽夫山川之勝於夫風濤雲霞浩渺出沒之際皆得形之於咏歌且其以既老之年復優㳺於清禁以沐聖上無窮之恩其為樂又可勝道耶獨予於君之厚不能無憾於往来之際故於其行也交㳺皆贈以詩而予為之序雅南集序詩以道性情而得夫性情之正者嘗少也三百篇風雅之盛足以見王者之澤及其變也王澤微矣然其憂悲歡娯哀怨之發咏歌之際尤能使人動盪感激豈非其澤入人之深者久猶未泯耶自漢魏以降其體屢變其音節去古益逺至唐作者益盛然皆有得乎此而後能深於詩也三山陳思孝以其先君江山令仲進所為雅南集一編求予言其温厚和平之音褒美諷刺之際抑揚感嘅反復曲折而皆不過乎節讀之有可愛者仲進之所以能此者誠有得於古作者之意哉然仲進嘗為宜陽韓城二縣丞終於江山甚有善政則其可稱者又不在於詩也惜其政之所施者狹獨於詩深矣思孝嘗為羅田浮梁二縣丞能世其家以善籀篆入翰林因與予交故為之書林氏族譜序林氏之先系出殷王子比干之後比干諫而死夫人方娠懼而遯於長林石室之間已而生子及武王之克殷也求比干後得所生子封之以其誕於林中石上也賜之姓林氏名之曰堅此林氏得姓之始也歴漢太子太傅尊尊以尚書論石渠始居濟南晉永嘉之亂黄門侍郎頴從中宗南渡頴二子曰懋為下邳太守林氏居下邳者皆懋之後也曰禄自散騎中常侍合浦浦郡大守改晉安因家焉至唐林氏在晉安者尤盛髙士㢘等承詔定正天下氏族凡九十八家林氏首稱於晉安所謂林黄陳鄭是也其後族益繁散處旁郡多林氏盖皆禄之後禄十五世曰饒州太守寵寵子披披子九人同時為州刺史者八人曰端州刺史葦始居莆田之前埭號前埭林家者葦之後也葦八世曰蕡三子曰矩曰伯林曰國華今譜自蕡而上既總為圖以統其世次自矩三人而下生齒既多又别為圖者三而於先世出處隠顯言行生卒之槩則以世備著於圖之後其端緒本末最為較著其為譜則因唐之舊而増續之無有所易故方之歐陽氏蘇氏二家之譜編集分合又自有誼例不相同也國華幾世孫崇璧以屬予序之崇璧以永樂丙戌進士及第入翰林為修撰尋選侍講方以文章顯名於時而其用心不屑屑於聲利於敦宗重本孝弟友愛油然不匱如此世徒慕其文於其行未盡知也然自其諸父昆弟為當世名宦者甚衆又不獨崇璧一人獨予知崇璧之深也崇璧既同被命来北京朝夕往還因得觀其譜因其先世之顯庸光昭而又有如崇璧者皆克世其家乃掇其世次源流以為之序云贈醫士湯孟祖序古者王之醫師屬於天官嵗終考其髙下賢否其任不輕其責效不茍也又上世仕多世禄得及其子孫故講習有素而志慮専精雖人之一身情欲勞佚之所拂雨暘暑寒之相遭冐觸乎内外者其變無窮而世有良醫師者得而治之也如探物於囊引手可得故雖疾且殆而人得以順受乎正者其扶持救䕶養生之道有以使之然也自夫世降而道漓事之不逮於古者豈徒醫之一事人之不得其生以全其天者亦多矣其可悲也聞豐城湯孟祖氏以善醫選為大醫院醫士盖自其先大父浩溪先生尊父橘泉居士皆讀書明道理而以醫擅名故其説有所授受其取信於人非一日也其來北京也御史張君思夀偶抱疾更數醫弗愈御史呉君叔潤與孟祖居同里以其名告張君張君得孟祖治之疾遂愈張君於是介呉君求予文謝之予固有感夫世之為醫者夫醫之書浩繁而隠微有難言極奥之㫖雖目濡耳染終其身有非口舌所能盡者而况以無所授受之説剽剟膚淺之見以誇詐眩惑而窺利于人如此而人之疾幾何其不危且殆哉以予之多病也思見夫古之醫師而不得也聞有如孟祖無忝於古之醫師也孟祖既得列于大醫或有以課其髙下賢否其有徴於吾言也夫李氏兄弟倡和詩序安成李時傑先生示其弟時勉詩二首時勉既和其兄之詩同時交逰之士在翰林者又相屬而和之積為巻以屬予序之予與先生同居郡知先生孝友著于家邦而時勉亦以早失其父也事先生尤盡恭愛及時勉取科第来京師與二十八人者同時選入秘閣讀書為古文辭恩遇既隆名聲大著於是人皆知先生有弟之能賢也永樂七年秋時勉䝉恩召赴北京既行以書報先生先生復書雖甚喜其弟之寵遇光華也然以其去之逺也不能無慼于中盖亦人之情也故其候問音勤非徒憂其單居逺寓恐其有索寞無聊之况至於寒暑風霜之變人事交際之微皆為之逆料過計至又為歌詩以申道其思慕嘅嘆真情至性纏綿往復讀之雖隔萬里而油然見其肺腑不盡之懐惻然有間闗無窮之慮此其愛之深者故其發之於言者有不能淺也而其同時相和者復有以道達其情志諷而誦之信乎其可以興也夫自三代之盛教化隆矣然風雅之作如脊令之塤篪之咏相好相猶之語丁寧懇切孔子皆存而著之以埀訓萬世而况去古既逺大道漓散之後世有篤倫誼如先生者於其詩之作獨何可廢哉惜世無孔子者其言不足以重之也然先生之志無所慕于世惟以其道教于鄉鄉之子弟服其教已久久則無不化者他日孝友之士出於其鄉者又聞先生之風而作者歟彭氏族譜序彭氏之先居清江自宋寳謨閣學士龜年以偽學黨貶安福丞其孫沂居安福之葛洲遂世為安福人譜之作自寳謨君而下其上系著于清江而有未暇深考者歴世變故恐他譜之非實徒混而失真故謹之而不敢妄有所續也譜之利一倣歐陽氏小宗之制每五世别而為圖圖之後又剙為各世小傳以著其行事始終之槩其有功徳顯著如寳謨君者史氏既有傳則抄附於圖之次或在當時得為銘誌者亦以類附焉盖自其十世孫敬宗之所修集而其子敷詢今始著為完譜也敷詢之来北京因其友翰林庶吉士李君時勉以謁予序之予既愛敷詢能謹其譜而其纂次條理又整宻而有法以克成其父之志其用心盖賢矣至于寳謨君講道于朱張二夫子之門列仕于朝為世名臣而當時指為偽學例見貶奪後世盖自有公論矣斯不必較也獨欽慕夫先賢之有後使凡世之學者聞之篤於信道而不惑於邪論之不勝而在其子孫又當知所勉也因以叙其譜贈周主事考滿序士之抱所長病未有知之者然而髙才豪傑之士知之亦未易也况夫學問政事難以兩能能之士以有聲焉則其才識之過人智慮之卓絶必有甚髙而不可及者矣錢唐周宗武始以進士選為翰林庶吉士時修永樂大典天下文學之士抱藝効能奮其志以精於事者盖雲集於秘書凡博聞多識之士與某交之厚者皆稱其能及其去為主事于兵部奉其職往還兩京兩京之士矜其材而逞其藝者日旁午於百司其操觚握管於其間殫志畢力於其事亦難矣然凡與之交而洽者又皆稱之如在翰林夫其稱於兵部者以其學兼兩者之能而皆以有聲焉則其才識之過人智慮之卓絶者固未易以及耶嗟夫今之士於學問之道及人之澤求其能充乎中以達乎外者無有也豈所謂豪傑之士固難於知抑抱其所長者誠不欲人之知耶何所見之少也某在兵部凡兩考於天官皆以能職聞於是其友中書舎人某與凡所交之厚者數人因其考績之際相與賦詩美之而以求予叙予不足以知某然知某者不必予也名者實之符而爵禄之所攸歸况所以見知於人者之衆如此耶為之言以俟其將来某其勉之哉送邵御史序方今百司之任於御史尤難稱事考法隠度以求其姦逆情慮詐不究其意一任以文而無違法焉者此其事固儒者有所未暇慮深而測微覩近而思逺畧其迹而原其情簡其文而持之以道徳仁義之意此又文法吏所不能也二者嘗並用亦嘗相訾然於風紀之任得失之際則判然有不可掩者我聖上深知其然始詔任御史必以文儒起自刀筆者皆罷不用自是居其職者益自知貴重以名節相髙蘭溪邵以先氏進士之賢者也其尊甫守拙先生嘗讀書椒峯之下所以教以先者皆篤實之道以先既舉進士又蒙聖恩俾歸榮於鄉以成其徳業由是其學益進為御史者幾十年論議設施舉措之際皆因其學而推之故其所為有非文法吏可及刑部都察院大理寺嘗長官缺議能署之者衆推以先又嘗按事廣東河南浙江鳯陽所至必宣上化歸有所奏其言必行以先盖不獨賢進士又御史之賢者也夫君子之學自格物至於修身其大者既盡其小者亦未嘗違也彼操弄簡牘屑屑於簿書勾稽之微夫何足道者然則使士於今皆若以先其誰敢議吾儒者之用哉以先考績上北京御史某求予文送之因為之言以先尚益勉之以無隳其成可也一樂堂詩序王君三綱孝弟人也其二親既康强無恙其弟三已亦侃侃循禮知學行三綱樂之於是取孟子三樂之語以已之有其一也名其堂曰一樂来京師能詩者皆為歌咏之三綱以屬予序夫父子兄弟之樂人之所深願而得之于天者有不可必也而或得之也又不知所以樂至于䦧墻而誶語此又家之可悲痛者也三綱家多良田課僮奴力耕嵗收粟千斛果蔬連畦松篁連林牛羊之畜盈谷泛於川泳於渚𣺌然湖海之思即幽而探阻傲然山川之樂㫖甘苾芬出乎中饋者不必水陸之珍而子弟賓客升堂拜慶相與舉觴而上夀故人知己或歌呼而笑傲極意而任情者皆相忘於物外世表此皆可樂也而三綱意不在是者豈不以人之所能至力之所可為者舉非其情之至而獨得之於天者乃為深慰至幸則其樂可勝道哉哉夫人之所能至力之所可為者某不以為樂則推是而求其用心雖富貴聲華貧賤有不足易其志者矣此君子學道者之所難而孟子所謂仰不愧俯不怍者在是也三綱知以此自力其樂又如何也三綱之尊父樵雪居士予嘗見之京師豪飲狂吟談詩不輟尤好蓄名畫古書遨逰江湖則載置舟中觀其所喜好其襟度可知矣矣予宦逰去家十五年見閭里故舊真如空谷足音况有如三綱之子之賢者哉故喜為之序詩凡若干首壽菊詩序世固有不養生而夀不粒食而腴草木之生有不根而植不培而榮者此皆理之不可致詰者也其亦萃隂陽之精氣挹天地之至和以致其神竒者固有異于常類耶世所謂神仙者不可必其有無使有之迨亦若此而已然予終不能無疑於心也今年秋九月修撰王君行儉于秘閣得菊一枝于中書舎人許君鳴鶴秘閣無菊行儉因不忍棄漫以楮漬水以潤液其所剪處置之座間累數日所漬水乾而不敗既而上往狩於郊鎖閣者兩句駕還而後入視之則穠艷芳馥如始折時而凡植于土者反枯然憔悴矣于是見者皆駭訝其未嘗有也予然後信夫物之不根而植不培而榮與夫不養生而夀不粒食而腴者誠然乎有也而世所謂仙者亦未必無之但偶未之見耳行儉因名之曰夀菊且相與賦詩以屬予序予聞南陽甘谷人飲菊潭之水夀百數十嵗又有康生者嘗服菊仙去菊之能夀人世嘗信之以此然於夫菊之自夀有如今之所見者則世或未必知也豈草木金石足以輔養于人者亦取其質性之堅久不敗故耶是雖物之至微而理有當辨者或又曰凡物有先機以兆祥者行儉之尊父瓊州公年幾八十尚康强無恙容色郁然今秩滿將来京師此其兆為公夀之徴無疑也行儉聞益大喜夫見其親之晚節光榮而又夀考不衰如之何不喜也盖行儉孝友忠信人也感于已而物應之豈虚也哉遂為之序復繋之以詩竒葩秪自妍經時尚粲如翦折豈本性豔彩恒弗渝泠泠玉堂署凛凛寒沍餘餘英久逾馥柔莖尚未枯諒無土膏潤豈有雨露濡葆冲挹其和自然生意敷有如丹丘仙絶粒形更腴朔風凋百卉舊種日就蕪念子得佳翫使我形神舒念彼久生道毋乃兹同符永言保殊操此意與之俱送陳正言㑹試序嘗閲陳氏家傳中記陳氏進士題名歴宋元至今四百餘年凡六十餘人其中以功業行義顯者甚衆若潭州司理盡與其弟國子監簿卒皆登進士第益正言之七世祖也卒歴官至浙西參師丞相文信公登第時參師公寔預考士故丞相擁麾南上公方休老於家丞相即其家拜焉且為改創其居今正言所居其故址也國朝之盛正言之伯父碩望先生士瞻舉於壬子之嵗叔父士啓舉甲申進士為禮部儀制郎中今正言又舉於鄉矣何其盛也夫鄉邦以科第顯者陳氏最盛而在于正言本宗盛者而如此其著則凡以科第之榮為正言相誇道侈美者皆不足道也夫士遭遇明時固將立名以顯當世况正言承累葉之緒餘繼前人之世業學甚富行甚篤材器髙大而聞望日著則所以世其家而光顯其前聞人者有在矣夫豈以科目之榮美自多乎哉以科目榮美自多亦非正言意也予于陳氏有世好又嘗與郎中君同預修書秘閣故于正言之行有以規之焉有為詩歌以餞正言者因書以序其首送郭公緒赴陜西僉事序公緒以進士選為陜西按察僉士凡交逰之厚者皆為詩餞其去而以屬予言公緒予故人子也視之尤厚于其去可無一言哉夫憲臺所以刺察百僚其任至重非素明于道而知大體者不能勝其任彼或習于法令輕重出入明析常盡乎其微至于屬使之際承順敏給動中乎所欲自常情視之誠有可快者然而聖上簡拔之重固不在是誠以明于道而知大體者惟進士其所素學也上之意如此非徒以重憲臺其於進士之重也亦至矣進士于此其可不振耀拔出思所以副皇上眷注之情哉夫學之明于道所以應事也造于道者不宏且深則應于事者不精以博如此者豈獨不足于風紀之任其于凡天下之任舉不可也公緒氣節髙邁渾渾乎公卿大夫之間將獨出於等夷而未可知又自其諸父任風紀教化之責者率一門數人所謂素明于道而知大體者非公緒其誰哉于道而造之必宏以深于事而處之必精以博公緒其必有以副皇上眷注之意矣以此望于公緒非獨予之情為然凡交友之情皆然也贈段舍人赴都司教練序自古世雖極治而武備不可以或弛也兵不必多而將不可以不精也兵之用在乎將而將之能否在乎教之有素練之有方也當夫海岳晏然一塵不染敦尚乎文徳而無復留心于武事兵不識伍將不識兵有備與無備等耳夫豈知文武並用之為良圖而兵食非不得已則不可以去乎此賈大傅所以嘆息而山巨源獨識其不可也方今聖天子在位日所出入靡不臣妾迨三十年民不見干戈然良將勁卒有増而無減練兵教士日講而弗輟立為定制使諸守禦各遣子弟以時聴教於都衛第其髙下而課最之别其能否以激勸之文事武備之兼舉不忘如此也今年夏吉之鎮禦千戸段公之子廣將聴練於江西都衛予表弟楊相時為郡庠弟子員稍與廣交逰于其行謁予序之予聞段侯威而不苛㢘而公廣也質而壯和而不狎孝友而謙卑是故士大夫與江右之良帥必以侯為最語羣帥之子弟必以廣為賢江右一大都㑹也廣之往也拜大藩之守將友羣府之俊乂訪江山之勝槩而論往昔之所以勝負益滋其見聞増其所未及則非惟行間之豪傑加重而相許將見幄中之元老或改容而稱賞也尚庶乎勉于忠義思他日策勲業于燕然而圖丹青于麟閣下無忝爾父之勤上無負皇上世禄武臣之美意也坐作撃刺之法盖餘事耳秋江送别圖序余友劉添元自弱冠逰燕趙縱觀都邑之巨麗暨壯東逰洛陽北踰河西入潼闗度太行盤谷歴覽山川之勝人物之盛風土之異宜習俗之美惡以至于草木鳥獸昆蟲魚鼈凡百寳玩怪竒與夫平昔之所未嘗見聞者嘗夜剪燭並坐語刺刺不休余雖未及遨遊四方因添元之言恍然若親歴之也前年入長沙去年遊京師今年秋復有長沙之行其同里蕭仕信為繪秋江送别圖而屬余序焉余覩夫漳江水冷下見沙石漁歌中流鴻飛數㸃當此之時能不愴焉于懐者幾希而添元方油然駕扁舟攘臂江風帆如奔馬欣欣然曽何别離之想盖由其平昔往来之熟胷次軒豁襟懐倜儻以四海為鄉邑舟楫為室廬雖千里猶庭除也向使添元拘拘于一邑之内一丘壑之間固有不堪其縶縛者而何能如是古人有以不讀書萬巻不行地千里為歉若添元之見聞識趣豈特行地千里而已哉慶守郭先生職教漢陽鄉之先達也添元往見焉其告之曰昔張翰居江東見秋風起而有思歸之嘆今余于秋江之上而有逺遊之樂所遭或異人情則同先生其謂何如贈曽子敏序洪武二十六年皇帝命使臣巡按于吉贑袁臨諸郡是年秋九月使臣至自贑遂即公館集諸生試以藝就試者二十人咸中式使者大喜曰江右為士之淵藪觀于吉之西江信然矣迺命諸生舉學與行俱美可司訓迪者各一人潛與邑庠友蕭善本因輿論所協首舉里之曽子敏以進子敏辭弗獲迺就聘于贑之石城今年夏六月赴京師就試于翰林得優等遂歸自京師道于家胄監生劉子敏適以省親至家相率賦詩為贈仍屬予序之予維吉贑隣郡相去非甚遼也民之習俗同也士大夫之出處同也衣冠語言威儀動静亦同也惟科第文學吉視贑為優然而其中為功名事業者贑與吉又並驅也文藝末也而贑毎屈于吉者何哉非其材之不足也非其質之弗侔也有賢父兄賢子弟而或者無良師友故也子敏其往哉天之生材有不齊而或因其材教之也無二道教至焉則不齊者可齊也吉與贑之士何相逺之有孔子曰草上之風必偃况子敏質美而行確志鋭而學勤忠節之裔而詩書科第之後也其為教之具素有矣尚庶乎積之以誠鎮其躁而消其邪養其中和則心通理達不待外求而文章自有可觀將見董生之幃馬融之帳顒顒昂昂之士與玉虹翠浪増聲騰價無有窮已也尚其拭目以觀贈劉氏二生序京師天下之本也本固則邦寧商頌曰邦畿千里惟民所止自古創業安邦之君思有以葺其民必先固其本若漢之高文徙齊楚豪傑於京師是已夫高文豈襲秦之舊轍哉為天下久長之慮固宜爾也方今聖天子宵衣旰食不遑寧處惟安天下民是慮迺洪武二十四年詔民之富者得徙居于京師俾自營生業庶京師寔而天下安夫聖天子亦豈暇求漢髙文之舊制哉事有當然適與之符也令下吾邑之劉添詳在富民列將行其子允仕暨厥姪允誠代之徃二子嘗從予舅氏游資質皆端美來别予於是告之曰帝王之都佳麗之地也有宫闕城池之壯宗社百官之富府庫甲兵之殷盛以至於四方貢獻竒貨玩寳靡不輻輳此蘇子由之少年時所以欲求天下之竒聞壯觀至京師而後知天下之巨麗又京師首善之地萬國之表制作之示於天下必由内以達外教化之漸被於四方必自近以及逺此彭汝礪所以嘗論四方之人其語言態度短長巧拙必問京師如何不同則以為鄙二子居首善之地而能為首善之人偉其所見廣其胸臆不亦快乎子由以文章雄一時而汝礪亦宋熈寧賢御史善觀京師無如蘇子由善論京師無如彭汝礪二子其往觀之於今論則無煩也余伯舅居京師為御史尤好古文蘇彭二公之説其必有取焉尚敬為我起居之遼東許某贈别序太史公嘗稱三世為將道家者忌其亦然乎哉夫人孰不欲其子孫之賢也而有不可必得者焉其盛名足以蓋一世盛徳足以埀百祀不旋踵而其子若孫操瓢為溝中瘠者非必為將三世也非必見忌於道家者也唐魏鄭公豈將也哉且操心行已若鄭公者亦庶乎可以免此矣没曽幾何而他人入其室是故君子毎付之於無可奈何而聴之於天焉而凡見人之有賢子孫者亦自不能不擊節而嘆賞也遼東衛許某其祖某在前元時已為萬戸後從皇上渡江有功賜金虎符仍授萬戸至今年九十尚無恙父某從大將軍攻閩授千户亦善待士卒諸叔伯父以軍功顯者尤不下十餘人今某從容安閒語言詳雅頗有燕趙之風而無北方之强信乎其為良家子弟也信乎萬户公之有令孫而某之有賢子也祖父子孫俯仰三世接武乎將門者可期而可必是古今之人所不能必得者而許氏得之矣豈不深可羡哉今年春以徴兵來泰和將歸願求一言以壯逺道於是能賦者即泰和八景分題賦詩為贈而屬予序其首嗟夫有子若遂不患馮唐之既老有孫若陵何憂李廣之未侯雖然陵之竒材固可取而陵之晚節未可許也尚當集義以養其氣正志以礪其行講武之餘又讀書以博古則他日將見運籌獻䇿斬將搴旗可以立勲封侯萬里外而益光前烈矣尚其懋之是為序泊菴集巻五
