body:
  text: 泊菴集卷四明梁潛撰記蕭氏南薰書院記泰和東南三十里有溪曰桃源溪之中有石崇曠而夷如砥曰石臺蕭氏居溪上盛且數百年矣自國朝初安常處士諸昆弟席先世之資而喜與名士遊士往來桃源者益衆時東園劉先生子彥以博學篤行館授焉其兄尚書公之老而歸也亦時時過之東園公為名其齋曰南薰書院尚書公大書以揭其額于時桃源石臺之間蓋煜然有光耀焉自是教于書院者相繼必賢士其子弟嘗受業者曰德皓德嘉德貫德資今皆傑然偉出而東園去而仕于時以沒已二十餘年矣安常之沒亦既十餘年而子弟之益衆講學之益盛談道德而誦詩書者未有過于今之時也此閭里之美事而豈獨蕭氏之盛哉永樂壬辰春邑士陳公培為之教公培尚書公外孫也於是德皓兄弟念先志之勤篤思東園公之惠顧欲不墜其緒因公培屬豫記其創立之始夫自三代之際黨庠術序家孰之教遍天下而俊造之士升于王宫國都者必自其鄉故居于家而亷恥之道立仕于時而仁義之政修後世鄉閭之教廢存者獨州郡之學耳至于白鹿鵝湖嶽麓諸書院雖當時大賢自相講學然斯道之振起尤有賴焉今南薰之建蕭氏特以教其一家子弟耳而有古人黨孰之遺意又况夫尚書公昆弟風聲氣烈之未泯者猶能使人興起而德皓兄弟嘗親炙而聞其議論宜其拳拳有不能忘者顧豫言之陋曷足以永前哲之澤于久逺哉茍他日有自此而達于郡邑上於大學赫然有名于四方則書院不為徒設矣書以鑱于石俾來者勉焉水竹軒記人之平居優遊邱壑日與故人子弟相歡莫逆漫不自知其為樂也及其去江湖之逺索然無聊或縻于仕宦羈愁其心然後懷去鄉之感動疇昔之念雖夢寐有不能已者豈非相忘於玩熟相惜于暌違之際者人情所不能無者哉豫未仕時今左春坊諭德楊君士奇方假館於城南彭氏水竹軒中彭氏子弟最季者季肅也方抱書日事句讀而諭德君朝夕坐軒中見江山之秀媚慨然有逺覽四方之意豫時亦數過軒中與諭德君笑語倦而後去顧豈知愛賞好樂于此軒而不能忘哉及豫二人並仕於朝者十有六年日夜思往時傲謔不可得也念之刻骨諭德君至寫詩紈素以寄季肅兄弟豫亦屬筆聯賦詞纍纍不覺其情之至也然後知人情相忘於玩熟相惜于暌違有不可掩者蓋如此季肅今已長大喜文詞尤酷憶諭德君嘗置此詩於其軒挾䇿呻吟之餘輒琅然誦不已此其意亦可念已於軒之外見鷗鷺之飛翥帆檣之去留煙霞洲渚之晦明變化益使人不能舍去而季肅之大父與其諸父昔嘗徘徊于此者今皆不可作矣顧諭德君未暇歸而豫又將别此而去也因書之以記其軒益齋記邑庠生蕭暹之恭遜信慎而好學能文辭治其居之南向曰益齋暹之進而逰於鄉校退而學于其齋也於是求豫文記焉豫告之曰君子之求有益莫如學學之道所以致其知也天地萬物之性人倫之道堯舜三代之訓周公孔子子思孟子之教皆精妙微奧所以闔闢萬化推而施于治皆道德之發揮述於文辭皆仁義之麗澤著之於身而動作弛張之際古人之善道懿行皆德焉其為益如此舍之而不求求之而不志於學無益也其或學之矣而以其躁忽簡傲之心矜氣而騁欲眩亂而狂斐猶為不學也聖人蓋嘗慮之矣著其受益招損之説於書著其消長吉凶之占于易告之以益者三友與損者之三友矣則又告之以益者三樂與損者之三樂焉庶乎其盡之矣而又著其象于宥坐之器使觀者不待言而深諭使夫怠而不能學者皆知以自警其憂人痛物之志蓋拳拳焉如此學者何可忽焉而易之耶暹之豫姻家子也鋭然進于學而未止其為益有未可測者吾固憂其怠而止也故為之言其于損益之際而深致其意焉者庶幾乎暹之不失於彼而得之于此也逰龍神寺記梅岡在吾邑之東四十里澗溪陵阜環而相屬皆近而可逰者也其西撫澄江其東平巒漫坡其外躍然而上出蒼然而深秀朝暮觀焉而不見可厭者薌城山也其南三峯隱然獨出乎天之外其勢若欲飛去者曰匡山世傳仙人王子瑶所嘗逰處望之皆可愛也而逺方或不能以逰獨西南有所謂龍神寺者寺不詳所起然其地幽而曠抱之以層峯延之以茂麓橫之以清澗無賈居農屋之鄰而水有菰蒲林有楩櫧蒙茸蔭翳而長松古柏涵雲氣而引風聲雖盛夏絶炎暑之薰蒸而密軒靚宇無塵呼俗競之及也故得以肆情放意覽逺山於無際送歸鳥之瞑飛而聽夫松柏萬竅之怒號亦無不可樂也蓋去梅岡僅二里雖甚美而近然每從梅岡而望之不能如薌城匡山之見也望之而可見者逺則吾不能以逰望之而不見幸其近吾得而逰焉逰而得其勝則逺而不及逰者可惜也望之而不及逰焉而後得則不及望又不及逰者可勝惜耶東坡嘗遇佳山水恨無僧寺今豫於此得梅岡之勝又得龍神以逰可謂兩得之矣而猶以為有可惜者如此人情何有極耶同豫逰者王君退菴偕其弟樵雪其甥錢君稽稼及其孫子二人二君皆髙年喜談文賦詩而其甥及孫皆績學能文其逺到不可測也寺之僧曰定成曰慧濟曰海潮皆名家子亦好文而善謔既暮相與賦詩而歸豫不能賦因為之記永思堂記桂陽宋任貴先生佐教於髙安題其所居堂曰永思之堂以書屬豫記且曰豫幼孤知自力于學忝科目方從事于都院尋以罪謫雲南方去時豫有老母慟不忍别倣徨道傍觀者皆泣下既十年而老母歿於是豫抱痛無涯矣念平昔孤苦所遭又梗途如此幸其時脫去顛危低徊一官祿足以自給然鬢髮已皓然矣壯而不能揚譽青雲之上以償夙志老又戀祿自羈不得暢情于桑梓以歌吟呼嘯舒其憤悶之氣則宜乎吾之思無已也此豫之所以名其堂也於乎豫讀其書哀其志而悲其窮之甚也然吾聞古之士學而行之也必光榮于一時埀譽於後世而不可必得也則持其身篤信而不惑雖貧窮患難不易所守且以為分定也孔顔樂之終身不改以此爾夫惟窮達不入其心故以之修其身則榮且吉以事其父兄則孝且弟以之教于人則信而從任貴既安於所遇矣則雖窮且老其志得也其志得則其身雖窮且賤無傷也書其説以志其堂使讀者不徒哀其志悲其窮而又知任貴有以不遺其親非今之士能及也慎密齋記廣東僉憲李公某由內翰出居風紀其發詞吐氣恆小心寅畏蓋有得於易大傳君子慎密之義遂以名其齋且命潛揚其説記之潛不敏然知公之存心得戒慎之道矣夫節之為卦上坎下兑兑為口舌之象也節之初九雖剛正而尚未至于甘節之吉則未可有行者故為不出户庭之象家之有戶庭猶身之有口舌故大傳發其義以為君臣幾事之失皆言語以為階而以慎密為戒嗟夫言者榮辱之招也出其言善則千里之外應之出其言不善則千里之外違之慎密之戒所係於君臣者豈小哉中庸以顯微之昭著不可掩也故教人以慎獨後世至周子以匪仁匪義匪禮匪智匪信悉邪也邪動辱也故示人以慎動獨者其迹未形動者其幾已發而所以致慎密于言行者蓋舉在其中矣公之名齋也其意深哉雖然未也彼動而靜靜而動物也不出戶庭非畫焉自止者也慎而密非默然自緘者也動之理嘗根乎靜則慎密不出又所以為昭著呈露鼓舞渙發之本體也歟是非潛心體道者不足語此昔劉器之得溫公不妄語之説退自􅕍括力行十年而後成今僉憲得大易慎密之説自幼學壯行以至于今有成立殆未止十年矣然其存心益密持已益嚴防意益至吾知其不至至誠動物之地不止焉遂書之以為慎密齋記存心堂記安成王仲良氏扁其所居之堂曰存心其府伴讀友過豫道之請記焉且曰仲良好學質厚不外飾不以榮利易其所守其志蓋在于古人而未止也嗟夫吾嘗讀書於操舍之語未嘗不深致意焉夫人以一心之微接無窮之變是非交於前而得失亂于內不有以養之未見其能存之也李延平先生以謂常存此心勿為事物所勝豈非能養之以靜而後能制之于動歟夫士之處乎山林者其評論是非善惡若鑑之照衡之稱雖毫髮得失不爽此非養之以靜者不能及出而任天下之事往往與平時所言者略不相似非惟不相似又倒置之焉抑獨何也豈所謂靜之力不致其極則為事物所勝而不足以勝夫動邪夫自堯舜禹湯文武周公孔子而下凡學聖賢之道可以當大任而決大事知之明行之力者由其中必有主也則何可以不存其心哉仲良有志乎此而山林深靜無外誘以汨其中求之于聖賢之言而且以之名其堂是可謂篤志者矣靜虛而動直其惟仲良能之哉仲良其勉之楮巢軒記丁亥之秋七月既望客有徜徉禁城渡秦淮橋而過王先生之軒者俯而入圜而視之駭且異焉曰何為其然也計其縱橫僅盈尋尺而外無亷隅內無堂戺上無梁棁旁無楹礎不規不矩谺然而中虛又代塗以楮中朗而表疏瑩潔無瑕縞然若晨光之晞積雪發輝吐耀駐影凝白其名為楮巢蓋抱朴而守素者亦何奇也軒之外有竹駢然挺立雜以佳樹風來泠然蕩之則衆籟交鳴猿鶴互答誠有似乎鵲之巢而得其所者而先生方裋褐隱几其中或吐氣而唉或大呼而吟或擁衾而鼾寢蓋神逰乎八極之表而葆光乎塵坌之中肆志于鴻濛之境而相忘于卑陋之域又有似乎有巢氏之民之自得者也客察焉而疑之即而問焉曰夫作於外者中之形也迹之寓者心之符也且夫騁亨衢者不局於蟻垤聞簫韶者不適于凷桴先生學道明時談經王門當接武石渠延譽縉紳顧乃寂寥守拙卑卑自貺豈非所謂內之而弗外者耶抑將杜德機而故為是栖栖者哉願請其説先生曰嗚呼子何言之背也子謂夫楮巢也者髙乎卑也曠乎隘也將蕩乎若無垠之邱窒乎若窞井之涯耶且子謂彼巢也者翔于青冥集于阿閣噰噰而翽翽者適乎否也彼茍簡乎一枝奮翼而上側身而下不過數尺之蓬半畝之蒿而嘲嘲然自以為足者適乎否也所寄不同而所以自適其適者一而已矣於是客無以應竟起謝去先生亦逌然卧軒中不知日之夕也遂書以記之先生字可貞溧陽人劉氏族譜記劉氏之先自湖南徙萬安有四十一承事者由萬安徙泰和之馬迹塘傳三世曰圭徙于菜園又徙源口至務耕别居藍溪蓋自圭至是九世矣務耕之子旭來京師持其家居所修宗譜求記之豫與務耕有姻好不可辭於乎吾鄉文物衣冠之盛自喪亂來子弟足以承其宗而率禮蹈義足以無忝其先世者已少矣然鄉閭之民猶往往喜道故家之後雖托姻好亦必求其先世門地之稱焉者以自矜於流俗他雖崛起富盛不問也此亦鄉人好慕髙致之一事而益見故家有後之可尚也源口之劉氏鄉人之所稱慕者而在藍溪者為尢盛豫嘗過藍溪見務耕築樓溪上樓甚髙爽有僮僕數十人環溪之田數百畝務耕既隱且耕油然自適也然務耕負氣自豪藍溪之西大山中多逋寇行劫村落中官不能捕輒以屬務耕務耕時時率家童縛送之官恆以此自雄一時獨旭循循信厚人益歡悅之今旭亦有子俊拔可愛一門三世如此吾又知劉氏之在藍溪者其澤無窮也於乎非前人之餘慶無以庇其後非仁義無以承其先劉氏之子孫尚其勉之遂書以記其譜富春堂記嚴君宗旦淳龎而溫厚有古長者之風築室于泰和江之南題曰富春之堂蓋有慕乎漢嚴子陵髙尚不仕隱居富春之義所謂百世之下聞其風而作者宗旦殆庶幾乎其近之歟其從子文祐來京師求豫文記之豫嘗論子陵之事謂夫西漢之亡士大夫不能無罪也方其時劇秦美新何其多也倒持太阿以釀成漢室之顛危而後末如之何惟屏迹窮居以不食莽之祿其中情能無歉乎哉及光武興復大業而向之窮居而屏迹者復冒然聞命而起曽謂子陵之賢肯混迹其中歟夫聰明英邁之主所以御天下必有雄謀逺略以籠絡天下之豪俊使之躍然去彼而就此凛然而懼大節義使其心志既定撼之以威武而不變劫之以干戈而不奪而國之根本規模亦有所利賴焉子陵與光武平時豈嘗道及此也當美新佞諛之後抗然髙舉而不顧子陵之用心固自有在矣或者乃謂子陵齒德俱尊而帝所以處之者未能盡夫尊敬隆重之道故子陵決計逺引以自同於沮溺丈人之流夫待士欵曲之勤至如光武者亦豈易得而猶云爾吾意子陵必不如是隘也子陵蓋以吾行之于已者足以助乎當世治化之大者吾又奚以仕為此子陵所見所以卓乎髙出而鮮與儔也故吾於子陵每深察其志焉宗旦之先世碩德顯宦著名當世宗旦雖隱居不仕然放身煙霞無所纍其心逍遙邱壑無所慕于時教其子弟以詩書禮義率其鄉人以謹厚亷恥如此亦何愧夫子陵也豫論子陵之事而表著之以記其堂使世之茍富貴者見之或少止焉而凡號為嚴氏子弟者尤當知所擇也思養堂記番昜王佐名其堂曰思養之堂中書舍人吳君為篆書揭之楣間因其友李君原紋謁豫文記之豫與原紋處有不能辭者夫子欲養而親不逮古今人未嘗不悲痛於斯也而况家室豐豫之時旨甘滫􅔱之既有則其心蓋有所不能已者佐因其情之不能已也而以名其堂使接乎其目以自慰其衷所謂著存不忘乎親者此其一端歟世之溺貨財私妻子而不顧父母之養者誠何人也其有愧于佐甚矣然豫聞人子思其親及其志意好樂不但養之一事也聞佐之尊翁傅巖嘗以耆德選為鄉之老人教導其民甚篤凡過其鄉入其閭其子弟事其父兄未嘗慢也其士者勤於學其農工未嘗怠其業也其田疇必治其播植未嘗後其時也問其所以然曰傅巖之教然也有爭競鬬鬩訟之守令而不決決之傅巖問其所從服傅巖者曰其心之誠斷之平也傅巖既殁其教固在其家庭與其鄉之子弟佐之不忘養其親與不忘其親之教孰輕而孰重于此舍而不思而汲汲於親之口體是念雖日致三牲列五鼎猶為無益况徒思之云乎佐讀書務學蓋有意于親之教者則不可須臾忘之也因併記之佐勉焉筠陽讀書處記進士潛彥鵬始為瑞陽郡庠生從豫弟本之學其容質溫雅其於學甚勤也及取科名居京師相見察其中非徒言者今年夏彥鵬來求豫記其家居所扁筠陽讀書處且以豫弟嘗有以教之也宜必不辭豫亦喜彥鵬之能學也故為記之夫君臣父子之懿仁義中正之實非讀書學問不足以知之六經諸子百氏之言求之於其書而得之于心即其奧以探其源擴其本以振拔其端緒知之明而後得之深得之深而後推之以應萬事無窮也如是而又加之以涵養之功使舉而措之皆誠意之充積推而行之皆志慮之真純可以感乎上可以教乎下此古之人所以學者如此宜其功業過乎人也彥鵬因其所已能者而益勉乎其所未至則其造就又豈今之人所能及哉然彥鵬方以進士觀政於都院日有訊鞠之煩或者疑其於詩書有未暇也夫君子之學知與行而已紫陽朱夫子告任行甫以謂雖忙遽尤必以書册灌溉庶不汨沒墜墮其意蓋欲學者知與行並進而已以豫之愛彥鵬也故備論夫古人之為學者告之且以為之記云存誠堂記古筠司訓周仲翼先生走書京師告豫曰弼世家錦水之歷山下先兄聞禮嘗搆堂以奉親元進士丁之幹先生扁之曰存誠蓋取易間邪存誠之語且為記之矣時老母尚康強無恙弼兄弟朝夕侍堂上唯諾進趨欣欣如也退講學于丁先生求所以持其身者惴惴焉惟辱親是懼稍知自立而母兄相繼逝矣今且老思往日膝下之樂有不能得徒取丁先生之記而讀之泫然不自知其情之悲也堂今圯而復葺之因其名之舊而不敢易願重為之記嗚呼先生之志尚矣夫人有親存而忘之者多矣况于親沒之後惓惓於一堂也耶且夫所謂存誠豈不以絶去非僻以涵養天理之實歟而其道當必自敬始程伯子曰敬則誠敬者誠之存也五常之首百行之原皆在於是而古今聖賢所以立事功而贊化育者皆由于此蓋難能也然而操守之無間足以見夫力行之有本先生之守身事親始終不懈如此非有得于是乎豈講之于丅先生者獨得其端緒耶古稱人子之事親養非難也敬為難敬非難也卒為難卒者非徒於親之身敬之也雖終吾身猶敬焉若先生者可謂敬而有卒者矣敬而有卒不幾於誠者乎是知先生能不忘其親而有得于存誠者深也於是乎為之記藜輝堂記去泰和城北十里有溪曰斂溪靜深甘潔貫四時不涸溪之上有山不甚峻拔然環立端重有可愛者山之外則三顧金華武姥崷崒爭秀出乎雲霞中雖相去稍逺勢不可盡見然其狀益竒也山之中坦夷尤宜稼穡壅泉以上出疏渠而下流故其田恆豐穰其土不可賤取其居人皆勤力以自給無爭鬬囂訟之習劉君晚成自其先世居其地幾數十年而劉君尤不事外慕搆堂以事栖息扁之曰藜輝蓋取劉向校書天祿遺事也堂之前後松竹森茂花卉駢植而故人賔客逰詠于其間者多敦厚士相與談論必本乎禮義由是民之居斂溪者皆知敬慕劉氏也或者謂劉向校書天祿太乙植青藜夜訪其事深逺且不可執千餘年後而劉君取之以名堂抑獨何也劉君曰不然堂本劉氏作也故有慕於向且炎漢之季王綱弛而士風頺向獨秉道不回引詩書道禍福反覆辨難數千餘言以之匡佐人主而不愛其身耿耿乎其忠也千載而下讀其事使人竦然起敬不敢有怠心此豫之所以名其堂也今之為士者當太平極盛之時欲求髙爵厚祿以致顯榮光耀而平居不知以忠自處此何可也於是聞者又皆知劉君名堂有教忠善俗之意同里楊仲基先生來京師道其事且稱劉君之賢謂豫宜有以記之豫昔逰斂溪愛其地之勝今而知劉君之賢作堂而與其地稱是可記也已城南草堂記昆山趙模宗範以善書選入祕閣相與纍月恭遜而信慎弊弊焉不忘豫甚愛之也一日以其所居城南草堂為屬豫記且曰模昆山之窮人也先君平生好學雖隆寒盛暑不休竟以成疾而卒卒時模生始九嵗有二弟亦幼弱老母年始二十八以模兄弟故自誓不復他適辛勤蠶績以育模兄弟至于有成立然室如罄懸模又質魯而材卑學不足以過人行不足以揚名浮江湖窮嵗月僅僅自給而母日益以老矣模恐虧先君之名而辱老母之教也乃不敢逺有所之負郭田數畝躬耕以為養教小學童子以自檢其身不敢辭其窮如是也幸遭逢聖天子制作之盛模得混名士子之次日聽夫先生學士論難之揄揚校讎之雄奧亦甚幸矣既而蒙恩賜還家城南之陋草堂之卑顧模之窮所宜居者願先生辱教一言以賁其陋而飾其卑庶幾模且不窮也於乎宗範信乎其窮哉天下之困苦悲戚孰有過於是者然吾聞古之士豐材而達德鍾祥而萃祉非少也豈其材智謀慮足以膺此盛美哉如模之材智謀慮不足以膺此盛美則宜乎其窮也安乎窮者知命也能知命而安之其惟君子哉豫惜其窮而喜其能安之也遂為之記居安堂記豫同里徐君應麒以材能舉需次于京師者幾三年矣相見而言惟務為篤實毫髮非禮僥幸不為也故凡仕于京者皆愛敬之以為鄉之長者今年冬其子以鉉來省其父因過豫旅邸觀其言談舉止勤勤焉甚似應麒應麒性好飲飲終日不亂以鉉之來也載酒數甕以為應麒夀且以飲豫及夫二三友之善飲者豫不能酒然既遇夫故舊鄉䣊而酒又釀於鄉者也遂酣暢以飲甚于能酒也飲酣以鉉作而言曰家君幸荷國家恩命得徴逐夫二三君子之後老母又康強無恙于家也鉉築室于澄江之南數畝之幽環四面皆平曠多良田陂池雜列可以漁可以溉嘉榖盈疇嵗乏時食可足也成人而冠長而婚娶可以給其費親戚之慶弔賔客之往還可以周其情四時之休暇可以遨逰欣喜以適也樹林之深茂翳之可以休花竹之駢列玩之可以悅瓜果蔬茹之繁實可剝擊而薦也凡此皆吾親平時所營度以遺吾昆弟用能守之而吾親無後顧之憂也故即其所居之堂曰居安之堂願先生辱賜之記且有以教鉉也於乎近世之士宦于外者往往廢弛其業其子弟無所資藉隨父兄挈挈然以仰食乎東西一旦罷而歸至無以為家此仕者之通患也吾觀應麒父子所以創造守謀之善如此獨能無羡乎既以美夫應麒又因以深慨夫今世之仕者不能如應麒也以鉉乃進酒更酌酌已為書其事以記之重榮桂軒記永樂丙戌夏吉文周君公明以文學徴入翰林同編纂祕閣文集因暇日過豫道其先世事有不能不感慨者蓋自其髙祖湖田居士以儒術起家子孫承其業至今二百年矣中庭有老桂數株湖田手植也湖田生蒙泉隱居不仕教諸子各授一經其季子沂溪尤篤行其時去湖田五十年矣桂森茂如雲柯葉布滿一庭中而周氏亦極盛宗族幾數千人一門子弟賔客相往來以歌吟笑樂於其下者無虛日及元季居室燬于兵桂所植四面簷楹連屬烈焰熾爍枯然成朽株無復生意而沂溪已沒周氏亦稍稍衰矣暨大明兵定不數年桂勃然復茂周氏亦復興沂溪之嗣溪間處士即公明之尊甫又因其故址築室而扁之重榮桂軒日與其弟仲方先生招故人耆老席繁隂而盼崇柯蓋亦念前人之培植慨興替之相仍不可常也前鄉貢進士安成劉雲章先生為之記矣至是溪間之沒又十餘年矣存者獨仲方先生又已老矣于是公明復屬豫記之於乎世之變固屢矣而周氏之桂厯數世而獨存肇幾先物而符合於人事不亦異哉豈非其先世培植之深耶然李衛公平泉草木記謂桂有三品而陸務觀以為未之見及觀朱子釋楚詞引本草云桂花白葉似竹則豫見之于嶺南者其説蓋合山巔水涯亦多有之正春始花豈陸公獨未之見耶陸公又謂春花為桂秋冬花者木樨則周氏所植殆非桂也然孫少魏東臯雜記謂巖桂冬初作花是即陸公所謂秋冬花者木樨也則謂木樨為巖桂其來久矣周氏所植殆巖桂也歟豫方期過文江之上掇其英而佩其芳以頌周氏之重榮也故考述其事以為之記耕訓堂記溧陽北行一舍許有溪曰瀨溪溪之水貫四時不竭凡田之溉於溪者獲必倍無豐歉盈縮也又其平曠衍夷樹林鬱然出沒乎雲煙者不辨其際洮湖在其東五里溪漫漲潦集則於湖泄焉天久弗雨畝澮皆竭則湖之所蓄足以障遏溪之下流而資其餘波故一鄉之壤賴是溪而沃而溪之宣泄又在於湖也凡湖之上溪之外京師東南諸山之逺不可盡見者皆可坐而見之而泳於湖遊于溪者又與夫煙光水色相茫洋也故自溧陽以北惟瀨溪最勝而郝君景髙家於溪之上窮山水之趣以自放課僮奴耕環溪之田數千畝嵗取萬餘斛擅江山之勝者幾四十年有子嵒稍長知為學遣逰邑庠為弟子員而扁其所居之堂曰耕訓因豫弟本之屬為記凡人無所纍於心者足以樂乎其身而尚其志漢諸葛公有桑八百株有田十五頃躬耕以自給觀其所以訓子皆聖賢之格言景髙誠有慕乎其人則所以訓其子者有在於是也嵒從吾弟本之學書經進止安雅而言辭和易語云野處而不匿其秀其嵒之謂哉用是知景髙之所以教矣是為記樂菴記君子之樂非在外也求諸中而有其樂焉斯樂矣求諸中而無有不樂也樂在內故不能奪之於外樂在已故不可示之於人不奪之于外不示之於人此吾友日孜之所以名其菴焉日孜以壯年筮仕佐教鄉邦得不去其家其親戚故人視之如未嘗仕又其職主於教非若他有司政治之繁外患不入其懷而道可以及人誠可樂者然日孜意不在是也方且置書百餘卷上自唐虞之典下迄近代名賢端士之文詞以及醫藥方技百家之説日夜研窮其旨自以謂至道之無窮非有得於心則不可以已也夫小方曲藝之流茍有得其説者皆樂也况夫聖賢之道之大與霄壤並立茍有見焉將超乎萬物之表而不可拘也日孜於是而盡其心一旦渙焉其為樂孰加哉浩乎其自得沛乎其莫之禦酬萬變而不可窮斂之方寸而不見其所有所謂不能奪之于外不可示之于人者如此而仲尼顔子之所以樂者亦在此而世之學者方規規於文詞之末窮弊其力而卒無用焉豈不可惜也哉日孜八世祖槐應宋寶祐間以釋褐奏名第一出守吉州宋亡占籍泰和江之南其門墻故址父老猶多識之而今奪之他人久矣日孜所居在城中髙廣深迥所謂樂菴者也夫仰前人之盛而有志於聖賢之學日孜所至詎可量哉靈山縣改建儒學碑記靈山小邦也其俗視他邑尤陋延平李善初為宰始至而病之思革其俗曰朝鮮極東夷也箕子居之而民化焉今有先王遺風栁州南蠻也子厚教之其子弟皆知為文詞靈山豈獨匪人遂注心焉時舊學宫頽圮殿廷惟綯茆黝堊漫漶圯隘而惡且西向非尊素王制思改建之適朝廷方用兵自江以北五大藩學校為之一空凡百力役供給南方困焉善初不敢以是重困其民乃往謀之於邑文學林某某力贊之謀之諸父老樂而助之資則又進諸生勉之諸生咸躍然喜于是梁柱之材出自生徒僦工之費則損已俸視民有餘力者役之民咸忘其勞遂卜地於縣之東南經始于辛巳之閏三月八月而廟成自殿而廡自廡而門皆煥然悉遵今制視他邑無以加之殿之東為堂堂之下東西相向為兩齋簠簋罍爵鐘鼓之屬庫庖之所無不具焉既而文學來朝于京誦其事屬豫記之以劖於石且曰昔之宰靈山者往往獠視其民民亦以獠自負李君獨加惠焉民知自愛嗟夫習俗之不美豈獨靈然也化而導之者恆激其外以移其內民且狼顧鼠拱之不暇又烏知所謂堯舜禹湯文武周公仲尼之教耶且夫平時通郡大邑略不聞絃誦聲過宮門闕曽不一下車趨者而靈山蕞爾僻小而於南北倥偬不暇給之際乃能委曲盡心以教化為事得非知為治之先務者乎是可記之以為宰陋邦者勸且以見聖人之欲居九夷果可行也董其役則邦人某某于法宜牽連得書豫既述其事復系之以詩曰於惟聖道為民之極如元氣之運俄頃弗息於惟聖道其大如天無逺弗覆匪靈山則然靈山之陋如川弗障惟賢大夫示民所尚乃崇斯文乃新廟學廟學既成有刻其桷有翼有嚴有穆其容丹漆煌煌既明孔揚昔焉靈山內訌外猘弗民其民政悖教泥今焉靈山乃有兹宮乃循今制其來其同猗歟靈山而克臻兹彼不靈山寧不忸怩猗歟休哉玉振金聲惠此小邦以底於大成重修淨居寺碑記惟大雄氏之教自西土入中夏行乎世者蓋千二百年於此矣其為教以無為為宗以慈惠強忍為道以圓融無染著為神而又以禍福果報一切之説以警動其徒而引掖之其持已應物之方亦𢎞且周矣夫自大雄氏之教之行也堯舜文武之道周公仲尼之術導之而弗從禁之而弗止者徒聞大雄氏一言惕然自省畏心生而悔心萌其感應之機亦何其異也豈其説有以動乎其人哉然聰明豪傑之材世未嘗少也習周公之言而或為之説以左右之抑獨何哉以彼教之𢎞且適而左右之以豪傑之説翼之以雄髙盛大之言宜乎其昌熾如此也古筠郡城之西有所謂淨居寺者世相傳以為唐良價禪師經逰之處宋元豐中蘇欒城與郡守毛公惟瞻嘗往來其中吟咏以取適一時者發郡志驗之蓋然至今寺之勝大著一郡以此夫蘇黃諸公之在宋也其事業文章非不豪偉一時然信慕佛氏果報之説終身焉不悟抑豈有所見哉元季兵爭寺燬於兵者無遺構大明洪武壬午春郡有吉祥院僧大機者始經營以復之初為堂若干楹既又為大雄殿𢎞敞壯麗自殿而廡而門而庖寢之所鐘鼓之縣像位之列以次皆具若干年悉復其故大機勤慎而開敏又率其徒力行以遵大雄氏之教戒者故所為有成功如此豫友潛溟來屬豫記其事於乎豫之言非有能左右乎大機若蘇黃者也而大機亦不待豫言左右之也獨念吾徒能服聖賢教戒就事功如大機者幾人也因論述其事以見大機能自強而有立而吾黨之士或去此而入彼者可惜也陽春縣學貢士題名碑記廣東百數十縣之地文章功業之士蓋與中州並至於地之僻陋瘴癘之深毒如肇慶之陽春者雖偉身壯貌之士亦少見之不但文學然也豈其土地風氣有以汨之哉抑受命來治其地者以其地之惡也教道薰陶之方茍且而不盡致其人之材質無以自變於乎天之降衷嶺海之逺與齊魯之近同也陽春豈獨有異乎哉夫陽春由秦漢至今千數百年其人明禮讓而服教化久矣何獨文字功業之士未有聞者前志皆然豈嘗有之為志者不知采而録之尤可怪也往年豫假令是邦數月得番昜吳君子育為之丞子育喜文辭暇日必相與課諸生為樂有崔生某者能為文豫二人皆喜之去陽春六年而子育來京師欣然告豫曰崔生以戊子之秋舉于鄉而中於有司蓋陽春能以文辭舉者始自崔生今日前乎此未有也子育遂礲石為題名俾來者有所感而勸以豫嘗為令陽春識崔生也屬為記於乎子育於陽春之士用心厚矣使子育用其心于齊魯之邦其功效當何如顧陽春也使治陽春者其用心皆如子育德行材美之士烏知其不顯榮於時陽春雖陋不陋矣子育幾三考將去陽春不知繼此而治者尚有其人否也惟我皇上化被幽隱如春至氣達隂崖寒谷物無不暢吾知陽春雖陋自此負道德抱文辭而進者當復有人而未止此也諸生學者尚以崔生自勉毋安于陋而自棄是為記重修江陵佑聖觀碑記江陵龍洲之上有觀曰佑聖相傳唐景雲間雪菴李真人始來築之其後有樂間趙真人者嗣而葺之室宇煥麗為江陵偉觀元季燬于兵大明洪武戊申玄靈陳煉師與其徒某復經營之凡幾年而宮門殿廡髙深宏壯之規悉復其舊三清天皇之像大乙紫微北極之祠以至鐘鼓之懸燕間之居賔客之舍井竈庖湢之所無不皆備而羽人仙客四方逰遨之士或仕宦而倦歸道江陵出龍洲而不之佑聖者咸以為歉也夫江陵跨衡湘而連吳蜀于古蓋為重鎮方盛時無事其民爭奢競豪而仙宮梵宇亦極一時之盛麗及天下有故干戈之鬭獨當其衝則有不勝其害者而所謂豪奢盛麗者忽焉化而為埃塵廢而為邱墟非太平涵育之久不能如其故也獨其間佛氏老子之徒興起廢敗若甚易然者其故何也夫變故多矣而其澤獨流興替屢矣而其教不熄豈其維持之力有以勝之耶然老氏之術非若佛氏之箝人情而鼓致之要其本能葆光斂和以抱雌守黑柔強勝剛使天子莫能賔萬物莫敢臣故其清淨卑退無為之道亦足以禆世而輔治非獨靈化飛去役致神物禱祈驅馘之小數為然也夫其道不同於堯舜文武周公仲尼之道者亦于堯舜文武周公仲尼道之外而觀之則老氏之所以獨立而常存既僨而遽興而佑聖之建獨巋然為太平宏侈之先者有以然矣是可書之以告來者張侯某來為令泰和侯江陵人求豫文歸鑱諸石豫既道其道之所以能然者告之復系之以詩曰靡靡龍洲煌煌神宮靈臺曲館窈窕穹窿笙磬鏘鏘有鼓有鐘鸞輿降止百神下從金幢玉節彌羅大空丹霞紫氣騰光重重下視九土九土茫茫西極崑崙東望扶桑混元至道無體無方曰清曰淨是謂非常闔闢玄化樞紐乾綱下徹九幽上摩三光沕合無間衍祉流慶於維聖明穆穆皇皇與天同體與帝同行惠鮮羣黎物以阜康荆水之陽龍山蒼蒼萬靈衛之呵除不祥上祝聖夀與天俱昌於萬斯年徴此頌章延真觀紫微閣碑記泰和之西有岡曰黃茆岡之上舊為白鶴觀宋太宗改洞虛英宗始賜名曰延真環觀東西為七堂其東北曰仁靜之堂今道士趙希老蕭奉吾因其地度為紫微寶閣上以祀北斗九皇之神按天文志紫微即紫宮也北極最尊在紫宮中曰太一居其南曰太微在太微北者北斗也北第一星曰天樞二曰璇三曰璣四曰權五曰衡六曰開陽七曰搖光杓攜龍角衡殷南斗魁枕參首以轄九州而以雍屬魁冀屬樞兖青屬璣徐揚屬權荆屬衡梁屬開陽豫屬搖光至於十干十二支辰亦皆有所分屬以為七政之樞機隂陽之元本也而道家又有謂尊帝二星者通號九皇晝夜運建與天同行故曰斗為帝車運乎中央臨制四海分隂分陽及夫建四時均五行移節度定諸紀一繫于斗蓋凡星者體生於地精成于天列居錯峙各有攸司故斗之功用神化有不可掩者如此於乎九州之氓茫乎如埃塵蟣蝨然而謂其命蒞於斗之次彼豈知之哉况動作非道速戾於其身妄祈非分以僭干於常度沉迷膠固終身有不可釋者由是而修真行道之士憫之而為之祈祥請命斡移災咎又以其所生之辰亦蒞于斗加精意而禱之夫豈徒然哉蓋以為是足以啓其遷善改過之端也至希老之為閣又取象於太一紫宮敬恭而奉承之者亦至矣而民尤或懵然不知所以為遷善改過者其速戾於躬豈不尤重乎哉閣髙幾丈廣若干深若干經始于永樂某年月日某年月日則其落成之時也希老之師祖蕭公省菴省菴之後曰韋公志菴志菴之徒三人曰王用相其二即奉吾希老也奉吾與希老捐已資命徒某往南市美材遂成此閣而能始終相其成者長道會彭公海雲提典觀事蕭公惟中也希老求豫文記之豫為著其事以記之矣復系之以詩曰黃茆之岡神光離離紫閣凌霄上瞰虛危貝户天開金桷霞飛仰瞻太一尊居巍巍太微四門大道逶迤九重獨運七政迭施三台四輔後先導隨斡旋萬化平分四時嗟哉生民彼昏罔知茫茫九土孰統轄之福善禍淫孰參其機巧訛搆煽孰察其微權衡默運節度潛移賞之罰之為民命司絳節丹幢仙童玉姬颯然戾止百靈衛持牖彼僻愚釋其繆迷隂翊皇度與道同歸皇道巍巍皇風清夷於萬斯年降此蕃釐用拙齋記梁子晨興步出西園坐劉先生齋中先生名齋曰用拙若有巧者過之顧之而自誦曰巧者嬉嬉拙者戚戚巧者之得拙者之失曷不為巧者其言則巵其行則澤言而人悅行而已獲萬物棕棕惟拙者之惛衆人祝祝惟拙者之局慎勿勉為拙者劉先生聞之囅然笑已復色斂而疑焉曰將為拙者乎將為巧者乎巧者未必得拙者豈盡失哉雖然老子大巧似拙豫小且弗巧何大拙之似且夫巧者之得拙者之賊也巧者之設拙者之漁也寧受彼之漁與賊哉將去而巧拙之間哉乃者之言得無意哉子其為吾擇焉梁子曰嗟乎何言之惑也上古之世民何能巧亦無有拙巧拙未形是謂得道本得道之本者不巧而巧是名大拙拙者巧之至也去古既逺然後巧言相欺巧行相劫巧名相炫巧實相翹靡然不得以安其生其巧益滋其拙亦至矣故巧者之機拙者恆執之拙所以為巧也韜華反朴乃可用世世無竒士孰辨巧拙惟栁宗元欲抱拙以終其身而杜少陵欲用拙以存其道少陵之拙屈於時也宗元之拙亦以巧之窮耳巧窮而拙者勢也屈于時者在天焉先生其可以一時之言而移向者之志哉亦盡於已而聽于天也先生曰巧言如簧誠是也哉吾將終其身用其拙矣於是巧者亦不復言書以記之先生字廣淵楮窩記永樂七年秋豫與翰林編修朱公文冕偕被召來北京既至於五雲坊之東得屋以居然迫乎車馬塵坌之中寢處之外無尺寸地空又壚酤之與鄰歌姬舞妓之嘈雜乎朝夕也文冕病之不得已乃背衢反置其戶别為道出入以稍絶市喧又惡其弗飾也束葦梗架座為承塵而􅀢以楮墻壁左右以楮墁之又嚮明為楮忩楮瑩潔而忩甚疏達於是通一室皎然晨曦所徹隅奧皆白入乎其中者視其貌亦濯濯然衆駭而異之鄙童頑僕旁睨而不敢入清賔雅士日至而忘歸焉無可憎之儔無拂情之務又甚溫而密故雖隆冬沍寒醉卧而起握筆而吟不知折膠裂指之凛能侵乎其肌也雖無髙山喬木以休而息然時取古人之賦咏竒聞異見之紀載披而玩之恍乎若即幽而入深出洪濛而逰汗漫也談論天地物理之要歸以窮辨其是非則雖外之囂若不聞乎其內雖四壁之彈筝擊築歌呼怒叫無所干而能聒也惟如是故文冕居而樂之因名之曰楮窩其友檢討王君希範既為書二大字又屬豫為記嗟夫文冕與豫均所居獨巧飾之如此使其平時瀟灑自得之趣一旦出乎卑隘喧迫之表信乎其不逺求而獲甚竒者矣夫文冕處一榻之小如此其得也事有大於是者使文冕處之其材志思慮之精乂烏可及哉故為記之詳焉文冕茍去此而南也失楮窩必于吾記得之也中泉記百喜之山當龍泉泰和之交雄峙峻僻邑之山鮮與儷每晨煙既落陟髙邱而望之宛然匡廬岷峨壺嶠之輻湊乎左右前後也有彭仁貴者搆堂居之既成忽有泉自堂之中迸出湛潔澄瑩掬之可見指試酌而嘗之味甘而冽視他泉為最佳遂欣然竒之以為一家朝夕之求雖淫潦而弗溢雖旱乾而弗虧且不偏不頗適當堂之中於是南宮從事羅君仲舉過而顧之扁之曰中泉書二大字遺之而介豫為之記豫嘗考之爾雅曰水本曰源源甘泉孟軻氏所謂源泉混混不舍晝夜是也然泉無定所流行地中無處弗有鑿而求之皆可以得惟不待鑿而自湧不待求而自得斯可謂地之靈而泉之異者也然亦必由夫人有以感之非偶然者焉李廣利忠於王事拔刀刺山而得泉薑詩孝于親得佳泉于宅畔蓋泉出有源猶善積有基也仁貴之居家也其亦和而兄弟字而幼孩樂而父母質直而純龎雍穆而慈順翕然一門之中沖和之氣發而為瓊漿玉液以昭夫一家之靈異泉乃無自而出耶非耶吾知仁貴於斯泉也漱之而神情爽逸濯之而襟懷蕩滌鑑之而貌以莊容以肅飲之而夀考以延沉疴以釋深山大谷之中明忩淨几之下而泉有若是者不亦異乎不亦異乎仁貴尚庶乎靜以畜之浚而深之時而酌之勿汨而渾之勿濘而湮之庶斯泉日汲而弗竭也哉杏林清隱記嵗辛丑春姻家生楊鼎過豫而言曰豫妻兄郭太素氏世業醫療病多竒中過門而求者迹相踵嘗語人曰古人用藥制方有不可移易者而亦有不可悉用者大抵因彼之病制此之方病之證有不齊則方之制無一定太素之言如此故其術驗而活人益衆前進士蕭子尚即其居為書四大字扁之曰杏林清隱畫史孫碧霄又繪而為之圖願有以記之豫辭以未獲造杏林之下姑俟後日則又告豫曰杏林之外羣山秀出每煙收雨止則霞影絢爛如蓬壺員嶠之不在人世一水縈回沙鷗漁艇相上下於數里間自郭氏先世有父子並登科者名冠於朝故其地至今號為冠朝雖太素不得為儒而邃于醫挾濟人之術信於一鄉利澤及于人人觀其所以為治則又疏通豁達不拘於陳言而亦不出于古人三尺之外雖未必能生死人而實未嘗死生人也嗟夫太素之賢如此是可記者夫病有可生之理而醫無起死之方用藥偶然而一中者輒父子世守之以為傳家之祕殊不知地有南北時有寒熱病之證雖同而人之身又有虛實強弱之不齊者不可執一而論蘇耽之橘井何地無橘何井非水而蘇耽能以之愈疾強而效蘇耽者必誤殺人此太素之術所以異於人而取效則多于人人也歟漢程不識之為將其守法律也嚴而敵不敢犯李廣之為將縱弛於法律之外而敵亦不敢犯人徒知程不識之可法而不知李廣之尤可法者在於不可法之外也用藥如用兵太素之為醫其李廣為將之道歟董仙活人之術要不外于此遂書以為記重修龍城寺記泰和東四十里有寺曰龍城蓋其山自西南數百里外勢踴躍如龍相屬不絶至寺之近鬱然環之如城故其寺以之而名其後據贑江其前紫瑶三顧諸峰望之皆可見其幽逺迥絶顛崖絶壁之間而蒼翠無窮逸韻鏘發登其髙以攬煙霞松柏如人世塵土之既逺而天台廬嶽相接迹乎左右也蓋其勝莫與為比者而寺之建相傳昔饒之福嚴寺僧曰亞愚以善詩得名自宋元豐間始挂錫而營此山元符之際請于朝賜額曰龍城其所建殿廡門廊極為煥麗元末燬焉國朝初僧肇象初與其徒數人乃為法堂若干楹永樂癸未秋僧定成善仁應機惠濟乃謀為正殿謀既合遂發其所藏購材鳩工陶甓于野伐石于山翕然皆作不兩月而殿已成蓋任其事者人各自盡而總其事者定成也堂在殿之後勢最髙涉級而升者幾丈自堂而殿而門規制皆有加于舊于是人之逰龍城者愛其宮宇之邃入其中常倦而不知還不獨以其山川之最勝也豫來梅岡數愛定成聰敏能賦詩所與交者又多名士如前吏部尚書劉公嵩皆是因竊異之曰此與亞愚無甚異者豈其創業興起時至而人出亦若有數然哉寺之建得其勝守其教又不乏人如此則宜乎其不落莫也而况其教有足以動人者乎因定成之請故為之記果確齋記徴士泰和余君斯延自少知力學明禮義于古先聖賢之道世俗委靡之習必欲去乎彼入乎此得之于心而措之于行事不但已也初從元進士劉雲章先生授書其志甚篤見世之徇名求進乾沒而不恥或材不逮其職而茍且依違顧盼眷戀者未嘗不私竊惜之遂因周子論誠章以果確名其齋而其持守益力矣洪武初聘至京師以老病告歸遂無復仕進意田廬之幽山水之勝雅歌觴詠縱意所適嘗拄一藜杖登髙邱四望慨然曰余乃得為太平幸民而無聞于世陶𢎞景樊夀昌豈豫所慕哉遂教其二子肆力于學久之其冢嗣學夔登永樂二年進士第選留翰林為庶吉士有旨擇十九人者教之俾益進于學為文詞必底于古之作者而後止學夔十九人之一也嘗暇日過豫旅邸以果確齋屬豫記豫素知徴士而又喜學夔能紹其家學故不得而辭之雖然果者陽之決確者隂之守也周子之學在于主靜而已惟無欲則靜而果確亦惟無欲者能之所以斷天下之至疑當大任而不動心也徴士誠有見于此焉使其措之天下當如何宏達也惜乎其老矣而世之知徴士者又少豫故論次其學問出處之槩而驗于果確誠有得也遂以為之記碧落清隱記太學生瑞陽梅鼎嘗過豫旅邸道其鄉彭君文夀隱居之勝而豫弟本之教瑞時嘗從家君過之飲酒甚樂因題其所居曰碧落清隱而屬豫記之蓋碧落山在郡治之後山之下文夀居也考瑞陽志碧落山不見于紀載而鳳凰山適在郡之後豈即所謂碧落山耶山下有李八百洞蘇黃門嘗賦詩焉世傳蜀人李多真修真其中多真年八百嵗故洞以是得名又云多真嘗詣陳圖南及門而返圖南追之不及遇白鹿先生問焉先生曰我神仙李八百也其行動八百里多真女弟明香亦隱于華林山之玄秀峰鳳凰岡乃其故宅即今所謂碧落山也其為地雖密邇闤闠然仰而觀之秀朗明麗松雲竹霧蔥翠森茂隱然煙霞之表不出郊坰而得竒勝如此可美也文夀無所慕于時休休然尊德而好禮外物不足纍其心故所居之勝益竒然神仙之説荒誕不經君子所不道者獨世之名山大川往往藉其迹以取重於世若碧落山者使無李八百其勝固自可尚也為之記使覽者得其勝不泥其迹可也好古樓記王君樵雪自少已英敏迭宕讀書慕古人之行視一世屑屑無足可其意者老而無所合乃偃然獨處梅岡之山中築樓岡上環樓之山如奔濤怒躍而樓又最髙望之無不見見之皆可愛也君喜飲飲酣而吟倦覽文信公之舊里望胡忠簡之故鄉慨然嘆息以謂今之世不復見古人功烈之盛也因名其樓曰好古之樓又多蓄古書名畫于其中君擇其論議之精揮灑之竒欣然若神交其人而與之翺翔乎其間而君之耿介拔乎流俗者亦豈今之人所易及者哉今漢王為書三大字俾揭于樓上雄偉飛動見者悚目由是巖壑之間鳥獸草木之微皆光景煥發而樓之勝亦嶐嶐然鮮與為比於乎美哉君之六世祖約齋進士丞相文信公交友也嘗從文信講易于道體堂上公為大書履恆謙益四德以遺之至其曾孫秋澗為萬丈樓以貯焉百餘年來徒見其遺址荒基莽然而已至于文信公一時往還翰墨亦零落逮盡人事盛衰之際有足慨者矣而獨王氏之澤未嘗泯也斯樓之建益雄壯偉傑其聲光氣烈足以追配昔人故雖忠臣之遺墨既燬而賢王之玉翰又後百嵗而作者其亦有追繼乎今日之美也哉安止軒記西昌曾子貫先生于其所居之後為軒曰安止取書益稷篇所云而屬豫記之夫人之心所當止者義理也惟君子不陷于人欲之危故能安得夫義理之正而不遷故能止安而止故常無欲而靜而馭羣動宰萬化本之以修身推之以事君治民擴而充之和神人奠上下而感靈致祥皆由于此先生于此蓋有所未暇而守之以修其身者則嘗裕如也蓋先生自幼而壯勤勤懇懇讀書以明理持其身未嘗有過居數椽僅蔽風雨而其心曠然若無涯者種魚于沼治蔬于圃耕稼于北郭之外而其身油然自得屏居獨處不妄交于人而世之妄者亦不得交于先生也教其子以學其子入縣庠以春秋舉鄉貢而教之益至雖甚貧不以貧而易其所守雖老且倦而其志自如不改而又名其軒以此則其中之所存豈常人所易及耶世之感物而趨利者心志思慮頃刻為之改圖衝衝然不知其所止蓋可惜也先生長于豫十年而豫深知先生居間暇嘗過焉相與言皆切實可用終身者又多能于地理隂陽祿命數學皆兼通其意而究極其精専其業者不及也為記其軒因并及之泊菴集卷四
