body:
  text: 泊菴集巻十四明梁潛撰銘素菴銘翰林侍講兼左春坊左中允鄒君仲熙名其所居之室曰素菴今翰林學士胡公記之矣君謂日相與至其菴之勤者無過予宜銘之蓋予與君處者十五年矣其能知君宜無有過於予者君所居廣不盈丈軒楹户牖之通非有雕刻藻繪之飾也盤盂牀几器用之設非有瑰竒靡麗之製也朝夕飲食酒漿脯脩之供又非有牛羊膳羞之冨山藏海出之珍也然而羅列􅍥致充牣乎其中翻繹披玩而不以厭者皆六經諸子百籍之書以及秦漢以来九州四海金石所刻之文怡然以自得傲然以相忘日之夕而尤忘倦者又皆一時賢人志士與之相徃来講而求之之際不資之義理之精微則擇之文字之奥雅不考之是非之得失則辨乎問學之純疵至其坦徑簡直渾朴無文有觸於己即發諸口非有回曲隠避之嫌而人不以為病者盖亦其任情之真而莫逆于心之深者有以為之也君為人質素如此而所居又不為華飾此其菴之所以名也而非予其孰能知之也哉君始自南康星子縣學教官入教太學自太學擢翰林侍講尋又兼侍青宫十五六年之間榮名寵祿之至而常泊然以自安澹然而自足視其在太學如在南康時其居従臣如在太學時始終一致未嘗少變然則所謂素位而行不以富貴貧賤而動者君其庶㡬乎哉宜乎其居之陋而其心有以自適也君平生尤力于學公退之暇手不停披日抄書嘗萬言其學既宏矣故其文有得於古作者之意尤深乃述其所以名菴之意為銘其菴曰太羮不和大圭不琢破觚斵璞古道斯逺相古至人含和内暢發為至文輝照萬象我視斯菴渾朴不文素琴無弦𤣥酒在尊以悦我躬以燕諸友文在兹乎銘之不朽崇徳堂銘并序淦有隠君子曰章厥謨其為人清修自守不汨于流俗而好學篤志進于道者不倦翰林學士解公過而愛之為名其堂曰崇徳復書二大字俾掲之楣間使朝夕觀覽以自警庶㡬見其徳之崇也予為銘曰惟道之修曰惟崇徳日進于髙曰一簣是覆堂之孔幽潭潭渠渠豐艸在階佳卉紛敷君子之樂敬兹明訓惟永永是若敏求齋銘并序夫古人之學固有以魯得之者然能敏以求之亦古之人之所難也生乎今之世學今之學而不知以古之道自勉望其為古人之歸鮮矣古筠王子堅學於古而能敏者于是進士濳彦鵬為題其齋曰敏求彦鵬又屬予為之銘曰聖賢之學義理精微惟敏求之乃得其㡬動静之際冲漠無朕其迹孔昭其㡬至隠欲心滋熾道心滋微雷奮霆决審其要歸弗牽于欲弗尼于私勇徃弗怠敬哉在兹玩易齋銘為蕭棻題有翼者齋亦孔之幽林木翳如春泉始流有翼者齋佳卉環殖彼玩易君子于焉以息左圖右書簡帙紛披未畫之前其㡬莫窺曰誠無為曰静無欲天地之心庶乎可復山川春涵雨露時施淵黙霆奮孰測其幾魚躍于囦鳴鶴在天既㑹厥理相忘於言素琴無絃尊則有酒薄言酌之以介眉夀栁溪梁氏鍾銘并序濳以淺陋之才遭逢聖主竊官禁林兼侍青宫雖寵榮之已至曾愧懼之敢忘家有老母一弟混又典教外郡闔門食指之既繁仰事俯育之未遂於是念君親之恩厚而報稱之未遑也凜乎其不能已而子弟輩猶或恃其不可恃之身而恬不知戒可乎哉因鑄小鍾以警昕夕而系之銘曰惟惰與傲予匪攸聞惟恭惟敬乃裕厥身勿二其心師于仁人克念厥訓永保有家蕭氏鍾銘有序泰和城西栁溪之上為里人蕭𤣥輔之所居𤣥輔改築其廬宏壯而髙明乃冶鐵為鍾于家以祀于神明以警于昏暮而謂鍾者八音之宗衆樂之祖可以和神人而格上下乃謁予為之銘且使後世子孫知作之所由始也𤣥輔為人和易而恭敬事其祖母與母甚謹兄弟五人相友愛尤篤過其閭入于其家孝愛之聲相接也于是為之銘曰有嚴渠渠有翼其楹有銑在懸喤喤厥聲衆律之凖八音是則一考一擊百神来格鏗鍧震揚聲聞于天何幽不即何隠不宣惟善之積氣乃至和氣感聲應降祥孔多敬之弗怠延于孫子粤千百祀無有窮已泊菴集巻十四
