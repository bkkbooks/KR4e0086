body:
  text: 泊菴集卷八明梁潛撰行狀竹亭王先生行狀先生諱沂字子與竹亭蓋所居之號而學者因之以號於先生者也姓王氏系出琅琊周司徒敬宗之後晉太傅𨗳之裔也代有聞人具載其家譜髙祖叔可有孝行理宗時榮王聞其賢辟掌府箋翰注國學待補曾祖孟炎祖性夫俱隱德不仕父以道當元盛時客游淮汴間以詩謁李韓公道復韓公薦之仁宗潛邸仁宗即位欲官之以親老辭歸其配彭氏為里望族生先生自幼時聞張南軒師孟子義利之說心已慕之既長益刻苦自勵從鄉先生楊升雲安成彭復初學易經習科舉文辭而於性命之理尤造其精微其學大進元季衰科目廢矣至正癸巳江西行省參政全普菴撒里分省贑州乃復設科取士遂以易經領鄉薦屬四郊多壘道阻塞不通行省上其名京師時元儲撫軍得便宜授官為恢復計命下撫軍院授福建行省照磨不赴尋授亞中大夫吉安路治中亦不受未幾而江西陷沒時戊戌夏也國朝洪武庚戌考試于廣東明年臺臣薦為諸王說書召至留數月授福建鹽運司副使先生以老懇辭遂賜歸田里自是屏居不復出所居城西龍灣之上有竹數百竿日寄傲其中誘接後學降意怡顔于天理人欲之際諄諄然辨析必造其微學者欣然趨之而皆有所得為古文宏辨浩博造之既深而達其意必暢擇之既精而致其辭必豐至于論辨古今成敗得失之際馳騁貫穿而析之于理如河之赴海如射之中鵠蓋與古之作者相上下無忝也尤喜賦詩所與逰者皆當時名士若襄城楊伯謙秣陵周湞豫章萬石大梁辛敬清江彭鏞劉仲修鄉先生劉尚書昆弟廖文學愚寄陳海桑心吾與先生之弟御史君子啓日賦咏往還更唱迭和以商確雅道為己事溫厚和平出于自然而音調格律之嚴必合于典則興之所至常登覽臨眺窮山谷之勝而後止惜所作之冨而其槀多不存近所傳二妙集者先生沒後出於聞人蕭翬之所收輯直十百中一二耳所居頗隘别為一室倣朱子家禮作主以祀先其法制極備歲時祭祀拜跽升降動合禮儀先世墳塋率子弟祭掃率有定期雖風雨不避事其親至孝親之殁己久每念及之輒悲痛形於容色於親戚尤有恩意始終未嘗以貧冨異其情與其弟御史君極相友愛御史君始以罪謫役和州先生聞之終夜不遑安寢家貧無以為資貨所有田業往給其費尋命戒行李躬往視之久而後歸既而御史君以宥還日相與怡怡然居處未嘗少離而御史君亦甚愛先生先生儀觀偉然氣岸髙邁而和氣充溢渾然不見其鋒頴御史君狀貌魁梧威嚴整肅昆弟常從容出鄉閭人望而敬之所謂二妙集者御史君與先生所作皆在也其文曰竹亭退槀者猶若干卷藏于家先生生平自處者嚴而待物極恕口未嘗言人之過不求異于衆而所為自出于流俗不拂乎人之情而所接自中乎矩度元進士劉雲章嘗贊其像曰淵乎𤣥酒之在尊也凜乎大阿之未出匣也皭乎其清而挹之弗竭薰乎其和而即之弗可狎也其出也曵裾五侯之門而不嚌其鯖其處也稅駕七賢之林而不逸于柙吾嘗求之古人蓋不答陳蕃之辟而唯笑傲于其榻者歟不然使及門孔氏則舞雩之咏歸端章甫之禮樂固將進退之綽然而特視其所合也說者謂是贊足以得其直臨沒强起扶坐神色不亂呼御史君至與稽首曰永訣矣實洪武癸亥六月二十七日也其生元至正丁己五月二十日享年六十有二娶陳氏先沒繼李氏皆有婦道子三人長伯貞今為瓊州府知府次某皆夭女一人適同里嚴𤣥齡孫男二人行敏行儉今以進士為翰林修撰曽孫男穟䅘鉉秬稹皆先生沒後生葬千秋鄉五十八都大徑之原於乎先生之才之學足以當大任而遭時弗康故囊括以自晦逮海宇既輯遇太祖髙皇帝之盛而先生老矣道不得行于時才不及見諸用君子蓋多惜之先生之葬尚未有銘于其墓者潜于先生獲聫姻好又嘗受學于御史君及侍先生而知之者也于是伯貞屬為之狀第謭淺蕪陋不足以知先生之深謹録其大槩以俟知者擇焉故監察御史陳公行狀公諱繼先字仲述姓陳氏陳氏之先自周武王封虞舜之後于陳始得姓秦以降多以功業著而髙年盛德在漢獨稱潁川長者公系出潁川十三世祖某始由金陵徙泰和既子孫蕃衍而貴顯者益衆又幾世曰菊存先生元贑州路儒學教授以子貴贈萬安縣尹公髙祖也曰學禮由贑州路儒學教授纍官贑州路推官致仕公曽祖也公之祖曰以道潮州路儒學教授公之尊府曰有慶先生刻志于學而行尤髙推官公嘗晝寐夢神人擁皂纛𥪡㕔事前而去俄而公生焉推官公喜曰此兒亢吾宗矣稍長頴悟特異常坐客羣集推官公呼令屬對公應聲而辨一坐客皆起賀時方七歲推官公愈益愛之未幾天下大亂亂甫定而居室盡燬于兵諸長老相繼沒家僮侍婢無一人存者公甫冠從弱弟老母以居纍纍然鮮有顧之者獨其姑夫劉尚書嵩來撫之諭使為學遂受詩經于尚書公數年學日進雖貧約僅自立而氣岸髙邁不少降意時人尚書公甚重之久之益肆力古學諸子百家靡不䆒覽蓄之既富出之沛然渾厚浩博而簡嚴精粹發揚蹈厲而鋒穎潜藏一時先生長者皆稱之或慕其為文而求之者輒欣然許諾退坐軒中握筆細書片楮如蠅頭㸃竄瑣瑣遇得意處則琅然誦之其聲若出金石蓋有不知饑寒之在體貧窮之切身者久之以詩經登洪武乙丑進士第明年授山西道監察御史改山東道出按事于山西閩海之間名聲益著繼改廣東道時天下决獄多萃于京師又太祖髙皇帝慎庶獄决獄者惟弗稱上㫖是懼獨公所訊不用威而得其情奸宄懾伏五鼓而興夜深而寐凡憲臺章疏奏核多出其手訊鞠之暇輒為文自娛一時與公交皆名士大夫識與不識皆稱為陳古文而不名也惜所為文多散失不存存者五卷耳公生元至正庚寅某月日以洪武甲戌六月二十一日殁于官享年若干殁之日搜其槖無餘資出其篋無完衣而牀几左右惟簡編塵積聞者莫不悲之夫人曽氏同里曽紹有先生女也自公來京師留事姑于家恭順而安于窮約先公三歲卒子一人曰賞登永樂九年進士第仕于朝女一人適士人嚴成仲公孝友之行本乎天性廣顙隆凖背隱起如負箕緩步徐趨懇懇乎其誠也碩碩乎其大也傲乎其自得而憂患得喪曽不足動其中雖坦夷自居而詭隨側媚者不能逆其情雖簡質不華而巧投曲中者不能測其意終始一節未嘗少變蓋公之材未盡用學未盡施年不及於下夀然為名進士賢御史為文章追乎古之作者雖死無憾矣潜之老母公姊也嘗稱道公之事以勉潜于學以詔其子賞使識之不忘潜既辱公教愛知之深乃敢狀其行言之不覺覼縷者兾似公而己然以哀公之故執筆屢作而屢止終不足以盡公之髙明也惟知公者能擇之處士鍾公吾隱行狀處士諱與字吾隱姓鍾氏出唐越國公紹京二十三世孫十四郎諱文正者仕宋為朝奉大夫由贑徙居泰和之柘塘又繇柘塘徙西塘生子德盛實處士之六世祖也德盛生敏叔為州之隅官綽有譽望元初西鄙寇起州兵寡莫能制宣差何公單騎走隅官命集鄉人討賊賊平上其事于朝授護民守帥辭不受一時皆髙其節敏叔生政甫政甫生聖可聖可生淵伯尤𢎞博有雅度人多慕之淵伯生以敬坦夷接物不為畔岸即處士父也處士生八閲月而母郭氏棄背鞠于伯母涂氏年十三以敬殁處士雖孱然孑立然臨事卓卓有為宗族咸異之元季兵亂挈家逺遁他所遇兵係縲且戮辱者無限處士獨能燭先事幾未嘗困迫大明兵定即治田園新棟宇擇賢師以教子弟曰凡人之質敦厚難成而輕佻易習惟臨之以嚴父兄接之以賢師友則庶幾焉其孝友出于天性自少事諸父曲盡禮意飬繼母尤得其歡心時涂氏年方二十寡居且無子處士事之尤極誠至涂氏遂忘其寡居卒守節以沒其弟樂吾蚤喪而家業落盡遂與從兄興吾從弟從吾力謀振復且曰人生大不幸無兄弟幸而有之往往以田地貨財爭鬪可慨也於是凡公出納一無所計有外侮輒交相赴救冠昏喪祭一以禮節雖不為過侈而必周于情文性强記博覽工詩辭尤善四六駢儷雅好賔客每劇飲盡醉酬酢不倦今山東都轉運鹽副使蕭君鵬舉于處士為妻黨親居南溪處士所甚相邇時鄉先生劉尚書槎翁致仕還館授蕭氏處士亟遣其子亮往從之逰一時賢士若王徴士子與其弟御史君子啓及國子學録蕭君子所咸相友善往還不在南溪則在西塘或時時陟金華登武姥草坐而觴咏得句誇先引滿舉白不盡興不止也或引羣弟子作樂于嵌嵓中至暮忘歸路幽徑瞑不得行則令僮奴束燥荻後先相屬燃之一時之樂逺邇羡慕槎翁先生嘗曰鍾君山川之趣綽有可人意者向使之為一郡一邑未必不雅也顧乃自晦如此遂為書吾隱二字以顔隱堂時人咸謂槎翁真知處士善觀人者處士平生質實之行髙邁之趣類如此當洪武初朝廷下有司令民計産陶甓運于京師有積十年而運弗及二三者朝廷未之罪惟處士獨先完焉適有挾私忿例以逋負誣之者拘至京得白尋以疾殁于旅舍時亮領教贑率惟次子亢在側瀕沒語之曰我疾殆弗起矣然幸俯仰無愧怍死無恨矣汝曹尚敬念于先世母墜厥宗緒命書之簡歸以示亮既而又曰其必返葬我遂殁實洪武戊寅五月十二日也生于至元巳卯正月十七日享年六十亢奉柩至豫章以哀毁嬰疾繼卒其姪啓初等并輿其喪還以是冬十二月庚申葬于同里汪陂之原處士雖平昔抱負然眇論微言䆁怨忿以諷諭鄉曲故既葬之曰人人悲悼之賻奠者交道娶蕭氏隱士仁傑之女即鵬舉之從姊也諳書循婦道性嚴正子四人長即亮也次長庚次月旦皆蚤卒又次即亢女四人皆適巨族孫男八人鈞鐸鏞錡錫銓鎬銑女五人曽孫男一名浩女一人亮今為三府伴讀既榮顯矣益痛處士弗逮飬汲汲欲乞銘當代大手筆以其舊所為狀不足信于當時屬潜更為狀之潜于處士為通家子弟知之為詳義不可辭遂托其實而為之狀云先君畦樂先生行實先君諱蘭字庭秀别字不移姓梁氏先世唐長夀間有為徴仕郎由長沙徙泰和九世曰均崇仕宋為鳯翔知府弟均傑同知黃州府入充史館編修官居縣之東郭大著聲望鳯翔五世至昭伯府君昭伯生才可府君才可生彥卿府君皆以篤行稱彥卿别字心易學者稱心易先生先生于書無所不讀而尤邃于易時同里鍾謹獨先生梁氏之甥也無子以先生為之子故遂姓鍾氏娶楊氏夫人元進士新喻州判升雲先生之子生子三人長曰庭芳次即先君次仲敏先君資禀端厚而讀書警敏七歲侍謹獨公公命與諸孫屬對先君應聲而就而造語益竒後就者悉不能及公大賞異之稍長心易先生授以易經益勤于業探求玩索隆寒盛暑不少懈然遭時大亂奔竄無有寧歲亂甫定而心易先生殁庭芳先生亦己先卒先君獨奉楊夫人訓撫弱弟雖甚困窮而愈愈如也處鄉里瞿瞿然惟恐有失意于人人亦無不敬愛之嘗深夜行遇里人訴其怨家語憤憤不平甚先君反覆喻解之去至家頃之遽聞扣門聲甚急起視之乃向怨家子也拜先君曰公長者人憤訴吾父于公始終但為好語解紛之適吾躡其後欲刃之然公長者在吾不忍也敢忘公德明日持兩縑來謝其謹厚多類此潜始為教保寧之蒼溪而弟混亦受辟教于瑞州瑞去家近嘗一至焉見混謹飭勤于教而子弟皆欣仰頗喜之為留兩月題其所居小齊曰三樂而還其後潜被薦為令廣東四㑹戒以書曰凡州郡仕宦惟寡嗜欲然後能亷亷則風節自立然承乎上者必恭謹接乎下者必慈良近時稍知持守者于此二事往往失之不獲乎上而拂乎下此其所以敗也又曰凡擇友必端人正士與端人正士處雖共患難尤為榮也處非端人正士雖冒榮利沒身可恥而壞其平生見儒生之從仕嘗為吏所欺曰為學有格物之功者於人情物理是是非非自然明白胥吏輩何自而能惑之見有恃材而越于理者曰凡動作以禮自防所以守法而自重也今越縱于矩度之外雖有善政豈賢者以禮蒞民之道以梁氏之無後而冒他姓為非命潜請于朝復姓梁氏築室城西溪上環植美竹數萬竿中為蔬畦淺堤近塢曲折蔽虧引泉為渠縈紆町疃之間土沃壤潤桑麻蔚然先君日笑傲其中或新雨初霽晴日和煦必䇿杖躡屐深入竹樹之間牽蔓引竿欣然自得曰觀物之生意鬱勃與我心俱快也因自號為畦樂翁里中士稱為畦樂先生其教鄉人子弟精於講說推明反覆淺譬近喻而奧隱明徹諸生來學者無不悟悅間為文簡暢而典則至於應酬簡札釋老醮祭四六之文亦極工緻其為詩尤尚格調冲容而雅淡晚喜陶靖節曰靖節之閒曠恬逸我素所慕也嘗賦西畦詩油然田園之趣翰林學士解公為書置卷中名公相屬而和者甚衆皆藏于家集所為詩題曰畦樂集以潜兄弟既仕于外益忘情世務頗嗜飲家多美釀故舊至輒與飲醉而後止諸孫侍側者假之以歡顔好語一味之甘呼之畢至或閒暇小酌使之持肴奉觴拜起進退因詫曰吾二子逺仕藉此自娛也有過失則密語丁寧曰是後不可復爾也未嘗至于楚撻嘗冉至京師羣公多士交相欣慕及潜之承召赴北京也兩示以書及詩二章歡然喜潜之承恩遇不以其去之逺而有毫髮戚乎其中然是時先君抱疾日益甚矣病時弟混生子得報甚喜為名曰從客來問疾曰何不賀我命取酒酌客然己屏去醫不服藥矣尋命為深衣幅巾曰以此斂我臨終問日蚤莫對以晚食時即命女奴輩出呼二僮與孫楘扶持盥沐更衣而坐親舊更進問欲何言曰葬祭必以禮他事吾二兒自能辦也言訖而逝生元至正癸未四月初一日其殁以今永樂八年七月二十六日也享年六十有八先君耿介自守老而益篤安乎儉約委命而自信者始終不二其志不强顔以譽非情不拂己以從流俗屛居終身無毫髮慕外之心故常油然自得配陳氏元處士友慶先生之子潮州路教授道山先生之孫贑州路推官梅村府君之曽孫也相先君婦道母儀卓冠家族子二人長即潜為翰林修撰兼右春坊右贊善次混溧陽縣儒學教諭孫男八人果楘栗矩乘楫榆樅矩乘樅早殤孫女六人曽孫二人翰羾將以明年某月某日卜吉葬于某鄉之某山某向念先君殁時潜兄弟既宦于外而長孫果亦在京師斂之明日果乃至家殁之四月潜還自北京始聞訃音摧痛不能即死仰惟先君忠信之行行于家庭著于鄉黨朋逰樂其易直子弟蒙其教愛下至僮𨽻小人亦皆欣悅服事而未得沾一命以見于功業而埀諸來世此潜所以疾首痛心叫號天地無可如何而有望于世之大賢君子之一言以賁諸幽也哽塞之餘言之無次伏惟知先君者擇焉潜泣血頓首謹書泊菴集卷八
